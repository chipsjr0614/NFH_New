<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💊 통합 투약 앱 (NFH)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* ── 탭 ── */
.main-tabs{display:flex;background:#161b22;border-bottom:1px solid #30363d;position:sticky;top:0;z-index:100}
.main-tab{flex:1;padding:14px 6px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:#8b949e;border-bottom:3px solid transparent;transition:.2s}
.main-tab.active{color:#58a6ff;border-bottom-color:#58a6ff}
.panel{display:none;padding:16px;max-width:1100px;margin:0 auto}
.panel.active{display:block}

/* ── 공통 카드 ── */
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;overflow:hidden;margin-bottom:14px}
.card-head{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #30363d}
.card-body{padding:14px 16px}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
h3{font-size:15px;font-weight:700}
.sub{font-size:12px;color:#8b949e;margin-top:2px}

/* ── 체중 입력 ── */
.weight-row{display:flex;align-items:center;gap:12px;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px 18px;margin-bottom:16px}
.weight-row label{font-size:14px;color:#8b949e;white-space:nowrap}
.weight-row input{background:#0d1117;border:1px solid #388bfd;color:#fff;font-size:24px;font-weight:700;width:90px;padding:6px 10px;border-radius:8px;text-align:center}
.weight-row span{font-size:16px;color:#8b949e}
.age-btns{display:flex;flex-wrap:wrap;gap:6px;margin-left:auto}
.age-btn{background:#21262d;border:1px solid #30363d;color:#c9d1d9;font-size:12px;padding:5px 11px;border-radius:6px;cursor:pointer}
.age-btn:hover{background:#30363d;color:#58a6ff}

/* ── 테이블 ── */
table{width:100%;border-collapse:collapse}
th{background:#0d1117;color:#8b949e;font-size:11px;font-weight:600;padding:8px 14px;text-align:left;border-bottom:1px solid #30363d}
td{padding:9px 14px;font-size:13px;border-bottom:1px solid #21262d}
tr:last-child td{border-bottom:none}
tr.hl td{background:#1c2d45}
tr.hl .val{color:#58a6ff;font-size:16px;font-weight:700}
.val{color:#e6edf3;font-weight:600}
.dim{color:#8b949e}

/* ── 성인 레이아웃 ── */
.adult-layout{display:grid;grid-template-columns:160px 1fr;gap:16px}
.drug-sidebar{display:flex;flex-direction:column;gap:6px;position:sticky;top:60px;height:fit-content}
.drug-btn{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:10px 12px;border-radius:8px;cursor:pointer;text-align:left;font-size:13px;font-weight:600;transition:.2s}
.drug-btn:hover,.drug-btn.active{background:#1c2d45;border-color:#388bfd;color:#58a6ff}
.drug-section{display:none}
.drug-section.active{display:block}

/* ── 노에피 두 열 ── */
.two-col-table th:nth-child(2),.two-col-table td:nth-child(2){color:#66bb6a}
.two-col-table th:nth-child(3),.two-col-table td:nth-child(3){color:#ffa726}

/* ── 소아 서브탭 ── */
.sub-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.sub-tab{padding:8px 18px;border-radius:20px;background:#21262d;border:1px solid #30363d;color:#8b949e;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.sub-tab.active{background:#1c2d45;border-color:#388bfd;color:#58a6ff}
.sub-panel{display:none}
.sub-panel.active{display:block}

/* ── 소아 그리드 ── */
.peds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}

/* ── 약물정보 검색 ── */
.search-box{position:relative;margin-bottom:16px}
.search-box input{width:100%;background:#161b22;border:1px solid #388bfd;color:#e6edf3;font-size:16px;padding:12px 16px 12px 44px;border-radius:10px}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px}
.drug-list{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:16px}
.drug-chip{background:#21262d;border:1px solid #30363d;border-radius:8px;padding:10px 14px;cursor:pointer;font-size:13px;transition:.2s}
.drug-chip:hover{border-color:#388bfd;color:#58a6ff}
.drug-chip.selected{background:#1c2d45;border-color:#388bfd;color:#58a6ff}
.info-card{background:#161b22;border:1px solid #388bfd;border-radius:10px;padding:18px}
.info-row{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid #21262d;font-size:13px}
.info-row:last-child{border-bottom:none}
.info-label{color:#8b949e;min-width:90px;font-weight:600}
.info-val{color:#e6edf3;flex:1;white-space:pre-line}
.go-btn{display:block;width:100%;margin-top:14px;padding:11px;background:#1f6feb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;text-align:center}
.go-btn:hover{background:#388bfd}

/* ── 색상 테마 ── */
.green{color:#56d364}.orange{color:#ffa726}.red{color:#f85149}.purple{color:#bc8cff}.yellow{color:#e3b341}.blue{color:#58a6ff}.cyan{color:#39c5cf}
.bg-green{background:#1a2f1a}.bg-blue{background:#1c2d45}.bg-purple{background:#211a2f}.bg-red{background:#2f1a1a}.bg-orange{background:#2f221a}.bg-yellow{background:#2a2412}

/* ── 섹션 헤더 ── */
.sec-head{font-size:12px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:1px;padding:6px 0 10px;border-bottom:1px solid #30363d;margin-bottom:12px}
.big-val{font-size:20px;font-weight:700;color:#58a6ff}
.result-box{background:#1c2d45;border:1px solid #388bfd;border-radius:8px;padding:12px 16px;text-align:center;margin:8px 0}

/* ── 반응형 ── */
@media(max-width:700px){
  .adult-layout{grid-template-columns:1fr}
  .drug-sidebar{flex-direction:row;flex-wrap:wrap;position:static}
  .drug-btn{flex:1;min-width:80px;text-align:center;font-size:12px;padding:8px 6px}
  .peds-grid{grid-template-columns:1fr}
  .drug-list{grid-template-columns:1fr}
  .two-col-table td,.two-col-table th{padding:7px 8px;font-size:12px}
}
@media(max-width:400px){
  .drug-list{grid-template-columns:1fr}
  .age-btns{display:none}
}

/* ── 통합 약물정보 (v3) ── */
.cat-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.cat-chip{background:#21262d;border:1px solid #30363d;color:#8b949e;font-size:12px;padding:5px 12px;border-radius:16px;cursor:pointer}
.cat-chip.active{background:#1c2d45;border-color:#388bfd;color:#58a6ff}
.mix-hero{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:6px 0 14px}
.mix-box{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:12px 10px;text-align:center}
.mix-box .lbl{font-size:11px;color:#8b949e}
.mix-box .v{font-size:16px;font-weight:700;margin-top:5px;word-break:keep-all;line-height:1.3}
.pill{font-size:11px;padding:3px 10px;border-radius:14px;background:#21262d;border:1px solid #30363d;color:#8b949e}
.pill-blue{background:#1c2d45;border-color:#388bfd;color:#58a6ff}
@media(max-width:600px){.mix-hero{grid-template-columns:1fr}}

/* ── 아코디언/홈/라이트 (v4) ── */
.app-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#161b22;border-bottom:1px solid #30363d}
.app-bar .app-title{font-size:15px;font-weight:700;color:#e6edf3}
.app-bar .app-actions{display:flex;gap:8px}
.app-bar button{background:#21262d;border:1px solid #30363d;color:#c9d1d9;font-size:16px;width:40px;height:34px;border-radius:8px;cursor:pointer}
.app-bar button:hover{border-color:#388bfd}
.drug-item{margin-bottom:8px}
.acc-arrow{color:#8b949e;font-size:11px}
.acc-card{margin-top:8px}
body.light{background:#f6f8fa;color:#1f2328}
body.light .app-bar,body.light .main-tabs{background:#fff;border-color:#d0d7de}
body.light .app-title{color:#1f2328}
body.light .app-bar button{background:#f6f8fa;border-color:#d0d7de;color:#1f2328}
body.light .card,body.light .info-card,body.light .weight-row,body.light .result-box{background:#fff;border-color:#d0d7de}
body.light .search-box input{background:#fff;border-color:#0969da;color:#1f2328}
body.light .drug-chip,body.light .cat-chip,body.light .age-btn,body.light .drug-btn{background:#fff;border-color:#d0d7de;color:#1f2328}
body.light .cat-chip.active,body.light .drug-chip.selected,body.light .drug-btn.active{background:#ddf4ff;border-color:#0969da;color:#0969da}
body.light th{background:#f0f3f6;color:#57606a;border-color:#d0d7de}
body.light td{border-color:#eaeef2}
body.light tr.hl td{background:#ddf4ff}
body.light .mix-box{background:#f6f8fa;border-color:#d0d7de}
body.light .pill{background:#f6f8fa;border-color:#d0d7de;color:#57606a}
body.light .pill-blue{background:#ddf4ff;border-color:#0969da;color:#0969da}
body.light .dim,body.light .sub,body.light .info-label,body.light .acc-arrow,body.light .weight-row label,body.light .weight-row span{color:#57606a}
body.light .info-val,body.light .val,body.light h3{color:#1f2328}
body.light .weight-row input{background:#fff;color:#1f2328}
body.light .card-head{border-color:#d0d7de}
body.light .main-tab{color:#57606a}
body.light .main-tab.active{color:#0969da;border-bottom-color:#0969da}
body.light .sub-tab{background:#fff;border-color:#d0d7de;color:#57606a}
body.light .sub-tab.active{background:#ddf4ff;border-color:#0969da;color:#0969da}
body.light .green{color:#1a7f37}body.light .red{color:#cf222e}body.light .orange{color:#bc4c00}body.light .blue{color:#0969da}body.light .purple{color:#8250df}body.light .yellow{color:#9a6700}body.light .cyan{color:#1b7c83}
body.light tr.hl .val{color:#0969da}
body.light .bg-green{background:#dafbe1}body.light .bg-blue{background:#ddf4ff}body.light .bg-purple{background:#fbefff}body.light .bg-red{background:#ffebe9}body.light .bg-orange{background:#fff1e5}body.light .bg-yellow{background:#fff8c5}
body.light .go-btn{background:#0969da}
.abx-tag{display:inline-block;background:#21262d;border:1px solid #30363d;border-radius:6px;padding:5px 11px;margin:3px;font-size:13px}
body.light .abx-tag{background:#f6f8fa;border-color:#d0d7de;color:#1f2328}
.badge-ha{display:inline-block;background:#7d1a1a;color:#ffb3b3;font-size:10px;padding:2px 7px;border-radius:10px;margin-left:4px;font-weight:700}
.badge-ve{display:inline-block;background:#7a4a12;color:#ffd9a8;font-size:10px;padding:2px 7px;border-radius:10px;margin-left:4px;font-weight:700}
.warn-lasa{background:#2a2412;border-left:3px solid #e3b341;padding:7px 10px;border-radius:6px;margin:8px 0;font-size:12px;color:#e3b341}
.warn-rev{background:#16261a;border-left:3px solid #56d364;padding:7px 10px;border-radius:6px;margin:8px 0;font-size:12px;color:#9fe0a6}
.extrav-box{background:#2f1a1a;border:1px solid #7d1a1a;border-radius:8px;padding:10px 12px;margin-top:12px;font-size:12px;color:#ffc7c7;line-height:1.5}
body.light .badge-ha{background:#ffebe9;color:#cf222e}body.light .badge-ve{background:#fff1e5;color:#bc4c00}
body.light .warn-lasa{background:#fff8c5;color:#7a5c00}body.light .warn-rev{background:#dafbe1;color:#1a7f37}
body.light .extrav-box{background:#ffebe9;border-color:#ffb3b3;color:#a40e26}
</style>
</head>
<body>

<!-- ── 메인 탭 ── -->
<div class="app-bar">
  <span class="app-title">💊 통합 투약 앱</span>
  <div class="app-actions">
    <button onclick="goHome()" title="홈">🏠</button>
    <button onclick="toggleTheme()" id="themeBtn" title="테마">🌙</button>
  </div>
</div>

<div class="main-tabs">
  <div class="main-tab" onclick="showMain('info')">🔍 약물정보</div>
  <div class="main-tab active" onclick="showMain('adult')">💉 성인계산기</div>
  <div class="main-tab" onclick="showMain('peds')">👶 소아계산기</div>
  <div class="main-tab" onclick="showMain('abx')">🧬 항생제병용</div>
  <div class="main-tab" onclick="showMain('anti')">🧪 해독·역전제</div>
</div>

<!-- ════════════════════════════════════════════════
     탭 1: 약물정보
════════════════════════════════════════════════ -->
<div id="tab-info" class="panel">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="drugSearch" placeholder="약물명 검색 (한글/영문)..." oninput="filterDrugs()">
  </div>
  <div class="cat-chips" id="catChips"></div>
  <div class="drug-list" id="drugList"></div>
</div>

<!-- ════════════════════════════════════════════════
     탭 2: 성인 계산기
════════════════════════════════════════════════ -->
<div id="tab-adult" class="panel active">
  <div class="weight-row">
    <label>환자 체중</label>
    <input type="number" id="adultWeight" value="70" min="1" max="200" oninput="updateAdult()">
    <span>kg</span>
    <div class="age-btns">
      <button class="age-btn" onclick="setAW(50)">50kg</button>
      <button class="age-btn" onclick="setAW(60)">60kg</button>
      <button class="age-btn" onclick="setAW(70)">70kg</button>
      <button class="age-btn" onclick="setAW(80)">80kg</button>
      <button class="age-btn" onclick="setAW(90)">90kg</button>
    </div>
  </div>
  <div class="adult-layout">
    <div class="drug-sidebar" id="drugSidebar"></div>
    <div id="drugContent"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════════
     탭 3: 소아 계산기
════════════════════════════════════════════════ -->
<div id="tab-peds" class="panel">
  <div class="weight-row">
    <label>체중</label>
    <input type="number" id="pedsWeight" value="15" min="1" max="80" oninput="updatePeds()">
    <span>kg</span>
    <div class="age-btns">
      <button class="age-btn" onclick="setPW(3.5,'신생아')">신생아</button>
      <button class="age-btn" onclick="setPW(10,'1세')">1세</button>
      <button class="age-btn" onclick="setPW(14,'3세')">3세</button>
      <button class="age-btn" onclick="setPW(18,'5세')">5세</button>
      <button class="age-btn" onclick="setPW(22,'7세')">7세</button>
      <button class="age-btn" onclick="setPW(32,'10세')">10세</button>
    </div>
  </div>
  <div class="sub-tabs">
    <div class="sub-tab active" onclick="showSub('emerg')">🚨 응급</div>
    <div class="sub-tab" onclick="showSub('drugs')">💊 약물</div>
    <div class="sub-tab" onclick="showSub('fluids')">💧 수액</div>
  </div>
  <div id="sub-emerg" class="sub-panel active"></div>
  <div id="sub-drugs" class="sub-panel"></div>
  <div id="sub-fluids" class="sub-panel"></div>
</div>

<div id="tab-abx" class="panel">
  <div style="font-size:13px;color:#8b949e;margin-bottom:12px">항생제를 선택하면 같은 라인 <b>병용 가능 여부</b>를 보여줍니다. (출처: 병용투여 가능 항생제.pptx)</div>
  <div class="cat-chips" id="abxChips"></div>
  <div id="abxResult"></div>
</div>

<div id="tab-anti" class="panel">
  <div id="antiResult"></div>
</div>

<script>
// ════════════════════════════════════════════════
// 데이터
// ════════════════════════════════════════════════

// ── 통합약물 85종 (약물_통합정리_초안_v1.xlsx) ──

  {name:"Adenosin",kr:"아데노신",cat:"심혈관계",full:"Adenosin (6mg/2ml vial)  ★ Infusion : 희석불가",stock:"O",bolus:"(믹스칸 참조)",dil:"원액 (NS 20 flush)",push:"⚡빠르게 + NS 20cc flush",mix:"Bolus : 반감기가 짦아 빠르게 투약 후 \n        ★ N/S 20ml flusing 필수 \n말초 투약(상완) : 6mg(1차) → 12mg (2차), \n                → 12mg (3차)\n중심정맥 투약 or 심장이식환자 : 3mg → 6mg \n                               → 6mg",fluid:"",rate:"(믹스/투여 칸 참조)",caution:"E-cart 및 주치의 bedside keep 필수\n심전도 모니터 보면서 투여, 투여 전후 EKG print\nIV 확보시 상완(best), 최소 상지(upper extremity)\nN/S 20ml flusing 필수  ◾효능: 발작심실상성빈맥치료",stab:"",src:"순환기계약물투여방법.docx"},
  {name:"Amiodarone HCI",kr:"아미오다론",cat:"심혈관계",full:"Amiodarone HCI (150mg/3ml amp)",stock:"O",bolus:"(믹스칸 참조)",dil:"D5W 20",push:"⚡빠르게 (D5W 20cc·CPR)",mix:"★ CPR : V.fib, p-VT 시 빠른 Bolus투여\n① 1차 : 300mg + ★ D5W 20ml IV push\n② 2차 : 150mg + ★ D5W 20ml IV push",fluid:"",rate:"(믹스/투여 칸 참조)",caution:"서맥, QT, prolongation 등 주의 관찰 필요\n★ Only D5W  ◾효능: 재발성중증부정맥 치료\n(Heart 환자 A.fib일 때)",stab:"",src:"순환기계약물투여방법.docx"},

function showMain(name){
  document.querySelectorAll('.main-tab').forEach((t,i)=>t.classList.toggle('active',['info','adult','peds','abx','anti'][i]===name));
  ['tab-info','tab-adult','tab-peds','tab-abx','tab-anti'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}
function showSub(name){
  document.querySelectorAll('.sub-tab').forEach((t,i)=>t.classList.toggle('active',['emerg','drugs','fluids'][i]===name));
  ['sub-emerg','sub-drugs','sub-fluids'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById('sub-'+name).classList.add('active');
}

let selDrug=null, selCat='전체';
const CATS=['전체','심혈관계','진정·진통(RSI)','진통·해열','전해질','항생제·항진균','소화기·항구토','이뇨','해독·기타','기타'];
function initDrugList(){ renderCatChips(); renderDrugList(curList()); }
function renderCatChips(){ document.getElementById('catChips').innerHTML=CATS.map(c=>`<div class="cat-chip${selCat===c?' active':''}" onclick="setCat('${c}')">${c}</div>`).join(''); }
function setCat(c){ selCat=c; renderCatChips(); renderDrugList(curList()); }
function curList(){ const q=document.getElementById('drugSearch').value.toLowerCase(); return DRUG_DB.filter(d=>(selCat==='전체'||d.cat===selCat)&&(!q||d.name.toLowerCase().includes(q)||(d.kr||'').includes(q)||(d.full||'').toLowerCase().includes(q))); }
function filterDrugs(){ renderDrugList(curList()); }
function bolusColor(b){ if(/불가|금지|빠르게/.test(b))return'red'; if(/주의|⚠|조건|권장\s*안|확인/.test(b))return'orange'; if(/가능|✅/.test(b))return'green'; return''; }
function pushColor(p){ if(/⚡|빠르게/.test(p))return'red'; if(/⚠/.test(p))return'orange'; if(p&&p!=='—')return'green'; return''; }
function clean(v){ return (!v||/참조/.test(v))?'—':v; }
function drugCardHTML(d){
  const stockBadge=d.stock==='O'?'<span class="pill pill-blue">소방병원 입고</span>':'';
  const bol=clean(d.bolus), psh=d.push||'—';
  const match=ADULT_DRUGS.find(a=>d.name.toLowerCase().includes(a.name.toLowerCase().split(' ')[0]));
  return `<div class="info-card acc-card">
     <div style="font-size:13px;color:#8b949e;margin-bottom:10px">${d.kr||''}${d.full&&d.full!==d.name?' · '+d.full:''} ${stockBadge}</div>
     ${HIGH_ALERT.has(d.name)?'<span class="badge-ha">⚠️ 고위험</span> ':''}${VESICANT.has(d.name)?'<span class="badge-ve">🟠 유출주의</span> ':''}
     ${LASA[d.name]?`<div class="warn-lasa">🔀 헷갈림 주의: ${LASA[d.name]}</div>`:''}
     ${REVERSAL[d.name]?`<div class="warn-rev">💊 역전제: ${REVERSAL[d.name]}</div>`:''}
     <div class="mix-hero">
       <div class="mix-box"><div class="lbl">💧 희석액(표준)</div><div class="v blue">${d.dil||'—'}</div></div>
       <div class="mix-box"><div class="lbl">💉 IV푸시 (NS 20cc/시간)</div><div class="v ${pushColor(psh)}">${psh}</div></div>
       <div class="mix-box"><div class="lbl">Bolus 가능여부</div><div class="v ${bolusColor(bol)}">${bol}</div></div>
     </div>
     <div class="info-row"><span class="info-label">💉 믹스 상세</span><span class="info-val">${d.mix||'—'}</span></div>
     <div class="info-row"><span class="info-label">🧪 희석수액</span><span class="info-val">${d.fluid||'—'}</span></div>
     <div class="info-row"><span class="info-label">⏱️ 투여속도</span><span class="info-val">${d.rate||'—'}</span></div>
     ${d.caution?`<div class="info-row"><span class="info-label">⚠️ 주의·배합금기</span><span class="info-val red">${d.caution}</span></div>`:''}
     <div class="info-row"><span class="info-label">🧊 안정시간</span><span class="info-val">${d.stab||'—'}</span></div>
     <div class="info-row"><span class="info-label">📄 출처</span><span class="info-val dim" style="font-size:11px">${d.src||''}</span></div>
     ${VESICANT.has(d.name)?`<div class="extrav-box"><b>🩹 혈관외유출 시</b><br>${EXTRAV}</div>`:''}
     ${match?`<button class="go-btn" onclick="gotoAdult('${d.name.replace(/'/g,"\\'")}')">💉 성인 계산기로 바로 이동 →</button>`:''}
   </div>`;
}
function renderDrugList(list){
  const el=document.getElementById('drugList');
  if(!list.length){ el.innerHTML='<div style="color:#8b949e;padding:18px">검색 결과 없음</div>'; return; }
  el.innerHTML=list.map(d=>{
    const open=selDrug===d.name;
    return `<div class="drug-item">
      <div class="drug-chip${open?' selected':''}" onclick="toggleDrug('${d.name.replace(/'/g,"\\'")}')">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <div><span style="font-weight:600">${d.name}</span>${HIGH_ALERT.has(d.name)?'<span class="badge-ha">고위험</span>':''}${VESICANT.has(d.name)?'<span class="badge-ve">유출</span>':''} ${d.stock==='O'?'<span style="color:#58a6ff;font-size:10px">●</span>':''}
            <div style="font-size:11px;color:#8b949e">${d.kr||''} · ${d.cat}</div></div>
          <span class="acc-arrow">${open?'▲':'▼'}</span>
        </div>
      </div>
      ${open?drugCardHTML(d):''}
    </div>`;
  }).join('');
}
function toggleDrug(name){
  selDrug=(selDrug===name)?null:name;
  renderDrugList(curList());
  if(selDrug){ const sel=document.querySelector('.drug-chip.selected'); if(sel) setTimeout(()=>sel.scrollIntoView({behavior:'smooth',block:'start'}),40); }
}

  document.querySelectorAll('#abxChips .cat-chip').forEach(c=>c.classList.toggle('active',c.textContent===name));

  ABX_LIST.forEach(o=>{ if(o===name)return; const v=(ABX_PAIR[name]&&ABX_PAIR[name][o])||'근거없음'; if(v==='불가')no.push(o); else if(v==='가능')yes.push(o); else unk.push(o); });

  const tag=a=>a.length?a.map(x=>`<span class="abx-tag">${x}</span>`).join(''):'<span class="dim">없음</span>';
  let h=`<div class="info-card" style="margin-bottom:14px"><div style="font-size:19px;font-weight:700">${name}</div>`;

}

let activeAdultDrug = 'norepi';
function setAW(w){ document.getElementById('adultWeight').value=w; updateAdult(); }
function calcRate(dose,conc,weightBased,w){
  return weightBased ? (dose*w*60)/conc : (dose*60)/conc;
}
function selectDrug(id){ activeAdultDrug=id; updateAdult(); }

function updateAdult(){
  const w=parseFloat(document.getElementById('adultWeight').value)||70;
  // 사이드바
  document.getElementById('drugSidebar').innerHTML=ADULT_DRUGS.map(d=>
    `<button class="drug-btn ${d.id===activeAdultDrug?'active':''}" onclick="selectDrug('${d.id}')">
      <span class="${d.color}">${d.name}</span><br>
      <span style="font-size:10px;color:#8b949e">${d.badge}</span>
    </button>`
  ).join('');
  // 컨텐츠
  const content=document.getElementById('drugContent');
  const drug=ADULT_DRUGS.find(d=>d.id===activeAdultDrug);
  if(!drug){content.innerHTML='';return;}

  if(drug.twoCol){
    // 노에피 - 말초/중심 동시 표시
    const r0=drug.routes[0], r1=drug.routes[1];
    const rows=drug.doses.map(dose=>{
      const rate0=calcRate(dose,r0.conc,drug.weightBased,w);
      const rate1=calcRate(dose,r1.conc,drug.weightBased,w);
      const hl=dose===drug.highlight;
      return `<tr class="${hl?'hl':''}">
        <td class="dim">${dose} ${drug.doseUnit}</td>
        <td class="${hl?'val green':'green'}" style="font-size:${hl?'17px':'14px'};font-weight:700">${rate0.toFixed(1)} ml/hr</td>
        <td class="${hl?'val orange':'orange'}" style="font-size:${hl?'17px':'14px'};font-weight:700">${rate1.toFixed(1)} ml/hr</td>
      </tr>`;
    }).join('');
    content.innerHTML=`
      <div class="card">
        <div class="card-head bg-green">
          <div><h3 class="green">${drug.name}</h3><div class="sub">체중 ${w}kg 기준</div></div>
          <span class="badge" style="background:#1a2f1a;color:#56d364">${drug.badge}</span>
        </div>
        <div class="card-body">
          <table class="two-col-table">
            <tr>
              <th>용량</th>
              <th>🟢 말초 (${r0.conc}mcg/ml)<br><span style="font-weight:400;font-size:10px">${r0.detail}</span></th>
              <th>🟠 중심 (${r1.conc}mcg/ml)<br><span style="font-weight:400;font-size:10px">${r1.detail}</span></th>
            </tr>
            ${rows}
          </table>
        </div>
      </div>`;
  } else {
    const route=drug.routes[0];
    const rows=drug.doses.map(dose=>{
      const rate=calcRate(dose,route.conc,drug.weightBased,w);
      const hl=dose===drug.highlight;
      return `<tr class="${hl?'hl':''}">
        <td class="dim">${dose} ${drug.doseUnit}</td>
        <td class="${hl?'val':'val'}" style="font-size:${hl?'18px':'14px'};font-weight:700;color:var(--c)">${rate.toFixed(1)} ml/hr</td>
      </tr>`;
    }).join('');
    const colors={blue:'#58a6ff',purple:'#bc8cff',red:'#f85149',orange:'#ffa726'};
    const c=colors[drug.color]||'#58a6ff';
    content.innerHTML=`
      <div class="card">
        <div class="card-head" style="background:var(--bg)">
          <div><h3 style="color:${c}">${drug.name}</h3>
            <div class="sub">${route.detail} · ${route.conc} ${route.unit} · 체중 ${w}kg</div>
          </div>
          <span class="badge" style="background:#21262d;color:${c}">${drug.badge}</span>
        </div>
        <div class="card-body">
          <style scoped>:root{--c:${c}}</style>
          <table>
            <tr><th>용량</th><th>주입 속도</th></tr>
            ${rows}
          </table>
        </div>
      </div>`;
  }
}

function setPW(w,label){ document.getElementById('pedsWeight').value=w; updatePeds(); }
function getAirway(w){
  return AIRWAY_TABLE.find(r=>w>=r.wMin&&w<r.wMax)||AIRWAY_TABLE[AIRWAY_TABLE.length-1];
}
function getVitals(w){
  return VITAL_TABLE.find(r=>w<=r.wMax)||VITAL_TABLE[VITAL_TABLE.length-1];
}
function maintenance(w){
  if(w<=10) return (4*w).toFixed(1);
  if(w<=20) return (40+2*(w-10)).toFixed(1);
  return (60+(w-20)).toFixed(1);
}
function f(n,d=1){ return parseFloat(n.toFixed(d)); }

function updatePeds(){
