<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>응급실 외과계열 교육 프로그램 v1.0 — 국립소방병원</title>
<style>
:root{
  --bg:#0d1117;--surf:#161b22;--surf2:#1c2330;--brd:#2a3441;
  --txt:#e6edf3;--mute:#8b98a8;--dim:#586273;
  --gold:#e3b341;
  --why:#4d9fff;--whybg:#0d2440;--whybd:#1e4976;
  --red:#ef4444;--redbg:#2a1012;--redbd:#7f1d1d;
  --c0:#1565C0;--c1:#2e7d32;--c2:#e65100;--c3:#8e24aa;--c4:#c62828;--c5:#00838f;
}
body.light{
  --bg:#eef2f6;--surf:#ffffff;--surf2:#f5f8fb;--brd:#dde5ee;
  --txt:#16202c;--mute:#5b6876;--dim:#9aa7b5;
  --why:#1565C0;--whybg:#eaf2fd;--whybd:#bcd6f5;
  --redbg:#fdeced;--redbd:#f5b5b5;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-size:18px;line-height:1.7;
  font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  transition:background .2s,color .2s;}
.wrap{max-width:880px;margin:0 auto;padding:0 18px;}

/* 상단바 */
.top{position:sticky;top:0;z-index:40;background:var(--surf);border-bottom:1px solid var(--brd);}
.top-in{max-width:880px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:12px;}
.brand{font-size:18px;font-weight:800;letter-spacing:-.4px;cursor:pointer;white-space:nowrap;}
.brand em{color:var(--red);font-style:normal;}
.top .sp{flex:1;}
.tgl{display:flex;gap:5px;}
.tgl button{padding:7px 12px;border:1px solid var(--brd);background:var(--surf2);color:var(--mute);
  border-radius:18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.tgl button.on{background:var(--red);border-color:var(--red);color:#fff;}

/* 홈 */
#home{padding:20px 0 60px;}
.hero-home{text-align:center;padding:14px 0 18px;}
.hero-home h1{font-size:27px;font-weight:800;margin-bottom:6px;}
.hero-home p{color:var(--mute);font-size:15px;}
.prog{margin:14px auto 0;max-width:420px;background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:12px 16px;}
.prog .pbar{height:8px;background:var(--surf2);border-radius:5px;overflow:hidden;margin-top:8px;}
.prog .pfill{height:100%;background:linear-gradient(90deg,#2e7d32,#43a047);transition:width .4s;}
.search{position:relative;margin:18px 0 8px;}
.search input{width:100%;background:var(--surf);border:1.5px solid var(--brd);border-radius:12px;
  padding:14px 16px 14px 46px;color:var(--txt);font-size:16px;font-family:inherit;outline:none;}
.search input:focus{border-color:var(--why);}
.search .si{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:20px;}

.cat{margin-top:26px;}
.cat-h{font-size:17px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.cat-h .cnt{font-size:13px;color:var(--mute);font-weight:600;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:11px;}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:13px;padding:15px;cursor:pointer;
  transition:.15s;position:relative;border-left:4px solid var(--cc,#666);}
.card:hover{transform:translateY(-2px);border-color:var(--why);}
.card .no{font-size:12px;color:var(--mute);font-weight:700;}
.card .nm{font-size:16.5px;font-weight:800;margin:3px 0 7px;line-height:1.35;}
.card .df{font-size:13px;color:var(--gold);}
.card .vchk{position:absolute;top:13px;right:13px;font-size:16px;display:none;}
.card.viewed .vchk{display:block;}
.card.viewed{opacity:.78;}
.noresult{text-align:center;color:var(--mute);padding:40px 0;}

/* 케이스 상세 */
#detail{display:none;padding-bottom:70px;}
.back{display:inline-flex;align-items:center;gap:6px;margin:16px 0 4px;background:var(--surf);
  border:1px solid var(--brd);color:var(--txt);padding:9px 15px;border-radius:20px;font-size:14px;
  font-weight:600;cursor:pointer;font-family:inherit;}
.hero{color:#fff;border-radius:18px;padding:24px 22px;margin:8px 0 18px;}
.hero .cno{font-size:14px;font-weight:700;opacity:.9;letter-spacing:.5px;}
.hero h1{font-size:30px;font-weight:800;margin:4px 0 12px;letter-spacing:-.5px;line-height:1.2;}
.hero .meta{display:flex;flex-wrap:wrap;gap:8px;}
.chip{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);
  padding:5px 12px;border-radius:16px;font-size:13.5px;font-weight:600;}

.mentor{background:var(--surf2);border:1px solid var(--brd);border-left:4px solid var(--gold);
  border-radius:12px;padding:17px 19px;margin-bottom:20px;}
.mentor .mh{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:7px;}
.mentor p{font-size:16.5px;}

.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:10px 15px;border-radius:20px;border:1px solid var(--brd);background:var(--surf);
  color:var(--mute);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.15s;}
.tab.active{color:#fff;border-color:transparent;}

.panel{display:none;animation:fade .25s ease;}
.panel.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.sec-head{display:flex;align-items:center;gap:9px;margin:14px 0 12px;}
.sec-head h2{font-size:20px;font-weight:800;}
.item{background:var(--surf);border:1px solid var(--brd);border-radius:13px;padding:18px;margin-bottom:13px;}
.item-title{font-size:17.5px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.item-title::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;}
.item-body{font-size:16px;white-space:pre-line;}
.why{margin-top:12px;background:var(--whybg);border:1px solid var(--whybd);border-radius:10px;padding:13px 15px;}
.why .wl{font-size:13px;font-weight:800;color:var(--why);letter-spacing:.5px;margin-bottom:5px;}
.why .wt{font-size:15px;white-space:pre-line;}
.fig{background:#fff;border:1px solid var(--brd);border-radius:14px;padding:14px;margin:6px 0 16px;box-shadow:0 1px 5px rgba(0,0,0,.07);}
.fig svg{width:100%;height:auto;display:block;}

.redbox{background:var(--redbg);border:1px solid var(--redbd);border-radius:14px;padding:18px;margin:22px 0 14px;}
.redbox h2{color:var(--red);font-size:19px;font-weight:800;margin-bottom:12px;}
.rf{display:flex;gap:10px;padding:11px 0;border-bottom:1px dashed var(--redbd);font-size:16px;}
.rf:last-child{border:none;}
.rf .ri{color:var(--red);flex-shrink:0;}

.memo{background:linear-gradient(135deg,#1A237E,#283593);color:#fff;border-radius:14px;padding:20px;margin-bottom:14px;}
.memo .ml{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:8px;}
.memo p{font-size:16.5px;font-weight:600;}

.navbtns{display:flex;gap:10px;margin-top:18px;}
.navbtns button{flex:1;padding:13px;border:1px solid var(--brd);background:var(--surf);color:var(--txt);
  border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.navbtns button:disabled{opacity:.4;cursor:default;}
</style>
</head>
<body>

<div class="top"><div class="top-in">
  <div class="brand" onclick="goHome()"><em>ER</em> 외과계열 교육</div>
  <div class="sp"></div>
  <div class="tgl">
    <button id="bd" class="on" onclick="theme('dark')">🌙</button>
    <button id="bl" onclick="theme('light')">☀️</button>
  </div>
</div></div>

<div class="wrap">
  <!-- 홈 -->
  <div id="home">
    <div class="hero-home">
      <h1>🏥 응급실 외과계열 교육 프로그램</h1>

      <div class="prog">
        <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:600">

        </div>

      </div>
    </div>
    <div class="search">
      <span class="si">🔍</span>
      <input id="q" type="text" placeholder="병명·증상·키워드 검색…" oninput="renderHome()">
    </div>
    <div id="catList"></div>
  </div>

  <!-- 상세 -->
  <div id="detail"></div>
</div>

 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">천공 — 단서·처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#37474f\">free air=천공</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">갑작스런 극심한 상복통→전반화</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#37474f\">판자배(강직)·반발통</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#37474f\">X선/CT 유리공기(free air)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">금식·비위관·수액·광범위 항생제·PPI</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"800\" fill=\"#37474f\">응급수술(봉합·세척)</text></svg>"}, {"title": "💊 처치 근거", "items": [{"item": "초기", "content": "금식·비위관 감압, 수액 소생, 광범위 항생제, PPI", "basis": "오염·감염 통제와 안정화. 비위관으로 추가 유출 감소.", "img": ""}, {"item": "수술", "content": "천공 봉합·대망성형·복강세척(응급)", "basis": "천공 폐쇄·복강 오염 제거가 근본. source control.", "img": ""}], "svg": ""}], "redflags": ["갑작스런 극심한 복통+판자배 → 천공 의심, 외과 즉시", "X선/CT 유리공기 → 소화관 천공 확진적, 응급수술", "저혈압·젖산↑ → 복막염·패혈증, 적극 소생·항생제", "고령·스테로이드·NSAID 복용 → 증상 가려질 수 있음"], "memo": "갑작스런 심한 상복통·판자배 / free air / 금식·비위관·수액·항생제·PPI / 응급수술(봉합·세척)"}, {"no": "G08", "name": "괴사성 근막염", "cat": "🔪 외과/외상", "diff": "★★★★★", "kw": "소견>겉보기 통증 / 빠른 진행·전신독성 / 捻발음·수포·피부괴사 / 응급 변연절제 / 광범위 항생제", "mentor": "“겉은 살짝 빨간데 환자가 ‘죽을 듯’ 아파하고, 몇 시간 만에 번지고 열나고 혈압 떨어지면 괴사성 근막염을 의심해. 피부 밑 근막을 따라 세균이 빠르게 퍼지면서 조직이 썩는 거라 항생제만으론 절대 안 돼. 답은 ‘응급수술로 죽은 조직을 도려내는 것’이야. 늦으면 사지절단·사망이야.”", "sections": [{"title": "📖 정의·분류", "items": [{"item": "한 줄 정의", "content": "피부밑 근막을 따라 빠르게 진행하는 괴사성 연부조직 감염. 생명·사지 위협 응급.", "basis": "독성 세균이 근막면을 따라 급속 확 ": "😣 평가", "items": [{"item": "핵심 단서", "content": "겉 소견에 비해 극심한 통증, 빠른 진행, 전신독성(발열·저혈압·빈맥)", "basis": "‘통증>소견’과 급속 진행이 조기 경고. 초기엔 봉소염과 유사.", "img": ""}, {"item": "후기 징후", "content": "수포·피부괴사·捻발음(가스), 무감각, 검붉은 변색", "basis": "이미 진행된 단계. 기다리지 말고 조기 의심·탐색.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">괴사성 근막염 — 응급</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#37474f\">시간=생명</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#37474f\">소견보다 극심한 통증·빠른 진행</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">수포·피부괴사·捻발음·전신독성</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#37474f\">수술적 탐색이 확진</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#37474f\">응급 변연절제(항생제만으론 불충분)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">광범위 항생제+패혈증 소생</text></svg>"}, {"title": "📈 검사", "items": [{"item": "랩·영상", "content": "CBC·CRP·젖산·CK, 영상(연부조직 가스), 수술적 탐색이 확진", "basis": "LRINEC 등 보조. 확진·치료는 ‘수술적 탐색’.", "img": ""}], "svg": ""}, {"title": "💊 처치 근거", "items": [{"item": "응급 변연절제", "content": "즉시 외과적 광범위 괴사조직 제거(반복 가능)", "basis": "감염원 제거가 유일한 결정적 치료 → 지체 시 사망률 급증.", "img": ""}, {"item": "항생제·소생", "content": "경험적 광범위 항생제(독소억제 포함)+패혈증 소생", "basis": "수술 보조. 항생제 단독으론 진행 못 막음.", "img": ""}], "svg": ""}], "redflags": ["겉보기보다 극심한 통증·빠른 진행·전신독성 → 즉시 외과 탐색", "항생제만으론 불충분 → 응급 변연절제가 결정적 치료", "捻발음·수포·피부괴사 → 진행된 괴사, 지체 금물", "당뇨·면역저하·음주 → 고위험, 급속 악화"], "memo": "통증>소견·급속진행·전신독성 / 수술적 탐색이 확진 / 응급 변연절제+광범위 항생제+소생 / 시간=생명"}, {"no": "G09", "name": "항문직장 응급 (농양·치핵)", "cat": "🔪 외과/외상", "diff": "★★☆☆☆", "kw": "항문주위 농양=배농 / 혈전성 외치핵 / 통증·발열 / 당뇨·면역저하 주의 / 푸르니에 감별", "mentor": "“항문 옆이 빨갛게 붓고 욱신거리고 열나면 농양이야 — 고름은 짼다, 항생제만으론 안 빠져. 혈전성 치핵은 갑자기 콩알 같은 게 만져지고 아픈 건데 초기면 빼주면 시원해해. 조심할 건 당뇨·면역저하 환자의 항문 감염 — 푸르니에 괴저로 번지면 응급이야.”", "sections": [{"title": "📖 정의·분류", "items": [{"item": "한 줄 정의", "content": "항문주위 농양(감염성 고름주머니)·혈전성 치핵 등 흔한 항문직장 응급.", "basis": "항문샘 감염→농양, 치핵 정맥 혈전→통증성 종괴. 대개 양호하나 일부 중증화.", "img": ""}], "svg": ""}, {"title": "😣 평가", "items": [{"item": "농양", "content": "항문주위 발적·압통·경결·파동감, 발열", "basis": "국소 감염 소견. 심부 농양은 겉 소견 약할 수 있음.", "img": ""}, {"item": "혈전성 외치핵", "content": "갑작스런 항문 통증성 푸른 종괴", "basis": "정맥 혈전. 발생 초기면 절개·혈전제거가 효과적.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">항문직장 응급</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#37474f\">농양은 배농</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">항문주위 농양: 발적·압통·파동감</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#37474f\">농양→절개배농(항생제만 부족)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">혈전성 외치핵: 초기엔 절제·보존</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#37474f\">당뇨·면역저하 회음부 감염→푸르니에 괴저</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">발열·광범위 발적→심부·괴사성</text></svg>"}, {"title": "💊 처치 근거", "items": [{"item": "농양 배농", "content": "절개배농이 핵심(항생제는 보조)", "basis": "고름은 빼야 호전. 면역저하·전신증상 시 항생제 추가 =\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">신경·혈관·건 평가</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">봉합 전략 결정</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">고오염·교상=지연봉합 · 파상풍·동물교상 광견병 예방</text></svg>"}, {"title": "😣 평가", "items": [{"item": "구조물 손상", "content": "신경(감각·운동)·혈관(맥박·출혈)·건(운동범위)·뼈 침범", "basis": "봉합 전 반드시 평가. 손·관절부는 건·신경 손상 흔함.", "img": ""}, {"item": "오염·감염위험", "content": "교상(사람·동물), 이물, 흙·녹, 경과시간, 면역상태", "basis": "고위험 상처는 봉합 전략·항생제·예방접종 결정에 영향.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">상처 — 평가·예방</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#37474f\">세척·구조물 평가</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#37474f\">신경·혈관·건 손상 평가(손·손목)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">대량 세척·이물·괴사조직 제거</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">깨끗·신선=일차봉합</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#37474f\">고오염·교상·지연=지연봉합·개방</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">파상풍 톡소이드±면역글로불린</text></svg>"}, {"title": "💊 처치 근거", "items": [{"item": "세척·정리", "content": "대량 세척, 이물·괴사조직 제거(변연절제)", "basis": "감염 예방의 핵심. 깨끗한 창상이 치유·봉합의 전제.", "img": ""}, {"item": "봉합 전략", "content": "깨끗·신선=일차봉합 / 고오염·교상·지연=지연봉합·개방", "basis": "오염창 즉시 봉합은 농양 위험. 부위·시간으로 판단.", "img": ""}, {"item": "예방", "content": "파상풍 톡소이드±면역글로불린, 동물교상 광견병·항생제", "basis": "면역력·상처에 따라 파상풍·광견병 예방. 고위험 교상은 항생제.", "img": ""}], "svg": ""}], "redflags": ["신경·혈관·건 손상 평가 누락 금지(특히 손·손목)", "사람·동물 교상·고오염창 → 즉시 일차봉합 지양, 감염위험↑", "파상풍 예방력 미확인 → 톡소이드±면역글로불린", "깊은 자상·관절 침범·이물 잔존 → 영상·외과 평가"], "memo": "세척이 8할·이물제거 / 신경·혈관·건 평가 / 오염·교상=지연봉합 / 파상풍·광견병 예방"}, {"no": "G11", "name": "연부조직·소화관 이물", "cat": "🔪 외과/외상", "diff": "★★★☆☆", "kw": "종류·부위별 위험 / 날카로운·자석·전지 / 식도이물=응급 / 영상 / 제거·관찰 기준", "mentor": "“이물은 ‘무엇을·어디에’가 핵심이야. 그냥 동전이면 대개 지나가지만, 단추전지·자석·날카로운 건 빨리 빼야 해 — 전지는 식도에 걸리면 몇 시간 만에 점막을 태우고, 자석 여러 개는 장끼리 붙어 구멍 내. 식도에 걸려 침도 못 삼키면 응급 내시경이야. 연부조직 이물은 감염·신경손상 보고 영상으로 위치 확인해.”", "sections": [{"title": "📖 정의·분류", "items": [{"item": "한 줄 정의", "content": "소화관·기도·연부조직에 들어간 이물. 종류·부위에 따라 응급도가 크게 다르다.", "basis": "대부분 자연배출되나 특정 이물·위치는 천공·부식·기도폐색 위험.", "img": ""}], "svg": ""}, {"title": "😣 평가", "items": [{"item": "고위험 이물", "content": "단추전지(부식·괴사), 자석 다발(장 압박괴사), 날카로운 물체, 기도이물", "basis": "위치·종류로 응급도 판단. 전지·자석·날카로운 건 적극 제거.", "img": ""}, {"item": "증상", "content": "연하곤란·침흘림(식도), 천명·호흡곤란(기도), 통증·감염(연부조직)", "basis": "걸린 부위 단서. 식도 완전폐색은 침도 못 삼킴.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">이물 — 무엇을·어디에</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#37474f\">고위험은 즉시 제거</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#37474f\">식도 단추전지→수시간 내 괴사(응급 제거)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#37474f\">자석 2개↑·날카로운 것→천공 위험</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">기도이물·완전폐색→기도응급</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">무증상 둔한 이물→경과 관찰</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">X선/CT로 위치·개수 확인</text></svg>"}, {"title": "📈 검사·처치", "items": [{"item": "영상", "content": "X선(방사선 비투과체 위치)·필요시 CT", "basis": "위치·개수·천공 평가. 비투과성 이물 확인.", "img": ""}, {"item": "처치 기준", "content": "식도이물·전지·자석·날카로운 것·증상 시 내시경/제거, 그 외 관찰", "basis": "고위험·증상성은 제거, 무증상 둔한 이물은 경과 관찰.", "img": ""}], "svg": ""}], "redflags": ["식도 단추전지 → 수시간 내 점막괴사, 응급 내시경 제거", "자석 2개 이상/날카로운 이물 → 천공 위험, 적극 제거", "기도이물·완전폐색(침도 못 삼킴) → 기도응급, 즉시 처치", "발열·통증·종창(연부조직) → 감염·농양, 영상·제거"], "memo": "무엇을·어디에가 핵심 / 전지·자석·날카로운·식도이물=응급제거 / 영상으로 위치 / 둔한 무증상=관찰"}, {"no": "G12", "name": "외상성 실질장기 손상 (간·비장)", "cat": "🔪 외과/외상", "diff": "★★★★☆", "kw": "좌·우상복부 둔상 / 복강내 출혈 / FAST·CT 등급 / 안정=비수술/색전 / 불안정=수술", "mentor": "“왼쪽 갈비뼈 아래를 부딪치고 어지러워하면 비장 파열을, 오른쪽이면 간 손상을 떠올려. 둘 다 피가 많은 장기라 배 안으로 줄줄 새. 혈압이 버텨주면(안정) CT로 등급 매겨 색전술·관찰로 가고, 흔들리면(불안정) 바로 수술이야. 비장 떼면 나중에 감염 예방접종도 챙겨야 해.”", "sections": [{"title": "📖 정의·분류", "items": [{"item": "한 줄 정의", "content": "복부 둔상으로 간·비장 등 실질장기가 파열·출혈한 손상. 복강내 출혈의 주원인.", "basis": "혈관 풍부한 장기 손상 → 대량 복강내 출혈. 손상 등급(grade)으로 처치 결정.", "img": ""}], "svg": ""}, {"title": "😣 평가", "items": [{"item": "증상", "content": "좌(비장)/우(간)상복부 통증·압통, 어지럼·쇼크, 방사통(견부)", "basis": "복강내 출혈·횡격막 자극(Kehr 징후). 활력징후가 처치 분기.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">간·비장 손상</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#37474f\">안정=관찰, 불안정=수술</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">좌/우상복부 둔상·견부 방사통(Kehr)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#37474f\">불안정→즉시 개복지혈</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#37474f\">안정→CT 등급→관찰·혈관색전</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">관찰 중 Hb↓·악화→지연출혈</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">비장절제 후 협막세균 예방접종</text></svg>"}, {"title": "📈 검사·처치", "items": [{"item": "영상", "content": "불안정→FAST+수술 / 안정→조영 CT로 손상등급·활동성 출혈", "basis": "CT 등급·조영누출이 색전/수술 결정. 불안정자는 영상보다 수술.", "img": ""}, {"item": "처치 분기", "content": "혈역학 안정→비수술적(관찰)±혈관색전 / 불안정→개복지혈", "basis": "안정 실질손상은 보존이 표준(특히 비장 보존). 불안정은 수술.", "img": ""}, {"item": "비장절제 후", "content": "피막세균 예방접종·감염 교육", "basis": "무비증은 협막세균 패혈증 위험 → 예방접종 필수.", "img": ""}], "svg": ""}], "redflags": ["혈역학 불안정 → 비수술 시도 말고 즉시 개복지혈", "좌상복부 둔상+견부 방사통(Kehr) → 비장 파열·복강내 출혈", "관찰 중 활력징후 악화·Hb 하강 → 지연 출혈, 재평가", "비장절제 후 협막세균 예방접종 누락 금지"], "memo": "둔상 간·비장 출혈 / 안정=CT등급→관찰·색전, 불안정=수술 / Kehr 징후 / 비장절제 후 예방접종"}, {"no": "B01", "name": "화상 깊이·범위 평가", "cat": "🔥 화상", "diff": "★★★☆☆", "kw": "1~3도 깊이 / Rule of 9s·손바닥법 / TBSA / 외래 vs 입원 / 화상센터 전원 기준", "mentor": "“화상은 ‘얼마나 깊고(깊이) 얼마나 넓은지(범위)’를 정확히 재는 게 시작이야. 깊이는 물집·통증·색으로 1·2·3도를 나누고, 범위는 9의 법칙이나 환자 손바닥(1%)으로 %를 계산해. 이 두 숫자가 수액량·입원·전원을 다 결정해. 표재성은 아파도 양호, 3도는 오히려 안 아픈 게 함정이야.”", "sections": [{"title": "📖 깊이 분류", "items": [{"item": "표재성(1도)", "content": "표피만, 발적·통증, 물집 없음(예: 햇볕화상)", "basis": "표피 손상. TBSA 계산엔 보통 제외. 수일 내 회복.", "img": ""}, {"item": "부분층(2도)", "content": "표재성: 물집·심한 통증·습윤·붉음 / 심부: 창백·통증 둔화", "basis": "진피 침범 깊이에 따라 치유·흉터 차이. 심부는 피부이식 고려.", "img": ""}, {"item": "전층(3도)", "content": "가죽같이 마르고 흰/갈/검은색, 통증 없음(신경파괴)", "basis": "진피 전층·부속기 파괴 → 자연치유 안 됨, 이식 필요. 무통이 함정.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 880 440\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"880\" height=\"440\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">화상 깊이(1~3도) &amp; 범위(9의 법칙)</text>\n  <line x1=\"32\" y1=\"60\" x2=\"848\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <g transform=\"translate(40,90)\">\n    <rect x=\"0\" y=\"0\" width=\"430\" height=\"46\" fill=\"#f6d9bf\" stroke=\"#cda077\" stroke-width=\"1.5\"/><text x=\"445\" y=\"30\" font-size=\"14\" fill=\"#8b6a4f\">표피</text>\n    <rect x=\"0\" y=\"46\" width=\"430\" height=\"100\" fill=\"#fbe3e5\" stroke=\"#dca9ae\" stroke-width=\"1.5\"/><text x=\"445\" y=\"100\" font-size=\"14\" fill=\"#8b6a4f\">진피</text>\n    <rect x=\"0\" y=\"146\" width=\"430\" height=\"100\" fill=\"#fff6d6\" stroke=\"#d9c98a\" stroke-width=\"1.5\"/><text x=\"445\" y=\"200\" font-size=\"14\" fill=\"#8b6a4f\">피하지방</text>\n    <rect x=\"20\" y=\"2\" width=\"120\" height=\"42\" fill=\"#ffcaca\" opacity=\"0.6\"/><text x=\"80\" y=\"28\" font-size=\"13\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">1도(표피)</text>\n    <rect x=\"160\" y=\"2\" width=\"120\" height=\"120\" fill=\"#ff9aa0\" opacity=\"0.6\"/><text x=\"220\" y=\"70\" font-size=\"13\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">2도(부분층)</text>\n    <rect x=\"300\" y=\"2\" width=\"120\" height=\"240\" fill=\"#7a3b40\" opacity=\"0.55\"/><text x=\"360\" y=\"130\" font-size=\"13\" font-weight=\"800\" fill=\"#5b1e22\" text-anchor=\"middle\">3도(전층)</text>\n    <text x=\"0\" y=\"272\" font-size=\"13\" fill=\"#5b6876\">1도=발적·통증 / 2도=물집·심한 통증 / 3도=가죽같이·무통(함정)</text>\n  </g>\n  <g transform=\"translate(560,95)\">\n    <text x=\"120\" y=\"-6\" font-size=\"14\" font-weight=\"800\" fill=\"#1a2a3a\" text-anchor=\"middle\">Rule of 9s (성인)</text>\n    <circle cx=\"120\" cy=\"28\" r=\"20\" fill=\"#fde3e5\" stroke=\"#b23039\" stroke-width=\"2\"/><text x=\"120\" y=\"33\" font-size=\"12\" text-anchor=\"middle\" fill=\"#b23039\">9</text>\n    <rect x=\"92\" y=\"50\" width=\"56\" height=\"90\" rx=\"8\" fill=\"#fde3e5\" stroke=\"#b23039\" stroke-width=\"2\"/><text x=\"120\" y=\"100\" font-size=\"12\" text-anchor=\"middle\" fill=\"#b23039\">앞18<tspan x=\"120\" dy=\"14\">뒤18</tspan></text>\n    <rect x=\"40\" y=\"56\" width=\"40\" height=\"84\" rx=\"8\" fill=\"#fde3e5\" stroke=\"#b23039\" stroke-width=\"2\"/><text x=\"60\" y=\"102\" font-size=\"12\" text-anchor=\"middle\" fill=\"#b23039\">9</text>\n    <rect x=\"160\" y=\"56\" width=\"40\" height=\"84\" rx=\"8\" fill=\"#fde3e5\" stroke=\"#b23039\" stroke-width=\"2\"/><text x=\"180\" y=\"102\" font-size=\"12\" text-anchor=\"middle\" fill=\"#b23039\">9</text>\n    <rect x=\"92\" y=\"150\" width=\"24\" height=\"120\" rx=\"8\" fill=\"#fde3e5\" stroke=\"#b23039\" stroke-width=\"2\"/><text x=\"104\" y=\"215\" font-size=\"12\" text-anchor=\"middle\" fill=\"#b23039\">18</text>\n    <rect x=\"124\" y=\"150\" width=\"24\" height=\"120\" rx=\"8\" fill=\"#fde3e5\" stroke=\"#b23039\" stroke-width=\"2\"/><text x=\"136\" y=\"215\" font-size=\"12\" text-anchor=\"middle\" fill=\"#b23039\">18</text>\n    <text x=\"120\" y=\"292\" font-size=\"12.5\" fill=\"#5b6876\" text-anchor=\"middle\">손바닥 ≈ 1% · 2도 이상만 TBSA</text>\n  </g>\n</svg>"}, {"title": "📐 범위 평가", "items": [{"item": "Rule of 9s", "content": "성인: 머리9·각 팔9·몸통앞18·뒤18·각 다리18·회음1", "basis": "빠른 TBSA 추정. 소아는 머리 비중↑·다리↓로 다름.", "img": ""}, {"item": "손바닥 법", "content": "환자 손바닥(손가락 포함) ≈ 체표 1%", "basis": "산재·소범위 추정에 유용. 9의 법칙 보완.", "img": ""}, {"item": "TBSA 주의", "content": "1도(표재성)는 TBSA에서 제외, 2도 이상만 합산", "basis": "수액 계산은 2도 이상 면적 기준 → 부종, 하기도·폐포 화학손상→ARDS, 전신 독성가스(CO·시안화물).", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">흡입 손상 — 기도가 먼저 죽인다</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">밀폐공간 화재</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">열·연기·유독가스</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">상기도 부종(진행성)</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">기도 폐색·ARDS</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">안면화상·그을린 코털·쉰목소리·검댕가래 → 조기 삽관 · CO·시안화물 동반</text></svg>"}, {"title": "😣 평가 단서", "items": [{"item": "위험 단서", "content": "밀폐공간 화재, 안면화상, 그을린 코털, 쉰목소리·천명·기침, 검댕 가래, 의식저하", "basis": "상기도 부종·흡입 손상 경고. 진행성이라 초기 경미해도 악화.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "평가", "content": "후두경/기관지경, ABG·일산화탄소헤모글로빈(SpO₂는 위양성), 젖산(시안화물)", "basis": "CO 중독은 일반 SpO₂ 정상처럼 보임 → CO-Hb 측정. 젖산↑은 시안화물 시사.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">흡입 손상 — 처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#bf360c\">늦으면 삽관 불가</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#bf360c\">부종 진행성→‘이른’ 기관삽관</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#bf360c\">CO중독은 SpO₂ 정상처럼 보임</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">CO-Hb 측정·고농도 산소</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">시안화물 의심(젖산↑)→하이드록소코발라민</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">폐손상→폐보호 환기</text></svg>"}, {"title": "💊 처치 근거", "items": [{"item": "조기 기도확보", "content": "상기도 부종 징후 시 ‘이른’ 기관삽관", "basis": "부종 진행 시 삽관 불가능해짐 → 망설이지 말고 조기 확보.", "img": ""}, {"item": "산소·해독", "content": "고농도 산소(CO 반감기↓), 시안화물 의심 시 하이드록소코발라민", "basis": "CO·시안화물 동시 가능. 고유량 산소·특이 해독.", "img": ""}, {"item": "환기·기타", "content": "폐손상 시 폐보호 환기, 기관지 위생", "basis": "ARDS 양상엔 저용적 환기. 분비물 관리.", "img": ""}], "svg": ""}], "redflags": ["밀폐공간 화재+안면화상·쉰목소리·검댕가래 → 조기 삽관 고려", "기도부종은 진행성 → 늦으면 삽관 불가, ‘일찍’이 원칙", "CO 중독은 일반 SpO₂ 정상으로 보임 → CO-Hb 측정·고농도 산소", "젖산↑·의식저하 → 시안화물 중독 의심, 해독 고려"], "memo": "기도가 먼저 죽인다 / 밀폐화재·안면·쉰목소리·검댕 → 조기삽관 / CO(고농도산소)·시안화물(해독) / ARDS 폐보호"}, {"no": "B03", "name": "화상 수액 소생 (Parkland)", "cat": "🔥 화상", "diff": "★★★★☆", "kw": "2도↑ TBSA / Parkland 공식 / 첫8h 절반 / 소변량 목표 적정 / 과소·과대소생 위험", "mentor": "“큰 화상은 혈관이 새서 ‘물이 조직으로 다 빠져’ 쇼크가 와. 그래서 수액이 생명인데, 공식만 믿으면 안 되고 ‘소변량’으로 조절하는 게 핵심이야. Parkland로 시작량 잡고(화상시각 기준!), 첫 8시간에 절반을 줘. 그리고 소변량 보면서 늘리고 줄여 — 너무 적게 주면 콩팥 망가지고, 너무 많이 주면 부어서 호흡·구획이 터져.”", "sections": [{"title": "📖 적응·원리", "items": [{"item": "적응", "content": "2도 이상 광범위 화상(보통 성인 TBSA≥15~20%, 소아 더 낮음)", "basis": "모세혈관 누출로 대량 체액이 제3공간 이동 → 저혈량 쇼크 예방.", "img": ""}, {"item": "Parkland 공식", "content": "4mL × 체중(kg) × TBSA(%) 균형수액 / 24h, 첫 8h에 1/2, 나머지 16h", "basis": "경험적 시작량. 화상 ‘수상 시각’ 기준으로 계산(내원시각 아님).", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">화상 수액 — 왜 필요한가</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">광범위 화상</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">모세혈관 누출</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">제3공간 체액 이동</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">저혈량 쇼크</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">Parkland: 4mL×kg×TBSA, 첫8h 절반(수상시각 기준)</text></svg>"}, {"title": "🎯 적정·모니터링", "items": [{"item": "소변량 목표", "content": "성인 0.5mL/kg/h(소아 1mL/kg/h)에 맞춰 수액 증감", "basis": "공식은 시작점일 뿐, 소변량이 실제 관류 지표 → 이걸로 적정.", "img": ""}, {"item": "감시", "content": "활력징후·소변량·젖산·말초순환, 전기화상은 더 많은 수액", "basis": "과소(신손상)·과대(부종·구획·폐부종) 모두 위험 → 지속 재평가.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">Parkland — 적정·주의</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#bf360c\">공식은 시작점, 소변량이 진짜</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">4mL × 체중 × TBSA(%), 첫8h 1/2</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#bf360c\">‘수상 시각’ 기준 계산</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#bf360c\">소변량으로 적정(성인 0.5mL/kg/h)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">과대소생→구획증후군·폐부종</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">과소→신손상 / 2도 이상만 TBSA</text></svg>"}, {"title": "💊 처치 근거", "items": [{"item": "접근·보온", "content": "굵은 IV(가능하면 화상 안 된 부위), 가온수액·보온, 통증조절", "basis": "저체온·통증 관리. 적절한 정맥로 확보.", "img": ""}, {"item": "주의", "content": "과대소생 시 구획증후군(사지·복부)·기도/폐부종 감시", "basis": "수액 폭주는 ‘fluid creep’ 합병증 → 목표지향 적정.", "img": ""}], "svg": ""}], "redflags": ["수액량은 ‘소변량’으로 적정(공식은 시작점일 뿐)", "Parkland는 ‘수상 시각’ 기준 계산(내원시각 아님)", "과대소생 → 사지·복부 구획증후군·폐부종, 과소→신손상", "전기화상·흡입 동반은 수액 요구량↑·횡문근융해 주의"], "memo": "4mL×kg×TBSA, 첫8h 절반(수상시각 기준) / 소변량으로 적정(0.5mL/kg/h) / 과소·과대 모두 위험"}, {"no": "B04", "name": "화학 화상", "cat": "🔥 화상", "diff": "★★★☆☆", "kw": "즉시 대량 세척 / 산 vs 알칼리(알칼리 더 깊음) / 분말 먼저 털기 / 눈 화상 / 특정 해독", "mentor": "“화학화상은 ‘계속 타고 있는’ 화상이야 — 물질이 남아 있는 한 조직이 계속 녹아. 그래서 1번은 ‘많은 물로 오래 씻기’야. 가루 형태면 물 붓기 전에 먼저 털어내고. 알칼리(세제·시멘트)가 산보다 더 깊게 파고들어서 더 위험해. 눈에 들어갔으면 즉시·대량 세척이 시력을 지켜. 중화제로 문지르는 건 열나서 오히려 나빠.”", "sections": [{"title": "📖 정의·기전", "items": [{"item": "한 줄 정의", "content": "산·알칼리 등 화학물질 접촉으로 조직이 손상되는 화상. 노출 지속 시 계속 진행.", "basis": "물질이 남아 화학반응 지속 → 시간 비례 손상. 제거·희석이 손상 정지의 핵심.", "img": ""}, {"item": "산 vs 알칼리", "content": "산: 응고괴사(가피로 일부 제한)\n알칼리: 액화괴사(더 깊이 침투)", "basis": "알칼리가 더 깊고 진행성 → 더 오래 세척·주의 필요.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">화학 화상 — 계속 타는 화상</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">화학물질 접촉</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">물질 잔존·반응 지속</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">시간 비례 손상</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">세척으로 정지</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">대량·장시간 세척(분말은 먼저 털기) · 알칼리&gt;산 깊이 · 중화제 지양</text></svg>"}, {"title": "💊 처치 근거", "items": [{"item": "즉시 대량 세척", "content": "오염 의복·분말 제거 후 다량의 물로 오래(20~30분+) 세척", "basis": "남은 물질 제거가 최우선. 분말은 먼저 털어내고(물에 활성화 방지).", "img": ""}, {"item": "중화제 주의", "content": "산-알칼리 중화는 발열 → 일반적으로 물 세척 권장", "basis": "중화 반응열이 추가 손상. 특정 물질만 전문 해독.", "img": ""}, {"item": "특정 해독", "content": "불산(HF)→칼슘글루콘산, 특정물질별 전문 처치/독성센터", "basis": "HF는 칼슘 킬레이션으로 저칼슘·부정맥 유발 → 칼슘이 해독.", "img": ""}, {"item": "눈 화상", "content": "즉시·지속 대량 세척, pH 정상화까지, 안과", "basis": "화학 안손상은 시간 싸움 → 즉각 세척이 시력 보존.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">화학 화상 — 처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#bf360c\">대량 세척이 1순위</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#bf360c\">오염 의복·분말 제거 후 다량 물 세척</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#bf360c\">분말은 물 붓기 전 먼저 털어내기</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">중화제 지양(발열로 악화)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#bf360c\">불산(HF)→칼슘(저칼슘·부정맥)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">눈 화상→즉시·지속 대량 세척</text></svg>"}], "redflags": ["노출 지속 = 손상 진행 → 즉시·대량·장시간 세척", "분말 화학물질은 물 붓기 전 먼저 털어낼 것", "불산(HF) 노출 → 저칼슘·치명적 부정맥, 칼슘 해독", "눈 화학화상 → 즉각 대량 세척(시력 응급)"], "memo": "계속 타는 화상 / 대량·장시간 세척(분말은 먼저 털기) / 알칼리>산 깊이 / HF=칼슘 / 눈=즉시 세척"}, {"no": "B05", "name": "전기 화상", "cat": "🔥 화상", "diff": "★★★★☆", "kw": "보이는 것보다 깊은 손상 / 입·출구 / 부정맥·심정지 / 횡문근융해·고칼륨 / 구획증후군", "mentor": "“전기화상은 ‘빙산’이야 — 들어간 곳·나간 곳 피부는 작아 보여도 그 사이 근육·신경이 다 타. 두 가지가 무서워. 첫째, 전류가 심장을 지나면 부정맥·심정지가 와서 심전도 감시가 필수야. 둘째, 근육이 녹아(횡문근융해) 미오글로빈이 콩팥을 막고 칼륨이 치솟아. 그래서 수액 넉넉히, 소변 잘 나오게, 칼륨·심전도 봐.”", "sections": [{"title": "📖 정의·기전", "items": [{"item": "한 줄 정의", "content": "전류가 몸을 통과하며 깊은 조직(근육·신경·혈관)을 손상시키는 화상.", "basis": "전기에너지가 열로 전환 → 심부 조직 괴사. 표면 손상은 실제보다 작아 보임.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">전기 화상 — 빙산형 손상</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">전류 통과</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">심부 근육·신경 손상</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">부정맥·근융해</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">고칼륨·신손상·구획</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">입·출구보다 경로 손상 큼 · 심전도·CK·소변색 감시</text></svg>"}, {"title": "😣 평가", "items": [{"item": "입·출구·경로", "content": "전류 입구·출구 확인, 통과 경로의 심부 손상 추정", "basis": "경로상 장기·근육 손상 평가. 심장 통과 여부가 부정맥 위험.", "img": ""}, {"item": "합병", "content": "부정맥·심정지, 횡문근융해(어두운 소변)·고칼륨·신손상, 구획증후군, 골절(강직성 수축·낙상)", "basis": "다발 합병. 미오글로빈뇨·구획압·전해질 감시.", "img": ""}], "svg": ""}, {"title": "📈 검사·처치", "items": [{"item": "모니터·랩", "content": "지속 심전도, CK·미오글로빈·칼륨·신기능, 소변색", "basis": "심장·근융해·신장 감시. 고칼륨·산증 교정.", "img": ""}, {"item": "처치", "content": "적극 수액(소변량 목표 상향)·소변량 유지, 구획증후군 평가·근막절개, 외상 동반 평가", "basis": "근융해 신보호 위해 수액·소변 유지. 구획증후군은 근막절개.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">전기 화상 — 처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#bf360c\">심장·근융해·구획</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">표면 작아도 심부 광범위 손상</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#bf360c\">전류 심장 통과→부정맥(지속 심전도)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#bf360c\">어두운 소변·CK↑→횡문근융해</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">적극 수액·소변량 유지·고칼륨 감시</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">통과부 부종·통증→구획증후군(근막절개)</text></svg>"}], "redflags": ["표면은 작아도 심부 근육·신경 광범위 손상(빙산)", "전류 심장 통과 → 부정맥·심정지, 지속 심전도 감시", "어두운 소변·CK↑ → 횡문근융해·고칼륨·신손상, 적극 수액", "통과 부위 부종·통증 → 구획증후군, 근막절개 평가"], "memo": "빙산형 심부손상 / 입·출구·경로 / 심전도(부정맥) / 횡문근융해→수액·소변유지·고칼륨 / 구획증후군"}, {"no": "B06", "name": "화상 상처 관리·감염", "cat": "🔥 화상", "diff": "★★★☆☆", "kw": "세척·물집 / 국소 항균드레싱 / 감염·패혈증 감시 / 환상화상=가피절개 / 통증·영양", "mentor": "“화상 상처는 ‘감염과의 싸움’이야 — 피부장벽이 없어 균이 쉽게 들어가 패혈증으로 가. 깨끗이 세척하고 국소 항균제·드레싱으로 덮고, 열·진물·악취 같은 감염 신호를 매일 봐. 팔다리나 가슴을 빙 둘러 깊게 탔으면(환상화상) 가피가 조여서 피가 안 통하거나 숨을 못 쉬게 돼 — 그땐 가피를 째줘(가피절개).”", "sections": [{"title": "📖 원칙", "items": [{"item": "상처 처치", "content": "세척·이물제거, 물집 관리, 국소 항균제·드레싱, 괴사조직 변연절제", "basis": "감염 예방·치유 환경 조성. 깊은 화상은 이식까지 단계적 관리.", "img": ""}], "svg": ""}, {"title": "🦠 감염·합병", "items": [{"item": "감염 감시", "content": "발열·진물·악취·주위 발적·전신악화 → 화상 패혈증", "basis": "손상 피부장벽으로 감염 위험↑. 전신 항생제는 감염 시(예방적 전신 X).", "img": ""}, {"item": "환상화상(가피절개)", "content": "사지·흉부 환상 전층화상 → 순환·호흡 장애 시 가피절개", "basis": "조이는 가피가 구획·호흡 제한 → escharotomy로 압력 해소.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans 학·흡입 손상, 동반 외상, 소아·고령·중대 기저질환", "basis": "복합·고위험군은 화상센터 자원 필요.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">화상센터 전원 기준</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#bf360c\">중증·특수부위·특수기전</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">대면적·전층(3도) 화상</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#bf360c\">얼굴·손·발·회음·주요 관절</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#bf360c\">전기·화학·흡입 손상·동반외상</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">소아·고령·중대 기저질환</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">→ 화상센터 전원 고려</text></svg>"}, {"title": "🚑 이송 전 안정화", "items": [{"item": "안정화", "content": "기도(필요시 삽관)·수액 소생 시작·보온·통증조절·상처 임시드레싱", "basis": "이송 중 악화 방지. 기도·수액·체온이 우선.", "img": ""}, {"item": "기록 동반", "content": "수상 시각·기전·추정 면적·투여 수액·처치 내역", "basis": "수액 계산·연속 치료에 필수. 인계 정보 정확히.", "img": ""}], "svg": ""}], "redflags": ["흡입·전기·화학·동반외상은 면적 작아도 전원 고려", "이송 전 기도·수액·보온 안정화 없이 보내지 말 것", "수상 시각·면적·수액량 기록 누락 → 수액계산 오류", "소아·고령은 낮은 기준에서도 전원"], "memo": "면적·전층·특수부위·특수기전·고위험군=전원 / 안정화(기도·수액·보온) 후 이송 / 시각·면적·수액 기록"}, {"no": "B08", "name": "동상·저체온증", "cat": "🔥 화상", "diff": "★★★☆☆", "kw": "한랭손상 / 재가온 / 동상 물집·감각 / 저체온 단계·서맥 / 부정맥·after-drop / 거친조작 금지", "mentor": "“추위 손상은 화상의 반대편이야. 동상은 ‘급속 재가온(따뜻한 물)’이 원칙인데, 다시 얼 위험 있으면 차라리 녹이지 마 — 얼었다 녹았다가 제일 나빠. 전신 저체온은 심장이 예민해서 거칠게 다루면 심실세동 와 — 부드럽게, 따뜻하게, 중심부터 데워. 그리고 ‘따뜻해질 때까지 사망선고 보류’라는 말 기억해, 차가운 심정지는 끝까지 살려.”", "sections": [{"title": "📖 정의·분류", "items": [{"item": "동상", "content": "조직이 어는 한랭손상. 감각소실·창백→재가온 시 물집·통증", "basis": "빙결로 세포·혈관 손상. 깊이는 재가온 후에 명확해짐.", "img": ""}, {"item": "저체온증", "content": "심부체온 저하(경<35, 중, 중증). 의식·서맥·서호흡·부정맥", "basis": "체온 단계별 증상. 중증은 심실세동·무수축 위험.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">동상·저체온 — 한랭손상</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">한랭 노출</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">조직 빙결/심부체온↓</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">혈관·세포 손상</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">괴사 / 부정맥</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">동상=급속 재가온(문지름·재동결 금지) · 저체온=중심 재가온·부드럽게</text></svg>"}, {"title": "💊 처치 근거", "items": [{"item": "동상 재가온", "content": "따뜻한 물(약 37~39℃) 급속 재가온, 마사지·문지름 금지", "basis": "급속 재가온이 조직 구제. 단 재동결 위험 시 녹이지 않음.", "img": ""}, {"item": "저체온 재가온", "content": "젖은옷 제거·보온, 가온수액·가온산소, 중증은 중심부 적극 재가온", "basis": "열소실 차단+능동 재가온. 단계에 맞춰.", "img": ""}, {"item": "부정맥·소생", "content": "거친 조작·과도 자극 금지(VF 유발), CPR·제세동은 시행하되 재가온 병행", "basis": "저체온 심장은 자극에 민감. ‘따뜻해질 때까지 사망선고 보류’.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">동상·저체온 — 처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#bf360c\">재가온이 핵심</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">동상: 따뜻한 물 급속 재가온</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#bf360c\">마사지·문지름 금지 / 재동결 위험시 보류</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">저체온: 젖은옷 제거·가온수액·중심 재가온</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#bf360c\">거친 조작→심실세동(부드럽게)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">‘따뜻해질 때까지 사망선고 보류’</text></svg>"}], "redflags": ["동상 부위 마사지·문지름 금지(조직 손상 악화)", "재동결 위험 있으면 재가온 보류(얼었다 녹기 반복이 최악)", "중증 저체온은 거친 조작으로 심실세동 유발 → 부드럽게", "‘따뜻해질 때까지 사망선고 보류’ — 차가운 심정지 끝까지 소생"], "memo": "동상=급속 재가온(문지름·재동결 금지) / 저체온=보온·중심 재가온·부드럽게 / VF 주의 / 가온 전 사망선고 보류"}, {"no": "O01", "name": "구획증후군", "cat": "🦴 정형외과", "diff": "★★★★★", "kw": "진통제 듣지 않는 통증 / 5P / 수동신전통 / 구획압 / 응급 근막절개 / 석고붕대 제거", "mentor": "“골절·압궤 후 ‘진통제를 줘도 안 듣는, 점점 심해지는 통증’이 제일 중요한 신호야. 부어서 근육칸 압력이 올라가 피가 안 통하는 거라 몇 시간 안에 근육·신경이 죽어. 발가락을 펴면(수동신전) 비명 지르듯 아파해. 맥박은 마지막까지 잡혀서 ‘맥 있으니 괜찮다’가 함정이야. 석고 있으면 풀고, 답은 응급 근막절개야.”", "sections": [{"title": "📖 정의·기전", "items": [{"item": "한 줄 정의", "content": "폐쇄된 근막 구획 내 압력이 상승해 조직 관류가 차단되는 사지 위협 응급.", "basis": "부종·출혈로 구획압↑ → 모세관 관류압 초과 → 허혈·근/신경 괴사(수시간 내).", "img": ""}, {"item": "흔한 원인", "content": "골절(특히 경골)·압궤·재관류·꽉 조인 석고/붕대·화상", "basis": "부종 유발 상황 후 발생. 석고·드레싱이 압박 가중.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 820 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"820\" height=\"430\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">구획증후군 — 칸 안의 압력이 혈류를 막는다</text>\n  <line x1=\"32\" y1=\"60\" x2=\"788\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <g transform=\"translate(230,250)\">\n    <circle r=\"135\" fill=\"#f3d9c2\" stroke=\"#c98248\" stroke-width=\"4\"/>\n    <circle r=\"118\" fill=\"#f6b8be\" stroke=\"#d98a90\" stroke-width=\"2\"/>\n    <line x1=\"-118\" y1=\"0\" x2=\"118\" y2=\"0\" stroke=\"#cda\" stroke-width=\"2\" opacity=\"0.5\"/>\n    <line x1=\"0\" y1=\"-118\" x2=\"0\" y2=\"118\" stroke=\"#cda\" stroke-width=\"2\" opacity=\"0.5\"/>\n    <circle cx=\"0\" cy=\"0\" r=\"20\" fill=\"#fff\" stroke=\"#8b6a4f\" stroke-width=\"3\"/><text x=\"0\" y=\"5\" font-size=\"11\" text-anchor=\"middle\" fill=\"#8b6a4f\">뼈</text>\n    <g fill=\"#b23039\"><path d=\"M0 -150 l8 16 l-16 0 Z\"/><path d=\"M0 150 l8 -16 l-16 0 Z\"/><path d=\"M-150 0 l16 8 l0 -16 Z\"/><path d=\"M150 0 l-16 8 l0 -16 Z\"/></g>\n    <text x=\"0\" y=\"-160\" font-size=\"13\" fill=\"#b23039\" text-anchor=\"middle\" font-weight=\"700\">부종 → 압력↑</text>\n  </g>\n  <g font-size=\"15\" fill=\"#3a4654\">\n    <text x=\"450\" y=\"120\" font-size=\"17\" font-weight=\"800\" fill=\"#b23039\">5P (특히 조기)</text>\n    <text x=\"450\" y=\"152\">*안 듣는 점증 통증</text>\n    <text x=\"450\" y=\"180\">*수동 신전 시 극심한 통증</text>\n    <text x=\"450\" y=\"208\">Paresthesia 이상감각</text>\n    <text x=\"450\" y=\"236\">Pallor 창백 · Paralysis 마비</text>\n    <text x=\"450\" y=\"264\">Pulselessness 무맥(후기·함정)</text>\n    <text x=\"450\" y=\"302\" font-weight=\"800\" fill=\"#b23039\">석고 제거·사지 심장높이</text>\n    <text x=\"450\" y=\"330\" font-weight=\"800\" fill=\"#b23039\">→ 응급 근막절개</text>\n  </g>\n</svg>"}, {"title": "😣 평가(5P·핵심)", "items": [{"item": "조기 핵심", "content": "‘진통제에 반응 없는 점증 통증’ + ‘수동 신전 시 극심한 통증’", "basis": "가장 민감한 조기 징후. 통증 양상 변화가 경고.", "img": ""}, {"item": "5P", "content": "Pain·Paresthesia·Pallor·Paralysis·Pulselessness(맥은 후기)", "basis": "무맥·마비는 늦은 징후 → 기다리면 이미 괴사. 맥 있어도 배제 못 함.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">구획증후군 — 처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#4e342e\">조기 통증이 단서</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#4e342e\">진통제에 안 듣는 점증 통증</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#4e342e\">수동신전 시 극심한 통증</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">맥박은 마지막까지(‘맥 있으니 괜찮다’ 금물)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">조이는 석고·붕대 제거·사지 심장높이</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"800\" fill=\"#4e342e\">지연→비가역 괴사→응급 근막절개</text></svg>"}, {"title": "📈 검사·처치", "items": [{"item": "구획압", "content": "임상 의심이 우선, 필요시 구획압 측정(ΔP=이완기압−구획압)", "basis": "임상진단이 핵심. 압측정은 보조(애매·의식저하 시).", "img": ""}, {"item": "응급 처치", "content": "조이는 석고·붕대 즉시 제거, 사지 심장 높이, 응급 근막절개술", "basis": "압력 해소가 유일 치료. 근막절개 지연 시 비가역 손상.", "img": ""}], "svg": ""}], "redflags": ["진통제에 반응 없는 점증 통증·수동신전통 → 구획증후군(조기)", "맥박은 마지막까지 잡힘 → ‘맥 있으니 괜찮다’ 금물", "조이는 석고·붕대 즉시 제거, 사지는 심장 높이(과거상 X)", "확진·치료 지연 시 비가역 근/신경 괴사 → 응급 근막절개"], "memo": "안 듣는 점증 통증+수동신전통 / 5P(맥은 후기·함정) / 석고 제거·심장높이 / 응급 근막절개"}, {"no": "O02", "name": "골반골절 (대량출혈)", "cat": "🦴 정형외과", "diff": "★★★★★", "kw": "고에너지 외상 / 후복막 대량출혈 / 골반바인더 / 혈역학 불안정 / 색전·외고정 / 요도·직장 손상", "mentor": "“골반은 큰 정맥얼기랑 동맥이 모여 있어서 부러지면 후복막으로 ‘안 보이게’ 피가 엄청 고여. 겉은 멀쩡한데 혈압이 떨어지면 골반을 의심해. 1번 처치는 골반을 ‘조여서’ 부피를 줄이는 골반바인더야 — 큰돌기 높이에 감아. 불안정하면 색전술·외고정이고. 소변에 피 비치거나 회음부 멍이면 요도·직장 손상도 같이 봐.”", "sections": [{"title": "📖 정의·기전", "items": [{"item": "한 줄 정의", "content": "고에너지 외상으로 골반환이 골절·불안정해진 손상. 후복막 대량출혈 위험.", "basis": "골반환 파괴 → 정맥얼기·동맥 손상 → 후복막강(큰 용적)으로 대량출혈.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">골반골절 — 후복막 대량출혈</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">고에너지 외상</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">골반환 파괴</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" r \"#3a4654\">균형수혈+색전술/외고정</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">요도구 출혈·회음부 혈종→요도손상</text></svg>"}, {"title": "💊 처치 근거", "items": [{"item": "골반바인더", "content": "큰돌기(greater trochanter) 높이에 골반압박대 적용", "basis": "골반 용적·골절 안정화 → 출혈 감소(탬포네이드). 1차·즉시 처치.", "img": ""}, {"item": "출혈 통제", "content": "수액·균형수혈, 불안정 지속 시 혈관색전술/외고정/수술", "basis": "바인더로 안 잡히면 색전·고정. 대량수혈 프로토콜.", "img": ""}, {"item": "주의", "content": "무분별한 골반 흔들기 반복 금지(혈괴 탈락)", "basis": "반복 검사·도뇨가 출혈 악화. 요도손상 의심 시 도뇨 신중.", "img": ""}], "svg": ""}], "redflags": ["고에너지 외상+저혈압+겉상처 경미 → 후복막 골반출혈 의심", "불안정 골반골절 → 즉시 골반바인더(큰돌기 높이)", "골반 반복 흔들기 금지(형성된 혈괴 탈락·출혈 악화)", "요도구 출혈·회음부 혈종 → 요도손상, 도뇨 전 평가"], "memo": "후복막 대량출혈(안 보임) / 큰돌기 골반바인더 / 균형수혈+색전·외고정 / 요도·직장 손상 동반 평가"}, {"no": "O03", "name": "개방성 골절", "cat": "🦴 정형외과", "diff": "★★★★☆", "kw": "뼈-외부 교통 / 감염·골수염 위험 / 조기 항생제·파상풍 / 세척·변연절제 / 멸균드레싱·정복고정", "mentor": "“뼈가 피부 밖으로 보이거나, 골절 부위에 상처가 뚫려 있으면 개방성 골절이야. 핵심은 ‘감염’이야 — 외부와 통했으니 균이 뼈까지 들어가 골수염 되면 평생 고생해. 그래서 빨리 항생제 주고 파상풍 챙기고, 상처는 멸균 거즈로 덮고 사진 한 장 찍어둬(반복해서 들추지 마). 진짜 세척·정리는 수술방에서 해.”", "sections": [{"title": "📖 정의·분류", "items": [{"item": "한 줄 정의", "content": "골절 부위가 외부와 통한 골절(피부 결손·뼈 노출). 감염 위험이 큰 응급.", "basis": "개방창으로 오염 → 골·연부조직 감염·골수염 위험. 손상정도(Gustilo)로 분류.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">개방성 골절 — 감염이 핵심</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">뼈-외부 교통</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">오염</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">골·연부조직 감염</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">골수염</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">조기 항생제·파상풍 · 멸균드레싱·사진(반복 노출 금지) · 수술 세척</text></svg>"}, {"title": "😣 평가", "items": [{"item": "평가", "content": "상처·뼈 노출, 신경·혈관 손상(맥박·감각·운동), 오염도, 구획증후군", "basis": "원위부 순환·신경 평가 필수. 동반 혈관손상·구획증후군 감시.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">개방성 골절 — 처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#4e342e\">감염·골수염 예방</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#4e342e\">조기 경험적 항생제+파상풍</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">원위 신경·혈관·구획 평가</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#4e342e\">멸균 식염수 거즈로 덮고 사진</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">반복 노출 금지→수술장 세척·변연절제</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">심한 오염·혈관손상→사지 구제 응급</text></svg>"}, {"title": "💊 처치 근거", "items": [{"item": "조기 항생제·파상풍", "content": "가능한 한 빨리 경험적 항생제, 파상풍 예방", "basis": "조기 항생제가 감염·골수염 감소. 오염도 따라 약제 확장.", "img": ""}, {"item": "창상 처치", "content": "멸균 생리식염수 거즈로 덮고 사진 기록, 반복 노출 금지", "basis": "오염·건조 방지. 응급실 반복 검사보다 수술장 처치가 원칙.", "img": ""}, {"item": "정복·고정·수술", "content": "정렬·부목 고정, 수술적 세척·변연절제·골고정", "basis": "오염·괴사 제거와 안정 고정이 근본. 응급 수술 대상.", "img": ""}], "svg": ""}], "redflags": ["개방성 골절 → 조기 항생제+파상풍 예방(감염·골수염 예방)", "원위 신경·혈관 손상·구획증후군 동반 평가", "상처 반복 노출 금지 → 멸균드레싱·사진 기록 후 수술장에서", "심한 오염·혈관손상(Gustilo IIIC) → 사지 구제 응급"], "memo": "뼈-외부 교통=감염 위험 / 조기 항생제·파상풍 / 멸균드레싱·사진(반복 노출 금지) / 수술 세척·고정"}, {"no": "O04", "name": "척추·척수 손상", "cat": "🦴 정형외과", "diff": "★★★★★", "kw": "전척추 고정 / 신경학적 평가 / 경추 클리어 기준 / 신경성 쇼크 / 이차손상 예방", "mentor": "“다친 기전이 세거나(추락·교통) 목·등 통증, 팔다리 저림·마비가 있으면 ‘일단 척추를 움직이지 마’가 원칙이야. 잘못 움직이면 멀쩡하던 척수가 끊겨. 통나무 굴리기로 옮기고 고정해. 경추 손상은 혈압 떨어지고 맥 느린 ‘신경성 쇼크’가 올 수 있는데, 출혈성 쇼크랑 헷갈리지 말고 둘 다 챙겨. 마비 범위를 기록해두면 악화를 빨리 잡아.”", "sections": [{"title": "📖 정의·기전", "items": [{"item": "한 줄 정의", "content": "외상으로 척추·척수가 손상된 상태. 부적절한 조작이 이차 신경손상을 유발.", "basis": "골절·탈구·부종·출혈이 척수 압박·손상. 1차 손상은 고정, 2차 손상은 예방 가능.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">척추·척수 손상 — 이차손상 예방</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fil , "items": [{"item": "증상", "content": "단일 관절 발적·열감·종창·심한 운동통, 발열, 체중부하 거부", "basis": "급성 단관절염은 화농성 우선 배제. 통풍·반응성과 감별 필요.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "관절천자", "content": "관절액 백혈구↑·도말·배양·결정검사(항생제 전)", "basis": "진단의 핵심. 배양으로 원인균·감수성. 결정으로 통풍 감별.", "img": ""}, {"item": "랩·영상", "content": "CBC·CRP·ESR·혈액배양, X선/MRI(골수염)", "basis": "염증·균혈증 평가. 골수염은 MRI가 민감.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">화농성 관절염·골수염</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#4e342e\">연골=시간싸움</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">단일 관절 발적·열감·심한 운동통+발열</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#4e342e\">관절천자(백혈구·배양)—항생제 전</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">CBC·CRP·ESR·혈액배양·MRI(골수염)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#4e342e\">응급 배농·세척(항생제 단독 부족)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">경험적 정맥 항생제→표적·장기</text></svg>"}, {"title": "💊 처치 근거", "items": [{"item": "배농·세척", "content": "화농성 관절염은 응급 관절 배농·세척(관절경/절개)", "basis": "고름 제거가 연골 보존의 핵심. 항생제만으론 부족.", "img": ""}, {"item": "항생제", "content": "배양 후 경험적 정맥 항생제, 이후 표적·장기", "basis": "조기 항생제. 골수염은 장기 치료 필요.", "img": ""}], "svg": ""}], "redflags": ["단일 관절 발적·열감·심한 운동통+발열 → 화농성 관절염, 응급", "관절천자·배양은 항생제 전(단, 치료 지연 말 것)", "화농성 관절염은 배농·세척 필요(항생제 단독 불충분)", "인공관절·당뇨·면역저하 → 고위험, 적극 평가"], "memo": "단관절 발적·열감·운동통=화농성 의심 / 관절천자(배양) / 응급 배농·세척+조기 항생제 / 연골=시간싸움"}, {"no": "O07", "name": "사지 절단·재접합", "cat": "🦴 정형외과", "diff": "★★★★☆", "kw": "절단부 출혈 통제 / 절단편 보존(젖은거즈→봉투→얼음물) / 직접 얼음 금지 / 허혈시간 / 이송", "mentor": "“손가락·사지가 잘리면 두 가지를 동시에 해 — 환자의 출혈을 멈추고(직접압박, 안 되면 지혈대), 잘린 조각을 ‘제대로’ 보존하는 거야. 절단편은 생리식염수 적신 거즈로 싸서 비닐봉투에 넣고, 그 봉투를 얼음물에 띄워. 얼음에 직접 닿으면 동상으로 못 붙여. 시간이 생명이니까 빨리 재접합 가능한 병원으로 같이 보내.”", "sections": [{"title": "📖 정의·원칙", "items": [{"item": "한 줄 정의", "content": "외상성 사지 절단. 환자 소생·출혈통제와 절단편 보존·재접합 가능성 판단.", "basis": "환자 생명(출혈) 우선, 절단편은 허혈시간 내 보존 시 재접합 가능.", "img": ""}], "svg": ""}, {"title": "💊 절단부(환자)", "items": [{"item": "출혈 통제", "content": "직접압박·거상, 실패 시 지혈대, 소생·진통·파상풍", "basis": "대량출혈은 생명 위협 → 압박·지혈대. 환자 안정이 먼저.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">절단 — 환자 처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#4e342e\">환자 출혈 통제 먼저</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#4e342e\">직접압박·거상→실패 시 지혈대</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">수액·수혈 소생·진통·파상풍</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">환자 출혈통제가 절단편보다 우선</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">근위부일수록 허혈에 취약(시간↓)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">재접합 가능 기관으로 신속 동반 이송</text></svg>"}, {"title": "🧊 절단편 보존", "items": [{"item": "올바른 보존", "content": "생리식염수 적신 거즈로 감싸기 → 방수봉투 → 얼음물에 담가 냉장", "basis": "건조·동결 방지. 차갑게 유지하면 허혈 허용시간 연장.", "img": ""}, {"item": "금기", "content": "절단편을 얼음·드라이아이스에 직접 접촉, 물에 담가 불림 금지", "basis": "직접 냉동은 동상으로 조직 파괴 → 재접합 불가.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">절단편 보존 — 올바르게</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#4e342e\">얼음 직접 접촉 금지</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#4e342e\">생리식염수 적신 거즈로 감싸기</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">→ 방수 봉투 → 얼음물에 담가 냉장</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#4e342e\">얼음·드라이아이스 직접 접촉 금지(동상)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">물에 담가 불리지 말 것</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">허혈시간 단축·재접합 기관 이송</text></svg>"}, {"title": "🚑 이송", "items": [{"item": "허혈시간·이송", "content": "온허혈 짧음·냉허혈 길어짐, 재접합 가능 기관으로 신속 동반 이송", "basis": "근육 많은 근위부일수록 허혈에 취약 → 시간 단축이 관건.", "img": ""}], "svg": ""}], "redflags": ["절단편 얼음·드라이아이스 직접 접촉 금지(동상→재접합 불가)", "환자 대량출혈 통제(압박→지혈대)가 절단편보다 우선", "허혈시간이 생명 → 신속 보존·재접합 기관 이송", "절단편을 물에 담가 불리지 말 것(조직 손상)"], "memo": "환자 출혈통제 우선 / 절단편=적신거즈→봉투→얼음물(직접 얼음 금지) / 허혈시간 단축 / 재접합 기관 이송"}, {"no": "O08", "name": "지방 색전 증후군", "cat": "🦴 정형외과", "diff": "★★★★☆", "kw": "장골 골절 후 24~72h / 호흡곤란·의식변화·점상출혈 3징 / 저산소 / 지지치료 / 조기고정 예방", "mentor": "“대퇴골 같은 큰 뼈가 부러지고 하루이틀 지나서 갑자기 숨차고 헛소리하고 가슴·겨드랑이에 작은 점출혈이 생기면 지방색전을 의심해. 골수의 지방이 혈관으로 들어가 폐·뇌를 막는 거야. 특이 치료는 없고 산소·호흡 지지가 핵심이라, 일찍 골절을 고정해서 ‘예방’하는 게 제일 중요해. PE랑 헷갈리니 감별도 해.”", "sections": [{"title": "📖 정의·기전", "items": [{"item": "한 줄 정의", "content": "장골 골절 등 후 골수 지방이 색전을 일으켜 폐·뇌·피부 증상을 내는 증후군.", "basis": "골수 지방구가 순환 유입 → 폐모세혈관·뇌 색전+염증반응. 보통 24~72시간 후.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">지방색전 — 골절 후 24~72h</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">장골 골절</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">골수 지방 유입</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">폐·뇌 색전+염증</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">저산소·신경증상</text><text x=\"888\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">점상출혈</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill= 120 130 Z\" fill=\"#e58c93\" stroke=\"#b23039\" stroke-width=\"2.5\"/>\n    <text x=\"70\" y=\"110\" font-size=\"13\" fill=\"#b23039\" font-weight=\"700\">허탈된 폐</text>\n    <path d=\"M70 100 L110 140\" stroke=\"#b23039\" stroke-width=\"2\"/>\n    <!-- 공기 영역 -->\n    <text x=\"60\" y=\"250\" font-size=\"22\" fill=\"#8b98a8\">air</text>\n    <!-- 우폐 눌림 -->\n    <path d=\"M300 60 C340 90 345 210 290 260 C255 230 250 120 300 60 Z\" fill=\"#f6b8be\" stroke=\"#b23039\" stroke-width=\"2.5\"/>\n    <text x=\"180\" y=\"305\" font-size=\"15\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">긴장성 (저혈압·기관편위)</text>\n  </g>\n  <text x=\"32\" y=\"424\" font-size=\"13.5\" fill=\"#8b98a8\">※ 편측 호흡음 소실+저혈압+기관 반대편 편위 → 영상 전 바늘감압→흉관</text>\n</svg>"}, {"title": "😣 평가", "items": [{"item": "기흉 소견", "content": "편측 호흡음 소실·과공명, 흉통·호흡곤란", "basis": "폐 허탈의 단서. 청진·타진으로 침상 추정 가능.", "img": ""}, {"item": "긴장성 신호", "content": "심한 호흡곤란+저혈압·빈맥, 기관 반대측 편위, 경정맥팽대, 청색증", "basis": "종격동 압박·환류 차단의 쇼크. 이 조합이면 즉시 감압.", "img": ""}], "svg": ""}, {"title": "💊 처치 근거", "items": [{"item": "긴장성 — 즉시", "content": "바늘감압(2nd ICS 중쇄골선 또는 4·5th 전액와선) → 흉관", "basis": "압력 해소가 쇼크를 푼다. 영상 전 임상진단으로 즉시.", "img": ""}, {"item": "흉관", "content": "증상성·외상성 기흉은 흉관 삽입(배액)", "basis": "공기 배출·폐 재팽창. 외상은 혈흉 동반 흔해 흉관 선호.", "img": ""}, {"item": "개방성 기흉", "content": "3면 밀폐 드레싱(밸브 효과)→흉관", "basis": "흡입창 차단하되 긴장성 전환 방지 위해 한 면 개방.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">기흉 처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#b23039\">긴장성은 임상진단으로 즉시</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">긴장성: 영상 전 바늘감압→흉관</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">바늘감압: 2nd ICS 중쇄골선 또는 4·5th 전액와선</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">증상성·큰 기흉: 흉관 배액</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">개방성: 3면 밀폐 드레싱</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">소량·무증상: 산소 주며 관찰</text></svg>"}], "redflags": ["편측 호흡음 소실+저혈압+기관 편위 → 긴장성, 영상 전 바늘감압", "양압환기(BVM·삽관) 중 급격 악화 → 긴장성 기흉 의심", "개방성 흉부창 → 3면 밀폐 드레싱(완전 밀폐는 긴장성 유발)", "외상성 기흉은 혈흉 동반 흔함 → 흉관·출혈 평가"], "memo": "편측 호흡음 소실 / 긴장성(저혈압·기관편위·경정맥팽대)=영상 전 바늘감압→흉관 / 개방성=3면 드레싱"}, {"no": "T02", "name": "대량 혈흉", "cat": "🫁 흉부외과", "diff": "★★★★★", "kw": "흉강내 출혈 / 호흡음 소실·타진 둔탁 / 저혈량 쇼크 / 흉관 / 초기 1.5L·지속출혈=개흉", "mentor": "“혈흉은 가슴 안에 피가 고이는 거야 — 기흉이랑 비슷한데 두드리면 ‘둔탁’하고(공기는 울림) 쇼크가 와. 흉관을 넣으면 진단·치료가 동시에 돼. 처음에 피가 확(1.5L 정도) 쏟아지거나 계속 많이 나오면 그냥 흉관으론 안 되고 수술방(개흉)이야. 큰 혈관이 찢어진 거니까. 수액·수혈로 소생하면서 흉부외과 빨리 불러.”", "sections": [{"title": "📖 정의·기전", "items": [{"item": "한 줄 정의", "content": "흉강 내 혈액 축적. 폐·흉벽·큰혈관 손상으로 대량출혈+폐압박을 일으킴.", "basis": "늑간동맥·폐·대혈관 손상 출혈 → 저혈량 쇼크 + 폐 허탈(가스교환 장애).", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">대량 혈흉</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">폐·흉벽·대혈관 손상</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" wi 8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#01579b\">둔탁=혈흉</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">편측 호흡음 소실+타진 둔탁+쇼크</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#01579b\">흉관 삽입(진단+배액+정량화)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#01579b\">즉시 ~1.5L 또는 지속 다량→개흉</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">균형수혈로 소생하며 흉부외과</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">기흉(과공명)과 타진으로 감별</text></svg>"}], "redflags": ["편측 호흡음 소실+타진 둔탁+쇼크 → 대량 혈흉", "흉관 즉시 ~1.5L 또는 지속 다량 배액 → 개흉 적응", "기흉(과공명)과 혈흉(둔탁) 타진으로 감별", "균형수혈로 소생하며 흉부외과 즉시 호출"], "memo": "흉강내 출혈→쇼크+폐압박 / 타진 둔탁 / 흉관(진단·치료) / 초기 1.5L·지속출혈=개흉 / 균형수혈"}, {"no": "T03", "name": "동요가슴·폐좌상", "cat": "🫁 흉부외과", "diff": "★★★★☆", "kw": "늑골 다발골절 / 역설호흡 / 기저 폐좌상이 진짜 문제 / 진통·산소 / 과수액 주의·환기보조", "mentor": "“늑골이 여러 대, 여러 군데 부러지면 그 부분 흉벽이 따로 놀아(숨 들이쉬면 안으로 들어가는 역설호흡). 근데 진짜 환자를 힘들게 하는 건 그 밑에 멍든 폐(폐좌상)야 — 시간이 지나면서 산소가 점점 떨어져. 핵심은 ‘통증 조절’이야. 아파서 숨을 얕게 쉬면 폐가 더 망가지거든. 수액은 과하지 않게, 산소 떨어지면 환기보조 준비.”", "sections": [{"title": "📖 정의·기전", "items": [{"item": "동요가슴", "content": "연속된 늑골이 두 군데 이상 골절되어 흉벽 분절이 역설운동", "basis": "흉벽 안정성 상실 → 환기 효율↓. 단 예후는 동반 폐좌상이 좌우.", "img": ""}, {"item": "폐좌상", "content": "폐실질 타박·출혈·부종 → 점진적 가스교환 장애(수시간~수일)", "basis": "지연성으로 악화 → 초기 정상이라도 추적 감시 필요.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">동요가슴·폐좌상</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width= \n    <text x=\"560\" y=\"330\" font-weight=\"700\" fill=\"#c2611a\">β차단으로 SBP100~120·HR&lt;60 먼저</text>\n    <text x=\"560\" y=\"356\" fill=\"#8b98a8\">혈관확장만 단독 금지(반사빈맥→악화)</text>\n  </g>\n</svg>"}, {"title": "😣 평가", "items": [{"item": "단서", "content": "고에너지 급감속 기전, 흉배부 통증, 양팔 혈압차, 흉부X선 종격동 확대", "basis": "기전+종격동 확대가 핵심 단서. 외형 손상 없이도 발생.", "img": ""}], "svg": ""}, {"title": "📈 검사·처치", "items": [{"item": "확진", "content": "CT 혈관조영(표준)", "basis": "손상 부위·범위·수술 결정. 안정 시 1차 확진.", "img": ""}, {"item": "혈압·심박 조절", "content": "β차단제로 SBP·심박수 낮춰 전단력↓(impulse control)", "basis": "박리에 준해 dP/dt↓로 진행·파열 억제. 혈관확장만 단독 금물.", "img": ""}, {"item": "확정 치료", "content": "흉부 스텐트그라프트(TEVAR)/수술", "basis": "파열 방지 위해 손상부 격리·복원. 동반손상 우선순위 조율.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">외상성 대동맥 손상</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#01579b\">전단력 먼저 낮추기</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">고에너지 급감속+종격동 확대</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#01579b\">혈압·심박 먼저 낮춤(β차단)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">혈관확장만 단독 금지(반사빈맥)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">CT 혈관조영(확진)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">TEVAR/수술 — 파열 전 응급</text></svg>"}], "redflags": ["고에너지 급감속+종격동 확대 → 대동맥 손상 의심, CT혈관조영", "혈압·심박 먼저 낮춰 전단력↓(β차단), 혈관확장만 단독 금지", "외형 손상 경미해도 발생 가능 → 기전 중시", "확진 지연 시 파열·사망 → 흉부외과/혈관 즉시
