dle\">압전 또는 대량혈흉</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">급사 위험</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">eFAST로 감별 · 관통물 고정(제거 금지) · 즉시 수술·소생적 개흉</text></svg>"}, {"title": "😣 평가", "items": [{"item": "두 갈래", "content": "압전(Beck 3징·기이맥) vs 대량혈흉(호흡음 소실·둔탁·쇼크)", "basis": "발현 양상으로 분기. eFAST로 신속 감별이 처치를 결정.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">흉부 관통상 — 처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#01579b\">압전 vs 혈흉</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#01579b\">심장위험구역 관통→심장손상 가정</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#01579b\">eFAST(심낭·흉강) 즉시</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">압전(Beck3징) vs 대량혈흉 감별</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#01579b\">박힌 관통물 제거 금지(고정)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">수액·균형수혈→즉시 수술</text></svg>"}, {"title": "💊 처치 근거", "items": [{"item": "eFAST·소생", "content": "즉시 eFAST(심낭·흉강), 수액·균형수혈, 관통물 고정(제거 금지)", "basis": "빠른 진단+소생. 박힌 이물은 수술장에서 제거.", "img": ""}, {"item": "수술", "content": "심장손상·압전·대량혈흉 → 즉시 개흉/수술, 압전은 천자 가교", "basis": "근본은 수술적 지혈·복원. 임박 심정지는 소생적 개흉 고려.", "img": ""}], "svg": ""}], "redflags": ["심장위험구역 관통 → 심장·대혈관 손상 가정, eFAST 즉시", "박힌 관통물 현장·응급실 제거 금지 → 고정 후 수술장", "압전(Beck3징)·대량혈흉 감별로 처치 분기", "도착 시 임박 심정지 → 소생적 개흉술 적응 평가"], "memo": "심장위험구역 관통 / 압전 vs 대량혈흉 / eFAST·균형수혈 / 관통물 고정 / 즉시 수술·소생적 개흉"}, {"no": "T08", "name": "흉관 삽입·관리", "cat": "🫁 흉부외과", "diff": "★★★☆☆", "kw": "기흉·혈흉 배액 / 삽입부 안전삼각 / 배액병 파동·기포·배액량 / 응급상황 대응 / 제거 시 호기", "mentor": "“흉관은 가슴에서 공기·피를 빼는 생명줄이야. 관리 포인트만 알면 돼 — 물기둥이 호흡 따라 ‘출렁(파동)’이면 잘 통하는 거고, 계속 보글보글(지속 기포)이면 공기 새는 거야. 배액량·색을 시간마다 기록하고 갑자기 많아지면 보고해. 병을 환자보다 ‘위로 들면’ 역류하니 항상 아래에 둬. 관이 빠지거나 끊기면 당황 말고 정해진 응급대처를 해.”", "sections": [{"title": "📖 목적·삽입", "items": [{"item": "목적", "content": "흉막강의 공기(기흉)·액체(혈흉·삼출) 배출로 폐 재팽창", "basis": "음압 회복·폐 재팽창이 목표. 외상·수술 후 흔히 사용.", "img": ""}, {"item": "삽입 위치", "content": "‘안전삼각’(중액와선~전액와선, 4·5번 늑간), 늑골 상연으로", "basis": "혈관·신경 손상 회피. 표준 위치·기법으로 합병증 감소.", "img": ""}], "svg": ""}, {"title": "🔧 관리·관찰", "items": [{"item": "정상 소견", "content": "호흡성 파동(oscillation), 배액량·색 기록", "basis": "파동=관 개방·기능 정상. 배액 추세가 출혈·치유 지표.", "img": ""}, {"item": "이상 신호", "content": "지속 기포(공기누출), 갑작스런 다량 혈성 배액, 파동 소실(폐쇄/꼬임)", "basis": "공기누출·재출혈·폐쇄 단서 → 원인 확인·보고.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">흉관 — 관리·관찰</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#01579b\">파동·기포·배액 관찰</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">안전삼각(중~전액와선, 4·5늑간) 삽입</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#01579b\">호흡성 파동(oscillation)=개방·정상</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#01579b\">지속 기포=공기누출</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">갑작스런 다량 혈성 배액→보고</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">배액량·색 시간마다 기록</text></svg>"}, {"title": "⚠️ 안전·응급", "items": [{"item": "배액병 위치", "content": "항상 환자 흉부보다 아래, 넘어뜨리지 않기", "basis": "높이면 역류·역류감염. 차폐 유지.", "img": ""}, {"item": "응급 대처", "content": "관 이탈→삽입부 폐쇄드레싱·관찰, 연결 분리→정해진 절차, 무단 클램프 지양", "basis": "상황별 표준 대처. 부적절 클램프는 긴장성 기흉 유발 위험.", "img": ""}, {"item": "제거", "content": "지시에 따라 호기 말/발살바 시 신속 제거+밀폐드레싱", "basis": "흡기 시 제거하면 공기 유입 → 호기·발살바로 제거.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">흉관 — 안전·응급</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#01579b\">클램프·역류 주의</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#01579b\">배액병은 항상 흉부보다 아래(역류 방지)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#01579b\">함부로 클램프 금지(긴장성 기흉)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">관 이탈→삽입부 폐쇄드레싱·관찰</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">연결 분리→정해진 절차</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">제거는 호기말/발살바 시 신속+밀폐</text></svg>"}], "redflags": ["지속 기포(공기누출)·갑작스런 다량 혈성 배액 → 즉시 보고", "배액병은 항상 흉부보다 아래 유지(역류 방지)", "함부로 클램프 금지 → 긴장성 기흉 유발 위험", "관 이탈·연결 분리 시 정해진 응급절차로 대응"], "memo": "공기·액체 배액 / 안전삼각 삽입 / 파동(정상)·지속기포(누출)·배액 기록 / 병은 아래 / 제거는 호기"}, {"no": "NS01", "name": "외상성 뇌손상 (TBI)·GCS", "cat": "🧠 신경외과", "diff": "★★★★☆", "kw": "GCS 반복 평가 / 1차 vs 2차 손상 / 저산소·저혈압 예방 / CT / 악화 추세", "mentor": "“머리 다친 환자는 ‘GCS(의식점수)’를 반복해서 재는 게 핵심이야. 처음보다 점수가 떨어지면 안에서 뭔가 커지고 있다는 신호거든. 부딪힌 순간의 1차 손상은 못 되돌려도, 그 뒤에 오는 2차 손상(저산소·저혈압)은 우리가 막을 수 있어. 그래서 산소·혈압을 사수하는 게 신규가 할 가장 중요한 일이야. 토하거나 두통 심해지거나 한쪽이 처지면 바로 보고.”", "sections": [{"title": "📖 정의·분류", "items": [{"item": "한 줄 정의", "content": "외상으로 뇌가 손상된 상태. GCS로 중증도를 나눈다.", "basis": "GCS 13~15 경증·9~12 중등도·≤8 중증(혼수). 중증은 기도확보 대상.", "img": ""}, {"item": "1차 vs 2차 손상", "content": "1차: 충격 순간의 직접 손상(불가역)\n2차: 이후 저산소·저혈압·뇌압상승·발열로 악화(가역)", "basis": "치료의 목표는 ‘2차 손상 예방’ → 산소·혈압·뇌압 관리가 핵심.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">외상성 뇌손상 — 2차손상 예방</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">외상(1차 손상)</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">저산소·저혈압(2차)</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">뇌압↑·부종</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">뇌관류↓·악화</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">GCS 반복(추세)·동공 · 산소·혈압 사수 · 악화=CT·신경외과</text></svg>"}, {"title": "😣 평가", "items": [{"item": "핵심 평가", "content": "GCS 반복 측정, 동공(크기·반응), 국소신경징후, 활력징후 추세", "basis": "GCS 하락·동공 부동은 혈종·뇌압상승 경고. 추세가 단발값보다 중요.", "img": ""}, {"item": "악화 신호", "content": "의식저하, 반복 구토, 심해지는 두통, 경련, 한쪽 위약", "basis": "두개내 병변 진행 시사 → 즉시 CT·신경외과.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">TBI — 평가·처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#283593\">GCS 추세가 핵심</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">GCS 13~15 경증 / 9~12 중등도 / ≤8 중증</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#283593\">GCS 하락·동공 부동→병변 진행(CT)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#283593\">산소·혈압 유지(2차손상 예방)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">상체 30°·중립·발열·경련 관리</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">항응고·고령은 경미 외상도 영상</text></svg>"}, {"title": "📈 검사", "items": [{"item": "뇌 CT", "content": "중등도·중증·악화·고위험(항응고·고령) → 비조영 CT", "basis": "혈종·골절·부종·뇌이동 확인. 악화 시 재촬영.", "img": ""}], "svg": ""}, {"title": "💊 처치 근거", "items": [{"item": "ABC·2차손상 예방", "content": "기도(중증=삽관)·산소·혈압 유지, 정상 체온·혈당", "basis": "저산소·저혈압은 예후를 크게 악화 → 적극 교정이 1순위.", "img": ""}, {"item": "뇌압·체위", "content": "상체 30°·머리 중립, 통증·발열·경련 관리, 필요시 고삼투", "basis": "정맥환류 도와 뇌압↓. 진행 시 ICP 알고리즘(NS05 연계).", "img": ""}], "svg": ""}], "redflags": ["GCS가 처음보다 떨어짐 → 두개내 병변 진행, 즉시 CT·신경외과", "동공 부동·산대 → 뇌탈출 임박 신호", "저산소·저혈압이 2차 손상 주범 → 적극 예방·교정", "항응고제 복용·고령 → 경미 외상도 출혈 위험, 적극 영상"], "memo": "GCS 반복(추세)·동공 / 1차(불가역)↔2차(예방) / 산소·혈압 사수 / 악화=CT·NS / 상체거상"}, {"no": "NS02", "name": "경막외 혈종 (EDH)", "cat": "🧠 신경외과", "diff": "★★★★★", "kw": "의식명료기(lucid interval) / 중경막동맥·측두골 / CT 볼록렌즈 / 동공산대 / 응급 개두술", "mentor": "“머리를 부딪히고 잠깐 멀쩡했다가(의식명료기) 갑자기 확 나빠지는 환자가 EDH의 전형이야. 두개골 바로 안쪽 동맥(중경막동맥)이 터져 피가 빠르게 차오르거든. CT에서 볼록렌즈(레몬) 모양이면 거의 확실해. 한쪽 동공이 커지고 반대쪽 팔다리가 마비되기 시작하면 이미 뇌가 밀리는 거야 — 망설이지 말고 응급 개두술. 빨리만 빼주면 예후는 좋은 편이야.”", "sections": [{"title": "📖 정의·기전", "items": [{"item": "한 줄 정의", "content": "두개골과 경막 사이에 생긴 ‘동맥성’ 혈종. 빠르게 커져 뇌를 압박한다.", "basis": "주로 측두골 골절로 중경막동맥 손상 → 고압 동맥출혈이 급속 축적.", "img": ""}, {"item": "CT 소견", "content": "볼록렌즈(biconvex/lens) 모양, 봉합선을 넘지 않음", "basis": "경막 부착부에 갇혀 볼록한 모양. SDH(초승달)와 감별점.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 840 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"840\" height=\"430\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">두부 CT — 경막외(볼록렌즈) vs 경막하(초승달)</text>\n  <line x1=\"32\" y1=\"60\" x2=\"808\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <g transform=\"translate(210,240)\">\n    <circle r=\"150\" fill=\"#1a2330\" stroke=\"#3a4654\" stroke-width=\"3\"/>\n    <circle r=\"120\" fill=\"#586273\"/>\n "16\" font-weight=\"500\" fill=\"#3a4654\">한쪽 동공산대+반대편 마비=탈출</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#283593\">응급 개두술(빠르면 예후 양호)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">ABC·뇌압·응고 역전(가교)</text></svg>"}, {"title": "💊 처치 근거", "items": [{"item": "응급 개두술", "content": "유의한 혈종·뇌압상승 → 즉시 개두술·혈종 제거", "basis": "압박 해소가 결정적 치료. 조기 수술이면 예후 양호.", "img": ""}, {"item": "가교 처치", "content": "ABC·기도, 뇌압 관리, 응고장애 교정", "basis": "수술 전 안정화·뇌압 관리. 항응고는 역전.", "img": ""}], "svg": ""}], "redflags": ["의식명료기 후 급격한 악화 → EDH 전형, 즉시 CT·수술", "한쪽 동공산대+반대편 마비 → 뇌탈출 진행, 응급 개두술", "측두부 외상·측두골 골절 → 중경막동맥 손상 의심", "조기 수술이 예후 결정 → 시간 지체 금물"], "memo": "동맥성·볼록렌즈 / 의식명료기→급변 / 측두골·중경막동맥 / 동공산대=탈출 / 응급 개두술(빠르면 예후 양호)"}, {"no": "NS03", "name": "급성 경막하 혈종 (acute SDH)", "cat": "🧠 신경외과", "diff": "★★★★★", "kw": "교정맥 손상 / CT 초승달 / 뇌좌상 동반·예후 나쁨 / midline shift / 수술·ICP 관리", "mentor": "“급성 경막하혈종은 고에너지 외상에서 뇌 표면의 정맥(교정맥)이 찢어져 생겨. CT에서 초승달(반월) 모양이야. EDH랑 헷갈리지 마 — EDH는 볼록렌즈, SDH는 초승달. 그리고 SDH가 더 무서운 게, 뇌 자체가 같이 멍든(뇌좌상) 경우가 많아 예후가 나빠. 혈종이 크고 뇌가 한쪽으로 밀리면(midline shift) 응급 수술이야.”", "sections": [{"title": "📖 정의·기전", "items": [{"item": "한 줄 정의", "content": "경막과 지주막 사이에 생긴 혈종. 주로 교정맥(bridging vein) 손상.", "basis": "가속-감속으로 표면 정맥 파열·뇌좌상 동반. 고령·항응고에서 위험.", "img": ""}, {"item": "CT 소견", "content": "초승달(crescent) 모양, 봉합선을 넘어 퍼짐", "basis": "뇌 표면을 따라 퍼져 반월형. EDH(볼록렌즈)와 감별.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 840 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"840\" height=\"430\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">두부 CT — 경막외(볼록렌즈) vs 경막하(초승달)</text>\n  <line x1=\"32\" y1=\"60\" x2=\"808\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <g transform=\"translate(210,240)\">\n    <circle r=\"150\" fill=\"#1a2330\" stroke=\"#3a4654\" stroke-width=\"3\"/>\n    <circle r=\"120\" fill=\"#586273\"/>\n    <p t-weight=\"500\" fill=\"#3a4654\">두꺼운 혈종·뇌이동→개두술</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">ICP·2차손상 적극 관리</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">고령·항응고제→응고 역전</text></svg>"}, {"title": "💊 처치 근거", "items": [{"item": "수술", "content": "두꺼운 혈종·유의한 뇌이동·악화 → 개두술 혈종제거", "basis": "압박·뇌이동 해소. 큰 혈종은 응급.", "img": ""}, {"item": "ICP·전신 관리", "content": "뇌압 관리, ABC, 응고 교정, 2차손상 예방", "basis": "뇌좌상·부종 동반 흔해 적극적 뇌압·전신 관리.", "img": ""}], "svg": ""}], "redflags": ["초승달 혈종+정중선 이동 → 응급 개두술 평가", "EDH(볼록렌즈)와 감별 — SDH는 초승달·예후 더 나쁨", "뇌좌상·부종 동반 흔함 → 적극 ICP 관리", "고령·항응고제 → 경미 외상도 발생, 응고 역전"], "memo": "교정맥·초승달 / 뇌좌상 동반=예후 나쁨 / midline shift=수술 / ICP·2차손상 관리 / EDH와 감별"}, {"no": "NS04", "name": "만성 경막하 혈종 (chronic SDH)", "cat": "🧠 신경외과", "diff": "★★★☆☆", "kw": "노인·경미 외상 후 수주 / 점진적 두통·인지·보행·편마비 / 항응고 / 천공배액(burr hole)", "mentor": "“노인이 몇 주 전 가볍게 머리 부딪힌 뒤로 서서히 두통·기억력 저하·한쪽 위약·걸음이 이상해지면 만성 경막하혈종을 의심해. 천천히 고여서 ‘치매 왔나·뇌졸중인가’ 하고 오해하기 쉬워. 특히 항응고제 먹는 노인에서 흔해. 다행히 천공(burr hole)으로 피를 빼주면 극적으로 좋아지는 경우가 많아 — 그래서 놓치지 않는 게 중요해.”", "sections": [{"title": "📖 정의·기전", "items": [{"item": "한 줄 정의", "content": "수주에 걸쳐 서서히 고이는 경막하 혈종. 노인에서 흔하다.", "basis": "뇌위축으로 늘어난 교정맥이 경미 외상에 미세출혈 → 서서히 축적·피막 형성.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">만성 경막하 혈종</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">노인·뇌위축</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" wid </text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#283593\">노인의 점진적 두통·인지·보행장애</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">경미 외상력·항응고제 복용</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">CT: 저/혼합 밀도(양측성도)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#283593\">증상성·큰 혈종→천공배액(극적 호전)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">소형 무증상→관찰·항응고 검토</text></svg>"}, {"title": "💊 처치 근거", "items": [{"item": "천공배액", "content": "증상성·큰 혈종 → 천공(burr hole) 배액", "basis": "감압으로 극적 호전 흔함. 표준 치료.", "img": ""}, {"item": "보존·교정", "content": "소형 무증상은 관찰, 항응고제 검토·교정", "basis": "작은 건 흡수 기대. 출혈 위험 약물 조정.", "img": ""}], "svg": ""}], "redflags": ["노인의 점진적 두통·인지저하·보행장애 → 만성 SDH 의심(치매로 오인 금지)", "경미 외상력·항응고제 복용 → 강한 단서", "증상성·큰 혈종 → 천공배액으로 호전 가능", "급격한 악화 → 재출혈·뇌압상승, 즉시 영상"], "memo": "노인·경미외상 후 수주·점진적 / 두통·인지·보행·편마비 / 항응고 / 천공배액(극적 호전) / 치매·뇌졸중 오인 주의"}, {"no": "NS05", "name": "두개내압 상승·뇌탈출", "cat": "🧠 신경외과", "diff": "★★★★★", "kw": "Monro-Kellie / Cushing 3징·동공·자세 / 상체거상·고삼투 / 과환기는 일시 / 응급 감압", "mentor": "“머리뼈는 닫힌 상자라(Monro-Kellie), 안에서 뭐가 커지면 뇌압이 치솟고 결국 뇌가 밀려 내려가(탈출) 죽어. 세 가지 신호를 외워 — Cushing 3징(혈압↑·맥박↓·불규칙 호흡), 한쪽 동공이 커짐, 의식이 뚝 떨어짐. 응급처치는 머리 올리고(30°·중립), 고삼투(만니톨·고장식염수) 주고, 과환기는 ‘잠깐만’ 다리로 쓰고, 근본은 응급 감압이야. 시간 싸움이야.”", "sections": [{"title": "📖 정의·기전", "items": [{"item": "한 줄 정의", "content": "두개내 용적 증가로 압력이 상승해 뇌관류 저하·뇌탈출에 이르는 응급.", "basis": "Monro-Kellie: 뇌·혈액·뇌척수액 합은 일정 → 한 가지 증가 시 보상 한계 넘으면 ICP 급등.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">두개내압 상승·뇌탈출</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" size=\"16\" font-weight=\"500\" fill=\"#3a4654\">부비동·중이·치아·심내막염 원발 탐색</text></svg>"}, {"title": "💊 처치 근거", "items": [{"item": "배농+항생제", "content": "수술적 배농/흡인 + 장기 경험적→표적 항생제", "basis": "종괴는 배농이 필요(항생제만으론 부족). 장기 항생제 병행.", "img": ""}, {"item": "원발·뇌압", "content": "원발 감염원 치료, 뇌압·경련 관리", "basis": "재발 방지 위해 원발 제거. 종괴효과 시 뇌압 관리.", "img": ""}], "svg": ""}], "redflags": ["발열+두통+국소신경징후 → 뇌농양 의심(수막염과 구분)", "종괴라 항생제만으론 부족 → 배농 필요", "종괴효과 동반 시 요추천자 신중(뇌탈출 위험)", "부비동·중이·치아·심내막염 등 원발 감염 탐색"], "memo": "발열+두통+국소징후 / 종괴효과·ICP↑ / 배농+장기 항생제 / 원발감염 / 수막염과 구분"}, {"no": "NS10", "name": "VP 션트 기능부전·감염", "cat": "🧠 신경외과", "diff": "★★★★☆", "kw": "션트 환자 두통·구토·의식저하 / 폐쇄·단절·과배액 / 발열·복부증상=감염 / 영상·신경외과", "mentor": "“뇌실복강 션트(VP shunt)를 단 환자가 두통·구토에 처지면 ‘션트가 막혔나’부터 의심해. 막히면 뇌압이 다시 확 올라 응급이야. 션트 경로를 따라 만져보고(펌프), 영상으로 뇌실이 다시 커졌는지·관 위치를 봐. 열나고 션트 길을 따라 붉거나 배가 아프면 감염일 수 있어. 신규가 판단하기 어려우니 의심되면 바로 신경외과로 연결해.”", "sections": [{"title": "📖 정의·역할", "items": [{"item": "한 줄 정의", "content": "수두증 치료용 뇌실복강(VP) 션트의 기능부전·감염 응급.", "basis": "션트가 CSF를 복강으로 배출. 막히거나 감염되면 뇌압 재상승·감염 위험.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">VP 션트 기능부전</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">션트 폐쇄/단절/과배액</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">CSF  font-weight=\"800\" fill=\"#283593\">신경외과 연계</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#283593\">션트 환자 ICP 재상승 증상→의심</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">뇌 CT(뇌실 크기)·shunt series(단절)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#283593\">막히면 뇌압 급상승(응급)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">발열·션트 경로 발적/복부→감염</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">폐쇄=교정/교체 · 감염=제거+항생제+외배액</text></svg>"}], "redflags": ["션트 환자 두통·구토·의식저하 → 션트 기능부전, 즉시 영상·NS", "막히면 뇌압 급상승 → 응급(뇌탈출 위험)", "발열+션트 경로 발적/복부증상 → 션트 감염", "소아는 보챔·식이저하·천문팽대 등 비전형 → 면밀 관찰"], "memo": "션트 환자 ICP 재상승 증상 / 폐쇄·단절·과배액 / 발열·복부=감염 / shunt series·CT / 신경외과 교정·제거"}, {"no": "NS11", "name": "마미증후군 (Cauda Equina)", "cat": "🧠 신경외과", "diff": "★★★★★", "kw": "안장마취·배뇨장애·양하지 위약 / 대형 추간판탈출 / 응급 MRI / 응급 감압(시간=기능)", "mentor": "“허리 아픈 환자는 많지만, 그중 ‘사타구니(안장 부위) 감각이 무뎌지고, 소변을 못 보거나 줄줄 새고, 양쪽 다리에 힘이 빠지면’ 그건 마미증후군 응급이야. 큰 디스크가 신경다발(마미)을 눌러서 그래. 시간이 지나면 배뇨·성기능·다리 마비가 영구히 남아 — 그래서 ‘의심 즉시 응급 MRI, 응급 감압수술’이야. 허리통증 환자에서 배뇨·안장감각을 꼭 물어봐.”", "sections": [{"title": "📖 정의·기전", "items": [{"item": "한 줄 정의", "content": "요추부 신경다발(마미)이 압박되어 배뇨·하지·회음 기능이 손상되는 응급.", "basis": "주로 대형 중심성 추간판탈출. 시간 지연 시 비가역 배뇨·운동 장애.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">마미증후군</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">대형 추간판탈출 등</text><path d=\"M256 239 l x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#283593\">응급 감압</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#283593\">안장(회음) 감각저하</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#283593\">방광·직장 장애(요저류/실금)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#283593\">양측 좌골신경통·하지 위약</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">잔뇨(방광스캔)·항문긴장도·MRI</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">허리통증 환자에서 배뇨·안장감각 확인</text></svg>"}, {"title": "📈 검사·처치", "items": [{"item": "응급 MRI", "content": "요천추 MRI로 압박 부위·원인 확인", "basis": "확진·수술 계획. 의심 시 지체 없이.", "img": ""}, {"item": "응급 감압", "content": "조기 응급 수술적 감압", "basis": "조기 감압이 기능 회복의 관건 — 시간이 곧 기능.", "img": ""}], "svg": ""}], "redflags": ["안장마취+배뇨장애(요저류/실금)+양하지 위약 → 마미증후군, 응급", "허리통증 환자에서 배뇨·안장감각 반드시 확인", "지연 시 영구 배뇨·성·운동 장애 → 의심 즉시 MRI·감압", "요저류(잔뇨↑)는 중요한 객관적 단서"], "memo": "안장마취·배뇨장애·양하지 위약 / 대형 추간판탈출 / 응급 MRI→응급 감압 / 시간=기능 / 배뇨·안장감각 확인"}, {"no": "NS12", "name": "전이성 척수 압박 (MSCC)", "cat": "🧠 신경외과", "diff": "★★★★★", "kw": "암 환자 진행성 등통증 / 신경결손 전 치료 / 즉시 스테로이드 / 응급 MRI / 방사선·수술 감압", "mentor": "“암 환자가 점점 심해지는 등·허리 통증에, 다리 힘이 빠지고 감각이 이상하고 소변이 어려워지면 전이암이 척수를 누르는 거야(MSCC). 핵심은 ‘마비되기 전에 잡아야 회복된다’는 거 — 한 번 못 걷게 되면 되돌리기 어려워. 그래서 의심되는 순간 스테로이드부터 주고, 응급으로 전(全)척추 MRI 찍고, 방사선이나 수술로 감압해. 걷던 사람을 계속 걷게 지키는 게 목표야.”", "sections": [{"title": "📖 정의·기전", "items": [{"item": "한 줄 정의", "content": "전이암(척추 전이)이 척수·마미를 압박하는 종양 응급.", "basis": "척추 전이→경막외 압박→척수 허혈·부종. 폐·유방·전립선암 등에서 흔함.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">전이성 척수 압박(MSCC)</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">척추 전이</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">경막외 압박</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">척수 허혈·부종</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">진행성 신경결손</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">암+진행성 등통증→신경결손 전 치료 · 즉시 스테로이드+전척추 MRI</text></svg>"}, {"title": "😣 평가", "items": [{"item": "증상", "content": "진행성·야간 악화 등통증(가장 흔한 초기), 하지 위약·감각저하, 배뇨·배변 장애", "basis": "통증이 신경결손보다 선행 → 통증 단계 포착이 기능 보존의 기회.", "img": ""}], "svg": ""}, {"title": "📈 검사·처치", "items": [{"item": "응급 전척추 MRI", "content": "압박 부위·다발성 평가(전척추)", "basis": "다발 전이 흔해 전척추 촬영. 신속 확진.", "img": ""}, {"item": "즉시 스테로이드", "content": "의심 즉시 코르티코스테로이드(부종 감소)", "basis": "신경기능 보호·악화 지연. 확진 기다리지 않음.", "img": ""}, {"item": "감압 치료", "content": "방사선치료 또는 수술적 감압(±안정화)", "basis": "압박 해소로 기능 보존. 보행 가능할 때 시작이 관건.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">MSCC — 단서·처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#283593\">마비 전에 잡기</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">암 환자 진행성·야간 악화 등통증</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">하지 위약·감각저하·배뇨장애</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#283593\">통증이 신경결손보다 선행(기회)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#283593\">의심 즉시 스테로이드+응급 전척추 MRI</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">방사선/수술 감압(보행 가능할 때)</text></svg>"}], "redflags": ["암 환자 진행성·야간 악화 등통증 → MSCC 의심(신경결손 전에)", "의심 즉시 스테로이드 + 응급 전척추 MRI", "보행 가능할 때 치료 시작이 기능 보존의 관건", "배뇨장애·하지 위약 진행 → 비가역 전 응급 감압"], "memo": "암+진행성 등통증→신경결손 전 치료 / 즉시 스테로이드 / 응급 전척추 MRI / 방사선·수술 감압 / 보행 보존"}];
const CAT_COLOR = {
  '🔪 외과/외상':'#37474F','🔥 화상':'#BF360C','🦴 정형외과':'#4E342E',
  '🫁 흉부외과':'#01579B','🧠 신경외과':'#283593'};
const SEC_COLOR = ['#1565C0','#2e7d32','#e65100','#8e24aa','#c62828','#00838f'];
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
let VIEWED = new Set(JSON.parse(localStorage.getItem('erSurgViewed')||'[]'));

function theme(t){
  document.body.classList.toggle('light',t==='light');
  document.getElementById('bd').classList.toggle('on',t==='dark');
  document.getElementById('bl').classList.toggle('on',t==='light');
  localStorage.setItem('erSurgTheme',t);
}
if(localStorage.getItem('erSurgTheme')==='light') theme('light');

function catColor(cat){ return CAT_COLOR[cat] || '#666'; }
function updateProg(){
  const n=VIEWED.size, t=CASES.length;
  document.getElementById('progTxt').textContent = n+' / '+t;
  document.getElementById('pfill').style.width = (t? n/t*100:0)+'%';
}
function renderHome(){
  const q=(document.getElementById('q').value||'').toLowerCase().trim();
  const list=CASES.filter(c=> !q || (c.name+c.kw+c.cat).toLowerCase().includes(q));
  const cats={};
  list.forEach(c=>{(cats[c.cat]=cats[c.cat]||[]).push(c);});
  const el=document.getElementById('catList');
  if(!list.length){ el.innerHTML='<div class="noresult">검색 결과가 없어요 🔍</div>'; return; }
  let html='';
  Object.keys(cats).forEach(cat=>{
    html+=`<div class="cat"><div class="cat-h">${esc(cat)} <span class="cnt">${cats[cat].length}개</span></div><div class="grid">`;
    cats[cat].forEach(c=>{
      html+=`<div class="card ${VIEWED.has(c.no)?'viewed':''}" style="--cc:${catColor(c.cat)}" onclick="openCase('${c.no}')">
        <span class="vchk">✅</span>
        <div class="no">CASE ${esc(c.no)}</div>
        <div class="nm">${esc(c.name)}</div>
        <div class="df">${esc(c.diff)}</div>
      </div>`;
    });
    html+='</div></div>';
  });
  el.innerHTML=html;
}
function openCase(no){
  const i=CASES.findIndex(c=>c.no===no); if(i<0) return;
  const c=CASES[i];
  VIEWED.add(no); localStorage.setItem('erSurgViewed',JSON.stringify([...VIEWED])); updateProg();
  const col=catColor(c.cat);
  let tabs='', panels='';
  c.sections.forEach((s,si)=>{
    const sc=SEC_COLOR[si%SEC_COLOR.length];
    tabs+=`<button class="tab ${si===0?'active':''}" style="${si===0?'background:'+sc:''}" onclick="selTab(this,'pn${si}','${sc}')">${esc(s.title)}</button>`;
    let items='';
    s.items.forEach(it=>{
      items+=`<div class="item"><div class="item-title">${esc(it.item)}</div>
        <div class="item-body">${esc(it.content)}</div>
        ${it.basis?`<div class="why"><div class="wl">💡 왜?</div><div class="wt">${esc(it.basis)}</div></div>`:''}</div>`;
    });
    const fig = s.svg?`<div class="fig">${s.svg}</div>`:'';
    panels+=`<div class="panel ${si===0?'active':''}" id="pn${si}">
      <div class="sec-head"><h2>${esc(s.title)}</h2></div>${fig}${items}</div>`;
  });
  const rf = c.redflags.length? `<div class="redbox"><h2>🔴 Red Flag — 절대 놓치면 안 되는 것</h2>
    ${c.redflags.map(r=>`<div class="rf"><span class="ri">⚠️</span><span>${esc(r)}</span></div>`).join('')}</div>`:'';
  const memo = c.memo? `<div class="memo"><div class="ml">⚡ 핵심 암기</div><p>${esc(c.memo)}</p></div>`:'';
  const prev = i>0? CASES[i-1]:null, next = i<CASES.length-1? CASES[i+1]:null;
  document.getElementById('detail').innerHTML = `
    <button class="back" onclick="goHome()">← 목록으로</button>
    <div class="hero" style="background:linear-gradient(135deg,${col}cc,${col})">
      <div class="cno">CASE ${esc(c.no)} · ${esc(c.cat)}</div>
      <h1>${esc(c.name)}</h1>
      <div class="meta"><span class="chip">난이도 ${esc(c.diff)}</span>${
        c.kw.split('/').map(k=>k.trim()).filter(k=>k).map(k=>`<span class="chip">${esc(k)}</span>`).join('')}</div>
    </div>
    ${c.mentor?`<div class="mentor"><div class="mh">💬 선배 말씀 (프셉마음)</div><p>${esc(c.mentor)}</p></div>`:''}
    <div class="tabs">${tabs}</div>
    ${panels}
    ${rf}${memo}
    <div class="navbtns">
      <button ${prev?'':'disabled'} onclick="${prev?`openCase('${prev.no}')`:''}">← ${prev?esc(prev.name):'이전'}</button>
      <button ${next?'':'disabled'} onclick="${next?`openCase('${next.no}')`:''}">${next?esc(next.name):'다음'} →</button>
    </div>`;
  document.getElementById('home').style.display='none';
  document.getElementById('detail').style.display='block';
  window.scrollTo(0,0);
}
function selTab(btn,pid,color){
  document.querySelectorAll('.tab').forEach(t=>{t.classList.remove('active');t.style.background='';});
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active'); btn.style.background=color;
  document.getElementById(pid).classList.add('active');
}
function goHome(){
  document.getElementById('detail').style.display='none';
  document.getElementById('home').style.display='block';
  renderHome(); window.scrollTo(0,0);
}
document.getElementById('totalN').textContent=CASES.length;
updateProg(); renderHome();
</script>
</body>
</html>
