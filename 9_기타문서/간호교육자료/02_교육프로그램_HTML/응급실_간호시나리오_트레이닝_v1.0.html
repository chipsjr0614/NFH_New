<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>응급실 간호 시나리오 트레이닝 — 국립소방병원</title>
<style>
:root{
  --bg:#0d1117;--surf:#161b22;--surf2:#1c2330;--brd:#2a3441;
  --txt:#e6edf3;--mute:#8b98a8;--dim:#586273;
  --gold:#e3b341;
  --why:#4d9fff;--whybg:#0d2440;--whybd:#1e4976;
  --red:#ef4444;--redbg:#2a1012;--redbd:#7f1d1d;
  --c0:#1565C0;--c1:#2e7d32;--c2:#e65100;--c3:#8e24aa;--c4:#c62828;--c5:#00838f;
}
body.light{
  --bg:#eef2f6;--surf:#ffffff;--surf2:#f5f8fb;--brd:#dde5ee;
  --txt:#16202c;--mute:#5b6876;--dim:#9aa7b5;
  --why:#1565C0;--whybg:#eaf2fd;--whybd:#bcd6f5;
  --redbg:#fdeced;--redbd:#f5b5b5;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-size:18px;line-height:1.7;
  font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  transition:background .2s,color .2s;}
.wrap{max-width:880px;margin:0 auto;padding:0 18px;}

/* 상단바 */
.top{position:sticky;top:0;z-index:40;background:var(--surf);border-bottom:1px solid var(--brd);}
.top-in{max-width:880px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:12px;}
.brand{font-size:18px;font-weight:800;letter-spacing:-.4px;cursor:pointer;white-space:nowrap;}
.brand em{color:var(--red);font-style:normal;}
.top .sp{flex:1;}
.tgl{display:flex;gap:5px;}
.tgl button{padding:7px 12px;border:1px solid var(--brd);background:var(--surf2);color:var(--mute);
  border-radius:18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.tgl button.on{background:var(--red);border-color:var(--red);color:#fff;}

/* 홈 */
#home{padding:20px 0 60px;}
.hero-home{text-align:center;padding:14px 0 18px;}
.hero-home h1{font-size:27px;font-weight:800;margin-bottom:6px;}
.hero-home p{color:var(--mute);font-size:15px;}
.prog{margin:14px auto 0;max-width:420px;background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:12px 16px;}
.prog .pbar{height:8px;background:var(--surf2);border-radius:5px;overflow:hidden;margin-top:8px;}
.prog .pfill{height:100%;background:linear-gradient(90deg,#2e7d32,#43a047);transition:width .4s;}
.search{position:relative;margin:18px 0 8px;}
.search input{width:100%;background:var(--surf);border:1.5px solid var(--brd);border-radius:12px;
  padding:14px 16px 14px 46px;color:var(--txt);font-size:16px;font-family:inherit;outline:none;}
.search input:focus{border-color:var(--why);}
.search .si{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:20px;}

.cat{margin-top:26px;}
.cat-h{font-size:17px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.cat-h .cnt{font-size:13px;color:var(--mute);font-weight:600;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:11px;}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:13px;padding:15px;cursor:pointer;
  transition:.15s;position:relative;border-left:4px solid var(--cc,#666);}
.card:hover{transform:translateY(-2px);border-color:var(--why);}
.card .no{font-size:12px;color:var(--mute);font-weight:700;}
.card .nm{font-size:16.5px;font-weight:800;margin:3px 0 7px;line-height:1.35;}
.card .df{font-size:13px;color:var(--gold);}
.card .vchk{position:absolute;top:13px;right:13px;font-size:16px;display:none;}
.card.viewed .vchk{display:block;}
.card.viewed{opacity:.78;}
.noresult{text-align:center;color:var(--mute);padding:40px 0;}

/* 케이스 상세 */
#detail{display:none;padding-bottom:70px;}
.back{display:inline-flex;align-items:center;gap:6px;margin:16px 0 4px;background:var(--surf);
  border:1px solid var(--brd);color:var(--txt);padding:9px 15px;border-radius:20px;font-size:14px;
  font-weight:600;cursor:pointer;font-family:inherit;}
.hero{color:#fff;border-radius:18px;padding:24px 22px;margin:8px 0 18px;}
.hero .cno{font-size:14px;font-weight:700;opacity:.9;letter-spacing:.5px;}
.hero h1{font-size:30px;font-weight:800;margin:4px 0 12px;letter-spacing:-.5px;line-height:1.2;}
.hero .meta{display:flex;flex-wrap:wrap;gap:8px;}
.chip{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);
  padding:5px 12px;border-radius:16px;font-size:13.5px;font-weight:600;}

.mentor{background:var(--surf2);border:1px solid var(--brd);border-left:4px solid var(--gold);
  border-radius:12px;padding:17px 19px;margin-bottom:20px;}
.mentor .mh{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:7px;}
.mentor p{font-size:16.5px;}

.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:10px 15px;border-radius:20px;border:1px solid var(--brd);background:var(--surf);
  color:var(--mute);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.15s;}
.tab.active{color:#fff;border-color:transparent;}

.panel{display:none;animation:fade .25s ease;}
.panel.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.sec-head{display:flex;align-items:center;gap:9px;margin:14px 0 12px;}
.sec-head h2{font-size:20px;font-weight:800;}
.item{background:var(--surf);border:1px solid var(--brd);border-radius:13px;padding:18px;margin-bottom:13px;}
.item-title{font-size:17.5px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.item-title::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;}
.item-body{font-size:16px;white-space:pre-line;}
.why{margin-top:12px;background:var(--whybg);border:1px solid var(--whybd);border-radius:10px;padding:13px 15px;}
.why .wl{font-size:13px;font-weight:800;color:var(--why);letter-spacing:.5px;margin-bottom:5px;}
.why .wt{font-size:15px;white-space:pre-line;}
.imgnote{margin-top:11px;font-size:14px;color:var(--mute);background:var(--surf2);border:1px dashed var(--brd);
  border-radius:9px;padding:10px 13px;}
.fig{background:#fff;border:1px solid var(--brd);border-radius:14px;padding:14px;margin:6px 0 16px;box-shadow:0 1px 5px rgba(0,0,0,.07);}
.fig svg{width:100%;height:auto;display:block;}

.redbox{background:var(--redbg);border:1px solid var(--redbd);border-radius:14px;padding:18px;margin:22px 0 14px;}
.redbox h2{color:var(--red);font-size:19px;font-weight:800;margin-bottom:12px;}
.rf{display:flex;gap:10px;padding:11px 0;border-bottom:1px dashed var(--redbd);font-size:16px;}
.rf:last-child{border:none;}
.rf .ri{color:var(--red);flex-shrink:0;}

.memo{background:linear-gradient(135deg,#1A237E,#283593);color:#fff;border-radius:14px;padding:20px;margin-bottom:14px;}
.memo .ml{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:8px;}
.memo p{font-size:16.5px;font-weight:600;}

.navbtns{display:flex;gap:10px;margin-top:18px;}
.navbtns button{flex:1;padding:13px;border:1px solid var(--brd);background:var(--surf);color:var(--txt);
  border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.navbtns button:disabled{opacity:.4;cursor:default;}
</style>

<style>
/* 시나리오 전용 */
.card .pt{font-size:12.5px;color:var(--mute);margin-top:5px;}
.pbox{background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:18px 20px;margin-bottom:18px;}
.pbox .pr{display:flex;gap:10px;padding:9px 0;border-bottom:1px dashed var(--brd);font-size:15.5px;}
.pbox .pr:last-child{border:none;}
.pbox .pl{flex-shrink:0;min-width:62px;font-weight:800;color:var(--why);white-space:nowrap;}
.sec-head .ln{flex:1;height:1px;background:var(--brd);}
.step{background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:0;margin-bottom:12px;overflow:hidden;}
.step-h{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--surf2);border-bottom:1px solid var(--brd);}
.step-n{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:var(--red);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14.5px;}
.step-cat{font-size:12.5px;font-weight:800;padding:4px 11px;border-radius:14px;
  background:var(--whybg);color:var(--why);border:1px solid var(--whybd);flex-shrink:0;}
.step-t{font-weight:800;font-size:16.5px;flex:1;}
.step-b{padding:14px 16px;}
.kv{display:flex;gap:9px;padding:7px 0;font-size:15.5px;align-items:flex-start;}
.kv .k{flex-shrink:0;width:96px;font-weight:700;color:var(--mute);font-size:13.5px;padding-top:1px;}
.kv .v{flex:1;}
.vs{display:inline-block;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-weight:700;
  background:var(--surf2);border:1px solid var(--brd);border-radius:8px;padding:3px 10px;font-size:14.5px;letter-spacing:.3px;}
.ordc{display:inline-block;background:var(--redbg);border:1px solid var(--redbd);color:var(--red);
  border-radius:8px;padding:3px 10px;font-size:14px;font-weight:700;}
.step .why{margin-top:10px;}
.vslegend{font-size:12.5px;color:var(--dim);margin:-6px 0 12px;}
.debrief{background:var(--surf2);border:1px solid var(--brd);border-left:4px solid var(--gold);
  border-radius:14px;padding:18px 20px;margin:22px 0 14px;}
.debrief h2{color:var(--gold);font-size:19px;font-weight:800;margin-bottom:12px;}
.debrief li{font-size:15.5px;margin:0 0 10px 2px;line-height:1.65;list-style:none;position:relative;padding-left:18px;}
.debrief li::before{content:"•";position:absolute;left:2px;color:var(--gold);font-weight:800;}
.debrief li b{color:var(--txt);}
</style>

</head>
<body>

<div class="top"><div class="top-in">
  <div class="brand" onclick="goHome()"><em>ER</em> 시나리오 트레이닝</div>
  <div class="sp"></div>
  <div class="tgl">
    <button id="bd" class="on" onclick="theme('dark')">🌙</button>
    <button id="bl" onclick="theme('light')">☀️</button>
  </div>
</div></div>

<div class="wrap">
  <div id="home">
    <div class="hero-home">
      <h1>🚑 응급실 간호 시나리오 트레이닝</h1>
      <p>국립소방병원 응급실 · 신규 의료인 시나리오 학습 · 시나리오 <span id="totalN"></span>개</p>
      <div class="prog">
        <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:600">
          <span>학습 진행</span><span id="progTxt">0 / 0</span>
        </div>
        <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="search">
      <span class="si">🔍</span>
      <input id="q" type="text" placeholder="병명·증상·키워드 검색…" oninput="renderHome()">
    </div>
    <div id="catList"></div>
  </div>
  <div id="detail"></div>
</div>

tionale": "열상 부위 원위부(손가락 끝)의 감각과 운동 능력을 확인해 신경 손상 여부 감별."}, {"no": "3", "cat": "처방/오더", "nursing": "HIS 처방 확인 및 물품 준비", "his": "봉합 세트, 국소마취제, 엑스레이 확인", "order": "HIS 처방 확인 (Pick-up)", "vs": "-", "rationale": "신속한 처치를 위해 필요한 기구와 약물을 미리 준비함."}, {"no": "4", "cat": "엑스레이", "nursing": "손가락 엑스레이 촬영", "his": "이물질(칼날 조각) 및 골절 여부 확인", "order": "Finger AP/Lat/Oblique", "vs": "-", "rationale": "칼날에 의한 손상이므로 금속 파편 잔존 여부와 골절 동반 가능성 확인."}, {"no": "5", "cat": "세척 (Irrigation)", "nursing": "상처 부위 정밀 세척", "his": "멸균 생리식염수 이용 대량 세척", "order": "상처 세척 처치", "vs": "115/70-72-16-36.5 (99%)", "rationale": "오염 물질을 제거하여 봉합 후 감염(Infection) 발생 위험을 최소화함."}, {"no": "6", "cat": "봉합 (Suture)", "nursing": "봉합술 시행 및 간호 기록", "his": "국소마취 후 봉합(Nylon 5-0 사용)", "order": "Laceration Repair", "vs": "-", "rationale": "벌어진 조직을 밀착시켜 일차 의도 치유(Primary intention)와 흉터 최소화 유도."}, {"no": "7", "cat": "투약 (Inj)", "nursing": "파상풍 예방 주사 투여", "his": "파상풍 예방접종력 확인 후 근육주사", "order": "Tetanus Toxoid (TdaP)", "vs": "-", "rationale": "외상 환자에서 파상풍균 감염 예방을 위해 면역 상태에 따라 접종 시행."}, {"no": "8", "cat": "투약 (PO)", "nursing": "항생제 및 진통제 처방 확인", "his": "경구 항생제 및 소염진통제 확인", "order": "퇴원약 (Antibiotics)", "vs": "-", "rationale": "상처 감염 방지 및 통증 조절을 위한 경구 약물 요법 병행."}, {"no": "9", "cat": "귀가", "nursing": "자가 소독 및 주의사항 교육", "his": "소독 방법, 실밥 제거 날짜 안내", "order": "퇴원 간호 기록", "vs": "120/80-70-18-36.6 (99%)", "rationale": "상처 관리법 및 감염 징후(발적, 부종) 발생 시 재내원 교육."}], "debrief": ["신경 및 혈관 손상 재확인:", "봉합 전후로 반드시 손가락 끝의 Capillary Refill(모세혈관 재충혈 시간)이 2초 이내인지 확인하여 혈관 손상 여부를 감시합니다.", "파상풍(Tetanus) 예방 지침:", "상처가 깨끗한지 오염되었는지(Dirt, Feces 등), 그리고 과거 접종 횟수에 따라 Td/TdaP 또는 TIG(파상풍 면역글로불린) 투여 여부를 결정해야 합니다. 19세 남성이므로 최근 접종력을 확인하는 것이 필수입니다.", "엑스레이 확인의 중요성:", "유리 파편이나 금속 파편이 박힌 채 봉합할 경우 나중에 염증이나 통증의 원인이 됩니다. 촬영 결과 'Foreign Body' 유무를 반드시 HIS에서 확인한 후 봉합에 들어갑니다.", "퇴원 교육 (Suture Care):", "손가락은 움직임이 많아 실밥이 풀리기 쉽습니다. 물이 닿지 않게 주의하고, 보통 10~14일 뒤에 실밥을 제거(Stitch out)한다는 점을 강조합니다."], "id": "1-05"}, {"diff": "기본", "no": "6", "title": "경증빈혈", "desc": "", "pname": "김OO", "pdemo": "여성 / 45세", "info": [{"label": "성함", "value": "김OO (여성 / 45세)"}, {"label": "과거력", "value": "자궁근종(Uterine Myoma) 진단받은 이력 있음."}, {"label": "현병력", "value": "최근 몇 달간 전신 피로감과 계단을 오를 때 약간의 숨 가쁨을 느껴 내원. 오늘 아침 일어날 때 눈앞이 핑 도는 어지럼증을 경험함."}, {"label": "특이사항", "value": "월경량이 최근 많아졌다고 함. 선홍색 토혈이나 흑색변(Melena) 증상은 없음. 조영제 알러지 없음, GFR확인 필요."}], "flow": [{"no": "1", "cat": "초진 (Triage)", "nursing": "환자 접수 및 초기 사정", "his": "주호소: 피로감, 어지럼증, 안색 창백", "order": "접수 및 KTAS 분류", "vs": "110/70-82-18-36.5 (98%)", "rationale": "만성 빈혈은 활력징후가 안정적이나 기립성 저혈압 위험이 있음."}, {"no": "2", "cat": "신체 검진", "nursing": "빈혈 징후 및 복부 촉진", "his": "안검 결막 창백, 복부 압통 확인", "order": "신체 검진 수행", "vs": "-", "rationale": "결막 창백은 빈혈의 지표이며, 복부 사정은 내부 출혈 여부를 파악함."}, {"no": "3", "cat": "처방/오더", "nursing": "HIS 처방 확인 및 혈액 채취", "his": "CBC 및 신기능(BUN/Cr) 확인", "order": "CBC, Iron set, BUN/Cr", "vs": "-", "rationale": "조영제 투여 전 신장 기능 확인은 신독성(CIN) 예방을 위한 필수 절차임."}, {"no": "4", "cat": "처치/준비", "nursing": "조영제 검사 전 처치", "his": "조영제 동의서, LMP 확인, 18G IV", "order": "조영제 동의서 확보", "vs": "115/75-78-18-36.6 (99%)", "rationale": "조영제 자동 주입기(Power Injector) 사용을 위해 18~20G 굵은 바늘 확보 필수."}, {"no": "5", "cat": "CT 촬영", "nursing": "조영제 증강 복부 CT 시행", "his": "CT Abdomen & Pelvis (Contrast)", "order": "CT Abdomen (Contrast)", "vs": "-", "rationale": "조영제를 통해 장기 내 활동성 출혈(Active bleeding) 및 종양 유무를 정밀 감별함."}, {"no": "6", "cat": "결과확인", "nursing": "검사 결과 확인 (HIS)", "his": "Hb 10.0, CT상 특이 출혈 소견 없음", "order": "결과 주치의 보고", "vs": "-", "rationale": "Hb 수치와 영상 결과를 종합하여 급성 대량 출혈이 아님을 확진함."}, {"no": "7", "cat": "보고/협진", "nursing": "산부인과(OBGY) 협진 의뢰", "his": "자궁근종에 의한 과다월경 의심 보고", "order": "협진(Consult) 의뢰", "vs": "-", "rationale": "영상 및 혈액 검사상 다른 출혈원이 없으므로 부인과적 원인에 집중함."}, {"no": "8", "cat": "퇴원 처방", "nursing": "외래 예약 및 경구약 처방", "his": "철분제 처방 및 외래 일정 안내", "order": "퇴원약(철분제), 부인과 외래", "vs": "115/70-76-16-36.5 (99%)", "rationale": "안정적인 경증 빈혈 상태이므로 전문 진료과로 연계하여 근본 치료 유도."}, {"no": "9", "cat": "귀가", "nursing": "조영제 배출 및 철분제 교육", "his": "수분 섭취 권장, 약 부작용 교육", "order": "퇴원 간호 기록", "vs": "-", "rationale": "신장에 남은 조영제 배출을 위해 물을 많이 마시도록 교육함."}], "debrief": ["조영제 부작용 모니터링:", "검사 직후 발생하는 급성 알레르기 반응(두드러기, 호흡곤란)을 감시해야 합니다.", "신기능 확인 (BUN/Creatinine):", "조영제는 신장으로 배출되므로, 검사 전 HIS에서 반드시 환자의 최근 신기능 수치를 확인해야 합니다.", "메트포르민(Metformin) 복용 여부:", "환자가 당뇨약을 복용 중이라면 메트포르민 성분이 있는지 확인해야 합니다. 조영제와 상호작용하여 유산 산증(Lactic acidosis)을 일으킬 수 있어 검사 전후 48시간 중단이 원칙입니다.", "수분 섭취 강조:", "퇴원 시 조영제의 빠른 배출을 위해 특별한 금기가 없는 한 평소보다 물을 많이 마시도록(약 1.5~2L) 강력히 권고합니다."], "id": "1-06"}, {"diff": "기본", "no": "7", "title": "임신입덧", "desc": "", "pname": "이OO", "pdemo": "여성 / 30세", "info": [{"label": "성함", "value": "이OO (여성 / 30세)"}, {"label": "과거력", "value": "특이사항 없음."}, {"label": "현병력", "value": "임신 8주 차 초산모. 일주일 전부터 입덧이 시작되었으나, 최근 2일간 물만 마셔도 구토하여 음식 섭취가 전혀 불가능한 상태임. 소변량이 급격히 줄어들고 어지럼증을 느껴 내원."}, {"label": "특이사항", "value": "임신 확인된 상태로 방사선 노출 금기."}], "flow": [{"no": "1", "cat": "초진 (Triage)", "nursing": "환자 접수 및 임신 주수 확인", "his": "주호소: 조절되지 않는 구토, 탈수", "order": "접수 및 KTAS 분류", "vs": "105/65-98-18-36.8 (98%)", "rationale": "심한 구토는 전해질 불균형과 심박수 증가(빈맥)를 유발함."}, {"no": "2", "cat": "신체 검진", "nursing": "탈수 징후 사정", "his": "구강 점막 건조도, 피부 탄력성 확인", "order": "신체 검진 수행", "vs": "-", "rationale": "구토로 인한 체액 부족 정도를 객관적으로 파악함."}, {"no": "3", "cat": "처방/오더", "nursing": "방사선 검사 제외 확인", "his": "X-ray/CT 오더 배제 및 Lab 확인", "order": "CBC, Electrolyte, Ketone", "vs": "-", "rationale": "임신 초기 태아 보호를 위해 불필요한 방사선 검사는 절대 금기임."}, {"no": "4", "cat": "처치/준비", "nursing": "IV Route 및 혈액 채취", "his": "22G IV 확보 및 전해질 검사 시행", "order": "CBC, Electrolyte, BUN/Cr", "vs": "-", "rationale": "전해질(K, Na) 수치 확인을 통해 보정 계획을 수립함."}, {"no": "5", "cat": "투약", "nursing": "수액 및 비타민 주입", "his": "D/W 5% 또는 N/S 1L 주입", "order": "5% D/W 1L + Vitamin B1", "vs": "110/70-88-18-36.7 (99%)", "rationale": "영양 결핍으로 인한 베르니케 뇌병증 예방을 위해 당분과 비타민 B1을 공급함."}, {"no": "6", "cat": "투약", "nursing": "임산부 안전 항구토제 투여", "his": "", "order": "항구토제 (IV/PO)", "vs": "-", "rationale": "임산부와 태아에게 기형 유발 위험이 낮은 안전한 약물을 선택함."}, {"no": "7", "cat": "결과확인", "nursing": "검사 결과 확인 (HIS)", "his": "Urine Ketone(+) 여부 확인", "order": "결과 주치의 보고", "vs": "-", "rationale": "소변 내 케톤체 검출은 지방 대사가 일어나고 있다는 심한 기지 상태를 의미함."}, {"no": "8", "cat": "상태확인", "nursing": "구토 완화 및 구강 섭취 시도", "his": "소량의 물 시음 후 구토 여부 확인", "order": "간호 사정 기록", "vs": "-", "rationale": "퇴원 전 경구 섭취 가능 여부를 확인하여 재내원 가능성을 낮춤."}, {"no": "9", "cat": "귀가", "nursing": "식이 요법 및 생활 습관 교육", "his": "소량씩 자주 먹기, 냄새 차단 교육", "order": "퇴원 간호 기록", "vs": "110/70-80-16-36.6 (99%)", "rationale": "증상 완화를 위한 식이 조절이 약물만큼 중요함을 인지시킴."}], "debrief": ["방사선 검사 절대 금기:", "초진 시 임신 여부를 반드시 확인하고, HIS 상에서 환자 이름 옆에 '임산부' 표식을 활성화하여 모든 의료진이 공유하도록 합니다.", "베르니케 뇌병증(Wernicke's Encephalopathy) 예방:", "심한 입덧으로 장기간 굶은 산모에게 포도당(Dextrose) 수액만 단독으로 주면 비타민 B1(Thiamine) 결핍이 심화될 수 있습니다. 반드시 티아민을 혼합하여 투여해야 합니다.", "약물 카테고리 확인:", "항구토제 처방 시 미국 FDA 임부 안전성 등급(Category)을 확인합니다. 주로 Pyridoxine(B6)과 Doxylamine복합제가 우선 권고됩니다.", "케톤뇨(Ketonuria) 모니터링:", "소변 검사상 케톤 수치가 높으면 입원을 고려해야 할 만큼 심각한 영양 부족 상태임을 의미합니다. HIS 결과 수치를 주시하세요."], "id": "1-07"}, {"diff": "기본", "no": "8", "title": "경증봉와직염", "desc": "", "pname": "최OO", "pdemo": "남성 / 52세", "info": [{"label": "성함", "value": "최OO (남성 / 52세)"}, {"label": "과거력", "value": "제2형 당뇨병(DM) 10년째 약물 복용 중."}, {"label": "현병력", "value": "3일 전 야외 작업 중 오른쪽 정강이를 긁힌 후, 어제부터 해당 부위가 빨갛게 부어오르고 열감이 느껴져 내원."}, {"label": "특이사항", "value": "당뇨 환자로 감염 확산 속도가 빠를 수 있음. 통증 점수(NRS) 5점."}], "flow": [{"no": "1", "cat": "초진 (Triage)", "nursing": "환자 접수 및 하지 사정", "his": "주호소: 다리 발적, 부종, 열감", "order": "접수 및 KTAS 분류", "vs": "125/85-88-18-37.5 (98%)", "rationale": "초기 미열과 빈맥은 국소 감염이 전신 반응으로 이행됨을 시사함."}, {"no": "2", "cat": "신체 검진", "nursing": "병변 범위 및 압통 확인", "his": "피부 발적 경계선확인", "order": "신체 검진 수행", "vs": "-", "rationale": "봉와직염은 경계가 불분명한 발적과 심한 압통이 특징임."}, {"no": "3", "cat": "처방/오더", "nursing": "HIS 처방 확인 및 처치 준비", "his": "혈액 검사 및 항생제 처방 확인", "order": "HIS 처방 확인 (Pick-up)", "vs": "-", "rationale": "염증 수치(WBC, CRP) 확인 및 원인균 파악을 위한 준비 단계."}, {"no": "4", "cat": "검사진행", "nursing": "혈액 배양 및 임상 사진 촬영", "his": "Blood Culture 채취, 병변  혈뇨 양상 사정", "his": "주호소: 배뇨통, 혈뇨, 하복부통", "order": "접수 및 KTAS 분류", "vs": "115/75-80-18-36.7 (99%)", "rationale": "혈뇨는 감염, 결석, 종양 등 다양한 원인에 의해 발생할 수 있음."}, {"no": "2", "cat": "신체 검진", "nursing": "CVA Tenderness(압통) 확인", "his": "옆구리 타진 시 통증 여부 확인", "order": "신체 검진 수행", "vs": "-", "rationale": "요로결석이나 신우신염의 경우 특징적인 옆구리 타진통이 나타남."}, {"no": "3", "cat": "처방/오더", "nursing": "HIS 처방 확인 및 처치 준비", "his": "소변 및 영상 검사 오더 확인", "order": "HIS 처방 확인 (Pick-up)", "vs": "-", "rationale": "감염 확진과 결석 배제를 위한 다각도 검사를 진행함."}, {"no": "4", "cat": "검사진행", "nursing": "소변검사(U/A) 시행", "his": "중간뇨 채취 및 육안적 혈뇨 확인", "order": "Urine Analysis", "vs": "-", "rationale": "소변 내 백혈구(WBC)와 적혈구(RBC) 수치를 통해 감염 정도 파악."}, {"no": "5", "cat": "CT 촬영", "nursing": "응급 비조영 CT (KUB) 시행", "his": "요로 결석 유무 정밀 확인", "order": "CT KUB (Stone protocol)", "vs": "110/70-76-16-36.5 (99%)", "rationale": "비조영 CT는 요로계의 결석을 발견하는 데 가장 민감도가 높은 검사임."}, {"no": "6", "cat": "투약", "nursing": "진통제 및 수액 투여", "his": "통증 완화 및 요로 세척 유도", "order": "N/S 500ml, IV 진통제", "vs": "-", "rationale": "충분한 수액 공급은 염증 산물과 혈액의 배출을 돕고 통증을 조절함."}, {"no": "7", "cat": "결과확인", "nursing": "검사 결과 확인 (HIS)", "his": "CT: 결석 없음, Urine: WBC(3+)", "order": "결과 주치의 보고", "vs": "-", "rationale": "결석이 없음을 영상으로 확인하고 세균성 방광염으로 확진함."}, {"no": "8", "cat": "투약", "nursing": "항생제 투여", "his": "항생제 알레르기 확인 후 주입", "order": "IV/PO 항생제", "vs": "-", "rationale": "방광염의 원인균(주로 대장균)을 사멸시키기 위한 치료를 시작함."}, {"no": "9", "cat": "귀가", "nursing": "퇴원 교육 및 귀가", "his": "충분한 수분 섭취 및 위생 교육", "order": "퇴원 간호 기록", "vs": "120/80-72-18-36.6 (99%)", "rationale": "수분 섭취는 방광 내 세균 농도를 낮추고 배출을 촉진하는 핵심 간호임."}], "debrief": ["결석과 감별 포인트:", "통증의 양상: 결석은 '산통(Colicky pain)'이라고 불릴 만큼 갑작스럽고 극심한 옆구리 통증이 특징인 반면, 방광염은 하복부의 뻐근한 통증과 배뇨 시의 통증이 주를 이룹니다.", "CT KUB (Stone Protocol): 결석을 찾기 위한 CT는 대개 조영제를 사용하지 않습니다. 조영제를 쓰면 결석(하얗게 보임)과 조영제가 섞여 구분이 어려울 수 있기 때문입니다.", "임신 확인 필수:", "젊은 여성 환자이므로 CT 촬영 전 반드시 임신 반응 검사(U-HCG)를 시행하거나 LMP를 확인하여 태아 노출을 방지해야 합니다.", "혈뇨(Hematuria)의 간호:", "혈뇨가 심할 경우 요도에 혈전(Clot)이 생겨 소변 배출을 막을 수 있습니다. 환자의 자가 배뇨 여부를 확인하고, 증상이 심하면 수액 속도를 높여 방광을 세척하는 효과를 유도합니다.", "생활 가이드:", "배뇨 후 닦는 방향(앞에서 뒤로) 교육 및 성관계 후 배뇨 습관 등 방광염 재발 방지를 위한 생활 수칙을 함께 안내하는 것이 좋습니다."], "id": "1-09"}, {"diff": "기본", "no": "10", "title": "흉부통증", "desc": "", "pname": "최OO", "pdemo": "남성 / 35세", "info": [{"label": "성함", "value": "최OO (남성 / 35세)"}, {"label": "과거력", "value": "1년 전 응급실 내원 이력 있음 (당시에도 EKG 정상)."}, {"label": "현병력", "value": "30분 전 갑자기 가슴이 답답하고 조이는 듯한 통증과 함께 숨이 가빠져 내원. 식은땀과 손발 저림을 동반함."}, {"label": "특이사항", "value": "최근 직장 내 프로젝트로 극심한 스트레스 상황임."}], "flow": [{"no": "1", "cat": "초진 (Triage)", "nursing": "환자 접수 및 즉각적 사정", "his": "주호소: 흉부 압박감, 불안, 식은땀", "order": "접수 및 KTAS 분류", "vs": "145/95-110-24-36.6 (98%)", "rationale": "모든 흉통 환자는 심혈관 사고 가능성을 최우선으로 고려함."}, {"no": "2", "cat": "Initial ECG", "nursing": "내원 즉시 1차 ECG 시행", "his": "10분 이내 시행 및 이전 기록 비교", "order": "Emergency ECG", "vs": "-", "rationale": "초기 허혈성 변화(ST 분절 변화 등) 유무를 즉시 파악함."}, {"no": "3", "cat": "1차 검사", "nursing": "Initial Lab 시행", "his": "심장 효소 및 기본 혈액 검사", "order": "Troponin-I, CK-MB", "vs": "-", "rationale": "심근 손상 여부를 판단하기 위한 기초 수치를 확보함."}, {"no": "4", "cat": "결과 확인", "nursing": "1차 결과 정상 확인", "his": "ECG: Normal / Lab: Normal", "order": "결과 주치의 보고", "vs": "130/80-88-20-36.5 (99%)", "rationale": "초기 수치는 정상이나 증상 발현 시점에 따라 음성일 수 있음."}, {"no": "5", "cat": "경과 관찰", "nursing": "안위 도모 및 모니터링", "his": "EKG Monitor 유지, 환자 안정 유도", "order": "Bed rest & Monitoring", "vs": "-", "rationale": "흉통의 양상 변화나 새로운 부정맥 발생 여부를 지속 감시함."}, {"no": "6", "cat": "2차 ECG (f/u)", "nursing": "2시간 뒤 추적 ECG 시행", "his": "1차 ECG와 비교하여 변화 확인", "order": "Follow-up ECG", "vs": "-", "rationale": "시간이 흐름에 따라 나타날 수 있는 지연된 심전도 변화를 감지함."}, {"no": "7", "cat": "2차 Lab (f/u)", "nursing": "2시간 뒤 추적 Lab 시행", "his": "Troponin 수치 상승 여부 확인", "order": "Follow-up Cardiac markers", "vs": "120/80-82-18-36.5 (99%)", "rationale": "심근 괴사 후 효소가 혈중으로 방출되는 시간을 고려한 재검사임."}, {"no": "8", "cat": "최종 확인", "nursing": "2차 결과 정상 확인", "his": "1, 2차 결과 모두 정상(Double Negative)", "order": "최종 결과 주치의 보고", "v  재사정", "nursing": "IV 투약 30분 후 통증 재평가", "his": "NRS 점수 기록 (9점 -> 4점)", "order": "간호 기록 (Pain Re-eval)", "vs": "135/85-88-18-36.7 (99%)", "rationale": "IV 투약 후 30분 이내 재사정을 통해 약물의 효과를 반드시 확인해야 함."}, {"no": "6", "cat": "CT 촬영", "nursing": "비조영 복부 CT (KUB) 시행", "his": "결석의 위치 및 크기(6mm) 확인", "order": "CT KUB (Non-contrast)", "vs": "-", "rationale": "5mm 이상의 결석은 자연 배출 가능성이 낮아 적극적 처치가 필요함."}, {"no": "7", "cat": "투약 (PO)", "nursing": "필요시 진통제 투여 (IV)", "his": "Ketorolac 또는 마약성 진통제 IV", "order": "PO Medication (Tamsulosin 등)", "vs": "-", "rationale": "환자의 고통을 경감시키는 것이 최우선 간호 중재임."}, {"no": "8", "cat": "통증 재사정", "nursing": "IV 투약 30분 후 통증 재평가", "his": "NRS 점수 기록 (7점 -> 4점)", "order": "간호 기록 (Pain Re-eval)", "vs": "-", "rationale": "IV 투약 후 30분 이내 재사정을 통해 약물의 효과를 반드시 확인해야 함."}, {"no": "9", "cat": "의사 결정", "nursing": "비뇨의학과(URO) 협진 및 입원", "his": "6mm 결석 확인으로 쇄석술(ESWL) 결정", "order": "입원 오더 (Admission)", "vs": "-", "rationale": "자가 배출이 어려운 크기이므로 입원 후 시술 진행 결정."}, {"no": "10", "cat": "입원 간호", "nursing": "입원 전 처치 및 병동 인계", "his": "시술 동의서 확인 및 환자 이송 준비", "order": "입원 간호 기록 및 인계", "vs": "120/80-80-16-36.6 (99%)", "rationale": "응급실 처치 내역과 통증 조절 양상을 병동에 상세히 전달함."}], "debrief": ["통증 관리의 타임라인 엄수:", "중증도 케이스에서는 투약 후 재사정이 법적·의료적 근거가 됩니다. IV는 30분 내, PO는 1시간 내 HIS에 NRS 점수를 반드시 남겨야 합니다.", "결석 크기(5mm)의 임상적 의미:", "보통 4~5mm 미만의 결석은 수분 섭취와 약물로 자연 배출을 시도하지만, 5mm 이상이거나 통증이 조절되지 않는 경우 ESWL(체외충격파쇄석술)이나 요관경하 제석술이 필요합니다.", "수분 섭취 및 배뇨 관찰:", "입원 전까지 환자에게 금기가 없다면 충분한 수액 공급을 통해 결석이 아래로 밀려 내려가도록 유도합니다. 소변을 볼 때 돌이 섞여 나오는지 확인하기 위해 거즈나 거름망을 사용하기도 합니다.", "신기능 감시:", "결석이 요관을 완전히 막으면 신우신염이나 신부전(Hydronephrosis)이 올 수 있습니다. HIS에서 BUN/Creatinine 수치와 소변량(Urine Output)을 면밀히 체크해야 합니다."], "id": "2-11"}, {"diff": "중급", "no": "12", "title": "폐렴", "desc": "", "pname": "최OO", "pdemo": "남성 / 68세", "info": [{"label": "성함", "value": "최OO (남성 / 68세)"}, {"label": "과거력", "value": "고혈압, 당뇨."}, {"label": "현병력", "value": "3일 전부터 시작된 오한과 고열, 화농성 가래를 동반한 기침으로 내원. 내원 직전부터 숨이 차고 말하기 힘든 상태."}, {"label": "특이사항", "value": "내원 시 산소포화도(SpO2) 85%로 확인되어 즉각적인 응급 처치 필요."}], "flow": [{"no": "1", "cat": "초진 (Triage)", "nursing": "KF94 마스크 착용 및 즉각 산소 공급(Nasal Prong 2L)", "his": "주호소: 호흡곤란, 고열, 기침", "order": "접수 및 KTAS 2단계", "vs": "135/85-112-26-39.2 (85%)", "rationale": "저산소증(Hypoxia) 해결을 위해 비강 캐뉼라(Nasal Prong) 적용."}, {"no": "2", "cat": "신체 검진", "nursing": "호흡음 청진 및 흉곽 움직임 관찰", "his": "양측 폐 하부 수포음(Crackle)", "order": "신체 검진 수행", "vs": "130/80-105-22-39.0 (94%)", "rationale": "폐렴 및 흉수가 있을 경우 폐포 내 삼출물로 인해 수포음이 청취됨."}, {"no": "3", "cat": "처방/오더", "nursing": "HIS 처방 확인 및 처치 준비", "his": "수액, 해열제, 선별 검사 오더", "order": "HIS 처방 확인 (Pick-up)", "vs": "-", "rationale": "고열로 인한 탈수 방지 및 원인균 파악을 위한 준비."}, {"no": "4", "cat": "검사진행 1", "nursing": "COVID/Influenza 선별 검사", "his": "결과: 음성(Negative)", "order": "Ag Test (Rapid)", "vs": "-", "rationale": "감염병 배제를 통해 일반 구역 진료 및 세균성 폐렴 가능성 확인."}, {"no": "5", "cat": "검사진행 2", "nursing": "혈액, 객담 검사 및 CT 촬영", "his": "Sputum Culture, CBC, CRP, Blood culture", "order": "CT Chest (Contrast)", "vs": "-", "rationale": "CRP 상승 및 CT상 폐렴과 양측 흉수(Pleural effusion) 확인."}, {"no": "6", "cat": "투약 1", "nursing": "해열제 및 수액 투여", "his": "약물 투여 후 체온 변화 감시", "order": "IV Antipyretics (Propacetamol)", "vs": "125/75-92-20-37.8(94%)", "rationale": "대사율을 낮추고 환자의 불편감을 경감시킴."}, {"no": "7", "cat": "투약 2", "nursing": "경험적 항생제(IV) 투여", "his": "항생제 AST(반응검사) 후 투여", "order": "IV Antibiotics(Ceftriaxone 등)", "vs": "-", "rationale": "원인균 확정 전, 광범위 항생제를 조기 투여하여 예후 개선."}, {"no": "8", "cat": "의사 결정", "nursing": "호흡기내과(MP) 협진 및 입원", "his": "중증도 및 흉수 소견으로 입원 결정", "order": "입원 오더 (Admission)", "vs": "-", "rationale": "산소 유지 필요성 및 흉수 관리를 위해 집중 치료 결정."}, {"no": "9", "cat": "입원", "nursing": "병동 인계 및 환자 이송", "his": "산소 공급 유지하며 병동 이송", "order": "입원 간호 기록 및 인계", "vs": "120/80-88-18-37.5 (95%)", "rationale": "이송 중에도 산소포화도가 유지되도록 이동용 산소통(O2 Tank) 사용."}], "debrief": ["산소포화도 모니터링:", "Nasal Prong 1~3L 적용 시 SpO2 94% 이상 유지되는지 확인합니다. 만약 산소를 주는데도 포화도가 계속 떨어진다면 전문기도확보(Intubation)를 준비해야 합니다.", "염증 수치(CRP) 및 백혈구(WBC) 확인:", "HIS에서 CRP 수치를 확인합니다. CRP가 매우 높다면 세균성 감염이나 염증 반응이 강력하다는 신호로, 패혈증(Sepsis)으로의 진행 여부를 감시해야 합니다.", "흉수(Pleural Effusion) 간호:", "양측 흉수로 인해 호흡 시 통증이나 호흡곤란이 심해질 수 있습니다. 환자를 반좌위(Semi-Fowler's position)로 유지하여 폐 확장을 돕습니다.", "항생제 조기 투여:", "폐렴 환자에서 첫 항생제 투여 시간(Door-to-Antibiotic)은 예후에 결정적인 영향을 미칩니다. 오더 확인 즉시 AST를 시행하고 투여합니다.", "왜 COVID/Influenza 검사를 먼저 하나요?", "응급실 입구에서 이 검사를 시행하는 이유는 '원인 감별'과 '방역 관리' 때문입니다.", "감염병 배제(Triage): 폐렴 증상은 코로나19나 독감과 매우 유사합니다. 음성이 나와야 일반 병실 입원이 가능하며, 의료진의 방호 수준을 결정할 수 있습니다.", "치료 방향 설정: 바이러스성(독감 등)인 경우 항바이러스제(Tamiflu 등)를, 세균성인 경우 항생제를 우선순위에 둡니다. 음성이 나왔다는 것은 세균성 폐렴일 가능성이 높음을 시사합니다."], "id": "2-12"}, {"diff": "중급", "no": "13", "title": "심부전 +입원", "desc": "", "pname": "이OO", "pdemo": "여성 / 72세", "info": [{"label": "성함", "value": "이OO (여성 / 72세)"}, {"label": "과거력", "value": "심부전(Heart Failure), 고혈압, 만성 신질환(CKD)."}, {"label": "현병력", "value": "일주일 전부터 조금만 움직여도 숨이 차더니, 어제부터는 누워 있으면 숨이 더 차서 잠을 잘 수 없는 기좌호흡(Orthopnea) 상태임. 양쪽 다리가 눈에 띄게 부어올라 내원."}, {"label": "특이사항", "value": "평소 복용하던 이뇨제를 며칠간 임의로 중단함."}], "flow": [{"no": "1", "cat": "초진 (Triage)", "nursing": "즉각적인 산소 공급 및 반좌위 적용", "his": "주호소: 호흡곤란, 야간 기좌호흡", "order": "접수 및 KTAS 2단계", "vs": "145/95-108-26-89%", "rationale": "폐부종으로 인한 가스교환 장애 해결이 최우선."}, {"no": "2", "cat": "신체 검진", "nursing": "하지 부종 사정 (Pitting Edema)", "his": "Both legs Grade 2+ 확인", "order": "신체 검진 수행", "vs": "140/90-102-22-94% (O2)", "rationale": "체액 과다(Fluid Overload)의 객관적 지표 확인."}, {"no": "3", "cat": "처방/검사", "nursing": "HIS 처방 확인 및 혈액 채취", "his": "BNP, Troponin, CBC, 전해질", "order": "ECG, Chest PA, Lab", "vs": "-", "rationale": "BNP 상승은 심실 벽의 신전 및 심부전 악화의 핵심 지표."}, {"no": "4", "cat": "전과/협진", "nursing": "심장내과(CV) 협진 및 검진", "his": "순환기내과 주치의 진찰 보조", "order": "CV Consult", "vs": "-", "rationale": "전문 진료과의 진단 및 치료 방향 결정."}, {"no": "5", "cat": "심초음파", "nursing": "Echocardiography 시행", "his": "LVEF(심박출률) 저하 확인", "order": "Bedside Echo", "vs": "-", "rationale": "심장의 수축 기능 및 판막 이상 여부를 실시간 확인."}, {"no": "6", "cat": "투약 1", "nursing": "Nitroglycerin(NTG) 투여 10mcg/min started", "his": "혈압 모니터링하며 지속 주입", "order": "NTG IV infusion", "vs": "135/85-95-20-95%", "rationale": "정맥 확장으로 심장의 전부하(Preload)를 감소시킴."}, {"no": "7", "cat": "투약 2", "nursing": "이뇨제(Lasix) 투여 1ampule", "his": "Lasix 20mg IV 투여", "order": "Lasix(Furosemide) IV", "vs": "-", "rationale": "체내 과잉 수분을 소변으로 신속히 배출."}, {"no": "8", "cat": "I/O 관리", "nursing": "Foley Catheter 삽입", "his": "Hourly Urine Check 시작", "order": "Foley Catheterization", "vs": "-", "rationale": "이뇨제 반응 확인 및 정확한 배설량 측정을 위한 필수 처치."}, {"no": "9", "cat": "집중 모니터", "nursing": "V/S Every 1 Hour Check", "his": "혈압 저하 및 부정맥 감시", "order": "Vital Check q 1hr", "vs": "125/75-88-18-96%", "rationale": "약물(NTG, Lasix) 반응 및 급격한 상태 변화 감시."}, {"no": "10", "cat": "약물 확인", "nursing": "이전 복용약(Medication) 확인", "his": "Home Med 리스트 HIS 등록", "order": "이전 처방 내역 조회", "vs": "-", "rationale": "기존 약물과의 중복 방지 및 복약 순응도 평가."}, {"no": "11", "cat": "입원/인계", "nursing": "중환자실 입원 결정", "his": "병동 인계 및 환자 이송", "order": "입원 오더 (Admission)", "vs": "120/75-82-18-97%", "rationale": "체액 균형 회복 시까지 집중 관리가 필요함."}], "debrief": ["BNP (B-type Natriuretic Peptide) 수치:", "심부전의 진단과 예후 결정에 가장 중요한 수치입니다. HIS에서 BNP가 수천 단위로 상승해 있다면 중증 심부전임을 인지해야 합니다.", "전해질 불균형 감시:", "Lasix(이뇨제)를 대량 투여하면 저칼륨혈증(Hypokalemia)이 발생하기 쉽습니다. 이는 부정맥을 유발할 수 있으므로 혈액 검사 결과를 수시로 확인합니다.", "Strict I/O (섭취 및 배설량):", "심부전 간호의 핵심입니다. 시간당 소변량(Hourly Urine)이 적절한지, 수액 주입 속도가 너무 빠르지 않은지(Overload 위험)를 철저히 관리합니다.", "혈압 저하 감시:", "NTG와 Lasix의 병용은 혈압을 급격히 떨어뜨릴 수 있습니다. 매시간 V/S 체크 시 수축기 혈압(SBP) 90mmHg 미만으로 떨어지는지 주의 깊게 봅니다."], "id": "2-13"}, {"diff": "중급", "no": "14", "title": "위장출혈", "desc": "", "pname": "이OO", "pdemo": "남성 / 58세", "info": [{"label": "성함", "value": "이OO (남성 / 58세)"}, {"label": "과거력", "value": "간경화(Liver Cirrhosis), 만성 위염."}, {"label": "현병력", "value": "3일 전부터 시작된 복부 불편감과 함께 오늘 하루 3차례의 흑색변(Melena)을 보아 내원."}, {"label": "특이사항", "value": "평소 복용하던 이뇨제를 며칠간 임의로 중단함."}], "flow": [{"no": "1", "cat": "초진 (Triage)", "nursing": "환자가 가져온 흑색변 사진 확인", "his": "주호소: 흑색변(일 3회), 어지럼증", "order": "접수 및 K 력", "value": "폭발 충격으로 가슴을 강하게 부딪힌 뒤 발생한 날카로운 가슴 통증과 호흡곤란으로 소방병원 응급실 내원."}, {"label": "특이사항", "value": "역동적인 외상 기전으로 인해 늑골 골절 동반 가능성 높음."}], "flow": [{"no": "1", "cat": "초진 (Triage)", "nursing": "환자 접수 및 외상 기전 파악", "his": "", "order": "접수 및 KTAS 2단계", "vs": "130/80-105-24-88%", "rationale": "폭발 둔상은 폐 타박상 및 기흉을 유발하는 고에너지 손상임."}, {"no": "2", "cat": "의사 검진", "nursing": "검진 보조 및 환자 상체 거상", "his": "", "order": "신체 검진 수행", "vs": "-", "rationale": "폐음 소실과 타진음 변화는 기흉(공기)과 혈흉(피)의 전형적 징후임."}, {"no": "3", "cat": "응급 처치", "nursing": "산소 흡입 시작 (2L/min)", "his": "", "order": "Nasal Prong 2L", "vs": "125/75-98-20-94%", "rationale": "폐 허탈로 인한 가스교환 장애를 보완하여 조직의 저산소증을 예방함."}, {"no": "4", "cat": "처방 확인", "nursing": "HIS 오더 확인 및 채혈", "his": "", "order": "Chest PA, CBC, ABGA", "vs": "-", "rationale": "출혈 정도(Hb)와 산소화 상태(ABGA)를 객관적으로 파악하기 위함."}, {"no": "5", "cat": "검사 시행", "nursing": "영상의학과 이송 및 촬영 보조", "his": "", "order": "Portable Chest X-ray", "vs": "-", "rationale": "폐의 허탈 정도와 흉강 내 혈액 고임 유무를 확진하는 가장 빠른 방법임."}, {"no": "6", "cat": "결과 판독", "nursing": "Rt. Hemopneumothorax확인", "his": "", "order": "판독 결과 보고", "vs": "120/80-92-18-95%", "rationale": "흉막강 내 압력 증가로 폐가 수축된 상태임을 영상으로 최종 확인."}, {"no": "7", "cat": "전과/협진", "nursing": "흉부외과(CS) 의뢰", "his": "", "order": "CS Consult", "vs": "-", "rationale": "폐 재확장을 위해 흉강 내 공기와 피를 즉시 배출해야 함."}, {"no": "8", "cat": "시술 시행", "nursing": "Rt. Chesttube insertion", "his": "", "order": "Chest Tube", "vs": "120/75-88-18-97%", "rationale": "폐쇄식 배액 시스템을 통해 흉강 내 음압을 복구하고 폐를 펴줌."}, {"no": "9", "cat": "시술 후 확인", "nursing": "배액병 작동 상태 확인", "his": "", "order": "시술 후 영상 확인", "vs": "-", "rationale": "배액병의 파동은 관의 개방성을, 기포는 공기 유출의 지속성을 의미함."}, {"no": "10", "cat": "상태 감시", "nursing": "배액 양상 및 통증 사정", "his": "", "order": "간호 기록", "vs": "-", "rationale": "시간당 200cc 이상의 출혈은 활동성 동맥 출혈(수술 적응증)을 시사함."}, {"no": "11", "cat": "입원/인계", "nursing": "흉부외과 병동 입원", "his": "", "order": "입원 오더 (Admission)", "vs": "120/80-82-16-98%", "rationale": "지속적인 흉관 관리와 폐 재확장 여부를 관찰하기 위해 집중 치료 필요."}], "debrief": ["Oscillation (파동): 환자의 호흡 주기(흡기와 호기)에 따른 흉강 내 압력 변화가 배액관 물기둥에 그대로 전달되는 현상입니다. 만약 파동이 없다면 관이 꺾였거나 막혔음을 의미합니다.", "Bubbling (기포): 흉막강 내에 갇혀 있던 공기가 흉관을 통해 밖으로 빠져나오며 배액병의 물속에서 기포를 형성하는 것입니다. 폐가 완전히 펴지면 기포는 서서히 줄어듭니다.", "Water Seal (밀봉): 배액병 속의 물은 외부 공기가 거꾸로 환자의 가슴속으로 들어가는 것을 막는 '일방통행 밸브' 역할을 합니다.", "[환자 교육 및 주의사항]", "저지대 유지: 배액병은 항상 환자의 가슴보다 60~90cm 아래에 위치시켜 중력에 의한 배액이 원활하게 하고 역류를 방지해야 합니다.", "고정 및 관리: 소방관 대원님의 경우 건장한 체격으로 움직임이 클 수 있으므로, 이동 시 관이 당겨져 빠지지 않도록(Self-extubation 방지) 견고하게 고정하고 교육하는 것이 필수적입니다.", "1. 흉관과 배액병 사이의 연결 부위가 '분리'된 경우", "[대처 방법]", "즉시 흉관의 환자 쪽 끝을 꺾거나(Kinking) 클램프로 잠급니다.", "분리된 부위를 소독제로 닦고 다시 연결하거나, 새 배액 세트로 교체합니다.", "잠갔던 흉관을 다시 열고, 환자에게 심호흡과 기침을 유도하여 흉강 내 공기를 배출합니다.", "[이론적 근거]", "외기 유입 차단: 연결 부위가 분리되면 대기 중의 공기가 흉막강 내의 음압 때문에 안으로 빨려 들어갑니다. 이는 허탈된 폐를 악화(기흉 재발)시키므로 즉시 관을 잠가 공기 유입을 차단해야 합니다.", "개방성 확보: 소독 후 재연결은 감염을 방지하고, 다시 음압 시스템을 복구하여 폐가 재확장되도록 돕기 위함입니다.", "2. 환자 몸에서 흉관 자체가 '통째로 빠진' 경우", "[대처 방법]", "즉시 손이나 깨끗한 거즈로 삽입 부위를 압박하여 구멍을 막습니다.", "바셀린 거즈(Petrolatum gauze)를 사용하여 삽입 부위를 밀폐한 후, 3면만 반창고로 고정합니다 (3-sided occlusive dressing).", "즉시 주치의에게 보고하고 환자의 활력징후 및 호흡음을 관찰합니다.", "응급 흉부 엑스레이를 촬영하여 기흉 여부를 확인합니다.", "[이론적 근거]", "긴장성 기흉 예방: 4면을 모두 막으면 흉강 내에 남아있던 공기가 나갈 곳이 없어 긴장성 기흉(Tension Pneumothorax)으로 진행될 수 있습니다. 3면만 고정하면 환자가 숨을 내쉴 때(호기) 내부의 공기는 밖으로 나갈 수 있고, 숨을 들이마실 때(흡기) 외부 공기가 안으로 들어오는 것은 막는 '일방통행 밸브' 역할을 합니다.", "음압 유지: 삽입 부위를 즉시 압박하는 것은 대기가 흉강으로 직접 유입되는 것을 차단하기 위함입니다.", "3. 배액병(Chest Bottle)이 넘어지거나 깨진 경우", "[대처 방법]", "흉관을 환자 몸과 가까운 곳에서 꺾어서 잡습니다.", "임시방편으로 흉관의 끝을 멸균 증류수(또는 생리식염수) 2cm 깊이로 담가 둡니다.", "새로운 배액 시스템으로 즉시 교체합니다.", "[이론적 근거]", "수봉식(Water Seal) 원리: 배액병이 깨지면 수봉식 밀폐가 깨져 공기가 역류합니다. 이때 관 끝을 생리식염수에 담그면 액체가 외부 공기 유입을 막는 임시 수봉(Water seal) 역할을 하여 폐의 허탈을 방지합니다.", "고정 확인: 삽입 부위의 봉합(Stay suture) 상태를 매번 확인합니다.", "Safety Loop: 흉관을 피부에 고정할 때 약간의 여유(Loop)를 두어 환자가 움직여도 직접적으로 당겨지지 않게 합니다.", "기구 비치: 침상 옆에는 항상 바셀린 거즈, 클램프(Kelly), 멸균 거즈를 비치해 두어 사고 즉시 대처할 수 있도록 합니다."], "id": "2-18"}, {"diff": "중급", "no": "18", "title": "폐색전증", "desc": "", "pname": "박OO", "pdemo 작용은 출혈이므로 이를 면밀히 관찰함."}, {"no": "11", "cat": "입원/인계", "nursing": "순환기내과 병동 입원", "his": "", "order": "입원 오더 (Admission)", "vs": "122/80-78-16-99%", "rationale": "안정적이지만 초기 약물 반응 관찰 및 원인 정밀 조사를 위해 입원."}], "debrief": ["D-dimer 검사의 의미", "이론적 근거: 혈전이 분해될 때 생성되는 산물입니다. 민감도는 높지만 특이도가 낮아 수술 후, 임신, 염증 시에도 상승할 수 있습니다. 그러나 수치가 정상(음성)이라면 폐색전증이 아닐 확률이 매우 높으므로 감별 진단에 중요합니다.", "② CT Chest (PE Protocol)와 GFR", "이론적 근거: 조영제를 매우 빠른 속도(초당 4~5cc)로 주입하여 폐동맥이 가장 잘 보이는 순간에 촬영합니다. 조영제 배설을 담당하는 신장을 보호하기 위해 반드시 eGFR(신여과율)을 확인해야 합니다.", "③ 항응고 요법 (Anticoagulation)", "이론적 근거: 항응고제는 이미 생긴 혈전을 녹이는 약(혈전용해제)이 아니라, 혈전이 더 커지거나 새로 생기는 것을 막는 약입니다. 혈전용해제는 혈압이 떨어지는 고위험 PE에서만 신중히 사용하며, 저위험 환자는 항응고제만으로도 치료가 가능합니다."], "id": "2-19"}, {"diff": "중급", "no": "19", "title": "NP", "desc": "", "pname": "이OO", "pdemo": "남성 / 32세", "info": [{"label": "성함", "value": "이OO (남성 / 32세)"}, {"label": "주호소", "value": "\"죽어버리겠다\"며 평소 복용하던 정신과 약물 10알(항정신병제 추정)을 한꺼번에 복용."}, {"label": "현병력", "value": "조현병으로 외래 치료 중이며, 최근 환청이 심해져 자살 사고(Suicidal ideation)가 빈번해짐."}], "flow": [{"no": "1", "cat": "초진 (Triage)", "nursing": "환자 접수 및 복용 약물 종류/양 확인", "his": "", "order": "접수 및 KTAS 2단계", "vs": "110/70-95-18-36.5", "rationale": "약물 과다복용 및 자타해 위험 환자는 즉각적인 처치가 필요한 고위험군임."}, {"no": "2", "cat": "환경 조성", "nursing": "관찰구역 가장 안쪽 배치 (모니터 선 등 제거)", "his": "", "order": "환경 통제 지시", "vs": "-", "rationale": "전선이나 줄은 자살 기도의 도구가 될 수 있으므로 주변 환경을 단순화함."}, {"no": "3", "cat": "초기 검사", "nursing": "보호자 상주 및 혈액 검사 시행", "his": "", "order": "Routine Lab, Toxicology", "vs": "-", "rationale": "복용한 약물의 독성 여부와 신체적 손상 정도를 파악하기 위함."}, {"no": "4", "cat": "상황 발생", "nursing": "환자 돌발 행동 (Acting out)", "his": "", "order": "보안요원(Security) 호출", "vs": "130/90-115-24", "rationale": "돌발 상황 시 다수의 인원을 투입하여 심리적 압박 및 물리적 안전을 확보함."}, {"no": "5", "cat": "1차 진정", "nursing": "Haloperidol 5mg IM투여", "his": "", "order": "Haloperidol 1@ IM", "vs": "-", "rationale": "항정신병제를 통해 환자의 정신병적 흥분 상태를 진정시킴."}, {"no": "6", "cat": "추가 투약", "nursing": "환자 흥분 지속됨에 따라 추가 투약", "his": "", "order": "Lorazep 5 마스크, 장갑, 가운을 반드시 착용해야 합니다.", "신속한 격리(Triage Separation): 결핵 환자가 일반 대기실에 오래 머물수록 병원 내 노출자가 기하급수적으로 늘어납니다. '3주 이상 기침' 키워드 확인 시 즉시 분리해야 합니다.", "보건소 신고: 결핵은 법정 감염병이므로 진단 또는 의심 시 관할 보건소에 신고해야 합니다.", "이송 수단: 전원 시 일반 사설 구급차가 아닌, 감염병 이송 규정을 준수하는 차량을 이용하며 이송 요원에게도 결핵 의심 환자임을 명확히 인지시켜야 합니다."], "id": "2-21"}, {"diff": "고급", "no": "1", "title": "STEMI VF ROSC", "desc": "[시나리오 1] 심근경색 환자의 치명적 부정맥(VF & Pulseless VT) 응급실 처치, ROSC 후 CAG 및 입원 연계 시나리오", "pname": "강OO", "pdemo": "남성 / 62세", "info": [{"label": "성함", "value": "강OO (남성 / 62세)"}, {"label": "주호소", "value": "\"명치가 짓눌리듯이 아프고 턱이랑 왼쪽 어깨까지 뻗치게 아파요. 숨을 못 쉬겠어요.\""}, {"label": "과거력", "value": "고혈압(10년), 당뇨(5년), 30갑년의 흡연가."}, {"label": "특이사항", "value": "내원 1시간 전부터 시작된 흉통으로 119 구급차 이용해 내원. 심전도상 STEMI(급성 심근경색) 의심되어 심장내과(CV) 긴급 Call 및 CAG(심장혈관조영술)팀 소집 중 응급실 침상에서 심정지 발생."}], "flow": [{"no": "1", "cat": "Triage (초진)", "nursing": "중증 구역 베드 배정 및 급성 관상동맥 증후군(ACS) 초기 사정", "his": "의식 Alert하나 식은땀을 다량 흘림. 주소지 확인 및 통증 점수(NRS 8점) 사정", "order": "응급 중증 구역 침상 배정, 12-Lead EKG, 산소 투여, 모니터 부착", "vs": "142/88 - 104 - 22 - 36.5℃ - 93%", "rationale": "흉통과 방사통, 전신 발한은 급성 심근경색의 전형적 징후임. 산소포화도가 94% 미만이므로 심근 산소 공급을 위해 산소 투여가 즉시 필요함."}, {"no": "2", "cat": "기초 검진 (심정지 전)", "nursing": "12-Lead EKG 시행 및 정맥로 확보, ACS 약물 투여", "his": "EKG 상 V1-V4 ST 분절 상승(STEMI) 확인. CAG 대기 중 환자가 갑자기 \"억...\" 소리를 내며 턴오버됨.", "order": "18G IV Line 확보, Aspirin 300mg + Ticagrelor 180mg PO", "vs": "90/50 - 130 - 24 - 36.4℃ - 91% ➡️ 측정 불가", "rationale": "심근 허혈이 극대화되면서 심장 전도계가 무너져 치명적인 부정맥(VF)으로 이행되는 전조 단계임. 의식 소실 직후 맥박 촉지 불가가 됨."}, {"no": "3", "cat": "심정지 인지 & CPR 가동", "nursing": "[메가코드 시작] 의식/맥박 확인 후 즉시 코드블루 발령 및 가슴 압박 시작", "his": "경동맥(Carotid) 맥박 없음. 모니터 리듬 쪼개지며 심실세동(VF) 관찰됨. 즉시 Chest Compression 개시", "order": "Code Blue 발령, 하드보드 삽입, 제세동기(Defibrillator) 준비", "vs": "Pulse (-) / 측정 불가", "rationale": "심정지 확인 즉시 1초의 지체도 없이 가슴 압박을 시작해야 뇌 및 관상동맥 관류압을 유지할 수 있음. VF는 제세동이 필수인 리듬임."}, {"no": "4", "cat": "1차 제세동 (Shock)", "nursing": "제세동기 패들 부착 및 첫 번째 Shock 200J 전달", "his": "모니터 상 VF 재확인. \"모두 물러서세요\" 외친 후 Shock 전달. 즉시 가슴 압박 2분 재개", "order": "Defibrillation 200J (Biphasic), 주입 수액 Full dropping", "vs": "Pulse (-) / 측정 불가", "rationale": "[치료의 핵심] VF를 해결하는 유일한 중재는 제세동임. Shock 전달 직후 리듬 확인을 위해 압박을 멈추지 말고, 즉시 가슴 압박을 재개해야 함."}, {"no": "5", "cat": "2차 제세동 & 에피네프린", "nursing": "CPR 2분 후 리듬 확인(여전히 VF). 2차 Shock 200J 전달 및 첫 약물 투여", "his": "2분 알람 울림. 압박 멈추고 리듬 확인 시 VF 지속됨. Shock 전달 후 압박 재개. Epinephrine 1mg IV Pushing", "order": "2nd Defibrillation 200J, Epinephrine 1mg IV single (3~5분 간격)", "vs": "Pulse (-) / 측정 불가", "rationale": "2차 제세동 직후 가슴 압박을 하는 동안 에피네프린을 투여함. 에피네프린의 알파 수용체 자극 효과는 말초혈관을 수축시켜 심장과 뇌로 가는 혈류를 증가시킴."}, {"no": "6", "cat": "3차 제세동 & 아미오다론", "nursing": "CPR 2분 후 리듬 확인, **무맥성 심실빈맥(Pulseless VT)**으로 변경됨. 3차 Shock및 항부정맥제 투여", "his": "리듬이 규칙적이고 굵은 빈맥 모양(VT)으로 바뀜. 대퇴동맥 맥박 없음 확인. Shock 후 압박 재개. Amiodarone 300mg IV 주입", "order": "3rd Defibrillation 200J, Amiodarone 300mg IV Loading", "vs": "Pulse (-) / 측정 불가", "rationale": "리듬이 VF에서 Pulseless VT로 바뀌었으나 여전히 Shockable 리듬임. 3번째 Shock 이후에는 난치성 부정맥을 잡기 위해 항부정맥제(아미오다론)를 투여함."}, {"no": "7", "cat": "4차 제세동 & 전문기도", "nursing": "CPR 2분 후 리듬 확인(Pulseless VT 지속). 4차 Shock및 전문기도확보(Intubation) 보조", "his": "2분 경과 후에도 리듬 유지되어 Shock 전달. 가슴 압박 유지하며 전문기도확보 보조 (Ambu-bagging을 6초당 1회로 전환)", "order": "4th Defibrillation 200J, Endotracheal Intubation (7.5Fr)", "vs": "Pulse (-) / 측정 불가", "rationale": "지속되는 심정지 상황에서 전문기도를 확보하여 적절한 환기를 제공함. 인투베이션 후에는 가슴 압박과 인공호흡을 동기화하지 않고 각각 독립적으로 시행함."}, {"no": "8", "cat": "ROSC (자발순환회복)", "nursing": "모니터 리듬 확인 및 맥박 촉지, 자발순환회복 인지", "his": "모니터 상 규칙적인 QRS 관찰됨. 경동맥 맥박 강하게 만져짐. \"압박 멈추세요. ROSC 되었습니다!\"", "order": "CPR 중단, 12-Lead EKG 재시행, Portable Chest X-ray 촬영, Arterial Line 확보", "vs": "112/64 - 118 - 18 - 36.2℃ - 98% (Ventilator)", "rationale": "맥박이 돌아왔으므로 가슴 압박을 중단하고 심정지 후 증후군(PCAS) 간호로 전환함. 승압제 주입 및 정확한 혈압 감시를 위해 주동맥관(A-line) 확보가 필요함."}, {"no": "9", "cat": "L-Tube 삽입 및 약물 투여", "nursing": "ROSC 후 의식 없는 상태(Stupor) 확인, 비위관(L-tube) 삽입 및 ACS 로딩 약물 투여", "his": "12-Lead EKG 상 ST 상승 지속 확인. 의식 소실로 경구 복용 불가하므로 L-tube 삽입 후 위치 확인. 약물 분쇄하여 주입", "order": "L-tube insertion (16Fr), Aspirin 300mg + Clopidogrel 600mg (Crushed) via L-tube", "vs": "105/58 - 110 - 18 - 36.1℃ - 97% (Ventilator)", "rationale": "[원인 치료 준비] CAG 전 혈전 형성을 억제하기 위한 필수 로딩 약물임. 의식이 없는 환자에게 경구 약물을 그냥 넣으면 흡인성 폐렴을 유발하므로, 비위관을 안전하게 삽입한 후 분쇄 주입해야 함."}, {"no": "10", "cat": "CAG실 이송 및 시술", "nursing": "환자 모니터 장비 장착, 승압제 유지하며 심장혈관조영실(CAG Room)로 안전 이송", "his": "이송용 인공호흡기 및 모니터 연결. 심장내과 스태프와 함께 이송. CAG 시행 (Right RCA 100% 폐색 확인 ➡️ Stent 삽입)", "order": "Portable Ventilator 적용, 이송 중 Infusion Pump(Dopamine/Norepinephrine) 유지", "vs": "100/60 - 105 - 18 - 36.0℃ - 96% (Ventilator)", "rationale": "이송 중 재심정지(Re-arrest) 위험이 매우 높으므로 continuous 모니터링이 필수임. 관상동맥에 스텐트를 삽입하여 심정지의 근본 원인인 허혈을 해소함."}, {"no": "11", "cat": "ICU (심장중환자실) 입원", "nursing": "시술 종료 후 ICU로 이송하여 중환자실 간호사에게 밀착 인수인계 및 입원 완료", "his": "스텐트 삽입 성공 후 자발 혈압 회복 기미 보임. ICU 베드로 부드럽게 턴오버. 시술 부위(Femoral/Radial) 출혈 여부 확인", "order": "CCU(심장중환자실) 입원, 정밀 V/S 및 시술 부위 감시, TTM(목표체온유지치료) 가동", "vs": "118/70 - 92 - 16 - 35.8℃ - 99% (Ventilator)", "rationale": "시술 후 항혈소판제 다량 투여로 인해 천자 부위 출혈 위험이 높음. 심정지 후 뇌 보호를 위한 TTM 요법을 중환자실에서 이어받아 연속성 있게 진행함."}], "debrief": ["① Shockable 알고리즘의 리더십과 타이밍 (Hands-off time 최소화)", "임상 판단 가이드: 심실세동(VF)과 무맥성 심실빈맥(Pulseless VT) 환자를 살리는 핵심은 \"제세동(Shock)을 주는 순간을 제외하고는 가슴에서 손을 떼지 않는 것\"입니다. 리더는 2분 알람이 울리기 15초 전에 미리 팀원에게 \"곧 리듬 확인하겠습니다. 충전 먼저 하겠습니다\"라고 지시하여 리듬 확인과 동시에 Shock이 나갈 수 있도록 싱크를 맞춰야 합니다.", "간호 팁: Shock을 주기 전 \"나도 물러서고, 너도 물러서고, 모두 물러서세요! (I'm clear, You're clear, Everybody's clear!)\"를 외치며 눈으로 침상 주변에 아무도 닿아있지 않음을 확인해야 합니다. Shock 버튼을 누른 후에는 모니터를 보며 감탄하거나 리듬이 바뀌었는지 확인할 시간 없이, 즉시 손을 환자 가슴에 얹고 압박을 시작하도록 큐(Sign)를 주는 것이 완벽한 리더의 역할입니다.", "② 심정지 약물 투여 및 플러시(Flush) 테크닉", "간호 실무: ACLS 메가코드에서 에피네프린은 2차 제세동 직후(약 심정지 3~4분 경과 시점) 주입하며, 이후 3~5분 간격(매 2회 리듬 확인마다)으로 투여합니다. 아미오다론은 3차 제세동 직후 300mg을 첫 로딩하고, 만약 리듬이 안 잡히면 5차 제세동 직후 150mg을 추가 투여(Max 450mg)합니다.", "Epinephrine (1mg/1mL): Amiodarone (1st Loading): Amiodarone (2nd Loading): ​매 3 5분 간격으로 IV Pushing→즉시 NS 20mL Flush→카테터 사지 거상300 mg (2Amp) 익스트림 Pushing→즉시 NS 20mL Flush150 mg (1Amp) 추가 Pushing (필요 시)​", "실무 꿀팁: 심정지 상황에서는 말초 혈류가 흐르지 않기 때문에 정맥 주사로 약을 그냥 넣으면 팔뚝에 고여서 심장까지 가지 못합니다. 따라서 모든 심정지 약물은 투여 즉시 생리식염수(NS) 20mL 시린지로 강하게 밀어 넣은(Flush) 후, 약물이 들어간 팔을 10~20초간 위로 높게 들어 올려 중력에 의해 약물이 중심 정맥과 심장으로 빠르게 도달하도록 해야 합니다.", "③ ROSC 후 비위관(L-Tube)을 통한 항혈소판제 분쇄(Crush) 주입", "임상 판단 가이드: 심정지 발생 전 아스피린과 티카그렐러를 입으로 먹으려던 중 어레스트가 났거나, ROSC 후 아직 약물이 들어가지 않은 상태라면 반드시 시술 전 강력한 항혈소판제 로딩(Loading)이 끝나야 스텐트 혈전증을 예방할 수 있습니다. 환자가 인투베이션 상태이거나 의식이 혼미(Stupor~Coma)할 때는 경구 투여가 절대 금기이므로 L-tube를 빠르게 삽입해야 합니다.", "간호 실무: L-tube(주로 16Fr) 삽입 후 청진기로 위 내 공기 유입음(Whoosh sound)을 확인하거나 위액 흡인을 확인하여 위치를 확진합니다. 처방된 아스피린 300mg과 클로피도그렐(플라빅스) 600mg 정제를 막자사발에 아주 미세하게 분쇄한 뒤, 주사용수나 생리식염수 20~30mL에 녹여 위관으로 주입합니다. 약물이 관에 고여서 막히지 않도록 주입 후 반드시 20mL 이상의 물로 추가 Flush(씻어내기)를 해주고 튜브를 잠가야(Clamping) 약물이 역류하거나 소실되지 않습니다.", "④ 응급실에서 혈관조영실(CAG Room) 및 중환자실(CCU) 이송 안전 대책", "간호 실무: ROSC 직후의 환자는 언제든 다시 VF가 터질 수 있는 '시한폭탄'과 같습니다. 이송 전 반드시 이송용 제세동기(Defibrillator with Paddle/Pad), 이송용 인공호흡기(Portable Ventilator), Ambu-bag, 응급 에피네프린 및 아미오다론 파우치를 챙겨야 합니다. 이송 중에도 도파민이나 노르에피네프린 등 인퓨전 펌프로 들어가는 승압제 라인이 꼬이거나 빠지지 않도록 메인 라인을 단단히 고정하고, 심전도 모니터에서 눈을 떼지 않으며 이동해야 합니다."], "id": "3-22"}, {"diff": "고급", "no": "2", "title": "STEMI(RV) ASYSTOLE, PEA ROSC", "desc": "[시나리오 2] 심근경색 환자의 비충격 필요 부정맥(Asystole & PEA) 응급실 처치, ROSC 후 CAG 및 입원 연계 시나리오", "pname": "박OO", "pdemo": "남성 / 58세", "info": [{"label": "성함", "value": "박OO (남성 / 58세)"}, {"label": "주호소", "value": "\"새벽부터 가슴 한가운데가 맷돌로 누르는 것처럼 뻐근하게 아프고 등까지 찢어지는 것 같아요. 토할 것 같습니다.\""}, {"label": "과거력", "value": "고지혈증(8년), 흡연가(25갑년)."}, {"label": "특이사항", "value": "내원 2시간 전 발생한 흉통과 구토 증상으로 내원. 심전도상 하벽(Inferior wall) STEMI 의심되어 심장내과 긴급 Call 및 CAG팀 소집 중, 우심실 경색(RV infarction)에 따른 극심한 미주신경 반사 및 전도 장애로 응급실 침상에서 서맥성 심정지 발생."}], "flow": [{"no": "1", "cat": "Triage (초진)", "nursing": "중증 구역 베드 배정 및 하벽 심근경색 초기 사정", "his": "의식 Alert하나 안면 창백, 오심/구토 호소. NRS 통증 점수 7점 사정.", "order": "응급 중증 구역 침상 배정, 12-Lead EKG, 산소 투여, 모니터 부착", "vs": "105/62 - 58 - 20 - 36.3℃ - 94%", "rationale": "하벽 심근경색은 우심실 경색을 동반하는 경우가 많아 심각한 서맥, 저혈압, 오심/구토가 동반될 수 있으므로 밀착 감시가 필요함."}, {"no": "2", "cat": "기초 검진 (심정지 전)", "nursing": "EKG 시행 및 정맥로 확보, 수액 로딩 및 약물 대기", "his": "EKG 상 II, III, aVF ST 분절 상승(Inferior STEMI) 확인. 환자가 갑자기 어지러움을 호소하며 의식 저하됨.", "order": "18G IV Line 2라인 확보, Aspirin 300mg + Clopidogrel 600mg PO 대기", "vs": "70/40 - 32 - 24 - 36.2℃ - 90% ➡️ 측정 불가", "rationale": "관상동맥 완전 폐색으로 인한 동방결절/방실결절 허혈로 극심한 전도 장애가 발생, 심박출량이 바닥나며 의식 소실 및 심정지로 이행됨."}, {"no": "3", "cat": "심정지 인지 & CPR 가동", "nursing": "[메가코드 시작]의식/맥박 확인 후 즉시 코드블루 발령 및 가슴 압박 시작", "his": "경동맥 맥박 없음. 모니터 리듬상 완전 평탄한 무수축(Asystole) 관찰됨. 즉시 Chest Compression 개시", "order": "Code Blue 발령, 하드보드 삽입, 제세동기 부착 및 리듬 분석", "vs": "Pulse (-) / 측정 불가", "rationale": "심정지 확인 즉시 1초의 지체도 없이 가슴 압박을 시작해야 함. Asystole은 제세동(Shock)을 주지 않는 Non-Shockable 리듬임."}, {"no": "4", "cat": "1차 리듬 분석 & 에피네프린", "nursing": "첫 번째 리듬 분석(Asystole 확인). Shock 없이 즉시 에피네프린 투여", "his": "모니터상 Asystole 지속 확인. \"Non-shockable입니다. 압박 계속하세요.\" Epinephrine 1mg IV Pushing", "order": "No Shock, CPR 유지, Epinephrine 1mg IV single (가장 먼저 투여)", "vs": "Pulse (-) / 측정 불가", "rationale": "[치료의 핵심]무수축/PEA인 경우 제세동은 효과가 없으며 오히려 심근에 손상을 줌. 신속한 고품질 CPR과 함께 가장 빠른 에피네프린 투여가 생존율을 높임."}, {"no": "5", "cat": "2차 리듬 분석 & 전문기도", "nursing": "CPR 2분 후 리듬 확인(Asystole 지속). 가슴 압박 유지하며 전문기도확보 보조", "his": "2분 알람 울림. 압박 멈추고 리듬 확인 시 Asystole 지속. 즉시 압박 재개하며 Intubation 시행 보조", "order": "No Shock, CPR 유지, Endotracheal Intubation (7.5Fr) 시행", "vs": "Pulse (-) / 측정 불가", "rationale": "전기적 활동이 아예 없는 심장에 산소 공급을 극대화하고 가슴 압박의 중단 없는 연속성을 확보하기 위해 전문기도유지술을 완수함."}, {"no": "6", "cat": "3차 리듬 분석 & PEA 전환", "nursing": "CPR 2분 후 리듬 확인, 모양은 정상이나 맥박이 없는 무맥성 전기활동(PEA)인지", "his": "모니터상 규칙적인 Sinus Bradycardia 모양 관찰됨. 즉시 경동맥 촉지했으나 맥박 없음. \"PEA입니다. 압박 유지하세요.\"", "order": "No Shock, CPR 유지, Epinephrine 1mg IV single (2차 투여)", "vs": "Pulse (-) / 측정 불가", "rationale": "모니터에 리듬이 정상처럼 보이더라도 실제 기계적인 심장 수축과 맥박이 없다면 심정지 상태(PEA)이므로 가슴 압박과 에피네프린을 지속해야 함."}, {"no": "7", "cat": "4차 리듬 분석 & 원인 교정", "nursing": "CPR 2분 후 리듬 확인(PEA 지속). 원인 교정을 위한 수액 급속 투여", "his": "모니터상 전기적 리듬은 유지되나 여전히 맥박 없음. 우심실 경색에 의한 심한 전부하 저하 교정을 위해 수액 라인 Full dropping", "order": "No Shock, CPR 유지, 생리식염수 500mL 챌린지 주입", "vs": "Pulse (-) / 측정 불가", "rationale": "PEA의 가역적 원인(5H 5T) 중 하나인 저혈량증(Hypovolemia)이나 우심실 기능 부전을 해결하기 위해 적극적인 수액 공급을 병행함."}, {"no": "8", "cat": "ROSC (자발순환회복)", "nursing": "모니터 리듬 확인 및 맥박 촉지, 자발순환회복 인지", "his": "모니터상 맥박수가 80회로 상승하며 경동맥 및 요골동맥 맥박 강하게 만져짐. \"압박 중단, ROSC!\"", "order": "CPR 중단, 12-Lead EKG 재시행, Portable Chest X-ray 촬영, Arterial Line 확보", "vs": "95/54 - 84 - 16 - 36.0℃ - 99% (Ventilator)", "rationale": "맥박이 정상적으로 돌아왔으므로 가슴 압박을 중단하고 관류압 유지를 위한 승압제 처방 및 혈역학적 실시간 감시(A-line)로 전환함."}, {"no": "9", "cat": "L-Tube 삽입 및 약물 투여", "nursing": "ROSC 후 의식 없는 상태(Stupor) 확인, 비위관(L-tube) 삽입 및 ACS 로딩 약물 투여", "his": "12-Lead EKG 상 하벽 ST 상승 지속 확인. 의식 소실로 경구 복용 불가하므로 L-tube 삽입 후 위치 확인. 약물 분쇄하여 주입", "order": "L-tube insertion (16Fr), Aspirin 300mg + Clopidogrel 600mg (Crushed) via L-tube", "vs": "98/56 - 86 - 16 - 35.9℃ - 98% (Ventilator)", "rationale": "[원인 치료 준비] 심정지의 원인인 관상동맥 폐색을 뚫으러 가기 전 혈전 형성 억제 약물을 넣어야 함. 의식 없는 환자의 기도 흡인을 막기 위해 L-tube를 통해 안전하게 분쇄 주입함."}, {"no": "10", "cat": "CAG실 이송 및 시술", "nursing": "환자 모니터 장비 장착, 승압제 유지하며 심장혈관조영술(CAG)실로 안전 이송", "his": "이송용 인공호흡기 및 모니터 연결. 심장내과 스태프와 함께 이송. CAG 시행 (Right RCA 100% 폐색 확인 ➡️ Stent 삽입)", "order": "Portable Ventilator 적용, 이송 중 Infusion Pump(Dopamine/Norepinephrine) 유지", "vs": "102/60 - 82 - 16 - 35.8℃ - 97% (Ventilator)", "rationale": "이송 중 재심정지(Re-arrest) 및 심한 서맥/저혈압 재발 위험이 높으므로 실시간 모니터링이 필수임. 막힌 우관상동맥을 재개통하여 허혈을 해소함."}, {"no": "11", "cat": "ICU (심장중환자실) 입원", "nursing": "시술 종료 후 ICU로 이송하여 중환자실 간호사에게 밀착 인수인계 및 입원 완료", "his": "스텐트 삽입 성공 후 자발 혈압 안정화. ICU 베드로 부드럽게 턴오버. 시술 부위(Femoral/Radial) 출혈 여부 확인", "order": "CCU(심장중환자실) 입원, 정밀 V/S 및 시술 부위 감시, TTM(목표체온유지치료) 가동", "vs": "114/68 - 78 - 14 - 35.6℃ - 100% (Ventilator)", "rationale": "시술 후 다량 투여된 항혈소판제로 인한 출혈 부작용을 예방하고, 심정지 후 뇌 손상을 최소화하기 위한 중환자 집중 치료(TTM)를 연속성 있게 진행함."}], "debrief": ["① Non-Shockable(Asystole/PEA) 알고리즘의 핵심 (신속한 약물과 원인 찾기)", "임상 판단 가이드: 심실세동(VF)과 달리 무수축(Asystole)과 무맥성 전기활동(PEA)은 제세동기 충전 버튼을 누를 필요가 없습니다. 제세동이 유효하지 않은 리듬이기 때문입니다. 이 알고리즘의 핵심은 \"리듬 분석 결과 비충격 리듬임을 확인한 순간 지체 없이 가슴 압박을 다시 시작하고, 3~5분 간격의 에피네프린을 1초라도 빨리 밀어 넣는 것\"입니다.", "간호 팁: PEA(무맥성 전기활동) 상태일 때는 모니터에 멀쩡한 심전도 리듬이 지나가기 때문에 초보 간호사들이 \"심장이 뛰나 봐요!\" 하고 압박을 멈추는 실수를 고질적으로 합니다. 화면에 아무리 예쁜 리듬이 나와도 목에 손을 댔을 때 맥박(Pulse)이 느껴지지 않는다면 그것은 심정지입니다. 즉시 \"PEA 리듬입니다. 압박 계속하세요!\"라고 외쳐야 합니다.", "② 비위관(L-Tube) 분쇄 약물 투여 시의 흡인 예방 및 개통성 유지", "간호 실무: ROSC 후 심정지 후 증후군 상태의 환자는 연하 기능(삼킴 능력)이 완전히 상실되어 있습니다. 이때 억지로 알약을 입으로 먹이면 100% 기도로 들어가 기도 폐쇄나 흡인성 폐렴을 유발합니다. 따라서 비위관을 삽입해야 합니다.", "L-Tube (16Fr) Position Check: ACS Loading Drug: Tube Maintenance: ​위 내 공기 주입음 (Whoosh Sound) 청진→위액 Reverse 흡인 확인Aspirin 300mg+Clopidogrel 600mg 곱게 분쇄→NS 30mL 희석 주입주입 즉시 NS 20mL Flush→Clamping 30분 유지 (약물 흡수 및 역류 방지)​", "실무 꿀팁: 가루약이 위관 벽에 달라붙어 관이 막히면 시술실로 출발해야 하는 초응급 상황에서 큰 차질이 생깁니다. 약물 주입 후 반드시 20mL 이상의 생리식염수로 강하게 밀어내기(Flush)를 해주고, 주입된 약물이 중력이나 위 내 압력에 의해 역류하거나 소실되지 않도록 튜브를 확실히 잠근(Clamping) 상태로 이송해야 합니다."], "id": "3-23"}, {"diff": "고급", "no": "3", "title": "STEMI VT Pulseless VT ROSC", "desc": "[시나리오 3] 심근경색 환자의 심실빈맥(VT) 악화 및 심정지 응급실 처치, ROSC 후 CAG 및 ICU 입원 연계 시나리오", "pname": "최OO", "pdemo": "남성 / 52세", "info": [{"label": "성함", "value": "최OO (남성 / 52세)"}, {"label": "주호소", "value": "\"가슴 속이 미친 듯이 뛰고 터질 것 같아요. 숨이 가쁘고 눈앞이 자꾸 캄캄해집니다.\""}, {"label": "과거력", "value": "협심증(3년 전 진단받았으나 약물 복용 임의 중단), 당뇨(10년)."}, {"label": "특이사항", "value": "내원 30분 전부터 시작된 극심한 흉부 압박감과 동반된 심계항진(두근거림)으로 내원. 심전도상 광범위 전벽(Extensive Anterior) STEMI 및 심실빈맥(VT) 관찰되어 심장내과 긴급 Call 중, 심근 허혈 가중으로 인해 맥박이 소실되며 무맥성 심실빈맥(Pulseless VT) 심정지 발생."}], "flow": [{"no": "1", "cat": "Triage (초진)", "nursing": "중증 구역 베드 배정 및 빈맥성 심근경색 초기 사정", "his": "의식 Alert하나 식은땀 유, 호흡곤란 및 흉통(NRS 9점) 호소.", "order": "응급 중증 구역 침상 배정, 12-Lead EKG, 산소 투여, 모니터 부착", "vs": "130/80 - 165 - 26 - 36.6℃ - 92%", "rationale": "전벽 심근경색은 좌전하행지(LAD) 폐색으로 대량의 심근 손상을 유발하며, 초기에 치명적인 실무율성 심실빈맥을 흔히 동반함."}, {"no": "2", "cat": "기초 검진 (심정 CT (Contrast)처방 및 이송", "vs": "104/58 - 102 - 14(Vent) - 35.4℃ - 99%", "rationale": "심정지 유발 원인(흡인성 폐렴 양상)을 확진하고, 의식 소실의 다른 원인(뇌출혈 등)이 없는지 감별하기 위한 필수 검사임."}, {"no": "10", "cat": "CT 결과 확인 및 치료 계획", "nursing": "CT 판독 결과 확인 및 중환자실(ICU) 입원 결정", "his": "Lung CT: 양측 하엽 대량의 흡인성 폐렴(Aspiration Pneumonia). Brain CT: 급성 출혈이나 중대한 이상 소견 없음.", "order": "ICU 격리실 침상 배정 오더, 광범위 항생제(Tazocin) 투여 개시", "vs": "112/64 - 96 - 14(Vent) - 35.5℃ - 100%", "rationale": "심정지 원인이 음식물 흡인에 의한 폐쇄 및 폐렴임이 확진되었고, 뇌 자체의 구조적 손상이 없음을 확인하여 ICU 집중 케어로 방향 설정함."}, {"no": "11", "cat": "ICU 인계 및 전동 완료", "nursing": "중환자실로 환자 이송 및 인공호흡기, 승압제 세팅 인수인계", "his": "소생실에서 ICU 베드로 안전하게 이송. 인공호흡기 파라미터 및 흡인 위험성 인계.", "order": "ICU 입원 처치 및 실시간 동맥압(A-line) 모니터링 연동", "vs": "114/66 - 92 - 14(Vent) - 35.6℃ - 100%", "rationale": "인공호흡기와 고위험 약물(노레피네프린)이 유지되는 환자이므로 이송 중 라인 빠짐을 방지하고 중환자실 간호사에게 완벽히 인계함."}], "debrief": ["① 흡인성 심정지에서 'Suction'의 우선순위", "임상 판단 가이드: 일반적인 심정지(V-fib 등)에서는 가슴압박과 제세동이 최우선이지만, 질식(Asphyxia)으로 인한 심정지는 기도가 막혀 있는 한 아무리 가슴을 압박하고 산소를 짜넣어도 폐로 들어가지 못합니다.", "간호 실무: 의사가 기관내삽관을 시도할 때, 구강 내에 떡, 밥알 등의 음식물이 가득 차 있으면 시야 확보가 불가능합니다. 간호사는 즉시 가장 굵은 흡인 카테터(Yankauer suction)나 에어로졸 카테터를 준비하여 압력을 최대로 높여 의사의 시야 확보를 돕고, 삽관 직후 튜브 내부로 들어간 음식물까지 신속하게 뽑아내야(Intratracheal suction) 산소 공급이 시작될 수 있습니다.", "① 흡인성 심정지에서 bagging", "\"Bagging 저항감을 느껴라\": 기관내삽관을 하고 앰부 배깅을 짤 때, 신규 간호사에게 꼭 가르쳐야 하는 것은 ‘손끝에 전해지는 저항감’입니다. 기도가 음식물로 꽉 막혀 있으면 앰부 주머니가 돌덩이처럼 딱딱해서 잘 짜지지 않습니다. 흡인(Suction)을 제대로 해서 기도가 뚫리면 손심이 부드러워지며 폐가 부풀어 오르는 느낌이 납니다. \"기계적으로 앰부만 짜지 말고, 공기가 들어가는 저항감을 수시로 체크해야 역류한 음식물로 기도가 다시 막히는 것을 잡아낼 수 있다\"고 교육해야 합니다."], "id": "3-27"}, {"diff": "고급", "no": "7", "title": "High K PEA ROSC", "desc": "[시나리오 7] 병원 입구 심정지 발생, CPR 가슴압박하며 소생실 입원 케이스", "pname": "강OO", "pdemo": "남성 / 58세", "info": [{"label": "성함", "value": "강OO (남성 / 58세)"}, {"label": "발견 당시 상황", "value": "월요일 아침 혈액투석을 위해 본관 로비 입구에 들어서다가 \"윽\" 소리와 함께 의식을 잃고 졸도함. 안내 데스크 직원 및 보안요원이 즉시 달려가 의식과 맥박 없는 것 확인 후 \"원내 CPR 코드 블루(Code Blue)\" 방송 전송. 보안요원이 현장에서 즉시 가슴압박을 시작하였으며, 응급실 간호사와 의사가 스트레처카를 끌고 나가 압박을 유지하며 소생실로 직행함."}, {"label": "신체 특이사항", "value": "좌측 전완부에 굵은 투석용 동정맥루(AVF) 흉터가 뚜렷하게 관찰됨. (좌측 상지 모든 의료 행위 절대 금기)"}], "flow": [{"no": "1", "cat": "소생실 진입 및 인계", "nursing": "가슴압박 끊기지 않게 소생실 베드로 환자 수평 이동 (보안요원 ➔ ER 간호사 압박 교대)", "his": "의식 무(Coma), 자발 호흡 무. 보안요원이 \"투석 환자분인데 로비에서 엎어지셨습니다\" 인계함.", "order": "가슴압박 지속, EKG 패치 부착, 우측 팔(Non-AVF) 18G 라인 확보", "vs": "무맥박 심정지 / 측정불가", "rationale": "원내 심정지는 목격 심정지이므로 예후가 좋을 수 있으나, 초기에 고품질 가슴압박을 끊김 없이 이어받는 것이 뇌 관류압 유지에 필수적임."}, {"no": "2", "cat": "1차 리듬 분석 (PEA 인지)", "nursing": "패치 부착 후 2분 압박 종료 시점에 첫 리듬 확인 및 분석", "his": "모니터상 분당 30회의 극도로 넓어진 QRS(Wide QRS 서맥) 관찰되나 경동맥 맥박 없음.", "order": "PEA 확인, 즉시 CPR 재개. 우측 팔 18G 정맥로 확보 및 응급 STAT 채혈", "vs": "PEA (Wide QRS) / 측정불가", "rationale": "심전도상 리듬은 보이지만 실제 피를 짜주지 못하는 무맥박 전기활동(PEA)임. 제세동(Shock) 적응증이 아니므로 곧바로 가슴압박을 이어나감."}, {"no": "3", "cat": "1차 에피네프린 투여", "nursing": "Non-shockable 리듬 공식에 의거하여 첫 번째 약물 즉시 투여", "his": "우측 정맥 라인 개통 확인 후 에피네프린 투여 및 수액 20mL 볼루스 플러시.", "order": "Epinephrine 1mg IV Pushing", "vs": "PEA 유지 / 측정불가", "rationale": "PEA나 Asystole 같은 비충격 필요 리듬은 심정지 인지 즉시 1분 이내에 에피네프린이 들어갈수록 생존율이 기하급수적으로 올라감."}, {"no": "4", "cat": "원인 추정 및 칼슘 투여", "nursing": "월요일 아침 투석 환자 + Wide QRS 서맥 조합으로 '고칼륨혈증' 임상적 확진 및 투여", "his": "랩 결과가 나오기 전이나 심전도가 100% 고칼륨혈증을 시사함. 칼슘 준비.", "order": "Calcium Gluconate 2g IV over 5min 천천히 진입", "vs": "PEA 유지 / 75% (Ambu 배깅)", "rationale": "고칼륨혈증성 심정지에서 글루콘산칼슘은 심근 세포막을 전기적으로 보강하여 정상 리듬으로 돌아올 수 있는 '방패' 역할을 함."}, {"no": "5", "cat": "전문기도확보 (Intubation)", "nursing": "가슴압박 중단 없는 기관내삽관 보조 및 위치 확인", "his": "의사가 비디오 후두경 사용하여 7.5Fr 튜브 거치. 청진 시 양측 폐음 동등함 확인.", "order": "기관내삽관(Intubation) 시행, 100% 산소 Ambu 배깅 연결", "vs": "PEA에서 Sine Wave로 변형 / 88%", "rationale": "전문기도가 확보되면 가슴압박과 인공호흡을 30:2로 맞추지 않고, 압박은 분당 100~120회 연속으로, 호흡은 6초에 1회만 주면 됨."}, {"no": "6", "cat": "2차 에피 및 칵테일 처방", "nursing": "2주기(4분) 경과 후 에피네프린 추가 및 대사성 약물 1차 투여", "his": "모니터 리듬이 뱀이 기어가는 듯한 **Sine wave(사인파)**로 악화됨. 고칼륨혈증 칵테일 가동.", "order": "Epinephrine 1mg 2차 투여, Bicarbonate (비본) 2amp IV Pushing", "vs": "Sine Wave / 92%", "rationale": "중탄산나트륨(비본)은 심한 산증을 돌려놓고 칼륨을 세포 내로 이동시키는 보조 장치임. Sine wave는 심장이 완전히 멎기 직전의 최종 신호임."}, {"no": "7", "cat": "K+ 수치 확진 및 인슐린", "nursing": "진단검사의학과에서 긴급 수치 확인 (K+ 8.7) 및 세포 내 이동 약물 주입", "his": "화학 검사 결과 수치 $K^+$8.7 mEq/L 수신됨. 인슐린과 고농도 포도당 투여.", "order": "RI 10iu + 50% D/W 1amp(20mL) mixed IV Pushing", "vs": "Sine Wave 지속 / 93%", "rationale": "인슐린은 세포막의 펌프를 촉진해 혈액 속 칼륨을 세포 안으로 쑤셔 넣는 마법 같은 효과를 냄. 이때 저혈당을 막기 위해 50% 포도당을 섞음."}, {"no": "8", "cat": "자발순환회복 (ROSC)", "nursing": "고칼륨혈증 교정 약물 주입 완료 후 정상 리듬 전환 및 맥박 촉지", "his": "리듬이 순식간에 좁아지며 분당 102회의 Sinus 리듬 확인. 대퇴동맥 맥박 매우 강하게 촉지됨.", "order": "가슴압박 즉시 중단, ROSC 선언, 바이탈 정밀 측정", "vs": "82/48 - 102 - 14(Ambu) - 35.9℃ - 98%", "rationale": "숨겨져 있던 칼륨이 세포 내로 들어가자 심장 전도계가 다시 살아나며 자발 수축력(ROSC)을 획득함."}, {"no": "9", "cat": "ROSC 후 저혈압 중재", "nursing": "자발 맥박은 돌아왔으나 쇼크 상태인 혈압을 올리기 위한 승압제 인퓨전 개시", "his": "수축기 혈압 80대 포착. 정밀 투여 위해 인퓨전 펌프 조작 및 라인 연결.", "order": "Norepinephrine 0.2mcg/kg/min주입 시작, 우측 요골동맥 A-line 확보", "vs": "104/58 - 96 - 14(Vent) - 36.1℃ - 100%", "rationale": "심정지 후 상태(Post-cardiac arrest syndrome)로 혈관 긴장도가 풀려있으므로 강력한 혈관수축제인 노레피네프린으로 승압함."}, {"no": "10", "cat": "중환자실 응급 투석 준비", "nursing": "근본적인 칼륨 배출을 위한 ICU 격리실 확보 및 CRRT 세팅 연락", "his": "환자 인공호흡기(Ventilator) 연결 및 모니터 안정화 확인. 중환자실 의무 기록 전송.", "order": "내과중환자실(MICU) 전동 오더, 우측 대퇴정맥 투석용 대형 카테터 삽입", "vs": "106/61 - 92 - 14(Vent) - 36.2℃ - 100%", "rationale": "RI와 비본으로 낮춘 칼륨은 서너 시간 뒤 다시 혈액으로 뿜어져 나옴(Rebound). 완전히 빼내려면 2~3시간 이내에 CRRT 투석을 돌려야 함."}, {"no": "11", "cat": "안전한 ICU 이송 및 인계", "nursing": "모든 라인 정리, 인공호흡기 배터리 확인 후 중환자실로 환자 인도", "his": "중환자실 베드로 환자 이동 후 모니터 스왑. 좌측 상지 AVF 절대 금기 재인계.", "order": "중환자실 도착 후 30분 간격 ABGA/Electrolyte 추적 오더", "vs": "112/65 - 89 - 14(Vent) - 36.3℃ - 100%", "rationale": "중환자실 간호사에게 로비 심정지 순간부터 K 8.7 확인, 투여된 칼슘/인슐린 용량, 좌측 팔 동정맥루 보호 지침을 완벽히 인계함."}], "debrief": ["① 투석 환자 고칼륨혈증 소생술의 특수성 (칵테일 처방)", "임상 판단 가이드: 일반적인 CPR 프로토콜(에피네프린, 아미오다론)만으로는 고칼륨혈증 심정지를 절대 살릴 수 없습니다. 원인인 칼륨을 세포 안으로 밀어 넣는 특수 약물 3종 세트가 즉시 들어가야 리듬이 돌아옵니다.", "간호 실무: 의사의 오더가 떨어지기 전이라도 투석 환자가 서맥으로 쓰러졌다면 고칼륨혈증을 직감하고, 글루콘산칼슘(심장 보호), RI 인슐린 + 50% 포도당(칼륨 세포 내 이동), 비본(중탄산나트륨, 산증 교정)약물을 소생 카트에서 즉시 꺼내어 투여할 수 있도록 원동력을 발휘해야 합니다."], "id": "3-28"}, {"diff": "고급", "no": "8", "title": "소아 기도 폐쇄 Brady CPR", "desc": "[시나리오 8] 급성 기도 폐쇄 및 후두 부종으로 인한 소아 호흡성 심정지 소생 시나리오", "pname": "만 3세", "pdemo": "남아 / 체중 15 kg 가정", "info": [{"label": "연령/체중", "value": "만 3세 (남아 / 체중 15 kg 가정)"}, {"label": "주호소", "value": "\"아이가 집에서 사탕을 먹다가 갑자기 캑캑거리더니 숨을 못 쉬고 얼굴이 새파래지면서 쓰러졌어요!\""}, {"label": "내원 당시 상태", "value": "119 구급대에 의해 백밸브마스크(BVM) 배깅을 받으며 소생실 진입. 유도 호흡은 거의 없으며 중증의 중심성 청색증(Cyanosis) 관찰됨. 구급대원 확인 시 이물은 육안으로 보이지 않는 상태에서 흡인하며 내원함."}], "flow": [{"no": "1", "cat": "ER 진입 및 초기 사정", "nursing": "BVM 배깅 받으며 진입한 환아 인수, 소생실 베드로 이송", "his": "의식 소실(Coma), 무호흡 상태. 흉부 함몰 심하며 청색증 극심.", "order": "즉각적인 고농도 산소 BVM 배깅, EKG 및 SpO2 모니터 부착", "vs": "48/26 - 42 (중증 서맥) - 4 - 36.5℃ - 55%", "rationale": "소아는 중증 저산소증 시 맥박이 분당 60회 미만으로 떨어지면 심정지 임박 신호이므로 즉각적인 순환 보조가 필요함."}, {"no": "2", "cat": "소아 CPR 개시", "nursing": "맥박 42회 확인 및 순환 부전으로 즉시 가슴압박 시작", "his": "심전도상 서맥 유지 중. 의료진 2인 이상이므로 15:2 비율로 압박/인공호흡 시행.", "order": "즉시 소아 가슴압박 개시, 좌측 정맥로(IO 또는 IV) 확보 시도", "vs": "서맥 유지 / 측정불가", "rationale": "소아 PALS 지침상 맥박 < 60회/분이고 순환 부전 시 가슴압박 적응증임. 구조자가 2인 이상일 때는 15:2 비율을 준수함."}, {"no": "3", "cat": "골수강 내 정맥로 (IO) 확보", "nursing": "소아 말초 정맥 확보 실패에 따른 즉각적인 골수강 내 선로 확보", "his": "소아는 심정지 쇼크 시 혈관이 완전히 허탈되므로 1분 이내 실패 시 바로 골수강(IO) 천자함.", "order": "우측 경골(Tibia) 부위 Intraosseous (IO) line 확보", "vs": "서맥에서 PEA로 이행 / 측정불가", "rationale": "소아 소생술에서 IV 확보로 시간을 지체해서는 안 됨. 골수강(IO)은 말초 정맥과 동일한 속도로 약물이 중앙 순환계로 전달됨."}, {"no": "4", "cat": "1차 소아 에피네프린 투여", "nursing": "체중(15kg) 계산에 맞춘 정확한 용량 골수강 내 투여", "his": "모니터상 맥박 소실되며 완전한 PEA(무맥박 전기활동) 진입 확인.", "order": "Epinephrine 0.15mg IO Pushing (15kg 기준: 0.01mg/kg), NS 5mL 플러시", "vs": "PEA / 측정불가", "rationale": "소아 심정지 약물 오더는 항상 체중 비례임. 에피네프린 1mg/1mL 앰플을 10배 희석($1:10,000$)하여 1.5 mL를 정확히 주입함."}, {"no": "5", "cat": "전문기도 확보 시도 (기도 이물)", "nursing": "의사가 직시하 후두경 검사로 기도 내 이물 탐색 및 제거", "his": "후두경 진입 시 성문(Glottis) 입구에 걸려있는 둥근 사탕 이물 발견. 마길 포셉(Magill forceps)으로 제거 성공.", "order": "비디오 후두경 가이드 하 Magill forceps 이용 이물 제거, 곧바로 기관내삽관", "vs": "PEA 유지 / 60% (BVM)", "rationale": "기도 폐쇄의 근본 원인(이물)을 제거해야만 공기가 폐로 들어갈 수 있음. 이물 제거 즉시 저산소증 해결을 위해 삽관 진행."}, {"no": "6", "cat": "기관내삽관 및 후두 부종 중재", "nursing": "성문 주변 심한 부종 확인 하에 소아용 튜브 삽입 및 약물 투여", "his": "소아용 4.5Fr 무낭(Uncuffed) 튜브로 기관내삽관 완료. 이물 자극으로 인한 성문 부종 극심함.", "order": "기관내삽관 성공 (깊이 12cm), 후두 부종 완화 위해 Dexamethasone 5mg IO", "vs": "PEA 유지 / 85% (배깅)", "rationale": "소아의 기도는 매우 좁아 이물 자극으로 인한 부종만으로도 재폐쇄가 일어날 수 있으므로 스테로이드(덱사메타손)를 투여해 부종을 가라앉힘."}, {"no": "7", "cat": "2차 에피네프린 투여", "nursing": "전문기도 확보 후 연속 가슴압박 유지하며 4분 경과 후 약물 추가", "his": "기관 삽관 후에는 가슴압박 연속(100~120회/분), 호흡은 2~3초마다 1회(분당 20~30회)로 전환.", "order": "Epinephrine 0.15mg IO 2차 투여", "vs": "PEA에서 Sinus 리듬으로 변화 조짐 / 92%", "rationale": "전문기도 확보 후에는 가슴압박과 호흡이 동기화될 필요가 없어 관류압 유리에 유리함. 3~5분 간격 약물 주기 준수."}, {"no": "8", "cat": "자발순환회복 (ROSC)", "nursing": "정상 Sinus 리듬 전환 및 대퇴동맥 맥박 강하게 확인", "his": "모니터상 분당 134회의 정상 빈맥 리듬 확인됨. 대퇴동맥 맥박 촉지됨. 가슴압박 중단.", "order": "가슴압박 즉시 중단, ROSC 선언, 바이탈 및 ABGA 확인", "vs": "94/52 - 134 - 24(Ambu) - 36.4℃ - 98%", "rationale": "산소 공급(이물 제거 및 삽관)이 재개되고 에피네프린이 순환하면서 지쳤던 소아 심근이 다시 스스로 뛰기 시작함."}, {"no": "9", "cat": "ROSC 후 호흡기 연동", "nursing": "소아 전용 인공호흡기 세팅 및 진정 약물 투여", "his": "환아 자발 맥박 안정적이나 자발 호흡 불규칙함. 튜브 파이팅 막기 위해 진정제 투여.", "order": "Midazolam 1.5mg IO slow, 소아용 벤틸레이터 연결 (PC-CMV 모드)", "vs": "96/54 - 130 - 24(Vent) - 36.4℃ - 99%", "rationale": "소아는 ROSC 후에도 저산소성 뇌손상을 방지하기 위해 과호흡이나 저호흡이 생기지 않도록 인공호흡기로 호흡수를 정밀 제어해야 함."}, {"no": "10", "cat": "저체온 치료 및 후속 검사", "nursing": "흉부 엑스레이 촬영", "his": "체온 36.4℃ 유지 중. 삽관 튜브 위치 확인 및 이물에 의한 폐 흡인 여부 확인 위해 엑스레이 시행.", "order": "Portable Chest X-ray, 응급 대동맥 혈액가스분석, 중환자실(ICU) 격리실 확인", "vs": "98/58 - 126 - 24(Vent) - 36.3℃ - 100%", "rationale": "삽관 튜브 끝이 기관분기부(Carina) 상단에 잘 위치했는지 확인하고, 뇌 보호를 위해 정상 체온($36\\sim37.5^\\circ\\text{C}$) 범위를 엄격히 유지함."}, {"no": "11", "cat": "PICU 이송 및 인계", "nursing": "소아 인공호흡기 및 모니터 유지 하에 중환자실로 전동", "his": "환아 약물 진정 상태 유지 양호하며 동공 반사 정상 회복됨. ICU 의료진에게 인계.", "order": "중환자실 입실 처방, 뇌 초음파 또는 Brain CT 스케줄링", "vs": "100/60 - 122 - 24(Vent) - 36.5℃ - 100%", "rationale": "호흡성 심정지는 원인(이물) 제거 후 뇌손상 제어가 관건임. 소아중환자실 간호사에게 심정지 시간(10분) 및 이물 제거 양상을 상세히 인계함."}], "debrief": ["\"소아는 바늘 찌르다 시간 다 간다. 무조건 골수강(IO) 준비!\": 신규 간호사들은 소아 환자가 오면 평소처럼 팔이나 발등의 얇은 혈관을 잡으려고 애쓰다가 골든타임을 놓칩니다. 소아 심정지 상황에서는 혈압이 안 잡히기 때문에 말초 IV가 거의 불가능합니다. \"소아 CPR 시 IV 시도는 딱 1번만 하고, 안 되면 즉시 주치의에게 골수강(IO) 드릴을 쥐여주어야 한다\"고 교육해야 합니다.", "\"에피네프린 용량 오류는 치명적이다\": 성인은 심정지 시 에피네프린 1amp(1mg)을 통째로 주지만, 15kg 소아에게 1mg을 주면 심장이 터지거나 뇌출혈이 발생합니다. 반드시 소아 전용 카트나 브로스공 테이프를 보고 1:10,000으로 희석된 주사용액에서 소수점 단위(1.5 mL=0.15 mg)로 정확히 재어 에어 없이 주입하는 훈련을 반복시켜야 합니다."], "id": "3-29"}, {"diff": "고급", "no": "9", "title": "소아 CHD VF", "desc": "[시나리오 9] 선천성 심질환(CHD) 환아의 심실세동(V-fib) 발생 및 제세동(Defibrillation) 소생 시나리오", "pname": "만 5세", "pdemo": "여아 / 체중 20 kg 가정", "info": [{"label": "연령/체중", "value": "만 5세 (여아 / 체중 20 kg 가정)"}, {"label": "주호소", "value": "\"심장 수술을 받았던 아이인데, 방금 전 거실에서 놀다가 갑자기 '가슴이 이상해' 하더니 툭 쓰러졌어요!\""}, {"label": "과거력", "value": "활로4징(Tetralogy of Fallot, TOF)으로 생후 1년 차에 본원에서 완전 교정술(Total Correction) 시행받은 이력 있음."}, {"label": "내원 당시 상태", "value": "어머니가 안고 응급실 문을 뛰어서 통과함. 의식 전혀 없고(Coma), 얕은 임종 흉식 호흡(Gasping)만 간헐적으로 관찰되며 중심성 청색증이 진행 중임."}], "flow": [{"no": "1", "cat": "ER 진입 및 초기 사정", "nursing": "소생실 베드로 환아 수평 이동 후 대퇴동맥 맥박 사정", "his": "의식 없음, 경동맥 및 대퇴동맥 맥박 없음. 임종 호흡 상태.", "order": "즉각적인 가슴압박(CPR) 시작, 모니터 패들/패치 부착 오더", "vs": "심정지 / 측정불가", "rationale": "선천성 심질환 환아의 돌연사는 치명적인 부정맥일 확률이 높으므로, 즉시 가슴압박을 치며 리듬 분석을 준비해야 함."}, {"no": "2", "cat": "1차 리듬 분석 (Shockable)", "nursing": "제세동 패치 부착 직후 가슴압박 멈추고 리듬 분석", "his": "모니터상 세밀하게 떨리는 전형적인 심실세동(V-fib) 파형 포착.", "order": "가슴압박 중단, 소아 제세동(Defibrillation) 40J 장전", "vs": "V-fib (심실세동) / 측정불가", "rationale": "소아 PALS 기준 최초 제세동 에너지는 2 J/kg임. 환아 체중 20kg이므로 40 J을 정확히 장전함."}, {"no": "3", "cat": "1차 제세동(Shock) 시행", "nursing": "충전 완료 확인 후 주변 안전 확보 및 충격 전달", "his": "\"모두 물러서세요\" 외친 뒤 환아 가슴에 40J 통전. 직후 리듬 확인 없이 즉시 압박 재개.", "order": "40J D 량에 맞춘 노레피네프린을 정밀 인퓨전함."}, {"no": "10", "cat": "심초음파 및 중환자실 콜", "nursing": "소아청소년과 스태프 소집 및 침상가 심초음파(ECHO) 확인", "his": "과거 수술 부위(TOF 교정 부위)의 급성 션트 기능 부전이나 패치 이탈 여부 긴급 스캔.", "order": "Portable Echocardiography, 중환자실(ICU) 격리 베드 즉시 지정", "vs": "96/54 - 118 - 22(Vent) - 36.4℃ - 100%", "rationale": "소아 심인성 심정지는 기존 구조적 심기형의 악화가 원인일 가능성이 매우 높으므로, 침상가 초음파로 원인을 즉시 감별해야 함."}, {"no": "11", "cat": "ICU 이송 및 정밀 인계", "nursing": "인공호흡기, 승압제, 아미오다론 유지 상태로 중환자실 전동 완료", "his": "환아 진정 약물 유지 하에 ICU 베드로 이동 완료. 모니터 연동 및 간호 인계 완수.", "order": "중환자실 입원 처치, 지속적 EKG 및 전해질(K+, Mg 모니터링", "vs": "98/56 - 116 - 22(Vent) - 36.5℃ - 100%", "rationale": "ICU 간호사에게 TOF 과거력, V-fib 발생 타임라인, 총 3회의 제세동 에너지 양, 아미오다론 주입 총량을 정밀하게 인계함."}], "debrief": ["\"소아 패들 크기와 위치 선택은 성인과 다르다!\": 신규 간호사들이 소아 제세동을 할 때 당황해서 성인용 대형 패치를 그냥 환아 가슴에 붙이다가 패치끼리 서로 닿아 합선(Arcing)을 일으키는 대형 사고를 냅니다. 체중 10~15kg 미만은 반드시 소아용 소형 패치를 써야 하며, 만약 앞 가슴 공간이 좁아 패치 간격이 3cm 이상 안 떨어진다면 '전-후면 부착 방식(Anterior-Posterior)'으로 앞가슴 정중앙과 등 뒤 날개뼈 사이에 붙여 전류가 심장을 관통하게 유도해야 한다고 손기술을 주입시켜야 합니다.", "\"아미오다론 주입 시 저혈압 쇼크 급변을 경계하라\": 불응성 V-fib에 아미오다론을 줄 때, 이 약물은 혈관을 확장시키는 특성이 있어 ROSC 직후 혈압을 급격하게 떨어뜨릴 수 있습니다. \"아미오다론이 들어간 뒤 ROSC가 되었다면, 심장 리듬이 돌아온 기쁨도 잠시, 바로 수축기 혈압이 무너질 것을 대비해 노레피네프린 승압제 라인을 옆에서 동시에 세팅하고 있어야 프로 간호사\"라고 가르쳐야 합니다."], "id": "3-30"}, {"diff": "고급", "no": "10", "title": "Normal Brady", "desc": "[시나리오 10] 증상이 없는 안정형 동서맥(Sinus Bradycardia) 환자의 소생실 관찰 및 내과 입원 시나리오", "pname": "김OO", "pdemo": "남성 / 66세", "info": [{"label": "성함", "value": "김OO (남성 / 66세)"}, {"label": "주호소", "value": "\"동네 의원에 당뇨 약 타러 갔는데 거기 의사 선생님이 맥박이 너무 느리다고 큰 병원 응급실로 가보라고 하셨어요. 저는 지금 아무렇지도 않아요.\""}, {"label": "과거력", "value": "10년 전 고혈압 및 당뇨 진단, 3개월 전부터 타원 변동으로 고혈압 약(Beta-blocker 성분 포함) 변경하여 복용 중."}, {"label": "특이사항", "value": "환자는 어지러움, 흉통, 호흡곤란, 실신 기왕력 등이 전혀 없으며, 피부색이 좋고 의식이 명료한 '안정형 서맥' 상태임."}], "flow": [{"no": "1", "cat": "초진 및 소생실 입실", "nursing": "외래 유입 처럼 보이나 맥박 34회 확인되어 즉시 소생실 중증 구역으로 침상 입실", "his": "의식 명료(Alert). 걸어서 입실함. 숨찬 기색이나 창백함 없음.", "order": "즉각적인 EKG 모니터링 적용, 정맥로 확보 오더", "vs": "124/
