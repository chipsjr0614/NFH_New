 "고칼륨혈증이나 급성 심근경색증에 의한 차단성 서맥이 아님을 혈액학적으로 최종 배제함."}, {"no": "8", "cat": "심장내과(Cardiology) 협진", "nursing": "소생실 주치의가 심장내과 당직의에게 환자 상태 보고 및 협진 처리", "his": "\"66세 남환, 약물성 의심되는 Sinus brady(HR 34회)이나 혈압 및 증상 안정적임\" 보고.", "order": "심장내과 공과(Consult) 발송, 집중관찰실 유지", "vs": "125/76 - 36 - 16 - 36.5℃ - 99%", "rationale": "응급 처치 대상은 아니지만, 지속적인 맥박 저하 시 영구 인공심박동기(PPM) 거치 필요성 판단을 위해 순환기내과 전문의 진료가 필요함."}, {"no": "9", "cat": "심장내과 의사 초진 및 플랜", "nursing": "내려온 심장내과 전공의/전임의가 환자 사정 후 입원 결정", "his": "환자 상태 및 EKG 재확인 후, 베타차단제 일시 중단 하에 24시간 심전도(Holter) 모니터링 위해 입원 플러그 지시.", "order": "순환기내과 일반병동(또는 심장중환자실 CCU) 입원 결정", "vs": "128/78 - 35 - 14 - 36.6℃ - 98%", "rationale": "병동 이송 중이나 입원 초기에 발생할 수 있는 원인 불명의 급격한 맥박 저하에 대비하여 모니터링 장비 구비된 병동 배정."}, {"no": "10", "cat": "입원 수속 및 간호 인계 준비", "nursing": "병동 침상 배정 확인 및 응급실 퇴실 수속 보조", "his": "심장내과 병동 배정 완료됨(베드 번호 확인). 입원 전 행정 절차 마무리.", "order": "입원 약속 처방 발행, 병동 간호사에게 전화 인계 시행", "vs": "124/74 - 34 - 15 - 36.5℃ - 99%", "rationale": "이송 중 환자 상태 급변을 방지하기 위해 이동식 모니터를 장착하고 이송 요원 및 간호사 동행 준비."}, {"no": "11", "cat": "병동 이송 및 전동 완료", "nursing": "포터블 모니터 장착 하에 바퀴의자 또는 베드로 병동 이송, 전동 완료", "his": "환자 혈압 안정적으로 유지되며 특이 증상 없이 안전하게 순환기내과 병동으로 인계됨.", "order": "응급실 퇴실 처리, 병동 모니터 연동", "vs": "122/76 - 35 - 16 - 36.5℃ - 98%", "rationale": "병동 담당 간호사에게 증상 없는 베타차단제 유발성 동서맥 상태와 응급실 체류 중 지속 안정적이었던 징후 인계함."}], "debrief": ["\"맥박 수치에 졸지 말고 환자의 얼굴(증상)을 봐라\": 신규 간호사들은 모니터에 맥박이 '32', '34'가 뜨면 손을 떨며 아트로핀부터 들고 뛰어옵니다. 하지만 ACLS 지침의 핵심은 ‘수치가 아니라 환자의 혈역학적 안정성(Symptomatic 여부)’입니다. 혈압이 120대로 짱짱하고 의식이 명료하며 흉통이 없다면 약물을 주지 않는 것이 정답입니다. 오히려 불필요한 아트로핀 투여는 빈맥을 유발해 심근 산소 소모량을 늘려 해가 될 수 있습니다.", "\"KVO 속도 엄수\": 서맥 환자는 심박출량(CO = HR × SV)이 떨어져 있는 상태이므로, 수액을 성인 기본 속도(80~120cc/hr)로 들이부으면 유입량을 심장이 감당하지 못해 급성 폐부종(Lung congestion)이 올 수 있습니다. 혈압이 정상이면 반드시 KVO(20cc/hr) 속도로 라인만 유지하도록 세팅을 확인시켜야 합니다."], "id": "3-31"}, {"diff": "고급", "no": "11", "title": "Unstable brady-Atropine", "desc": "[시나리오 11] 불안정형 서맥(Unstable Bradycardia) 환자의 아트로핀(Atropine) 투여 및 소생 성공 시나리오", "pname": "박OO", "pdemo": "여성 / 74세", "info": [{"label": "성함", "value": "박OO (여성 / 74세)"}, {"label": "주호소", "value": "\"어지럽고 메스껍다고 하시더니 갑자기 스르륵 쓰러지면서 식은땀을 비 오듯 흘려요!\" (보호자 진술)"}, {"label": "과거력", "value": "만성 신부전(CKD Stage 3), 고혈압으로 약물 복용 중."}, {"label": "내원 당시 상태", "value": "119 구급대 침대에 눕혀져 소생실로 직행함. 의식은 기면(Drowsy) 상태로 말을 걸면 간신히 눈만 떴다 감으며, 전신에 차고 축축한 식은땀(Clammy skin)이 가득하고 말초 청색증이 관찰됨."}], "flow": [{"no": "1", "cat": "초기 진입 및 중증도 사정", "nursing": "소생실 입실 즉시 의식 및 맥박 동시 사정, 모니터 부착", "his": "의식 Drowsy, 자극에 신음만 함. 대퇴동맥 맥박이 매우 느리고 약하게 촉지됨.", "order": "즉시 모니터링 장착, 산소 5L/min 투여, IV 라인 확보", "vs": "74/42 - 32 (심한 서맥) - 20 - 35.8℃ - 89% (RA)", "rationale": "수축기 혈압이 90 이하이면서 의식 저하와 식은땀을 동반한 '불안정형 서맥' 상태이므로 즉각적인 처치 준비가 필요함."}, {"no": "2", "cat": "산소 공급 및 라인 확보", "nursing": "비강 캐뉼라로 산소 투여 시작, 좌측 전주와정맥 18G 확보", "his": "산소 투여 후 SpO2 96%로 상승 유도. 굵은 정맥로(18G)를 통해 신속한 약물 주입로 확보.", "order": "비강 캐뉼라 5L/min 공급, Atropine 1mg IV Pushing 즉시 준비", "vs": "76/44 - 31 - 18 - 35.9℃ - 96% (O2)", "rationale": "ACLS 가이드라인상 불안정형 서맥의 1차 선택 약물은 아트로핀 1mg임 (과거 0.5mg에서 최근 지침은 1mg으로 강도 상향)."}, {"no": "3", "cat": "12유도 심전도 및 아트로핀 1차 투여", "nursing": "12유도 심전도 신속 촬영과 동시에 아트로핀 1차 투여", "his": "EKG상 P파와 QRS의 연결이 완전히 끊어진 전형적인 3도 방실차단(Complete AV Block) 포착.", "order": "Atropine 1mg IV Pushing 1회차 시행, 수액 0.9% NS 바짝 loading", "vs": "72/40 - 30 - 19 - 35.8℃ - 97%", "rationale": "3도 방실차단은 하위 조율기(Pacemaker)에 의존하므로 아트로핀 반응성이 낮을 수 있으나, 가이드라인에 따라 페이싱 준비와 함께 1차 투여를 선행함."}, {"no": "4", "cat": "약물 투여 후 반응 평가 (3분 간격)", "nursing": "아트로핀 투여 후 3분간 모니터 및 혈압 집중 관찰", "his": "투여 후 3분이 경과했으나 맥박 32회, 혈압 75/43 mmHg로 전혀 변동 없고 증상 지속됨.", "order": "Atropine 1mg IV Pushing 2회차 추가 투여, 경피적 페이싱(TCP) 장비 침상가 대기", "vs": "75/43 - 32 - 18 - 35.9℃ - 97%", "rationale": "아트로핀은 효과가 없을 경우 3~5분 간격으로 반복 투여할 수 있으며, **최대 총량은 3mg(총 3회)**임."}, {"no": "5", "cat": "아트로핀 3회차(최대량) 투여", "nursing": "2회차 투여 후에도 반응 없어 즉시 3회차 투여 및 플랜 B 가동", "his": "맥박 31회 유지. 아트로핀 최대 총량(3mg)에 도달하는 순간임. 혈압 여전히 쇼크 상태.", "order": "Atropine 1mg IV Pushing 3회차 시행, 노레피네프린 대량 인퓨전 믹스 처방", "vs": "73/41 - 31 - 19 - 35.8℃ - 96%", "rationale": "아트로핀 최대량 투여 중에도 반응이 없으면 지체 없이 2차 약물(Epinephrine 또는 Dopamine 인퓨전)이나 경피적 페이싱으로 넘어가야 함."}, {"no": "6", "cat": "극적인 약물 반응 (반응 발현)", "nursing": "3회차 주입 완료 약 1분 뒤, 모니터 리듬의 급격한 변화 포착", "his": "완고하던 서맥 리듬이 갑자기 좁은 QRS의 정상 동성 리듬으로 전환되며 맥박이 치솟음.", "order": "약물 추가 중단, 바이탈 사인 1분 간격 재측정", "vs": "112/68 - 84 (동성 리듬) - 16 - 36.1℃ - 99%", "rationale": "아트로핀이 미주신경을 차단하고 방실결절(AV node) 전도력을 극적으로 회복시키면서 자발 맥박과 심박출량이 정상화됨."}, {"no": "7", "cat": "혈역학적 지표 및 의식 개선 확인", "nursing": "환자의 의식 상태 재평가 및 식은땀 소실 확인", "his": "환자가 눈을 번쩍 뜨며 \"아이고 이제 살겠네, 아까는 눈앞이 캄캄하더니...\" 하며 의식 Alert로 회복됨.", "order": "산소 2L/min으로 감량, 실시간 바이탈 감시 주기 5분으로 변경", "vs": "118/72 - 86 - 15 - 36.2℃ - 100%", "rationale": "심박수가 80대 수준으로 올라오면서 뇌관류압(CPP)이 즉각적으로 복구되어 기면 상태의 의식이 명료해진 것임."}, {"no": "8", "cat": "원인 분석 (고칼륨혈증 감별)", "nursing": "만성 신부전 과거력 고려하여 응급 ABGA 및 전해질 결과 확인", "his": "ABGA상 Potassium 4.8 mEq/L로 약한 상승이나 치명적 수준은 아님을 확인.", "order": "수액 속도 60cc/hr로 조절, 지속 모니터링", "vs": "120/74 - 82 - 14 - 36.2℃ - 100%", "rationale": "신부전 환자의 서맥은 고칼륨혈증이 주원인인 경우가 많으므로 칼슘이나 인슐린 투여가 필요한지 랩을 통해 신속히 감별함."}, {"no": "9", "cat": "심장내과(Cardiology) 긴급 연락", "nursing": "EKG상 한때 3도 방실차단이 발생했던 환자이므로 내과 당직의 호출", "his": "\"3도 AV block으로 인한 언스테이블 서맥이었으나 아트로핀 총 3mg 투여 후 반응하여 현재 정상 바이탈\" 보고.", "order": "심장내과 협진, 필요시 임시형 인공심박동기(TPI) 세트 준비", "vs": "122/75 - 80 - 15 - 36.3℃ - 100%", "rationale": "아트로핀으로 일시적인 전도력은 회복했으나, 기저 전도계 퇴행성 질환일 가능성이 높아 응급 TPI(Temporary Pacemaker) 거치 대비가 필요함."}, {"no": "10", "cat": "안전 지대 유지 및 입원 결정", "nursing": "소생실 내에서 모니터를 유지하며 내과 중환자실(CCU) 베드 확보", "his": "심장내과 교수 확인 하에 일시적 차단 재발 위험성이 높아 CCU(심장중환자실) 집중 감시 입원 결정됨.", "order": "심장중환자실(CCU) 입원 오더 및 동의서 작성", "vs": "124/76 - 84 - 16 - 36.4℃ - 99%", "rationale": "아트로핀의 반감기(약 2~3시간)가 지나면 다시 방실차단 및 서맥 쇼크가 재발할 수 있으므로 중환자실 관찰이 절대 필수적임."}, {"no": "11", "cat": "CCU 이송 및 밀착 인계", "nursing": "이동식 모니터 및 페이싱 패드를 지참한 상태로 인턴, 간호사 동행 이송", "his": "환자 상태 명료하고 혈압 안정적인 상태로 CCU 베드 안착 및 정밀 인계 완수.", "order": "응급실 퇴실 처리, CCU 모니터 이관 완료", "vs": "120/72 - 82 - 15 - 36.5℃ - 100%", "rationale": "CCU 간호사에게 내원 당시 3도 방실차단 상태, 아트로핀 총 3mg(최대량) 투여 타임라인, 주입 후 극적 회복 과정 상세 인계."}], "debrief": ["\"아트로핀 투여 후 시계(3분)를 철저히 봐라\": 신규 간호사들은 마음이 급해서 아트로핀을 주자마자 \"선생님 안 올라와요!\" 하며 1분 만에 다음 약을 주려고 하거나, 반대로 다른 일에 치여 10분이 지나도록 방치하기도 합니다. 아트로핀은 정확히 3~5분 간격으로 반응을 재평가하고 연속 투여해야 효과적인 체내 농도가 유지된다는 점을 머리에 박아주어야 합니다.", "\"최대 총량 3mg 제한의 의미를 교육하라\": 아트로핀을 3mg(1mg씩 3회) 이상 과량 투여하게 되면 미주신경 차단 효과는 더 이상 증가하지 않고, 오히려 항콜린성 부작용(심한 입마름, 시야 흐림, 섬망, 소변 정체) 및 역설적 빈맥을 유발해 심장을 망가뜨릴 수 있습니다. 따라서 3회 투여 후에도 반응이 없으면 \"아트로핀은 끝났으니 빨리 페이싱 패치를 붙이거나 노레피네프린/도파민 라인을 켜야 한다\"는 위기 대응 흐름을 주입시켜야 합니다."], "id": "3-32"}, {"diff": "고급", "no": "12", "title": "Unstable b - TCP, TPM", "desc": "[시나리오 12] 아트로핀 불응성 서맥 쇼크 환자의 경피적 페이싱(TCP) 가동 및 소생 시나리오", "pname": "최OO", "pdemo": "남성 / 79세", "info": [{"label": "성함", "value": "최OO (남성 / 79세)"}, {"label": "주호소", "value": "\"방에서 쉬고 계셨는데 갑자기 쿵 소리가 나서 가보니 정신을 못 차리고 온몸이 시체처럼 차가워요!\" (가족 진술)"}, {"label": "과거력", "value": "영구형 인공심박동기(PPM) 삽입 권유를 받았으나 거부함, 고혈압 및 허혈성 심질환(협심증) 기저질환자."}, {"label": "내원 당시 상태", "value": "119 구급대 완화 보조(BVM 산소 투여) 하에 소생실로 진입함. 의식은 혼미(Stupor) 상태로 꼬집어도 신음소리만 겨우 내며, 혈압 측정 불가(Unmeasurable) 수준의 중증 심원성 쇼크 상태임."}], "flow": [{"no": "1", "cat": "초기 진입 및 중증 쇼크 포착", "nursing": "소생실 입실 즉시 의식 사정 및 모니터 부착, 혈압 측정 시도", "his": "의식 Stupor. 자극에 반응 거의 없음. 경동맥만 간신히 매우 느리게 촉지됨.", "order": "모니터 가동, 산소 리저버 마스크 15L, 양측 18G Line 확보", "vs": "50/30 (측정 불가 수준) - 24 (극심한 서맥) - 22 - 35.5℃ - 84% (RA)", "rationale": "수축기 혈압 50 이하의 뇌관류압 상실 상태로, 한 치만 지체해도 심정지(Asystole)로 진행될 초위급 상황임."}, {"no": "2", "cat": "12유도 심전도 및 아트로핀 실패", "nursing": "12유도 심전도 촬영과 동시에 아트로핀 1mg 정맥 투여", "his": "EKG상 '고도 방실차단(3rd AV Block)' 확인. 아트로핀 1mg 투여했으나 맥박 24회로 전혀 무반응.", "order": "12-Lead EKG, Atropine 1mg IV Pushing 처방", "vs": "52/32 - 24 - 20 - 35.6℃ - 95% (O2)", "rationale": "고도 방실차단이나 3도 차단은 하부 조율기 부위의 차단이 많아 아트로핀(미주신경 차단제) 효과가 거의 없으므로 빠른 페이싱 준비가 병행되어야 함."}, {"no": "3", "cat": "아트로핀 3mg 최대량 불응 확인", "nursing": "3분 간격으로 아트로핀 총 3mg까지 신속 투여했으나 리듬과 바이탈에 아무런 변화 없음", "his": "아트로핀 총 3회 주입 완료. 모니터는 여전히 분당 24회의 심각한 서맥 유지. 환자 청색증 심화.", "order": "아트로핀 중단, 즉시 경피적 페이싱(TCP) 가동 오더", "vs": "48/28 - 24 - 24 - 35.4℃ - 94%", "rationale": "약물 불응성 불안정형 서맥의 유일한 생존 대안은 전기적으로 심장을 뛰게 하는 경피적 페이싱(Transcutaneous Pacing)임."}, {"no": "4", "cat": "페이싱 패드 부착 및 모니터 설정", "nursing": "제세동기 패드를 환자 전후면(Anteroposterior)에 밀착 부착 후 Pacing 모드 전환", "his": "전면(좌측 흉부 하부) 및 후면(좌측 견갑골 아래)에 패드 부착. 제세동기를 [PACING] Mode로 세팅.", "order": "Rate(목표 심박수) 60회/min, Output(전류) 0mA에서 시작 설정", "vs": "50/30 - 24 - 22 - 35.5℃ - 95%", "rationale": "하위 조율기 마비를 고려해 목표 속도는 안정적인 60~70회로 설정하고, 전기 자극 강도는 0mA부터 서서히 올림."}, {"no": "5", "cat": "전류량(Output) 증폭 및 Capture 포착", "nursing": "전류량을 10mA씩 올리며 모니터 파형과 자발 맥박 동기화 확인", "his": "70mA 도달 시, 전기적 자극(Spike) 직후 넓은 QRS 파형이 100% 매칭되는 전기적 포착(Electrical Capture) 포착.", "order": "Output 70mA 유지, 실제 대퇴동맥 맥박 일치 여부 확인", "vs": "55/34 - 60 (Pacing) - 20 - 35.6℃ - 96%", "rationale": "모니터에 파형이 나온다고 끝이 아님. 전기 자극이 실제 심장 근육을 수축시켜 피를 뿜고 있는지 대퇴동맥(Femoral)을 짚어 일치(Mechanical Capture)하는지 확인해야 함."}, {"no": "6", "cat": "페이싱 안전 역치(Threshold) 설정", "nursing": "포착 전류량보다 10mA 높여 안정적인 페이싱 유지", "his": "전기/기계적 포착이 확인된 70mA에서 안전계수를 더해 80mA로 출력 고정함.", "order": "Output 80mA 고정 유지 오더", "vs": "94/56 - 60 (안정) - 18 - 35.7℃ - 98%", "rationale": "이송이나 환자 움직임으로 페이싱이 풀리는 것을 막기 위해, Capture가 시작된 전류량(Threshold)보다 10~20mA 높여서 유지함."}, {"no": "7", "cat": "진통 진정제 투여 (통증 조절)", "nursing": "페이싱 전류 자극으로 인한 환자의 가슴 들썩임 및 통증 사정", "his": "혈압이 오르며 의식이 살짝 돌아오는 환자가 전기 충격으로 괴로워함. 수축기 혈압 90 이상 확인 후 진정제 투여.", "order": "Fentanyl 50mcg IV 천천히 처방", "vs": "96/58 - 60 - 16 - 35.8℃ - 99%", "rationale": "경피적 페이싱은 흉벽에 수십 mA의 전류를 지속적으로 주기 때문에 환자에게 극심한 통증을 유발함. 혈압이 허용하는 한 진통제(Fentanyl 등) 투여가 필수적임."}, {"no": "8", "cat": "혈역학적 지표 대폭 개선", "nursing": "TCP 가동 5분 후 바이탈 최종 안정화 및 의식 사정", "his": "혈압이 100대로 복구되며 환자의 의식이 기면(Drowsy)에서 명료(Alert) 직전으로 크게 개선됨. 식은땀 멈춤.", "order": "지속적인 TCP 유지, 2차 승압제(Dopamine) 믹스 대기", "vs": "104/64 - 60 - 15 - 36.0℃ - 100%", "rationale": "강제 페이싱을 통해 심박출량이 확보되자 쇼크 상태였던 전신 장기와 뇌로 혈류 공급이 재개된 결과임."}, {"no": "9", "cat": "심장내과(Cardiology) 초응급 콜", "nursing": "소생실 주치의가 내과 당직의 및 중환자실 실시간 핫라인 연락", "his": "\"79세 남환 고도 방실차단 쇼크, 아트로핀 불응하여 현재 TCP 60회/80mA 적용 중으로 즉시 임시 심박동기 필요\" 보고.", "order": "심장내과 응급 시술(TPI) 및 CCU 입원 확정", "vs": "108/66 - 60 - 16 - 36.1℃ - 100%", "rationale": "경피적 페이싱(TCP)은 임시방편(가슴 통증 및 피부 화상 위험)이므로, 즉시 대퇴정맥 등을 통해 심장 안으로 전극선을 넣는 경정맥 페이싱(TPI) 시술로 넘어가야 함."}, {"no": "10", "cat": "안전지대 유지 및 인계 서류 작성", "nursing": "제세동기 전원선 연결 상태 확인, 배터리 잔량 및 패드 밀착 상태 재점검", "his": "이송 중 배터리 아웃을 방지하기 위해 장비 완충 확인. 병동/시술실 인계 전산 작성.", "order": "응급실 퇴실 및 혈관조영실(Angio room) 직행 준비", "vs": "110/68 - 60 - 14 - 36.2℃ - 100%", "rationale": "TCP 기기가 꺼지거나 패드가 떨어지면 그 즉시 다시 맥박이 20회대로 추락하며 어레스트가 오므로 밀착 감시가 요구됨."}, {"no": "11", "cat": "안지오실(Angio) 이송 및 시술 연계", "nursing": "제세동기를 포터블 모드로 전환하여 소생실 의료진 전원 동행 하에 혈관조영실로 이송, 전동 완료", "his": "페이싱 중단 없이 안전하게 이송하여 심장내과 교수팀에게 TPI 시술을 위한 정밀 인계 완료.", "order": "Angio room 인계 완료 및 응급실 HIS 마감", "vs": "106/64 - 60 - 15 - 36.4℃ - 100%", "rationale": "앙지오실 도착 즉시 내과 의료진과 함께 임시형 경정맥 인공심박동기(TPI) 인퓨전 선 연동 및 TCP 탈착 성공함."}], "debrief": ["1. \"모니터 파형에 속지 말고 반드시 대퇴동맥을 짚어라\": 신규 간호사들이 가장 많이 하는 실수가 제세동기 화면에 페이싱 스파이크 뒤로 QRS 파형(Electrical Capture)이 예쁘게 뜨면 소생이 다 된 줄 알고 안심하는 것입니다. 그러나 심장 근육이 너무 지쳐있거나 패드가 제대로 안 붙으면 전기 신호만 모니터에 잡히고 실제 심장은 펌프질을 안 할 수 있습니다. 반드시 대퇴동맥(Femoral artery)이나 요골동맥을 직접 손으로 짚어서 모니터의 Pacing Rate(60회)와 똑같이 뛰는지 '기계적 포착(Mechanical Capture)'을 내 눈과 손으로 검증해야 한다고 가르쳐야 합니다.", "2. \"수축기 혈압 90 넘으면 즉시 통증 조절 처방을 유도하라\": TCP는 환자 가슴에 생으로 전기 충격을 매 분당 60회씩 계속 꽂는 처치입니다. 의식이 조금이라도 있는 환자는 \"가슴을 도끼로 찍는 것 같다\"며 발버둥을 치는데, 이 때문에 패드가 떨어지면 바로 어레스트입니다. 따라서 TCP 자극이 성공하여 수축기 혈압이 90 mmHg 이상으로 올라와 마진이 생기는 즉시, 주치의에게 펜타닐이나 모르핀 같은 마약성 진통제 처방을 적극적으로 건의(Advocate)하여 환자를 안정시켜야 유지가 가능합니다."], "id": "3-33"}, {"diff": "고급", "no": "13", "title": "Normal Tachy", "desc": "[시나리오 13] 안정형 발작성 상심실성 빈맥(PSVT) 환자의 발살바 조작(Valsalva) 및 순환기내과 입원 예정 시나리오", "pname": "최OO", "pdemo": "여성 / 28세", "info": [{"label": "성함", "value": "최OO (여성 / 28세)"}, {"label": "주호소", "value": "\"갑자기 한 시간 전부터 심장이 툭 떨어지는 느낌이 들더니, 그 뒤로 멈추지 않고 미친 듯이 뛰어요. 숨이 약간 차요.\""}, {"label": "과거력", "value": "1년 전에도 유사한 증상으로 로컬 의원에서 약을 먹은 적이 있으나, 정밀 검사는 받지 않음. 카페인 민감성 있음."}, {"label": "특이사항", "value": "가슴 두근거림(Palpitation) 외에 어지러움, 식은땀, 실신 징후는 없으며, 의식이 아주 명료하고 혈압이 정상 범위인 '안정형 상심실성 빈맥' 상태임."}], "flow": [{"no": "1", "cat": "초진 및 소생실 입실", "nursing": "외래 접수대에서 빈맥 확인되어 소생실 침상으로 즉시 안내 및 모니터 장착", "his": "의식 명료(Alert). 빈맥으로 인해 다소 불안해하나 의사소통 명확함. 말초 순환 양호.", "order": "즉각적인 EKG 모니터링 적용, 12유도 심전도 오더", "vs": "118/72 - 168 (심한 빈맥) - 20 - 36.6℃ - 98% (RA)", "rationale": "맥박이 150회 이상인 경우 심실 충만 시간 단축으로 순간적인 혈압 추락이 올 수 있으므로, 증상이 경미해도 소생실 감시가 원칙임."}, {"no": "2", "cat": "12유도 심전도 촬영 (PSVT 확진)", "nursing": "움직임을 최소화하여 12유도 심전도 촬영 후 주치의 공유", "his": "EKG 결과: QRS 폭이 좁고(Narrow QRS), P파가 T파에 묻혀 보이지 않는 전형적인 PSVT 양상.", "order": "12-Lead EKG 확정 판독, 우측 상지 20G 정맥로 확보", "vs": "116/70 - 168 - 18 - 36.5℃ - 99%", "rationale": "좁은 QRS 빈맥 중 가장 규칙적인 파형을 보이는 PSVT(발작성 상심실성 빈맥)를 감별 진단하여 향후 처치의 방향을 결정함."}, {"no": "3", "cat": "정맥로 확보 및 수액 연결", "nursing": "우측 전완부에 20G 라인 개통 후 생리식염수 연결", "his": "혈관 확보 완료. 미주신경 자극 실패 시 아데노신 투여를 염두에 두고 라인을 확보함.", "order": "0.9% NS 500mL 연동 (KVO 속도), 응급 기본 랩 STAT", "vs": "114/72 - 165 - 19 - 36.5℃ - 99%", "rationale": "치료적 중재(약물 또는 발살바 등) 시 발생할 수 있는 일시적 아레스트나 미주신경 실신에 대비해 정맥로 확보는 필수임."}, {"no": "4", "cat": "혈역학적 안정성 재평가", "nursing": "ACLS 빈맥 알고리즘에 따른 '불안정 징후' 유무 최종 스캔", "his": "저혈압, 의식 변화, 쇼크 징후, 흉통, 급성 심부전 증상이 모두 없음을 재확인 (안정형 확인).", "order": "비약물성 치료인 변형 발살바 조작(Modified Valsalva) 준비", "vs": "120/74 - 166 - 18 - 36.4℃ - 98%", "rationale": "혈역학적으로 안정한 좁은 QRS 빈맥(PSVT)의 1차 처치는 약물이 아닌 미주신경 자극 요법(Vagal Maneuver)임."}, {"no": "5", "cat": "변형 발살바 조작 시행 (1단계)", "nursing": "환자에게 주입용 10cc 시링지를 주고 피스톤을 강하게 밀어 불도록 교육", "his": "환자를 침대에 반쯤 앉힌(Semi-Fowler) 상태에서 15초 동안 시링지를 강하게 불도록 유도함.", "order": "Valsalva Maneuver 시행 보조, 모니터 리듬 밀착 관찰", "vs": "122/76 - 165 (변화 없음) - 22 - 36.5℃ - 98%", "rationale": "흉강 내압을 높여 대동맥궁의 압수용기를 자극함으로써 미주신경(Vagus nerve) 부교감신경계를 활성화하는 과정임."}, {"no": "6", "cat": "변형 발살바 조작 완료 (2단계)", "nursing": "불기가 끝나자마자 환자를 눕히고 양다리를 45도 들어 올림", "his": "15초 송풍 직후, 환자를 앙와위로 눕히며 간호사가 환자의 양다리를 위로 치켜들어 정맥 환류량 증폭시킴.", "order": "변형 발살바 2단계 포지셔닝 유지 (15초 간)", "vs": "118/74 - 164 ➔ 82 (극적 전환) - 16 - 36.5℃ - 99%", "rationale": "침대를 눕히고 다리를 드는 '변형 발살바 법'은 일반 발살바보다 방실결절(AV node) 전도를 차단해 정상 리듬으로 돌리는 성공률이 2배 이상 높음."}, {"no": "7", "cat": "정상 동성 리듬(NSR) 전환 확인", "nursing": "모니터 리듬이 순식간에 떨어지며 P파가 살아난 정상 리듬 포착", "his": "맥박이 분당 80회대로 급격히 툭 떨어지며 정상 동성 리듬으로 성공적으로 복구됨.", "order": "가슴 두근거림 호전 여부 사정, 15분 간격 바이탈 전환", "vs": "116/70 - 82 (정상 동성 리듬) - 15 - 36.5℃ - 100%", "rationale": "미주신경 자극이 방실결절의 회귀 회로(Reentry circuit)를 차단하여 부정맥을 종결시키고 정상 율동을 찾아옴."}, {"no": "8", "cat": "환자 증상 호전 및 주관적 평가", "nursing": "환자에게 현재 가슴 상태 질문 및 안심 도모", "his": "환자가 \"어머, 이제 가슴이 안 뛰고 숨쉬기 너무 편해요\"라며 심리적 안정 상태로 복귀함.", "order": "안심 간호 제공, 기본 채혈 결과 전산 모니터링", "vs": "118/72 - 80 - 14 - 36.6℃ - 100%", "rationale": "부정맥 리듬이 전환되면 즉각적으로 심박출량이 정상화되어 흉부 압박감 및 숨찬 증상이 씻은 듯 사라짐."}, {"no": "9", "cat": "순환기내과(Cardiology) 외래 협진 및 내원", "nursing": "소생실 주치의가 순환기내과 당직의에게 리듬 전환 성공 보고 및 외래/입원 조율", "his": "\"28세 여환, PSVT 내원했으나 변형 발살바로 아데노신 없이 NSR 회복함\" 보고.", "order": "순환기내과(심장내과) 협진 처리, 향후 스케줄링", "vs": "120/74 - 78 - 14 - 36.5℃ - 99%", "rationale": "PSVT는 재발률이 높고 근본 원인(부전도로)을 제거하려면 전기생리학 검사(EPS) 및 전도자 절제술(RFCA)을 위한 내과 플랜이 필요함."}, {"no": "10", "cat": "순환기내과 입원 결정 (정밀 검사 플랜)", "nursing": "심장내과 스태프 지시에 따라 EPS/RFCA 시술 스케줄 조율 및 입원장 접수", "his": "환자의 재발 이력 고려하여, 금주 내 전도자 절제술(RFCA) 진행을 위해 순환기내과 병동 일반실 입원 예정으로 접수 완료.", "order": "순환기내과 일반병동 입원 결정, 입원 대기 처방", "vs": "122/75 - 76 - 15 - 36.4℃ - 100%", "rationale": "당장 응급 상황은 종결되었으나, 외래를 통해 다시 잡으려면 시간이 걸리므로 응급실을 통해 단기 정밀 검사 입원으로 연계함."}, {"no": "11", "cat": "병동 입원 대기 및 안전 이송 구역 인계", "nursing": "입원 수속 안내 완료 후, 원무과 베드 컨펌 대기하며 환자 상태 최종 확인", "his": "환자 바이탈 완벽히 안정적이며, 증상 재발 없는 상태로 입원실 배정 대기 구역으로 안전하게 인도함.", "order": "응급실 대기 구역 이송, 지속 관찰", "vs": "120/72 - 78 - 16 - 36.5℃ - 100%", "rationale": "입원실 올라가기 전까지 재발 가능성을 열어두고 환자에게 가슴이 다시 뛰면 즉시 벨을 누르도록 교육 후 인계함."}], "debrief": ["\"그냥 침대에서 숨 참으라고 하는 건 옛날 방식이다\": 과거에는 코를 막고 숨을 참으라고만(Valsalva) 유도해서 성공률이 5~20% 미만으로 낮았습니다. 최근 임상 지침은 주사기를 불게 한 뒤 즉시 상체를 눕히고 다리를 수직으로 들어 올리는 '변형 발살바(Modified Valsalva)'를 표준 to NCU)", "vs": "118/72 - 80 - 14 - 99%", "rationale": "이송 도중 리듬 급변이나 재발 시 즉각 대처할 수 있도록 전문 간호사가 밀착 동행하여 인수인계함."}], "debrief": ["① 발작 환자의 첫 번째 간호 우선순위: 안전(Safety)과 기도(Airway)", "근거: 발작이 일어나는 동안 환자를 억제(Restraint)하기 위해 몸을 강제로 누르면 근육 파열이나 골절을 유발할 수 있습니다. 난간에 부딪히지 않도록 패딩을 대주는 것이 최선입니다. 또한, 흡인성 폐렴을 막기 위해 고개를 측면으로 돌려 분비물이 흘러나오게 해야 하며, 설압자 등을 입에 강제로 집어넣는 행위는 치아 손상 및 기도 폐쇄를 유발하므로 절대 금기입니다.", "② 아티반(Lorazepam) 투여 시 속도 준수 및 호흡 부작용 감시", "근거: 로라제팜은 벤조디아제핀계 약물로 과흥분된 뇌 세포를 빠르게 진정시키지만, 동시에 중추성 호흡 억제(Respiratory depression)를 유발할 수 있습니다. 1분당 2mg을 넘지 않도록 천천히 주입해야 하며, 주입 직후 환자가 숨을 쉬는지(무호흡 여부) 모니터의 Resp rate와 SpO2를 아주 예민하게 관찰해야 합니다.", "③ 2차 항경련제(Loading)의 필연성", "근거: 1차 약물인 아티반은 효과가 빠르지만 대사 속도가 빨라 30분~1시간 이내에 효과가 사라집니다. 따라서 환자가 깨어나기 전에 레베티라세탐(Keppra)이나 페니토인(Phenytoin) 같은 장기 작용 항경련제를 즉시 부하 주량(Loading dose)으로 투여해야 소생실이나 이송 중에 발생하는 2차, 3차 연쇄 발작을 차단할 수 있습니다.", "\"선생님, 모든 발작이 사지를 떨지는 않습니다\" (유형별 특징 숙지): 주니어 간호사들은 대발작(GTC)만 발작이라고 생각하기 쉽습니다. 디브리핑 시, 제시된 표의 내용을 바탕으로 임상 현장에서 마주할 수 있는 다양한 발작 패턴을 교육해야 합니다.", "의식 소실 없이 입꼬리나 한쪽 손만 까딱거린다면 단순 부분 발작이므로 환자를 안심시키며 라인을 잡아야 합니다.", "응급실 침상에 멍하니 앉아 눈 초점 없이 입맛을 쩝쩝 다시거나 옷가지를 반복적으로 만지작거린다면 복합 부분 발작(Complex partial)이므로 억제하지 말고 다치지 않게 지켜봐야 합니다.", "특히 무기력 발작(Atonic)의 경우, 순간적으로 전신 근육에 힘이 툭 빠지면서 고꾸라지기 때문에 안면부나 두부 외상을 동반해 내원하는 경우가 많아, 내원 즉시 경추 보호(C-colar)가 필요할 수 있음을 상기시킵니다.", "시간 체크의 엄격성: 발작 간호에서 가장 중요한 것은 \"몇 분 동안 떨었는가\"입니다. 발작이 5분 이상 지속되거나, 의식이 돌아오지 않은 상태에서 연달아 발작이 일어나면 이는 응급 의료 체계상 뇌전증지속증(Status Epilepticus)으로 정의되며, 이때부터는 분 단위로 뇌 세포가 괴사합니다. 소생실 입실 시점부터 발작이 완전히 멈춘 시점을 초시계 보듯 정확히 기록하는 습관을 강조해야 합니다."], "id": "4-44"}, {"diff": "프셉마음", "no": "48", "title": "열성경련", "desc": "48. 소아 열성 경련(Febrile Convulsion) 환아의 해열 간호 및 소아청소년과 병동 입원 간호", "pname": "이OO (남성 / 생후 8개월) / 체중: 보호자가 정확히 모름", "pdemo": "Broselow Tape 적용 결과 약 8kg", "info": [{"label": "성함", "value": "이OO (남성 / 생후 8개월) / 체중: 보호자가 정확히 모름 (Broselow Tape 적용 결과 약 8kg)"}, {"label": "주호소", "value": "내원 30분 전 가정에서 갑자기 눈이 위로 돌아가며 2분간 전신을 격하게 떠는 증상 발생, 119 구급대 통해 이송됨."}, {"label": "과거력", "value": "특이 기저질환 없으나 최근 감기 증상으로 경구 감기약 완료되고 혈역학적 안정을 지녀, 후속 모니터링을 위해 소생실 격리를 해제하고 일반 관찰 구역으로 이송함."}, {"no": "8", "cat": "혈당 재측정", "nursing": "이송 후 추적 BST 160 mg/dL확인 및 기초 수액 유지", "his": "30분 만에 재측정한 BST 160으로 안전권 진입 확인, 반동성 저혈당 감시", "order": "10% DW 기초 수액 주입 속도 유지 (60cc/hr)", "vs": "126/74 - 78 - 14 - 99%", "rationale": "50% DW 주입 후 일시적 급상승 뒤 다시 급격히 떨어지는 **반동성 저혈당(Rebound)**을 막기 위해 포도당 포함 기초 수액을 지속 주입함."}, {"no": "9", "cat": "협진 후 퇴원", "nursing": "내분비내과 컨설트 회신 확인 및 퇴원 교육 후 귀가", "his": "인슐린 용량 조절 및 외래 f/u 오더 수령, 환자/보호자 저혈당 예방 교육", "order": "내분비내과 협진 완료, 응급실 퇴원 처방", "vs": "122/72 - 76 - 14 - 100%", "rationale": "저혈당의 명확한 유발 원인(식사 거름)이 확인되었고, 내분비내과 자문에 따라 외래 조정이 가능하므로 안전하게 퇴원 조치함."}], "debrief": ["50% DW 주입 시 혈관 선택 및 유출(Infiltration) 방지의 필연성", "근거: 50% Dextrose 용액은 혈액에 비해 삼투압이 극도로 높은 고장성 액체이며 끈적거리는 점도를 가집니다. 만약 손등의 가늘고 약한 혈관에 주입하다가 혈관이 터져 세포 조직으로 새어나가면 정맥염을 넘어 주변 피부 조직이 전층 괴사(Necrosis)될 수 있습니다. 따라서 반드시 전주와(오금 부위) 등 굵고 안전한 중심성 말초혈관에 18G~20G로 확보해야 하며, 주입 중 수시로 주사기를 리거지(Regurgitation)하여 혈액이 역류하는지 확인해야 합니다. 만약 관절 부위라 꺾일 위험이 있다면 부목(Armboard) 고정이 필수적입니다.", "② 포도당 주입 전 선채혈(Blood Sample)의 임상적 가치", "근거: 응급실에 의식 저하로 온 환자가 단순 당뇨약 오남용인지, 아니면 췌장 섬세포종(Insulinoma) 같은 다른 내분비 질환 때문인지 감별하려면 저혈당이 발생한 '그 순간'의 인슐린 수치와 C-peptide 수치가 필요합니다. 일단 50% DW가 몸에 들어가 혈당이 인위적으로 올라가 버리면 이 수치들이 왜곡되므로, 정맥로를 뚫자마자 수액 라인을 연결하기 직전 주사기로 혈액을 20cc 먼저 뽑아두는 것이 완벽한 진단을 위한 최고의 팁입니다. 단, 채혈이 지연되어 당 투여를 늦추어서는 안 됩니다.", "③ 반동성 저혈당(Rebound Hypoglycemia) 감시와 기초 수액(Main Fluid)의 역할", "근거: 고농도 포도당(50% DW)이 한 번에 들어가면 몸에서는 이를 해결하기 위해 췌장에서 일시적으로 인슐린을 과다 분비하거나, 환자가 이전에 맞았던 고용량 인슐린의 잔여 약효 때문에 혈당이 다시 롤러코스터를 타듯 뚝 떨어지는 '반동성 저혈당'이 발생합니다. 이를 방지하기 위해 응급실에서는 50% DW 투여 후 맹물(Normal Saline)만 달아놓으면 안 되며, 10% DW나 5% DS 같은 당이 포함된 유지 수액을 지속적으로 공급하면서 최소 2시간 동안 30분~1시간 간격으로 혈당을 꼼꼼히 추적(f/u)해야 합니다."], "id": "4-46"}, {"diff": "프셉마음", "no": "50", "title": "고혈당(HHS)", "desc": "50. 고삼투압성 고혈당 증후군(HHS) 환자의 응급 인슐린 CIV 요령 및 내분비내과 병동 입원 간호", "pname": "최OO", "pdemo": "여성 / 68세", "info": [{"label": "성함", "value": "최OO (여성 / 68세)"}, {"label": "주호소", "value": "1주일 전부터 지속된 오심, 구토 및 설사. 전일부터 소변량이 급격히 "order": "0.9% NS 1L Full drop 후 f/u Lab 처방 확인", "vs": "126/55 - 98 - 16 - 37.0℃ - 98%", "rationale": "인슐린이 투여되면 혈액 속 칼륨이 세포 안으로 이동하며 급격한 저칼륨혈증이 오므로, K+ 수치가 3.3 이하면 인슐린을 즉시 Stop해야 함."}, {"no": "7", "cat": "인슐린 OFF", "nursing": "수액 지속 주입 중 혈당 강하 확인 및 인슐린 CIV 중단", "his": "내원 6시간째, 매시간 추적 BST 결과 150 mg/dL 측정됨", "order": "BST 150 확인 후 Insulin CIV Off, 기초 수액을 5% DS로 교체", "vs": "132/68 - 84 - 16 - 36.8℃ - 99%", "rationale": "혈당이 250 이하(본 케이스 150)로 떨어지면, 급격한 저혈당 및 뇌세포 삼투압 변화로 인한 뇌부종(Cerebral Edema)을 막기 위해 인슐린을 끄고 당수액을 투여함."}, {"no": "8", "cat": "상태 호전 및 의뢰", "nursing": "환자 의식 회복 확인 및 내분비내과 협진 의뢰", "his": "의식 상태 Alert하게 회복됨. \"입이 덜 마르고 정신이 든다\"고 표현함", "order": "내분비내과(Endocrinology) 협진 의뢰 및 입원 오더 수령", "vs": "130/70 - 80 - 14 - 36.7℃ - 100%", "rationale": "중증 탈수와 고삼투압 상태가 교정되면서 뇌 관류가 정상화되어 의식이 극적으로 명료해짐. 기저 원인 조절을 위해 입원 진행함."}, {"no": "9", "cat": "병동 입원", "nursing": "내분비내과 집중치료 병동으로 이송 및 최종 인계", "his": "인슐린 주입 누적량, 잦은 채혈을 위한 라인 관리 상태 병동 인계", "order": "내분비내과 병동 입실(Transfer to Ward)", "vs": "128/68 - 78 - 14 - 36.7℃ - 100%", "rationale": "병동 이동 중 리바운드 고/저혈당 발생 여부를 감시하기 위해 이동식 모니터를 동반하여 안전하게 전실함."}], "debrief": ["① HHS 환자에게 인슐린보다 대량 수액 공급(Fluid Resuscitation)이 선행되는 이유", "근거: HHS 환자는 극심한 고혈당(보통 600 mg/dL 이상, 본 환자 842 mg/dL)으로 인해 혈액의 삼투압이 비정상적으로 높아져 세포 속 수분까지 모두 소변으로 끌고 나가는 고삼투압성 이뇨를 겪습니다. 이로 인해 체액의 10~15%에 달하는 극심한 탈수가 유발됩니다. 이 상태에서 수액 공급 없이 인슐린만 먼저 투여하면, 혈관 내에 남아있던 당이 세포 안으로 급격히 이동하면서 혈관 내 수분까지 함께 끌고 들어가 혈관성 쇼크(Vascular Collapse)와 급성 신부전을 일으킵니다. 따라서 반드시 0.9% 생리식염수를 Full Drop 속도로 투여하여 혈관 내 볼륨을 채우는 것이 간호 1순위입니다.", "② 인슐린 CIV 작동 시 '매 1시간 f/u'과 '뇌부종(Cerebral Edema)' 예방 간호", "근거: 속효성 인슐린(Regular Insulin)을 지속 정맥 주입(CIV)할 때, 혈당이 너무 신나게 떨어지면 안 됩니다. 시간당 50~75 mg/dL 속도로 완만하게 떨어지는 것이 가장 안전합니다. 만약 인슐린 용량이 과다하여 혈당이 한 번에 수백씩 뚝 떨어지면, 혈액 속 삼투압은 급격히 낮아지는 반면 뇌 세포 내부의 삼투압은 여전히 높은 상태로 유지됩니다. 이로 인해 혈액 속 수분이 뇌 세포 안으로 급격히 이동하여 치명적인 뇌부종(Cerebral Edema)을 유발합니다. 환자가 치료 도중 갑작스러운 두통을 호소하거나 뇌압 상승 소견(혈압 상승, 서맥)을 보인다면 즉시 인슐린을 끄고 의사에게 보고해야 합니다.", "③ 칼륨(K+) 수치에 따른 인슐린 Stop 가이드라인", "근거: HHS 및 DKA 환자 간호에서 인슐린 주입 버튼을 과감히 꺼야 하는 타이밍은 혈당이 낮을 때뿐만 아니라 '칼륨 수치가 낮을 때'입니다. 인슐린은 포도당을 세포 내로 들여보낼 때 혈액 속의 칼륨(K+)도 함께 세포 안으로 끌고 들어갑니다. 만약 환자의 혈청 칼륨 수치가 3.3 mEq/L 이하로 떨어진 상태에서 인슐린을 지속 투여하면, 급격한 저칼륨혈증으로 인해 치명적인 심실성 부정맥(V-fib 등)이나 심정지가 발생할 수 있습니다. 따라서 랩 결과 K+ 수치가 3.3 이하로 확인되면 의사 처방 오더가 없더라도 인슐린 CIV를 선제적으로 Off하고 의사에게 알리는 것이 전문 간호사의 역량입니다."], "id": "4-47"}, {"diff": "프셉마음", "no": "51", "title": "자궁외임신", "desc": "51. 자궁외임신 파열(Ectopic Pregnancy Rupture) 환자의 조영제 CT 검사 및 응급 처치 간호", "pname": "김OO", "pdemo": "여성 / 35세", "info": [{"label": "성함", "value": "김OO (여성 / 35세)"}, {"label": "주호소", "value": "6시간 전부터 시작된 찌르는 듯한 극심한 하복부 및 오른쪽 옆구리 통증(NRS 7점), 그리고 중형 생리대가 1시간 만에 흠뻑 젖을 정도의 대량 질 출혈."}, {"label": "산과력", "value": "최종 월경일(LMP) 기준 임신 7주 차 추정. 평소 생리불순이 심해 임신 여부를 정확히 모르고 있었음."}], "flow": [{"no": "1", "cat": "Triage (초진)", "nursing": "가임기 여성 급성 복통 및 대량 질 출혈 확인, 산과력 사정", "his": "의식 Alert하나 안면 창백, NRS 7점 하복부 통증 호소. KTAS 2단계 분류", "order": "접수 및 산부인과적 응급 격리 구역 침상 배정", "vs": "100/60 - 112 - 20 - 36.6℃ - 97%", "rationale": "가임기 여성의 대량 질 출혈과 빈맥은 **자궁외임신 파열로 인한 복강 내 대량 출혈(저혈량성 쇼크 징후)**을 최우선 의심해야 함."}, {"no": "2", "cat": "신체 검진", "nursing": "하복부 촉진 보조 및 압통/반발통(Rebound tenderness) 사정", "his": "하복부 전반에 걸친 극심한 압통과 복벽이 딱딱해지는 복막 자극 징후 관찰", "order": "신체 검진(P/E), 침상 옆 모니터 적용", "vs": "98/58 - 115 - 22 - 36.5℃ - 96%", "rationale": "난관 파열로 피가 복강 내로 쏟아지면 복막을 자극하여 찌르는 듯한 통증과 반발통이 발생함. 조기 발견이 핵심임."}, {"no": "3", "cat": "선제 처치", "nursing": "18G Two-line IV 확보 및 소변/혈액 검사(HCG 포함) 시행", "his": "양측 전주와 정맥에 18G 확보. Urine HCG '양성(Positive)' 확인", "order": "18G Line x 2, CBC, Chem, Serum/Urine $\\beta$-hCG, 수액 로딩", "vs": "92/54 - 120 - 22 - 36.5℃ - 95%", "rationale": "대량 수혈과 수액 투여에 대비해 18G를 잡고, 임신을 확진(HCG+)하는 동시에 수술/CT를 위한 신장 수치(GFR)를 확인해야 함."}, {"no": "4", "cat": "증상 조절", "nursing": "처방된 마약성 진통제 정맥 투여 및 통증 재평가", "his": "진통제 투여 후 NRS 7점에서 4점으로 다소 완화되나 통증 지속됨", "order": "Nalbuphine 10mg IV stat (처방에 따른 마약성 진통제)", "vs": "95/56 - 114 - 20 - 36.6℃ - 96%", "rationale": "수술이나 검사 전 통증으로 인한 환자의 과호흡 및 쇼크 악화를 막기 위해 혈역학적 저하를 최소화하는 진통제를 투여함."}, {"no": "5", "cat": "검사 준비", "nursing": "신장 기능 및 GFR 정상 확인 후 조영제 CT 검사 접수", "his": "랩 결과 확인: BUN/Cr 정상, GFR 90 이상. 조영제 동의서 서명 확인", "order": "Abdomen-Pelvis CT with contrast(복부-골반 조영 CT)", "vs": "94/55 - 110 - 18 - 36.6℃ - 97%", "rationale": "복강 내 출혈(Hemoperitoneum)의 정확한 양과 파열 부위를 확인하기 위해 신장 기능 정상 확인 후 조영제 CT를 시행함."}, {"no": "6", "cat": "진단 확인", "nursing": "CT 검사 종료 후 판독 결과 확인 및 산부인과 긴급 노티", "his": "판독: Right ectopic pregnancy with rupture & massive hemoperitoneum", "order": "산부인과(OBGY) 긴급 협진 및 대동 초음파 준비", "vs": "90/50 - 122 - 22 - 36.4℃ - 94%", "rationale": "우측 난관 파열로 인한 자궁외임신 및 복강 내 대량 출혈이 확인됨. 환자 혈압 떨어지며 쇼크 진행 중으로 즉각적 중재 필요."}, {"no": "7", "cat": "시술/수술 감별", "nursing": "혈관조영실 인터벤션(UAE) 가능 여부 타진 및 수술 결정", "his": "인터벤션실 확인 결과, 파열성 대량 출혈은 색전술 부적합. 응급수술 확정", "order": "응급 복강경 하 우측 난관절제술(Salpingectomy)결정", "vs": "88/48 - 125 - 24 - 36.4℃ - 93%", "rationale": "[중요] 혈관이 터져 복강 내로 피가 고이는 파열형 자궁외임신은 색전술(UAE)로 잡을 수 없으며, 즉각적인 응급 지혈 수술이 원칙임."}, {"no": "8", "cat": "수술 전 간호", "nursing": "Foley Catheter 삽입, 하복부 제모(Surgi-prep) 및 응급 수혈", "his": "5% DS 멈추고 18G 라인으로 교차시험 통과된 RBC 수혈 개시", "order": "Foley 삽입, 수술 부위 Prep, 정치형 Packed RBC 2차 정주", "vs": "96/58 - 112 - 20 - 36.5℃ - 96%", "rationale": "수술 중 방광 손상을 막기 위해 유치도뇨관을 꽂고, 수혈을 통해 혈압을 끌어올리며 신속하게 수술실(OR)로 인계할 준비를 함."}, {"no": "9", "cat": "수술실 이송", "nursing": "수술실 간호사에게 실시간 바이탈, 수혈 상황 인계 후 이송", "his": "수혈 1팩 주입 중, Foley 10cc(농축뇨) 확인, OR 정시 인계", "order": "수술실로 환자 이송 (Transfer to OR)", "vs": "98/60 - 108 - 18 - 36.5℃ - 97%", "rationale": "응급실 체류 시간을 최소화하고, 복강 내 출혈을 잡기 위해 이동식 산소 및 모니터를 연결하여 수술실로 신속히 전실함."}], "debrief": ["① 자궁외임신인데 HCG 검사가 왜 필수적이고 양성이 나와야 할까?", "교정 사정: 자궁외임신(난관 착상 등)도 정상 임신과 마찬가지로 수정란이 착상한 후 합포체성영양막(Syncytiotrophoblast)에서 β-hCG 호르몬을 분비합니다. 따라서 소변 및 혈액 검사에서 반드시 양성(Positive)이 나옵니다. 다만, 자궁 내막이 아닌 병적인 장소에 착상했기 때문에 호르몬 분비량이 정상 임신처럼 48시간마다 2배씩 팍팍 늘어나지 못하고 낮게 정체되거나 흐릿하게 나타날 뿐입니다. 응급실에서 \"HCG 음성\"이 나왔다면 통증의 원인은 자궁외임신이 아니라 충수염(맹장염), 골반염(PID), 또는 난소낭종 파열 등 다른 외과적 질환을 찾아야 합니다.", "② 혈관조영실 시술(자궁동맥 색전술, UAE)이 가능한가? vs 왜 수술을 해야 하는가?", "임상 판단 가이드: 자궁외임신 환자에게 혈관조영실 인터벤션 시술(자궁동맥 색전술, Interventional Uterine Artery Embolization)을 적용할 수 있는 경우는 비파열성 고위험 착상(예: 자궁경부 임신, 자궁상흔부 임신)에 한해서입니다. 자궁경부나 상흔부는 수술 시 대량 출혈 위험이 너무 커서 미리 혈관을 막아 태아 조직을 괴사시키는 시술을 씁니다.", "그러나 본 케이스처럼 \"난관이 파열(Rupture)되어 복강 내로 피가 쏟아지는(Hemoperitoneum)\" 상태에서는 인터벤션 시술이 절대 금기입니다. 혈관 한두 개를 막는다고 해결되는 것이 아니라, 이미 터진 난관 조직 전체에서 광범위한 삼출성 출혈이 일어나고 있기 때문에, 즉각 배를 열거나 복강경을 넣어 터진 난관을 잘라내고(Salpingectomy) 복강 내 고인 피를 씻어내는 응급 수술만이 환자의 목숨을 살리는 유일한 방법입니다."], "id": "4-48"}, {"diff": "프셉마음", "no": "52", "title": "급성 폐쇄각 녹내장", "desc": "52. 급성 폐쇄각 녹내장(Acute Angle-Closure Glaucoma) 환자의 응급실 간호 및 입원 프로세스", "pname": "이OO", "pdemo": "여성 / 68세", "info": [{"label": "성함", "value": "이OO (여성 / 68세)"}, {"label": "주호소", "value": "3시간 전부터 발생한 우측 안구의 쪼개지는 듯한 극심한 통증(NRS 8점), 우측 전두부 두통, 멈추지 않는 분사성 구토(Projectiles vomiting)."}, {"label": "특이사항", "value": "불빛 주위로 무지개 잔상(Halo 현상)이 보인다고 호소함. 타 병원에서 위장관 질환 의심 하에 진통제만 맞다 증상 악화되어 본원 응급실로 도보 내원."}], "flow": [{"no": "1", "cat": "Triage (초진)", "nursing": "안구 통증 및 오심/구토 확인, 소화기가 아닌 안과 질환 의심", "his": "안면 창백, 우측 안구 결막 충혈 및 동공 Mid-dilated(중등도 산동) 상태 고정 확인. KTAS 3단계", "order": "응급 구역 침상 배정 및 안과(EY) 긴급 콜", "vs": "175/105- 92 - 20 - 36.6℃ - 98%", "rationale": "극심한 안구 통증과 두통, 오심/구토, 혈압 상승은 급성 녹내장의 전형적 압박 징후임. (망막박리는 Painless이므로 제외)"}, {"no": "2", "cat": "기초 검진", "nursing": "안과 검진시행함(안과외래 보냄)", "his": "우안 돌처럼 딱딱함 촉진됨. 이동식 안압계(Tonopen) 측정 결과 우안 안압 62 mmHg확인", "order": "응급 안압 측정, 안과 기초 검진 오더", "vs": "170/100 - 90 - 18 - 36.5℃ - 98%", "rationale": "정상 안압(10-21 mmHg)을 가볍게 넘긴 초고안압 상태로, 방수 배출구가 막혀 안구가 터질 듯한 압박을 받는 상태임."}, {"no": "3", "cat": "선제 처치", "nursing": "18G IV Line 확보 및 응급 고삼투압제 수액 투여", "his": "만니톨 주입 전 크리스탈 성분 석출 여부 라인 확인. 수액 Full dropping 개시", "order": "18G Line확보, 20% Mannitol 250mL IV Full drop", "vs": "165/98 - 88 - 18 - 36.5℃ - 97%", "rationale": "[핵심 중재] 고삼투압제인 만니톨을 빠르게 주입하여 안구 내 수분을 혈관으로 끌어당겨 안압을 급격히 떨어뜨려야 시신경 손상을 막음."}, {"no": "4", "cat": "약물 점안", "nursing": "의사 처방에 따른 축동제(Pilocarpine) 및 안압 하강제 점안", "his": "우안에 2% Pilocarpine 15분 간격 3회 점안. 정해진 시간 철저 준       s.debrief.map(line=>{
        const mm=line.match(/^([^:：]{1,14})[:：]\s*(.*)$/);
        return mm ? `<li><b>${esc(mm[1])}</b> : ${esc(mm[2])}</li>` : `<li>${esc(line)}</li>`;
      }).join('')+`</ul></div>`;
  }

  const prev = i>0? SCEN[i-1]:null, next = i<SCEN.length-1? SCEN[i+1]:null;
  document.getElementById('detail').innerHTML = `
    <button class="back" onclick="goHome()">← 목록으로</button>
    <div class="hero" style="background:linear-gradient(135deg,${col}cc,${col})">
      <div class="cno">${esc(m.icon)} ${esc(m.label)} 시나리오 #${esc(s.no)}</div>
      <h1>${esc(s.title)}</h1>
      <div class="meta">
        <span class="chip">${esc(s.pname)}${s.pdemo?' · '+esc(s.pdemo):''}</span>
        <span class="chip">단계 ${s.flow.length}개</span>
      </div>
    </div>
    ${s.desc?`<div class="mentor"><div class="mh">📋 시나리오 개요</div><p>${esc(s.desc)}</p></div>`:''}
    <div class="sec-head"><h2>👤 환자 정보</h2><span class="ln"></span></div>
    ${pbox}
    <div class="sec-head"><h2>🔄 진료 흐름</h2><span class="ln"></span></div>
    <div class="vslegend">Vital Signs 표기: 수축기/이완기 - 맥박 - 호흡수 - 체온 - SpO₂</div>
    ${steps}
    ${deb}
    <div class="navbtns">
      <button ${prev?'':'disabled'} onclick="${prev?`openScen('${prev.id}')`:''}">← ${prev?esc(prev.title):'이전'}</button>
      <button ${next?'':'disabled'} onclick="${next?`openScen('${next.id}')`:''}">${next?esc(next.title):'다음'} →</button>
    </div>`;
  document.getElementById('home').style.display='none';
  document.getElementById('detail').style.display='block';
  window.scrollTo(0,0);
}
function goHome(){
  document.getElementById('detail').style.display='none';
  document.getElementById('home').style.display='block';
  renderHome(); window.scrollTo(0,0);
}
document.getElementById('totalN').textContent=SCEN.length;
updateProg(); renderHome();
</script>
</body>
</html>
