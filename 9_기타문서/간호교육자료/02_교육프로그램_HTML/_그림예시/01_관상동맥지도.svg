<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 540" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <linearGradient id="myo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9656b"/><stop offset="1" stop-color="#b23039"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="780" height="540" rx="18" fill="#ffffff"/>
  <text x="32" y="48" font-size="26" font-weight="800" fill="#1a2a3a">관상동맥 지도 — 어느 혈관이 막히면 어디가?</text>
  <line x1="32" y1="62" x2="748" y2="62" stroke="#e3e8ee" stroke-width="2"/>

  <!-- 심근 본체 -->
  <g filter="url(#sh)">
    <path d="M300 150
             C250 110 175 120 160 195
             C148 255 175 330 250 405
             C300 455 360 480 400 488
             C440 480 500 455 550 405
             C625 330 652 255 640 195
             C625 120 550 110 500 150
             C465 175 430 200 400 200
             C370 200 335 175 300 150 Z"
          fill="url(#myo)" stroke="#8d242c" stroke-width="3"/>
  </g>

  <!-- 대동맥/폐동맥 큰 줄기 -->
  <path d="M360 150 C360 95 345 70 330 55" fill="none" stroke="#c98b95" stroke-width="14" stroke-linecap="round"/>
  <path d="M445 150 C448 100 470 78 492 66" fill="none" stroke="#c98b95" stroke-width="14" stroke-linecap="round"/>

  <!-- LAD: 전벽 중앙 하행 (금색) -->
  <path d="M398 175 C396 250 392 330 386 430" fill="none" stroke="#f2a900" stroke-width="9" stroke-linecap="round"/>
  <circle cx="398" cy="178" r="7" fill="#f2a900"/>
  <!-- LCX: 좌측 후벽 감김 (초록) -->
  <path d="M420 188 C500 205 560 250 560 330" fill="none" stroke="#2e9d4f" stroke-width="9" stroke-linecap="round"/>
  <!-- RCA: 우측 하행 (파랑) -->
  <path d="M362 188 C275 215 222 270 235 360" fill="none" stroke="#1f7ae0" stroke-width="9" stroke-linecap="round"/>

  <!-- 라벨 박스 -->
  <g font-size="16">
    <!-- LAD -->
    <rect x="560" y="120" width="196" height="74" rx="10" fill="#fff7e6" stroke="#f2a900" stroke-width="2"/>
    <circle cx="578" cy="142" r="6" fill="#f2a900"/>
    <text x="592" y="147" font-weight="800" fill="#9a6b00">LAD (전하행지)</text>
    <text x="574" y="170" fill="#5b4a1f">심실 전벽 · V1~V4 ST↑</text>
    <text x="574" y="188" fill="#b23039" font-weight="700">가장 위험</text>
    <line x1="560" y1="157" x2="430" y2="300" stroke="#f2a900" stroke-width="2" stroke-dasharray="4 4"/>

    <!-- LCX -->
    <rect x="560" y="350" width="196" height="74" rx="10" fill="#eafaef" stroke="#2e9d4f" stroke-width="2"/>
    <circle cx="578" cy="372" r="6" fill="#2e9d4f"/>
    <text x="592" y="377" font-weight="800" fill="#1d6b36">LCX (좌회선지)</text>
    <text x="574" y="400" fill="#264f33">측벽 · I·aVL·V5·V6 ST↑</text>
    <text x="574" y="418" fill="#5b6876">진단이 까다로움</text>
    <line x1="560" y1="387" x2="558" y2="330" stroke="#2e9d4f" stroke-width="2" stroke-dasharray="4 4"/>

    <!-- RCA -->
    <rect x="24" y="350" width="200" height="92" rx="10" fill="#eaf3fd" stroke="#1f7ae0" stroke-width="2"/>
    <circle cx="42" cy="372" r="6" fill="#1f7ae0"/>
    <text x="56" y="377" font-weight="800" fill="#1559a8">RCA (우관상동맥)</text>
    <text x="38" y="400" fill="#1d3a5f">하벽·우심실 · II·III·aVF ST↑</text>
    <text x="38" y="420" fill="#b23039" font-weight="700">NTG 금기 · 수액 필요</text>
    <text x="38" y="438" fill="#5b6876">서맥 동반 잦음</text>
    <line x1="224" y1="395" x2="240" y2="360" stroke="#1f7ae0" stroke-width="2" stroke-dasharray="4 4"/>
  </g>

  <text x="32" y="520" font-size="14" fill="#8b98a8">※ 라벨로 "막히는 혈관 → 변하는 ECG 유도 → 임상 주의점"을 한눈에</text>
</svg>
