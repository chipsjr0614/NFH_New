\"", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "심낭(심장 주머니)의 염증이 심낭염, 삼출액이 차서 심장을 눌러 채워지지 못하게 하는 게 심낭압전.", "basis": "심낭은 신축성이 적음 → 액체가 빠르게 차면 적은 양으로도 심실 충만 방해(압전).", "img": "🖼️ 심낭 구조 + 삼출액 고인 심낭압전 단면"}, {"item": "원인", "content": "바이러스·특발성(흔함), 결핵, 요독증, 외상, MI 후, 악성, 자가면역", "basis": "원인에 따라 경과·치료가 다름. 급성 압전은 외상·박리·시술 합병 등 빠르게 차는 경우.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "압전 기전", "content": "심낭압↑ → 우심실 이완기 충만 방해 → 정맥환류 정체·심박출↓ → 쇼크", "basis": "\"못 채워지면 못 짜낸다\" → 전부하 의존. 그래서 수액으로 일시 보조, 근본은 액체 빼기.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 800 450\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"800\" height=\"450\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">심낭압전 — 물주머니가 심장을 누른다</text>\n  <line x1=\"32\" y1=\"60\" x2=\"768\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <g transform=\"translate(250,265)\">\n    <ellipse cx=\"0\" cy=\"0\" rx=\"160\" ry=\"150\" fill=\"#cfe6ff\" stroke=\"#1f7ae0\" stroke-width=\"3\"/>\n    <text x=\"0\" y=\"-118\" font-size=\"14\" fill=\"#1559a8\" text-anchor=\"middle\" font-weight=\"800\">심낭 삼출액</text>\n    <path d=\"M0 -70 C-70 -70 -82 40 0 90 C82 40 70 -70 0 -70 Z\" fill=\"#e9656b\" stroke=\"#b23039\" stroke-width=\"3\"/>\n    <path d=\"M-10 -40 C-26 -40 -30 0 -10 22 C-2 4 -2 -22 -10 -40 Z\" fill=\"#a83139\"/>\n    <text x=\"0\" y=\"20\" font-size=\"12.5\" fill=\"#fff\" text-anchor=\"middle\" font-weight=\"700\">눌린 심장</text>\n    <g stroke=\"#1f7ae0\" stroke-width=\"2\" fill=\"none\"><path d=\"M-150 -20 A150 150 0 0 1 -120 -90\"/><path d=\"M150 20 A150 150 0 0 1 120 90\"/></g>\n  </g>\n  <g font-size=\"15\" fill=\"#3a4654\">\n    <text x=\"470\" y=\"130\" font-size=\"17\" font-weight=\"800\" fill=\"#b23039\">Beck 3징</text>\n    <text x=\"470\" y=\"162\">① 저혈압 (충만 안 됨)</text>\n    <text x=\"470\" y=\"190\">② 경정맥 팽대 (정맥 울혈)</text>\n    <text x=\"470\" y=\"218\">③ 심음 감약 (액체가 막음)</text>\n    <text x=\"470\" y=\"256\" font-weight=\"700\" fill=\"#c2611a\">+ 기이맥(흡기 시 SBP&gt;10↓)</text>\n    <text x=\"470\" y=\"298\" font-weight=\"800\" fill=\"#b23039\">→ 즉시 심낭천자</text>\n    <text x=\"470\" y=\"326\" fill=\"#5b6876\">이뇨·혈관확장 금기(전부하 의존)</text>\n    <text x=\"470\" y=\"352\" fill=\"#5b6876\">천자 전까지 수액으로 충만 보조</text>\n  </g>\n</svg>"}, {"title": "😣 증상", "items": [{"item": "심낭염", "content": "흉막성 흉통(흡기·기침 시 악화), 앉아 앞으로 숙이면 완화, 심막마찰음", "basis": "염증 심막이 호흡·체위로 자극됨 → AMI(체위 무관)와 구분되는 단서.", "img": ""}, {"item": "압전(Beck 3징)", "content": "저혈압 + 경정맥 팽대 + 심음 감약, 기이맥(흡기 시 SBP>10mmHg 하강), 빈맥", "basis": "충만 장애로 혈압↓·정맥울혈↑, 액체가 심음 차단. 기이맥은 압전의 특징적 소견.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "ECG", "content": "심낭염: 광범위(여러 영역) 오목한 ST 상승 + PR 하강\n압전: 저전압·전기적 교대(electrical alternans)", "basis": "한 관상동맥 영역에 국한된 STEMI와 달리 '전반적'. 전기적 교대는 심장이 액체 속에서 흔들리는 소견.", "img": "🖼️ 심낭염 ECG — 광범위 ST상승·PR하강 / 압전 심초음파"}, {"item": "영상", "content": "심초음파(삼출·이완기 우심 허탈), 흉부X선(물주머니 심장)", "basis": "압전 진단·심낭천자 유도의 핵심. 우심 허탈은 압전의 직접 증거.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1180 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><defs><pattern id=\"g_sm\" width=\"10\" height=\"10\" patternUnits=\"userSpaceOnUse\"><path d=\"M10 0H0V10\" fill=\"none\" stroke=\"#f3c7cb\" stroke-width=\"0.7\"/></pattern><pattern id=\"g_lg\" width=\"50\" height=\"50\" patternUnits=\"userSpaceOnUse\"><rect width=\"50\" height=\"50\" fill=\"url(#g_sm)\"/><path d=\"M50 0H0V50\" fill=\"none\" stroke=\"#e88e95\" stroke-width=\"1.5\"/></pattern></defs><rect width=\"1180\" height=\"430\" rx=\"18\" fill=\"#ffffff\"/><text x=\"34\" y=\"50\" font-size=\"27\" font-weight=\"800\" fill=\"#1a2a3a\">심낭염 심전도 — 광범위 ST 상승 · PR 하강</text><line x1=\"34\" y1=\"66\" x2=\"1146\" y2=\"66\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"34\" y=\"92\" width=\"1112\" height=\"210\" rx=\"10\" fill=\"url(#g_lg)\" stroke=\"#e88e95\" stroke-width=\"1.6\"/><line x1=\"46\" y1=\"235\" x2=\"1134\" y2=\"235\" stroke=\"#2e9d4f\" stroke-width=\"1.1\" stroke-dasharray=\"6 5\"/><polyline fill=\"none\" stroke=\"#b23039\" stroke-width=\"3.2\" stroke-linejoin=\"round\" stroke-linecap=\"round\" points=\"70,235 83,223 96,235 112,235 118,246 127,155 137,263 146,209 176,209 196,185 220,209 234,235 340,235 353,223 366,235 382,235 388,246 397,155 407,263 416,209 446,209 466,185 490,209 504,235 610,235 623,223 636,235 652,235 658,246 667,155 677,263 686,209 716,209 736,185 760,209 774,235 880,235 893,223 906,235 922,235 928,246 937,155 947,263 956,209 986,209 1006,185 1030,209 1044,235\"/><circle cx=\"170\" cy=\"200\" r=\"22\" fill=\"none\" stroke=\"#ff7a00\" stroke-width=\"3\"/><path d=\"M170 144 l0 20 l-8 0 l8 14 l8 -14 l-8 0 Z\" fill=\"#ff7a00\"/><text x=\"186\" y=\"160\" font-size=\"20\" font-weight=\"800\" fill=\"#ff7a00\">광범위 ST↑</text><rect x=\"34\" y=\"324\" width=\"1112\" height=\"84\" rx=\"11\" fill=\"#fff4ec\" stroke=\"#ff7a00\" stroke-width=\"1.8\"/><text x=\"54\" y=\"356\" font-size=\"17\" font-weight=\"800\" fill=\"#b23039\">여러 영역에 걸친 '오목한(concave)' ST 상승 + PR 분절 하강 (한 혈관 영역에 국한된 STEMI와 다름)</text><text x=\"54\" y=\"382\" font-size=\"17\" font-weight=\"500\" fill=\"#3a4654\">앉아 앞으로 숙이면 완화·흡기 시 악화 → STEMI와 감별</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "심낭염", "content": "NSAID + Colchicine, 원인 치료, 휴식", "basis": "항염증으로 통증·재발 감소. Colchicine이 재발 예방에 근거.", "img": "🖼️ 심낭천자 시술 모식도"}, {"item": "압전 — 응급", "content": "즉시 심낭천자(pericardiocentesis)로 액체 제거", "basis": "눌림 해소가 유일한 즉효 치료. 지체 시 무맥성 전기활동(PEA) 심정지.", "img": ""}, {"item": "가교 처치", "content": "천자 전까지 수액(전부하 유지), 산소, 모니터", "basis": "전부하 의존 상태라 수액이 일시적 충만 보조. 단 근본 해결은 액체 제거.", "img": ""}, {"item": "피해야 할 것", "content": "과도한 이뇨·혈관확장(전부하↓) 금기", "basis": "전부하 떨어뜨리면 충만 더 악화 → 압전에선 혈압 더 무너짐.", "img": ""}], "svg": ""}], "redflags": ["Beck 3징(저혈압·경정맥팽대·심음감약) + 기이맥 → 심낭압전, 즉시 심낭천자 준비", "압전 의심에 이뇨제·혈관확장제 금기 (전부하 의존)", "광범위 ST상승+PR하강은 심낭염 — STEMI와 감별(체위·흉막성 통증)", "외상·대동맥박리·시술 후 급성 압전 → 빠르게 진행, 즉시 보고"], "memo": "앉아 숙이면 편함=심낭염 / 광범위 ST↑·PR↓ / Beck3징+기이맥=압전 / 압전→심낭천자, 이뇨 금기"}, {"no": "11", "name": "대동맥 박리", "cat": "❤️ 심장/순환기", "diff": "★★★★★", "kw": "찢어지는 통증 / 양팔 혈압차 / 종격동 확대 / CT 혈관조영 / Stanford A·B", "mentor": "\"'칼로 찢는 것 같다'·'등으로 뻗친다'는 흉통이면 박리를 의심해. 양팔 혈압 꼭 재 — 차이 나면 강한 단서야. 여기서 제일 중요한 건, 혈압·심박수를 먼저 낮춰서 찢기는 힘을 줄이는 거야. 그냥 혈관확장제만 주면 반사빈맥으로 더 찢어져. β차단제 먼저!\"", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "대동맥 내막이 찢어져 혈액이 중막 사이로 파고들어 '가성내강'을 만드는 치명적 응급.", "basis": "고압 혈류가 내막 파열부로 들어가 벽을 갈라놓음 → 분지혈관 폐색·파열·압전으로 사망 위험.", "img": "🖼️ 대동맥 내막 파열 → 가성내강 형성 단면도"}, {"item": "Stanford 분류", "content": "A형: 상행대동맥 침범 → 응급 수술\nB형: 하행만 → 대개 약물치료", "basis": "A형은 관상동맥·대동맥판·심낭으로 파급 → 압전·MI·판막부전 위험이 커 수술적.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "위험인자", "content": "고혈압(최대), 결합조직질환(Marfan), 이엽성 대동맥판, 외상, 임신", "basis": "벽 스트레스·구조 취약 → 내막 파열. 혈압·맥압(shear stress)이 진행을 가속.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 820 440\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"820\" height=\"440\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">대동맥 박리 — 내막이 찢어져 '가성내강' 생성</text>\n  <line x1=\"32\" y1=\"60\" x2=\"788\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <!-- 대동맥 종단면 -->\n  <g transform=\"translate(60,90)\">\n    <path d=\"M40 300 C40 120 120 40 250 40 C360 40 420 110 470 200\" fill=\"none\" stroke=\"#e0a9b0\" stroke-width=\"56\" stroke-linecap=\"round\"/>\n    <path d=\"M40 300 C40 120 120 40 250 40 C360 40 420 110 470 200\" fill=\"none\" stroke=\"#ffd9dc\" stroke-width=\"40\" stroke-linecap=\"round\"/>\n    <!-- 박리 피판 -->\n    <path d=\"M150 70 C200 110 210 170 205 250\" fill=\"none\" stroke=\"#b23039\" stroke-width=\"3\" stroke-dasharray=\"7 5\"/>\n    <ellipse cx=\"178\" cy=\"150\" rx=\"16\" ry=\"60\" fill=\"#8d242c\" opacity=\"0.6\"/>\n    <text x=\"120\" y=\"120\" font-size=\"13.5\" fill=\"#b23039\" font-weight=\"800\">내막 파열구</text>\n    <path d=\"M118 128 L150 95\" stroke=\"#b23039\" stroke-width=\"2\"/>\n    <text x=\"220\" y=\"160\" font-size=\"13\" fill=\"#7a2f37\" font-weight=\"700\">가성내강</text>\n    <text x=\"60\" y=\"270\" font-size=\"13\" fill=\"#1559a8\" font-weight=\"700\">진성내강</text>\n  </g>\n  <g font-size=\"14.5\" fill=\"#3a4654\">\n    <text x=\"560\" y=\"120\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">Stanford 분류</text>\n    <rect x=\"560\" y=\"135\" width=\"220\" height=\"70\" rx=\"10\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"1.6\"/>\n    <text x=\"574\" y=\"162\" font-weight=\"800\" fill=\"#b23039\">A형 — 상행 침범</text>\n    <text x=\"574\" y=\"186\" fill=\"#5b6876\">압전·MI·판막부전 위험 → 응급수술</text>\n    <rect x=\"560\" y=\"220\" width=\"220\" height=\"64\" rx=\"10\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"1.6\"/>\n    <text x=\"574\" y=\"246\" font-weight=\"800\" fill=\"#1559a8\">B형 — 하행만</text>\n    <text x=\"574\" y=\"270\" fill=\"#5b6876\">대개 약물치료(β차단 먼저)</text>\n    <text x=\"560\" y=\"330\" font-weight=\"700\" fill=\"#c2611a\">β차단으로 SBP100~120·HR&lt;60 먼저</text>\n    <text x=\"560\" y=\"356\" fill=\"#8b98a8\">혈관확장만 단독 금지(반사빈맥→악화)</text>\n  </g>\n</svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "갑작스런 찢어지는 흉통/등통(이동성), 양팔 혈압·맥박 차이, 실신, 분지 침범 시 뇌졸중·하지허혈·핍뇨", "basis": "박리가 분지혈관을 막으며 다양한 허혈 증상. 양팔 혈압차는 쇄골하동맥 침범 단서.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 800 410\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"800\" height=\"410\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">박리의 침상 단서 — 양팔 혈압차 · 종격동 확대</text>\n  <line x1=\"32\" y1=\"60\" x2=\"768\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <!-- 사람 + 양팔 혈압 -->\n  <g transform=\"translate(190,250)\">\n    <circle cx=\"0\" cy=\"-110\" r=\"34\" fill=\"#f1c0c4\" stroke=\"#b23039\" stroke-width=\"2.5\"/>\n    <path d=\"M-55 30 C-55 -55 55 -55 55 30 Z\" fill=\"#f3b5ba\" stroke=\"#b23039\" stroke-width=\"2.5\"/>\n    <rect x=\"-130\" y=\"-40\" width=\"56\" height=\"34\" rx=\"6\" fill=\"#eaf3fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/>\n    <text x=\"-102\" y=\"-17\" font-size=\"15\" fill=\"#1559a8\" text-anchor=\"middle\" font-weight=\"800\">142</text>\n    <rect x=\"74\" y=\"-40\" width=\"56\" height=\"34\" rx=\"6\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/>\n    <text x=\"102\" y=\"-17\" font-size=\"15\" fill=\"#b23039\" text-anchor=\"middle\" font-weight=\"800\">98</text>\n    <line x1=\"-55\" y1=\"-20\" x2=\"-130\" y2=\"-23\" stroke=\"#9aa7b5\" stroke-width=\"3\"/>\n    <line x1=\"55\" y1=\"-20\" x2=\"130\" y2=\"-23\" stroke=\"#9aa7b5\" stroke-width=\"3\"/>\n    <text x=\"0\" y=\"80\" font-size=\"15\" fill=\"#b23039\" text-anchor=\"middle\" font-weight=\"800\">양팔 SBP 차이 ↑</text>\n  </g>\n  <!-- 흉부 X선 종격동 확대 -->\n  <g transform=\"translate(530,210)\">\n    <rect x=\"-110\" y=\"-110\" width=\"220\" height=\"220\" rx=\"10\" fill=\"#0d1117\" stroke=\"#2a3441\" stroke-width=\"2\"/>\n    <path d=\"M-30 -90 C-70 -40 -70 60 -40 95 L40 95 C70 60 70 -40 30 -90 Z\" fill=\"#3a4654\" opacity=\"0.7\"/>\n    <ellipse cx=\"0\" cy=\"-50\" rx=\"60\" ry=\"40\" fill=\"#7b8a9a\" opacity=\"0.85\"/>\n    <text x=\"0\" y=\"-46\" font-size=\"12.5\" fill=\"#fff\" text-anchor=\"middle\" font-weight=\"700\">종격동 확대</text>\n    <text x=\"0\" y=\"135\" font-size=\"14\" fill=\"#5b6876\" text-anchor=\"middle\">흉부 X선</text>\n  </g>\n  <text x=\"32\" y=\"392\" font-size=\"13.5\" fill=\"#8b98a8\">※ 찢어지는 흉통/등통 + 양팔 혈압차 → 대동맥 박리 강력 의심. 확진은 CT 혈관조영.</text>\n</svg>"}, {"title": "📈 검사", "items": [{"item": "흉부 X선", "content": "종격동 확대, 대동맥 윤곽 이상", "basis": "빠른 선별 단서. 정상이라도 박리 배제는 못 함.", "img": "🖼️ 흉부X선 종격동 확대 / CT 혈관조영 가성내강"}, {"item": "CT 혈관조영", "content": "확진 검사 — 내막 피판·가성내강·침범 범위", "basis": "분류(A/B)·수술 결정의 기준. 혈역학 안정 시 1차 확진.", "img": ""}, {"item": "기타", "content": "양팔 혈압, ECG(MI 감별), 심초음파(압전·판막), D-dimer", "basis": "AMI·압전 동반 평가. 양팔 혈압차는 침상에서 즉시 가능한 단서.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "1차: β차단제", "content": "Esmolol/Labetalol로 HR<60, SBP 100~120 먼저", "basis": "심박수·수축력↓ → 대동맥 벽 shear stress(dP/dt)↓ → 박리 진행 억제. 반드시 혈관확장제보다 먼저.", "img": "🖼️ 박리 강압 전략 — β차단 먼저, 목표 SBP100~120·HR<60"}, {"item": "2차: 혈관확장", "content": "β차단 후에도 혈압 높으면 Nicardipine/Nitroprusside 추가", "basis": "먼저 혈관만 확장하면 반사성 빈맥 → shear↑ → 더 찢어짐. 순서가 생명.", "img": ""}, {"item": "통증 조절", "content": "Morphine 등으로 통증·교감항진 완화", "basis": "통증→교감↑→혈압·맥박↑→박리 악화 고리 차단.", "img": ""}, {"item": "확정 치료", "content": "A형: 즉시 흉부외과 수술 / B형: 약물·합병증 시 중재", "basis": "A형은 파열·압전 위험으로 수술이 원칙. B형은 약물조절 우선.", "img": ""}], "svg": ""}], "redflags": ["찢어지는 흉통/등통 + 양팔 혈압차 → 대동맥 박리 강력 의심", "혈관확장제만 단독 투여 금지 → 반사빈맥으로 박리 악화 (β차단 먼저)", "A형(상행 침범) → 심낭압전·MI 동반 가능, 즉시 흉부외과", "박리를 ACS로 오인해 항응고·혈전용해 → 치명적 출혈 위험"], "memo": "찢어지는 통증·양팔 혈압차 / CT혈관조영 확진 / β차단 먼저→SBP100~120·HR<60 / A형=수술"}, {"no": "12", "name": "급성 폐부종 (호흡기)", "cat": "🫁 호흡기", "diff": "★★★★☆", "kw": "심인성 vs 비심인성(ARDS) / 폐포 가스교환 장애 / 양압환기 / 원인 감별", "mentor": "“폐부종이라고 다 심장 문제는 아니야. 심장이 펌프를 못 해서 물이 차는 ‘심인성’이 흔하지만, 패혈증·흡인·익수처럼 폐포막이 새서 차는 ‘비심인성(ARDS)’도 있어. 둘 다 숨은 차지만 치료가 달라. 심인성은 이뇨·혈관확장, ARDS는 원인치료+폐보호 환기야. 일단 앉히고 산소부터.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "폐포·폐간질에 체액이 비정상적으로 고여 가스교환이 안 되는 상태. 심인성과 비심인성으로 나뉜다.", "basis": "폐모세혈관압↑(심인성) 또는 폐포막 투과성↑(비심인성)으로 체액이 폐포로 누출 → 산소 확산 장벽.", "img": ""}, {"item": "심인성 vs 비심인성", "content": "심인성: 좌심부전·허혈·판막 → 압력 상승\n비심인성(ARDS): 패혈증·흡인·외상·췌장염 → 막 손상", "basis": "BNP↑·심비대·기왕력은 심인성, 정상 심장+양폐 침윤+유발질환은 ARDS를 시사 → 치료 방향이 갈림.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "가스교환 장애", "content": "폐포 내 체액 → 산소 확산거리↑·환기-관류 불균형 → 저산소혈증", "basis": "공기가 있어야 할 폐포에 물 → 산소가 혈액으로 못 넘어감 → SpO₂↓, 호흡일↑.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">급성 폐부종(호흡기) — 가스교환 장애</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">유발</text><text x=\"150\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">압력↑ / 막손상</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">폐포로 체액</text><text x=\"396\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">누출·정체</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">가스교환 장애</text><text x=\"642\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">확산거리↑</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">저산소혈증</text><text x=\"888\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">호흡곤란</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">심인성=압력↑(이뇨·혈관확장) / 비심인성 ARDS=막손상(원인치료·폐보호 환기)</text><text x=\"54\" y=\"380\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">공통: 앉히고 산소·NIV가 1차</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "심한 호흡곤란·빈호흡, 기좌호흡, 분홍빛 거품가래(심인성), 양폐 수포음, 불안·발한·청색증", "basis": "폐울혈·저산소로 호흡보조근 동원, 교감신경 항진. 누우면 정맥환류↑로 악화 → 앉으려 함.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "흉부 X선", "content": "양측 폐문부 음영(심인성: 나비모양), ARDS: 양폐 미만성 침윤", "basis": "체액 분포 양상으로 심인성/비심인성 추정. 심비대·흉수는 심인성 쪽.", "img": ""}, {"item": "기타", "content": "ABG(저산소·저탄산→피로 시 고탄산), BNP, ECG·Troponin, 심초음파", "basis": "산소화 정도·심장 원인 평가. BNP 낮고 좌심기능 정상이면 ARDS 가능성.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 880 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"880\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">심인성 vs 비심인성(ARDS)</text><line x1=\"34\" y1=\"64\" x2=\"846\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"106\" y=\"92\" width=\"320\" height=\"290\" rx=\"14\" fill=\"#fdeced\" stroke=\"#b23039\" stroke-width=\"2\"/><text x=\"124\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#b23039\">심인성</text><text x=\"124\" y=\"150\" font-size=\"13.5\" fill=\"#5b6876\">압력 상승</text><text x=\"124\" y=\"174\" font-size=\"14.5\" fill=\"#3a4654\">좌심부전·허혈·판막</text><text x=\"124\" y=\"202\" font-size=\"14.5\" fill=\"#3a4654\">BNP↑·심비대</text><text x=\"124\" y=\"230\" font-size=\"14.5\" fill=\"#3a4654\">→ 이뇨·혈관확장(NTG)</text><rect x=\"454\" y=\"92\" width=\"320\" height=\"290\" rx=\"14\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"472\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#1f7ae0\">비심인성 ARDS</text><text x=\"472\" y=\"150\" font-size=\"13.5\" fill=\"#5b6876\">막 투과성↑</text><text x=\"472\" y=\"174\" font-size=\"14.5\" fill=\"#3a4654\">패혈증·흡인·외상</text><text x=\"472\" y=\"202\" font-size=\"14.5\" fill=\"#3a4654\">정상 심장·BNP 낮음</text><text x=\"472\" y=\"230\" font-size=\"14.5\" fill=\"#3a4654\">→ 원인치료+폐보호 환기</text><text x=\"40\" y=\"412\" font-size=\"13.5\" fill=\"#8b98a8\">감별이 치료 방향을 가른다</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "산소·환기", "content": "상체 거상 + 고농도 산소 → NIV(CPAP/BiPAP), 실패 시 삽관", "basis": "양압이 폐포 체액 밀어내고 산소화 개선·호흡일 감소 → 삽관 회피. ARDS는 폐보호 저용적 환기.", "img": ""}, {"item": "심인성 약물", "content": "Furosemide(이뇨) + Nitroglycerin(혈관확장), 혈압 적정 시", "basis": "전·후부하↓로 폐울혈 완화. 심인성에서 즉효.", "img": ""}, {"item": "비심인성", "content": "원인 질환 치료(패혈증 항생제 등) + 폐보호 환기, 이뇨는 신중", "basis": "ARDS는 이뇨만으론 해결 안 됨 → 막 손상 원인을 잡아야. 과도한 수액 제한.", "img": ""}], "svg": ""}], "redflags": ["NIV에도 산소 안 오르고 호흡근 지침·고탄산 → 즉시 기관삽관 준비", "분홍 거품가래+양폐 수포음+기좌호흡 → 전형적 심인성, 산소·NIV·이뇨 즉시", "패혈증·흡인 등 유발질환+정상 심장 → ARDS 의심, 원인치료가 핵심", "심인성/비심인성 감별 없이 이뇨만 반복 → ARDS는 악화·탈수 위험"], "memo": "폐포에 물=가스교환 장애 / 심인성(압력↑)↔비심인성ARDS(막손상) 감별 / 앉히고 산소·NIV / 원인치료"}, {"no": "13", "name": "폐렴", "cat": "🫁 호흡기", "diff": "★★☆☆☆", "kw": "발열·기침·객담 / 폐포 경화 / CURB-65 / 조기 항생제 / 패혈증 이행 감시", "mentor": "“폐렴은 흔하지만 만만하게 보면 안 돼. 노인은 열 없이 ‘기운 없고 밥 못 먹어요’만 하다가 패혈증으로 가. CURB-65로 중증도 빠르게 잡고, 균 배양 ‘뽑고 나서’ 항생제 빨리 시작해. 산소 떨어지고 혈압 흔들리면 이미 패혈증이야.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "세균·바이러스 등이 폐 실질(폐포)에 염증·삼출을 일으킨 감염. 폐포가 고름·삼출로 차서 굳는다(경화).", "basis": "폐포에 염증세포·삼출액이 차면 가스교환 면적↓ → 저산소·기침·발열.", "img": ""}, {"item": "분류", "content": "지역사회획득(CAP) vs 병원획득(HAP)/인공호흡기연관(VAP), 흡인성", "basis": "발생 장소·위험인자로 원인균·항생제 선택이 달라짐.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "경과", "content": "병원체 흡입·흡인 → 폐포 염증·삼출 → 경화 → 환기-관류 불균형", "basis": "삼출된 폐포는 환기는 안 되는데 혈류는 통과 → 션트 효과로 저산소.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">폐렴 — 폐포가 삼출로 굳는다</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">병원체 흡입·흡인</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">폐포 염증·삼출</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">경화(consolidation)</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">환기-관류 불균형</text><text x=\"888\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">저산소</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">노인은 비전형(발열 없이 의식저하·빈호흡) · 배양 후 조기 항생제</text></svg>"}, {"title": "😣 증상", "items": [{"item": "전형", "content": "발열·오한, 기침·화농성 객담, 흉막성 흉통, 호흡곤란, 수포음·기관지호흡음", "basis": "감염·염증반응과 폐포 경화의 직접 결과. 흉막 침범 시 호흡 시 통증.", "img": ""}, {"item": "비전형(노인)", "content": "발열 없이 의식저하·식욕부진·낙상·빈호흡만", "basis": "노인은 면역·체온반응 둔화 → 비전형. 빈호흡(>20)이 조기 단서.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "흉부 X선", "content": "폐엽·폐분절 경화 음영, 공기기관지음영", "basis": "폐렴 확진의 기본. 침윤 범위로 중증도 가늠.", "img": ""}, {"item": "배양·검사", "content": "객담/혈액 배양(항생제 전 채취), CBC·CRP·procalcitonin, ABG, 폐렴구균/레지오넬라 항원", "basis": "원인균 동정·중증도 평가. 배양은 반드시 항생제 투여 전에.", "img": ""}, {"item": "CURB-65", "content": "의식저하·BUN>19·호흡수≥30·SBP<90/DBP≤60·≥65세", "basis": "점수로 외래/입원/중환자 결정. 조기 위험도 층화.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">폐렴 중증도 — CURB-65</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#1559a8\">점수로 진료 강도 결정</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#1559a8\">Confusion 의식저하</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#1559a8\">Urea BUN&gt;19mg/dL</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#1559a8\">Respiratory rate ≥30</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#1559a8\">Blood pressure SBP&lt;90 / DBP≤60</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"800\" fill=\"#1559a8\">65세 이상</text><text x=\"62\" y=\"334\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">각 1점 → 외래(0~1)·입원(2)·중환자(≥3) 고려</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "조기 항생제", "content": "배양 후 경험적 항생제 신속 투여(중증·패혈증 의심 시 1시간 내 목표)", "basis": "조기 투여가 사망률 개선. 균 확인 후 표적 항생제로 좁힘(de-escalation).", "img": ""}, {"item": "지지요법", "content": "산소(SpO₂ 목표 유지), 수액, 해열·진통, 객담 배출", "basis": "산소화·관류 유지. 탈수 교정으로 객담 배출 도움.", "img": ""}, {"item": "악화 감시", "content": "활력징후·SpO₂·의식·소변량 추세 관찰", "basis": "패혈증·호흡부전 이행 조기 포착이 핵심.", "img": ""}], "svg": ""}], "redflags": ["노인 ‘열 없는 의식저하·식욕부진’도 폐렴/패혈증일 수 있음 → 빈호흡 확인", "SBP<90·빈호흡·의식저하(qSOFA) → 패혈증 이행, 즉시 보고·번들 시작", "항생제 전 반드시 혈액·객담 배양 채취 (이후 신속 투여)", "SpO₂ 지속 저하·호흡근 피로 → 호흡부전, 환기 보조 준비"], "memo": "폐포 경화 감염 / 노인은 비전형(의식저하·빈호흡) / CURB-65로 중증도 / 배양 후 조기 항생제 / 패혈증 감시"}, {"no": "14", "name": "급성 폐색전증 (PE)", "cat": "🫁 호흡기", "diff": "★★★★☆", "kw": "DVT 색전 / V-Q 불균형 / 갑작스런 호흡곤란·빈맥 / CT 폐동맥조영 / 항응고·혈전용해", "mentor": "“다리에서 생긴 피떡이 폐로 튄 거야. 갑자기 숨차고 가슴 아프고 맥이 빨라지는데 흉부 X선은 멀쩡해서 놓치기 쉬워. 한쪽 다리가 붓고 아팠던 적 없는지 꼭 물어봐. 혈압 떨어지는 ‘대량 PE’면 혈전용해까지 가는 진짜 응급이야.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "주로 하지 심부정맥혈전(DVT)이 떨어져 폐동맥을 막은 상태. 폐 혈류가 차단된다.", "basis": "정맥 혈전이 우심 거쳐 폐동맥 색전 → 폐 일부 환기는 되나 관류 안 됨(사강).", "img": ""}, {"item": "중증도", "content": "대량(massive): 저혈압·쇼크 / 준대량: 우심부담·정상혈압 / 저위험", "basis": "혈역학 안정 여부가 혈전용해 등 적극치료 결정의 기준.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "Virchow 3요소", "content": "정체(부동·수술·장거리)·과응고(암·임신·호르몬)·혈관손상", "basis": "DVT 위험인자. 색전 후 폐혈관 저항↑ → 우심실 압부하 → 우심부전·심박출↓.", "img": ""}, {"item": "저산소 기전", "content": "환기되지만 관류 안 되는 폐 영역(사강) + 션트 → 저산소·저탄산", "basis": "과호흡으로 CO₂는 낮은데 산소는 안 오르는 패턴이 단서.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">폐색전증 — 다리 혈전이 폐로</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">DVT(하지 정맥혈전)</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">우심 거쳐 폐동맥</text><text x=\"396\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">색전</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">폐 사강·우심부담</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">저산소·쇼크</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">갑작스런 호흡곤란+빈맥+저산소인데 X선 정상 → PE 의심</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "갑작스런 호흡곤란·빈호흡, 흉막성 흉통, 빈맥, 실신, 객혈, 저산소; DVT 동반(한쪽 다리 부종·압통)", "basis": "폐혈류 차단·우심부담의 결과. ‘원인 불명의 갑작스런 호흡곤란+빈맥’이면 항상 의심.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "D-dimer / Wells", "content": "임상확률 낮을 때 D-dimer 음성으로 배제", "basis": "D-dimer는 민감하나 비특이적 → 저위험에서 배제용. 고위험은 바로 영상.", "img": ""}, {"item": "CT 폐동맥조영", "content": "확진 검사 — 폐동맥 내 충만결손", "basis": "현 표준 진단. 신기능·조영제 금기 시 V/Q 스캔.", "img": ""}, {"item": "기타", "content": "ECG(동성빈맥, S1Q3T3·우심부담), ABG, Troponin·BNP(우심부담), 하지 도플러", "basis": "우심부담·예후 평가. 심초음파의 우심실 확장은 위험 신호.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">PE 진단·치료</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#b23039\">저위험 배제·고위험 영상</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">확진: CT 폐동맥조영</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">저위험: Wells↓ + D-dimer 음성으로 배제</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">ECG: 동성빈맥(가끔 S1Q3T3)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">항응고: 의심 단계부터(금기 없으면)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">대량 PE(쇼크): 혈전용해/제거</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "항응고", "content": "신속 항응고(헤파린/LMWH/DOAC) — 금기 없으면 의심 단계부터", "basis": "추가 혈전 형성 차단·자가용해 유도. 진단 지연 시 의심만으로 시작 고려.", "img": ""}, {"item": "혈전용해", "content": "대량 PE(쇼크) → tPA 등 혈전용해 / 또는 카테터·수술적 제거", "basis": "즉각적 폐혈류 회복으로 우심부전·사망 예방. 출혈위험과 저울질.", "img": ""}, {"item": "지지", "content": "산소, 수액(과다금물)·필요시 승압제, 모니터링", "basis": "우심은 과부하 상태 → 과도한 수액은 오히려 악화. 신중한 전부하 관리.", "img": ""}], "svg": ""}], "redflags": ["갑작스런 호흡곤란+빈맥+저산소인데 흉부X선 정상 → PE 강력 의심", "저혈압·쇼크 동반 대량 PE → 혈전용해/혈전제거 대상, 즉시 보고", "한쪽 다리 부종·압통(DVT) 병력 → PE 단서, 반드시 확인", "우심부담 징후(Troponin·BNP↑, 우심실 확장) → 악화 위험, 집중 감시"], "memo": "DVT→폐동맥 색전 / 갑작스런 호흡곤란·빈맥·저산소+정상 X선 / CT폐동맥조영 / 항응고, 대량=혈전용해"}, {"no": "15", "name": "기흉 (Pneumothorax)", "cat": "🫁 호흡기", "diff": "★★★★☆", "kw": "흉막강 공기 / 폐 허탈 / 긴장성=응급 / 편측 호흡음 소실·기관편위 / 흉관·바늘감압", "mentor": "“폐가 쪼그라든 거야. 한쪽 숨소리가 안 들리고 그쪽 가슴이 안 움직이면 기흉을 떠올려. 제일 무서운 건 ‘긴장성 기흉’ — 공기가 자꾸 차서 심장·큰혈관을 누르면 혈압이 뚝 떨어져. 이건 영상 기다릴 시간 없어. 기관이 반대로 밀리고 혈압 떨어지면 바늘로 바로 빼.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "흉막강(폐와 흉벽 사이)에 공기가 들어가 폐가 쭈그러든 상태.", "basis": "음압이어야 할 흉막강에 공기 유입 → 폐 허탈 → 환기 면적↓.", "img": ""}, {"item": "분류", "content": "일차성 자연(키 큰 젊은 남성)·이차성(COPD 등)·외상성·긴장성", "basis": "긴장성은 일방향 밸브로 공기가 계속 차 종격동 압박 → 즉시 처치 대상.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "긴장성 기전", "content": "흡기마다 공기 유입·배출 안 됨 → 흉강압↑ → 종격동 편위·대정맥 눌림 → 정맥환류↓ → 폐쇄성 쇼크", "basis": "압력이 심장·큰혈관을 눌러 혈압 붕괴. ‘폐쇄성 쇼크’의 대표 원인.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 840 440\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"840\" height=\"440\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">기흉 — 정상 vs 긴장성(종격동 편위)</text>\n  <line x1=\"32\" y1=\"60\" x2=\"808\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <!-- 정상측 흉곽 -->\n  <g transform=\"translate(40,90)\">\n    <rect x=\"0\" y=\"0\" width=\"360\" height=\"300\" rx=\"16\" fill=\"#f7eef0\" stroke=\"#d9a9b0\" stroke-width=\"2\"/>\n    <line x1=\"180\" y1=\"14\" x2=\"180\" y2=\"286\" stroke=\"#cbb3b8\" stroke-width=\"3\"/>\n    <path d=\"M150 40 C70 60 60 200 130 270 C170 250 175 120 150 40 Z\" fill=\"#f6b8be\" stroke=\"#b23039\" stroke-width=\"2.5\"/>\n    <path d=\"M210 40 C290 60 300 200 230 270 C190 250 185 120 210 40 Z\" fill=\"#f6b8be\" stroke=\"#b23039\" stroke-width=\"2.5\"/>\n    <text x=\"180\" y=\"305\" font-size=\"15\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">정상 (양폐 팽창)</text>\n  </g>\n  <!-- 긴장성 -->\n  <g transform=\"translate(440,90)\">\n    <rect x=\"0\" y=\"0\" width=\"360\" height=\"300\" rx=\"16\" fill=\"#f7eef0\" stroke=\"#d9a9b0\" stroke-width=\"2\"/>\n    <line x1=\"230\" y1=\"14\" x2=\"230\" y2=\"286\" stroke=\"#cbb3b8\" stroke-width=\"3\" stroke-dasharray=\"6 5\"/>\n    <text x=\"252\" y=\"150\" font-size=\"13\" fill=\"#b23039\" font-weight=\"700\">기관·종격동</text>\n    <text x=\"252\" y=\"168\" font-size=\"13\" fill=\"#b23039\" font-weight=\"700\">반대편 밀림</text>\n    <!-- 허탈된 좌폐 -->\n    <path d=\"M120 130 C90 150 92 210 130 240 C150 220 150 160 120 130 Z\" fill=\"#e58c93\" stroke=\"#b23039\" stroke-width=\"2.5\"/>\n    <text x=\"70\" y=\"110\" font-size=\"13\" fill=\"#b23039\" font-weight=\"700\">허탈된 폐</text>\n    <path d=\"M70 100 L110 140\" stroke=\"#b23039\" stroke-width=\"2\"/>\n    <!-- 공기 영역 -->\n    <text x=\"60\" y=\"250\" font-size=\"22\" fill=\"#8b98a8\">air</text>\n    <!-- 우폐 눌림 -->\n    <path d=\"M300 60 C340 90 345 210 290 260 C255 230 250 120 300 60 Z\" fill=\"#f6b8be\" stroke=\"#b23039\" stroke-width=\"2.5\"/>\n    <text x=\"180\" y=\"305\" font-size=\"15\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">긴장성 (저혈압·기관편위)</text>\n  </g>\n  <text x=\"32\" y=\"424\" font-size=\"13.5\" fill=\"#8b98a8\">※ 편측 호흡음 소실+저혈압+기관 반대편 편위 → 영상 전 바늘감압→흉관</text>\n</svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "갑작스런 편측 흉통·호흡곤란, 환측 호흡음 소실·과공명, 흉곽 운동 감소", "basis": "폐 허탈로 인한 환기·통증. 청진·타진만으로도 강한 단서.", "img": ""}, {"item": "긴장성 징후", "content": "심한 호흡곤란, 저혈압·빈맥, 경정맥 팽대, 기관 반대측 편위, 청색증", "basis": "종격동 압박·정맥환류 차단의 결과. 이 조합이면 즉시 감압.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "흉부 X선", "content": "폐 가장자리(visceral pleura line)·무폐혈관 영역", "basis": "진단 표준(안정 시). 단 긴장성은 영상 기다리지 말 것.", "img": ""}, {"item": "기타", "content": "폐초음파(lung sliding 소실), CT(미세·재발 평가)", "basis": "침상 초음파로 신속 평가 가능. 긴장성은 임상진단.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "긴장성 — 즉시", "content": "바늘감압(2nd ICS 중쇄골선 또는 4·5th 전액와선) → 흉관", "basis": "압력을 빼야 쇼크 해소. 영상 전 임상진단으로 즉시 시행.", "img": ""}, {"item": "흉관 삽입", "content": "증상성·큰 기흉·이차성 → 흉관 배액", "basis": "공기 배출로 폐 재팽창. 지속 누출은 흡인 적용.", "img": ""}, {"item": "소량·무증상", "content": "산소 투여하며 관찰, 추적 X선", "basis": "소량 일차성은 자연 흡수. 산소가 흡수를 촉진.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">기흉 처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#b23039\">긴장성은 임상진단으로 즉시</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">긴장성: 영상 전 바늘감압→흉관</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">바늘감압: 2nd ICS 중쇄골선 또는 4·5th 전액와선</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">증상성·큰 기흉: 흉관 배액</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">개방성: 3면 밀폐 드레싱</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">소량·무증상: 산소 주며 관찰</text></svg>"}], "redflags": ["편측 호흡음 소실+저혈압+기관 반대편 편위 → 긴장성 기흉, 즉시 바늘감압", "긴장성 의심 시 X선 기다리지 말 것 → 임상진단으로 즉시 감압", "COPD·외상 환자의 급격한 호흡곤란·산소저하 → 기흉 배제", "양압환기(NIV·삽관) 중 갑작스런 악화 → 긴장성 기흉 유발 의심"], "memo": "흉막강 공기→폐 허탈 / 편측 호흡음 소실 / 긴장성(저혈압·기관편위)=영상 전 바늘감압→흉관"}, {"no": "16", "name": "천식 발작", "cat": "🫁 호흡기", "diff": "★★★☆☆", "kw": "기도 가역적 폐색 / 호기성 천명 / PEF / β2작용제·스테로이드 / silent chest 위험", "mentor": "“쌕쌕거리고 숨 내쉬기가 힘들면 천식이야. 핵심은 빨리 기관지를 넓혀주는 거 — 네뷸라이저 β2 작용제 반복하고 스테로이드 일찍 줘. 그런데 너무 막혀서 ‘쌕쌕 소리조차 안 나는’ silent chest는 오히려 더 위험한 신호야. 말 못 하고 졸기 시작하면 삽관 준비.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "기도 과민성으로 기관지 평활근 수축·염증·점액이 생겨 ‘가역적’ 기도폐색이 발생.", "basis": "유발인자에 기관지 수축·부종·점액 → 호기 기류 제한. 치료로 회복(가역)되는 게 특징.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전", "content": "알레르겐·감염·운동 → 염증매개체 → 평활근 수축+부종+점액 → 호기 기류제한·공기걸림", "basis": "좁아진 기도로 내쉬기 어려움 → 호기 연장·천명·과팽창. 호흡일↑.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">천식 — 가역적 기도 폐색</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">유발(알레르겐·감염)</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">기관지 수축·부종</text><text x=\"396\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">점액↑</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">호기 기류 제한</text><text x=\"642\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">천명·공기걸림</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">호흡일↑</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">SABA 반복+조기 스테로이드 · silent chest·말 못함=위험</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "호기성 천명, 호흡곤란, 기침, 흉부 압박, 호기 연장, 보조근 사용", "basis": "기도 협착의 결과. 말하기 어려움·앉아서 호흡은 중증 단서.", "img": ""}, {"item": "중증·임박 신호", "content": "말 못 함, 청색증, 의식저하, silent chest, 서맥, PEF<50%", "basis": "기류가 거의 없어 천명조차 사라짐 → 호흡부전 임박. 가장 위험.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">천식 중증도 신호</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#c2611a\">말하기·천명·의식으로 판단</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">경증~중등: 천명·말하기 가능</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#c2611a\">중증: 한 단어씩·앉아 호흡·보조근</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#c2611a\">생명위협: 말 못함·청색증·처짐</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#c2611a\">silent chest(천명 사라짐)=기류 거의 없음</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">ABG CO₂ 정상화/상승=피로 신호</text></svg>"}, {"title": "📈 검사", "items": [{"item": "PEF/산소", "content": "최대호기유속(기저 대비 %), SpO₂, 중증도 평가", "basis": "객관적 폐색 정도·치료반응 추적. ABG의 ‘정상~상승 CO₂’는 피로 신호.", "img": ""}, {"item": "ABG", "content": "초기 저탄산(과호흡)→ 정상/상승 CO₂면 피로·악화", "basis": "처음엔 CO₂ 낮은 게 정상. CO₂ 정상화·상승은 지쳐간다는 경고.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "β2 작용제", "content": "흡입 SABA(Salbutamol) 네뷸라이저 반복 ± 항콜린제(Ipratropium)", "basis": "기관지 평활근 즉시 이완 → 기류 회복. 중증은 지속·반복 투여.", "img": ""}, {"item": "전신 스테로이드", "content": "조기 경구/IV 코르티코스테로이드", "basis": "기도 염증·부종 감소(작용까지 수시간) → 일찍 줄수록 재악화·입원↓.", "img": ""}, {"item": "산소·중증", "content": "산소(목표 유지), 중증 시 MgSO₄ IV, 호흡부전 시 환기 보조", "basis": "Mg는 중증에서 기관지 확장 보조. 피로·의식저하면 삽관.", "img": ""}], "svg": ""}], "redflags": ["천명이 사라진 ‘silent chest’ → 기류 거의 없음, 호흡부전 임박", "말 못 함·청색증·의식저하·서맥 → 생명위협, 즉시 환기보조 준비", "ABG에서 CO₂ 정상화/상승 → 과호흡으로 못 버팀(피로), 위험 신호", "SABA 반복에도 PEF·증상 호전 없음 → 중증 지속, 집중치료 보고"], "memo": "가역적 기도폐색·호기성 천명 / SABA 반복+조기 스테로이드 / silent chest·말 못함=위험 / CO₂↑=피로"}, {"no": "17", "name": "COPD 급성 악화", "cat": "🫁 호흡기", "diff": "★★★☆☆", "kw": "객담 변화·호흡곤란 악화 / CO₂ 저류 / 조절산소(목표 88~92%) / NIV / 스테로이드·항생제", "mentor": "“COPD 환자는 만성적으로 CO₂가 높아서 ‘산소 농도’로 숨을 쉬어. 그래서 산소를 펑펑 주면 오히려 숨을 안 쉬고 CO₂가 더 쌓여 의식이 처져. 목표는 SpO₂ 88~92%, 딱 그만큼만. 숨차고 졸리면서 CO₂ 오르면 NIV(BiPAP)가 답이야.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "만성폐쇄성폐질환 환자에서 호흡곤란·기침·객담이 평소보다 급격히 악화된 상태.", "basis": "기도염증·점액↑·기류제한 악화 → 환기 불량·CO₂ 저류. 흔한 유발: 호흡기 감염.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "CO₂ 저류·산소요법", "content": "만성 고탄산 → 호흡 자극이 ‘저산소’에 의존. 고농도 산소 → 호흡 억제·V/Q 악화 → CO₂↑·의식저하", "basis": "그래서 ‘조절 산소(88~92%)’. 산소를 끊으란 게 아니라 과투여를 피하는 것.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">COPD 악화 — CO₂ 저류 주의</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">악화(흔히 감염)</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">기류제한·점액↑</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">환기 불량</text><text x=\"642\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">CO₂ 저류</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">고탄산성 산증</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">조절 산소 88~92% · 기관지확장제+스테로이드±항생제 · 산증→NIV</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "호흡곤란 악화, 객담량·농도·색 변화, 천명·기침↑, 보조근 사용, 입술 오므린 호흡", "basis": "감염·기류제한의 결과. 객담 화농성 변화는 세균감염·항생제 단서.", "img": ""}, {"item": "CO₂ 저류 신호", "content": "졸림·두통·진전(asterixis)·의식저하, 홍조", "basis": "고탄산혈증성 뇌증. 산소 과투여 후 처지면 의심.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "ABG", "content": "고탄산+호흡성 산증 여부, 산소화 평가", "basis": "NIV 적응·악화 정도 판단의 핵심. pH 낮고 CO₂ 높으면 환기보조 고려.", "img": ""}, {"item": "기타", "content": "흉부 X선(폐렴·기흉 감별), ECG, CBC·CRP", "basis": "유발·합병 원인 감별. 기흉·폐렴이 악화 방아쇠일 수 있음.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "조절 산소", "content": "SpO₂ 목표 88~92%로 적정(과투여 금물)", "basis": "저산소는 교정하되 CO₂ 저류·호흡억제 방지. 너무 낮아도 안 됨.", "img": ""}, {"item": "기관지확장제", "content": "흡입 SABA+항콜린제(Ipratropium) 네뷸라이저", "basis": "기류제한 완화. 천식과 동일 기전으로 즉시 효과.", "img": ""}, {"item": "스테로이드·항생제", "content": "전신 스테로이드 + (화농성 객담·중증) 항생제", "basis": "염증 감소·회복 단축. 세균감염 시사 시 항생제 추가.", "img": ""}, {"item": "NIV", "content": "고탄산성 산증 지속 → BiPAP, 실패 시 삽관", "basis": "양압 환기보조로 CO₂ 배출·호흡일↓ → 삽관·사망 감소. COPD 악화의 근거 강한 치료.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">산소·환기 핵심</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#1559a8\">저산소는 교정하되 과투여 금지</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#1559a8\">SpO₂ 목표 88~92% (과투여 금물)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">과산소→호흡억제·V/Q악화→CO₂↑·의식저하</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">기관지확장제(SABA+항콜린)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">전신 스테로이드 ±(화농성)항생제</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"800\" fill=\"#1559a8\">고탄산성 산증 지속→NIV(BiPAP)</text></svg>"}], "redflags": ["산소 과투여 후 졸림·의식저하 → CO₂ 저류, SpO₂ 88~92%로 적정", "고탄산성 산증(pH↓·CO₂↑) 지속 → NIV(BiPAP) 적응, 지체 말 것", "갑작스런 편측 악화 → 기흉 동반 가능, 흉부 X선 확인", "의식저하·NIV 실패·호흡근 피로 → 기관삽관 준비"], "memo": "악화=호흡곤란·객담 변화 / 조절산소 88~92% / 기관지확장제+스테로이드±항생제 / 고탄산성 산증→NIV"}, {"no": "18", "name": "폐결핵", "cat": "🫁 호흡기", "diff": "★★☆☆☆", "kw": "만성 기침·체중감소·야간발한 / 공기매개 격리 / 객담 항산균·결핵균검사 / 4제 병합", "mentor": "“2주 넘게 기침하고 밤에 식은땀 나고 살 빠지면 결핵을 의심해. 제일 중요한 건 ‘격리’야 — 공기로 옮아서, 의심되는 순간 N95 쓰고 음압실로 보내. 한 가지 약만 쓰면 내성 생기니까 4제를 같이 쓰고, 환자가 약을 끝까지 먹게 돕는 게 핵심이야.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "결핵균(M. tuberculosis) 감염으로 주로 폐에 생기는 만성 감염. 공기(비말핵)로 전파.", "basis": "흡입된 균이 폐포 대식세포 내 증식 → 육아종·건락괴사. 공동(cavity) 형성 시 전염력↑.", "img": ""}, {"item": "잠복 vs 활동성", "content": "잠복결핵: 균 보유·증상 없음·비전염\n활동성: 증상·전염성", "basis": "활동성만 격리·치료 대상. 면역저하 시 잠복→활동 재활성화.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "경과", "content": "흡입 → 폐포 감염 → 세포면역(육아종)으로 봉쇄 → 면역저하 시 재활성화·공동 형성", "basis": "공동은 산소가 풍부해 균 증식·배출↑ → 전염의 핵심.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">결핵 — 흡입에서 재활성화까지</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">비말핵 흡입</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">폐포 대식세포 감염</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">육아종으로 봉쇄</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">재활성화</text><text x=\"888\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">공동 형성</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">2주↑ 기침·야간발한·체중감소 · 공동=전염력↑</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "2주 이상 기침·객담, 객혈, 야간 발한, 체중감소·식욕부진, 미열·피로, 흉통", "basis": "만성 소모성 경과가 특징. 급성 폐렴과 달리 서서히 진행.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "객담 검사", "content": "항산균 도말(AFB)·결핵균 PCR·배양 (서로 다른 날 객담)", "basis": "도말 양성=전염력 높음. PCR로 신속 확진, 배양으로 약제감수성.", "img": ""}, {"item": "영상·기타", "content": "흉부 X선(상엽 침윤·공동), IGRA/투베르쿨린(잠복), HIV 검사", "basis": "상엽·공동 병변이 전형. IGRA는 활동성 확진엔 부적합(보조).", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "격리 — 최우선", "content": "공기매개 격리(음압 1인실), 의료진 N95, 환자 수술용 마스크", "basis": "비말핵 공기전파 차단이 1순위. 의심 즉시 적용.", "img": ""}, {"item": "4제 병합", "content": "Isoniazid+Rifampin+Pyrazinamide+Ethambutol(초기 2개월)", "basis": "단일제는 내성 유발 → 다제 병합으로 내성 방지·살균. 이후 유지기.", "img": ""}, {"item": "복약 지원·신고", "content": "직접복약확인(DOT), 법정감염병 신고, 접촉자 조사", "basis": "치료 중단=내성(MDR-TB) 위험. 완치·전파차단 위해 끝까지 복약 지원.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">결핵 관리 핵심</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#1d6b36\">격리가 최우선</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#1d6b36\">공기매개 격리(음압실·N95)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">객담 AFB도말·PCR·배양(다른 날)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">상엽 침윤·공동(흉부 X선)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#1d6b36\">4제 병합(INH+RIF+PZA+EMB)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">직접복약확인(DOT)·법정감염병 신고</text></svg>"}], "redflags": ["2주↑ 기침+야간발한+체중감소 → 결핵 의심, 즉시 공기매개 격리", "도말 양성·공동 병변 → 전염력 높음, 음압실·N95 철저", "단일 약제·임의 중단 → 다제내성결핵(MDR-TB) 초래", "HIV·면역저하 동반 → 비전형·중증 진행 가능, 함께 평가"], "memo": "만성기침·야간발한·체중감소 / 공기매개=음압격리·N95 / 객담 AFB·PCR·배양 / 4제 병합·DOT·신고"}, {"no": "19", "name": "과호흡 증후군", "cat": "🫁 호흡기", "diff": "★★☆☆☆", "kw": "불안 유발 과호흡 / 호흡성 알칼리증 / 손저림·테타니 / 배제진단 / 안정·호흡 조절", "mentor": "“불안해서 숨을 너무 빨리 쉬면 CO₂가 확 빠져나가 알칼리증이 와. 그래서 손발이 저리고 입 주위가 찌릿하고 손이 오그라들어(테타니). 무섭게 보이지만 대개 양호해. 단, ‘과호흡이겠지’ 하고 PE·심근경색·DKA 같은 진짜 원인을 놓치면 안 돼 — 배제부터.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "주로 불안·공황으로 과도한 환기가 일어나 저탄산·호흡성 알칼리증을 유발하는 상태.", "basis": "빠른 호흡 → CO₂ 과배출 → PaCO₂↓ → 혈중 pH↑(알칼리증) → 증상 발생.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전", "content": "CO₂↓ → 알칼리증 → 이온화칼슘↓·뇌혈관 수축 → 손발저림·테타니·어지럼", "basis": "알칼리증이 칼슘 결합을 늘려 ‘기능적 저칼슘’ → 신경근 흥분성↑.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">과호흡 — 알칼리증·테타니</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">불안·공황</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">과도한 환기</text><text x=\"396\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">CO₂ 과배출</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">호흡성 알칼리증</text><text x=\"642\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">pH↑</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">이온화 Ca↓</text><text x=\"888\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">손발저림·테타니</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">안정·호흡 조절 · 봉지 재호흡 지양(숨은 저산소)</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "빈호흡·숨막힘 느낌, 손발·입주위 저림, 손발 경직(테타니), 어지럼·실신감, 흉부불편·불안", "basis": "저탄산 알칼리증과 불안의 결과. 대개 자가 한정적.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "배제 검사", "content": "ABG(호흡성 알칼리증), SpO₂ 정상, ECG·Troponin, D-dimer/임상확률, 혈당", "basis": "과호흡은 ‘배제 진단’ → PE·ACS·DKA·패혈증·저산소 먼저 제외해야.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">‘과호흡’ 단정 전 배제</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#b23039\">과호흡은 배제 진단</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">PE(폐색전)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">ACS(심근경색)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">DKA(당뇨케톤산증)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">패혈증·저산소·갑상선항진</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">SpO₂ 저하 동반→기질적 원인 의심</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "안정·재확신", "content": "조용한 환경, 호흡 속도 늦추도록 코칭, 안심시키기", "basis": "불안 고리 차단이 핵심. 차분한 유도 호흡으로 CO₂ 회복.", "img": ""}, {"item": "주의", "content": "무분별한 봉지 재호흡 금지(저산소 유발 위험)", "basis": "봉지호흡은 숨은 저산소·PE를 악화시킬 수 있어 권장 안 함.", "img": ""}, {"item": "원인 치료", "content": "불안/공황이면 안정·필요시 약물, 기저질환 동반 시 그 치료", "basis": "증상만 보지 말고 유발·동반 원인 함께 관리.", "img": ""}], "svg": ""}], "redflags": ["‘과호흡이겠지’ 단정 금지 → PE·ACS·DKA·패혈증·저산소부터 배제", "SpO₂ 저하 동반 → 단순 과호흡 아님, 기질적 원인 적극 검사", "봉지 재호흡 루틴 적용 금지 → 숨은 저산소 악화 위험", "흉통·심전도 이상·당뇨력 → 심장·대사 원인 우선 감별"], "memo": "불안성 과호흡→호흡성 알칼리증·테타니 / 배제진단(PE·ACS·DKA 먼저) / 안정·호흡 조절 / 봉지호흡 지양"}, {"no": "20", "name": "허혈성 뇌졸중 (Ischemic Stroke)", "cat": "🧠 신경계", "diff": "★★★★★", "kw": "FAST / tPA / 골든타임 4.5시간 / NIHSS / 뇌CT / 혈관 재개통", "mentor": "\"뇌졸중은 Time is Brain이야. STEMI가 심장을 살리는 거라면 뇌졸중은 뇌를 살리는 거야. tPA 한 번 잘못 쓰면 뇌출혈로 죽을 수도 있어서 금기 확인이 진짜 중요해. 차분하게 체크리스트 돌리는 습관이 필요해.\"", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "뇌혈관이 막혀 뇌세포가 산소·포도당을 못 받아 죽어가는 상태", "basis": "Time is Brain — 분당 190만 개의 뇌세포 사망. 4.5시간 이내 tPA 투여가 골든타임.", "img": ""}, {"item": "종류", "content": "허혈성(80%): 혈전·색전으로 뇌혈관 폐색\n출혈성(20%): 뇌혈관 파열 → CT로 즉시 구분 필수!\n(출혈성에 tPA 쓰면 사망)", "basis": "뇌 CT 찍어서 출혈 없으면 허혈성으로 간주하고 tPA 고려.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "허혈 연쇄반응", "content": "뇌혈관 폐색 → 혈류 감소 → ATP 고갈\n→ 이온 펌프 실패 → Na·Ca 세포내 유입\n→ 세포 부종 → 괴사\n중심부(Core): 즉시 괴사 / 반음영(Penumbra): 살릴 수 있음!", "basis": "Penumbra는 혈류가 완전히 없지 않아 일시적으로 기능 저하 상태. 빨리 혈류 회복하면 살릴 수 있음 → tPA/thrombectomy 근거.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">허혈성 뇌졸중 — Time is brain</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">혈전·색전</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">뇌혈류 차단</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">허혈 중심부·penumbra</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">재관류 골든타임</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">발병시각 확인 · CT로 출혈 배제 후 혈전용해/혈전제거</text></svg>"}, {"title": "🗺️ 해부 지도", "items": [{"item": "혈관별 증상", "content": "MCA(중대뇌동맥, 가장 흔함): 반대쪽 팔다리 마비·감각소실, 실어증(우성반구)\nACA(전대뇌동맥): 반대쪽 하지 마비\nPCA(후대뇌동맥): 시야장애, 어지럼증\n뇌간: 복시, 구음장애, 연하곤란, 현훈", "basis": "어느 혈관이 막혔는지 증상으로 유추 가능. 의사에게 보고 시 증상 방향(좌/우)과 발생 시각 정확히 전달.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 800 460\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"800\" height=\"460\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">뇌혈관 영역 &amp; FAST — 빨리 알아채기</text>\n  <line x1=\"32\" y1=\"60\" x2=\"768\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <g transform=\"translate(250,260)\">\n    <path d=\"M0 -150 C-150 -150 -175 0 -120 110 C-80 170 80 170 120 110 C175 0 150 -150 0 -150 Z\" fill=\"#f3e1c8\" stroke=\"#b78b53\" stroke-width=\"3\"/>\n    <path d=\"M-110 -40 C-120 60 -60 130 0 140 L0 -120 C-60 -120 -100 -90 -110 -40 Z\" fill=\"#cfe6ff\" opacity=\"0.8\"/>\n    <path d=\"M110 -40 C120 60 60 130 0 140 L0 -120 C60 -120 100 -90 110 -40 Z\" fill=\"#ffe0c2\" opacity=\"0.8\"/>\n    <ellipse cx=\"0\" cy=\"-70\" rx=\"44\" ry=\"48\" fill=\"#d8f0dd\" opacity=\"0.9\"/>\n    <text x=\"-70\" y=\"20\" font-size=\"14\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">MCA</text>\n    <text x=\"70\" y=\"20\" font-size=\"14\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">MCA</text>\n    <text x=\"0\" y=\"-66\" font-size=\"13\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">ACA</text>\n    <text x=\"0\" y=\"120\" font-size=\"13\" font-weight=\"800\" fill=\"#6a1b9a\" text-anchor=\"middle\">PCA</text>\n  </g>\n  <g font-size=\"15\" fill=\"#3a4654\">\n    <text x=\"470\" y=\"120\" font-size=\"17\" font-weight=\"800\" fill=\"#b23039\">FAST</text>\n    <text x=\"470\" y=\"152\"><tspan font-weight=\"800\">F</tspan>ace 안면 비대칭</text>\n    <text x=\"470\" y=\"184\"><tspan font-weight=\"800\">A</tspan>rm 한쪽 팔 처짐</text>\n    <text x=\"470\" y=\"216\"><tspan font-weight=\"800\">S</tspan>peech 말 어눌</text>\n    <text x=\"470\" y=\"248\"><tspan font-weight=\"800\">T</tspan>ime 발병시각·즉시</text>\n    <text x=\"470\" y=\"296\" font-size=\"14\" fill=\"#5b6876\">MCA: 편마비·실어 / ACA: 다리 위약</text>\n    <text x=\"470\" y=\"320\" font-size=\"14\" fill=\"#5b6876\">PCA: 시야장애 / 후방: 현훈·복시</text>\n    <text x=\"470\" y=\"360\" font-weight=\"800\" fill=\"#b23039\">CT로 출혈/경색 먼저 감별</text>\n  </g>\n</svg>"}, {"title": "😣 증상 FAST", "items": [{"item": "FAST + 추가 증상", "content": "F(Face): 안면 마비, 입꼬리 처짐\nA(Arm): 팔다리 마비, 한쪽만\nS(Speech): 말이 어눌하거나 이해 못함\nT(Time): 즉시 응급실!\n추가: 갑작스런 두통(SAH 감별), 시야장애, 현훈, 보행장애", "basis": "증상 발생 시각을 환자·보호자에게 반드시 확인! 마지막으로 정상이었던 시각(Last Known Well)이 tPA 판단 기준.", "img": ""}], "svg": ""}, {"title": "📈 ECG & 검사", "items": [{"item": "즉시 검사", "content": "뇌 CT: 출혈성 배제 필수 (tPA 전)\n뇌 MRI/DWI: 허혈 범위 정확 파악\nECG: 심방세동 확인 (색전성 원인)\n채혈: CBC·BMP·Coag·혈당 (저혈당이 뇌졸중 모방 가능!)\nNIHSS 평가: 중증도 점수화", "basis": "NIHSS 0~42점. 점수↑ = 중증. 시간대별 변화 추이 기록이 치료 효과 판단에 중요.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "tPA 투여 근거 & 금기", "content": "근거: 혈전용해 → 막힌 혈관 재개통 → Penumbra 살림\n용량: 0.9mg/kg (최대 90mg), 10%는 IV push, 나머지 60분 주입\n골든타임: 증상 발생 4.5시간 이내\n주요 금기: 출혈성 뇌졸중, 최근 3개월 내 뇌수술, 혈압>185/110, 혈당<50/>400, 항응고제 복용", "basis": "tPA 후 24시간은 항혈소판제·항응고제 금지. 혈압 모니터링 강화 (출혈 위험).", "img": ""}, {"item": "혈압 관리", "content": "tPA 전: BP>185/110이면 먼저 낮춰야 (Labetalol·Nicardipine)\ntPA 후: BP<180/105 유지\ntPA 불가 환자: 220/120 넘을 때만 조심스럽게 낮춤\n(뇌허혈 부위는 자동조절 실패 → 혈압 너무 낮추면 더 나빠짐)", "basis": "혈압을 적극적으로 낮추면 Penumbra 혈류까지 감소. 뇌졸중에서의 혈압 관리는 다른 응급과 반대 방향.", "img": ""}], "svg": ""}], "redflags": ["발생 시각(Last Known Well) 반드시 확인 — tPA 판단 기준", "혈당 먼저 확인! 저혈당이 뇌졸중 증상 모방 가능", "BP>185/110이면 tPA 전 혈압 조절 선행", "tPA 후 24시간: 항혈소판·항응고제 금지", "증상 악화 → 즉시 CT (출혈성 전환 의심)"], "memo": "FAST / Last Known Well / tPA 4.5h 이내 / 출혈성 배제 후 투여 / BP<185/110 유지"}, {"no": "21", "name": "출혈성 뇌졸중 (ICH)", "cat": "🧠 신경계", "diff": "★★★★★", "kw": "뇌실질 출혈 / 두개내압↑ / 혈압조절 / 항응고 역전 / 혈종 확장 감시", "mentor": "“뇌졸중이라고 다 막힌 게 아니야. 터진 것(출혈)일 수도 있어서 CT부터 찍어. 출혈이면 혈전용해제 절대 금지 — 주면 더 터져. 핵심은 혈압을 적정선으로 낮춰 혈종이 커지는 걸 막고, 와파린 먹던 사람이면 빨리 역전시키는 거야. 의식 처지고 동공 커지면 뇌압 응급.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "뇌혈관이 터져 뇌실질 안으로 출혈이 일어난 뇌졸중. 혈종이 주변을 압박한다.", "basis": "혈관 파열 → 혈종 형성·주위 부종 → 두개내압↑·뇌조직 압박. 고혈압이 가장 흔한 원인.", "img": ""}, {"item": "허혈성과 차이", "content": "증상만으론 구분 불가 → CT로 출혈/경색 감별이 ‘치료의 갈림길’", "basis": "허혈은 혈전용해, 출혈은 절대 금기. 영상 없이 항응고·용해 금물.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "악화 기전", "content": "초기 혈종 확장(수시간)·부종 → 뇌압↑ → 뇌관류압↓·탈출(herniation)", "basis": "첫 몇 시간 혈종 확장이 예후 결정 → 혈압·응고 관리로 확장 억제.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">출혈성 뇌졸중 — 혈종이 압박</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">혈관 파열</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">뇌실질 혈종</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">혈종 확장·부종</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">두개내압↑·탈출</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">CT 확인 전 혈전용해·항응고 금지 · 와파린/DOAC 즉시 역전</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "갑작스런 국소신경결손(편마비·언어장애)+심한 두통·구토·의식저하, 고혈압", "basis": "허혈보다 두통·구토·의식저하·고혈압이 두드러지는 경향(절대적 아님).", "img": ""}, {"item": "뇌압상승 신호", "content": "의식저하, 동공 부동·산대, Cushing 3징(고혈압+서맥+불규칙호흡)", "basis": "탈출 임박 신호 → 즉시 뇌압 관리·신경외과 보고.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "뇌 CT(비조영)", "content": "고밀도 혈종 즉시 확인 — 출혈/경색 감별의 1순위", "basis": "빠르고 출혈에 민감. 모든 뇌졸중 의심에 우선.", "img": ""}, {"item": "기타", "content": "혈압, 혈당, 응고검사(INR·혈소판), 약물력(항응고제)", "basis": "혈종 확장 위험인자 평가. 항응고제 복용은 즉시 역전 대상.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 880 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"880\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">CT — 경색 vs 출혈</text><line x1=\"34\" y1=\"64\" x2=\"846\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"106\" y=\"92\" width=\"320\" height=\"290\" rx=\"14\" fill=\"#eef4fd\" stroke=\"#1559a8\" stroke-width=\"2\"/><text x=\"124\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#1559a8\">허혈성(경색)</text><text x=\"124\" y=\"156\" font-size=\"14.5\" fill=\"#3a4654\">저음영(어둡게)</text><text x=\"124\" y=\"184\" font-size=\"14.5\" fill=\"#3a4654\">초기엔 미묘</text><text x=\"124\" y=\"212\" font-size=\"14.5\" fill=\"#3a4654\">→ 혈전용해 대상</text><rect x=\"454\" y=\"92\" width=\"320\" height=\"290\" rx=\"14\" fill=\"#fdeced\" stroke=\"#b23039\" stroke-width=\"2\"/><text x=\"472\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#b23039\">출혈성</text><text x=\"472\" y=\"156\" font-size=\"14.5\" fill=\"#3a4654\">고음영(밝게)</text><text x=\"472\" y=\"184\" font-size=\"14.5\" fill=\"#3a4654\">즉시 보임</text><text x=\"472\" y=\"212\" font-size=\"14.5\" fill=\"#3a4654\">→ 용해 절대 금기</text><text x=\"40\" y=\"412\" font-size=\"13.5\" fill=\"#8b98a8\">증상만으론 구분 불가 → CT가 갈림길</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "혈압 조절", "content": "과한 고혈압을 적정 목표로 신중히 강압(IV 강압제)", "basis": "극단적 고혈압은 혈종 확장 촉진. 단 과도한 급강압은 관류 저하 → 균형.", "img": ""}, {"item": "항응고 역전", "content": "와파린→비타민K+PCC, DOAC→특이 역전제, 헤파린→프로타민", "basis": "응고 정상화로 출혈 진행 차단. 혈종 확장 예방의 핵심.", "img": ""}, {"item": "뇌압·수술", "content": "상체거상·기도/환기·필요시 고삼투요법, 신경외과 수술 평가", "basis": "뇌압 관리로 탈출 예방. 큰 혈종·뇌실내출혈·소뇌출혈은 수술 고려.", "img": ""}], "svg": ""}], "redflags": ["CT로 출혈 확인 전 혈전용해·항응고 절대 금지", "의식저하+동공 부동/산대+Cushing 3징 → 뇌탈출 임박, 즉시 보고", "와파린/DOAC 복용 → 즉시 응고 역전 (혈종 확장 방지)", "소뇌출혈·뇌실내출혈 → 급격 악화·수두증 위험, 신경외과 조기 의뢰"], "memo": "CT로 출혈/경색 감별(용해 금기) / 혈압 적정 강압+혈종확장 억제 / 항응고 즉시 역전 / 뇌압·수술 평가"}, {"no": "22", "name": "일과성 허혈발작 (TIA)", "cat": "🧠 신경계", "diff": "★★★☆☆", "kw": "일시적 신경결손·완전회복 / 경색 임박 경고 / ABCD2 / 영상·경동맥 / 항혈소판", "mentor": "“증상이 잠깐 왔다 사라졌다고 ‘괜찮네’ 하면 큰일 나. TIA는 곧 진짜 뇌졸중이 온다는 ‘경고’야. 특히 발생 48시간이 제일 위험해. 증상 없어졌어도 그냥 보내지 말고 ABCD2로 위험도 따져서 빨리 검사·항혈소판 시작해야 해.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "뇌·망막의 일시적 허혈로 신경결손이 생겼다가 ‘경색 없이’ 완전 회복되는 상태.", "basis": "일시적 혈류 차단 후 회복 → 영구 손상은 없으나 곧 경색이 올 수 있는 경고.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전", "content": "경동맥/심장 색전·소혈관 일과성 폐색 후 재개통", "basis": "원인은 뇌경색과 동일(죽상경화·심방세동 색전 등) → 같은 위험을 공유.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">TIA — 경색 임박 경고</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">일시적 폐색</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">신경결손</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">재개통·완전 회복</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">곧 경색 위험</text><text x=\"888\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">48h 최고</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">회복됐어도 귀가 금지 · ABCD2 · 항혈소판 신속</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "일시적 편측 위약·감각이상, 언어장애, 일과성 흑암시(amaurosis fugax), 보통 수분~1시간 내 회복", "basis": "뇌경색과 같은 양상이나 가역적. 회복됐다고 위험이 사라진 게 아님.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "영상", "content": "뇌 MRI(확산강조)로 미세경색 확인, CT로 출혈 배제", "basis": "실제 경색 여부 확인. 증상 회복돼도 영상상 경색 있을 수 있음.", "img": ""}, {"item": "원인·위험도", "content": "경동맥 도플러/CTA, ECG·심전도 모니터(AF), ABCD2 점수", "basis": "경동맥 협착·심방세동 등 교정 가능한 색전원 탐색·위험 층화.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">TIA 평가·관리</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#b23039\">임박 뇌졸중으로 접근</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">MRI(미세경색)·CT(출혈 배제)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">경동맥 도플러/CTA·ECG(AF)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">48시간 이내가 경색 위험 최고</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">항혈소판 신속 시작</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">AF→항응고 / 경동맥 고도협착→재개통</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "항혈소판", "content": "Aspirin 등 신속 시작(고위험은 단기 이중요법 고려)", "basis": "혈전 형성 차단으로 임박 경색 예방. 조기 시작이 핵심.", "img": ""}, {"item": "원인 교정", "content": "AF면 항응고, 경동맥 고도협착이면 혈관재개통(내막절제/스텐트)", "basis": "색전원 차단이 재발·경색 예방. 위험인자(혈압·지질·당) 관리.", "img": ""}, {"item": "신속 평가", "content": "고위험(ABCD2↑)·48h 내 → 입원·집중 평가", "basis": "발병 초기가 경색 위험 최고 → 지체 없이 검사·치료.", "img": ""}], "svg": ""}], "redflags": ["증상 회복됐어도 그냥 귀가시키지 말 것 → 임박 뇌졸중 경고", "발생 48시간 이내가 경색 위험 최고 → 신속 평가·항혈소판", "심방세동 발견 → 항응고 필요, 항혈소판만으론 부족", "경동맥 고도 협착 → 재개통술 대상, 조기 영상 평가"], "memo": "일시적 결손·완전회복=경색 경고 / 48h 최고위험 / MRI·경동맥·ECG / 항혈소판 신속+원인(AF·협착) 교정"}, {"no": "23", "name": "지주막하 출혈 (SAH)", "cat": "🧠 신경계", "diff": "★★★★★", "kw": "벼락두통 / 동맥류 파열 / CT→불명확시 LP / 재출혈·혈관연축 / 혈압·니모디핀", "mentor": "“‘살면서 이런 두통은 처음’이라는 벼락두통이면 SAH를 의심해. 동맥류가 터진 거라 다시 터지면(재출혈) 치명적이야. CT부터 찍고, CT 음성인데 의심되면 요추천자로 황색변성 확인해. 동맥류 막기 전까지 혈압·자극 관리가 생명이고, 며칠 뒤엔 혈관연축도 조심해.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "지주막하 공간으로의 출혈. 대부분 뇌동맥류 파열이 원인.", "basis": "파열된 동맥류에서 뇌척수액 공간으로 출혈 → 급격한 뇌압↑·뇌막자극.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "합병 기전", "content": "재출혈(초기), 혈관연축(3~14일)→지연성 허혈, 수두증, 뇌압↑", "basis": "동맥류를 막기 전 재출혈, 이후 혈관연축이 주요 사망·장애 원인.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">지주막하 출혈 — 동맥류 파열</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">뇌동맥류 파열</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">지주막하 출혈</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">급격한 ICP↑</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">재출혈·혈관연축</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">벼락두통 · CT→음성시 LP(황색변성)</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "갑작스런 ‘인생 최악’의 벼락두통, 구토, 경부강직, 의식저하, 경련, 국소징후", "basis": "급격한 뇌압·뇌막자극의 결과. 두통 양상이 진단의 강력한 단서.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "뇌 CT(비조영)", "content": "지주막하·뇌기저조 고밀도 혈액 — 1순위, 초기 민감도 높음", "basis": "발병 초기일수록 민감. 음성이라도 강한 의심이면 다음 단계.", "img": ""}, {"item": "요추천자", "content": "CT 음성+강한 의심 → LP로 황색변성(xanthochromia) 확인", "basis": "적혈구 분해산물로 혈성/외상천자 감별. CT가 못 잡은 소량 출혈 확인.", "img": ""}, {"item": "혈관영상", "content": "CTA/DSA로 동맥류 위치·치료 계획", "basis": "파열 동맥류 확인 → 코일색전/클립 결정.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">SAH 핵심</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#b23039\">재출혈·연축이 사망 원인</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">‘인생 최악’ 벼락두통</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">CT(초기 민감)→음성+의심시 LP</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">황색변성(xanthochromia) 확인</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">재출혈 예방: 안정·혈압·조기 처치(코일/클립)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">혈관연축: 니모디핀(3~14일)</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "재출혈 예방", "content": "안정·자극 최소화, 혈압 적정 조절, 진통, 조기 동맥류 처치(코일/클립)", "basis": "동맥류를 막기 전 재출혈이 치명적 → 혈압·통증·자극 관리가 핵심.", "img": ""}, {"item": "혈관연축 예방", "content": "Nimodipine 투여, 혈량 정상 유지", "basis": "니모디핀이 지연성 허혈성 결손·예후 개선 근거. 연축기 신경학적 감시.", "img": ""}, {"item": "뇌압·수두증", "content": "상체거상, 필요시 뇌실외배액(EVD)", "basis": "급성 수두증·뇌압 상승 시 배액으로 감압.", "img": ""}], "svg": ""}], "redflags": ["‘인생 최악·갑작스런’ 벼락두통 → SAH 의심, 즉시 CT", "CT 음성이어도 강한 의심이면 요추천자로 황색변성 확인", "동맥류 처치 전 혈압 급등·자극 → 재출혈 위험, 안정·강압", "발병 3~14일 신경학적 악화 → 혈관연축/지연성 허혈 의심"], "memo": "벼락두통=SAH / CT→음성시 LP(황색변성) / 재출혈 예방(혈압·안정·조기처치) / 니모디핀·연축 감시"}, {"no": "24", "name": "뇌수막염", "cat": "🧠 신경계", "diff": "★★★★☆", "kw": "발열·두통·경부강직 / 세균성=응급 / 요추천자 / 조기 항생제·덱사메타손 / 격리", "mentor": "“열나고 머리 아프고 목이 뻣뻣하면 수막염이야. 세균성은 시간 싸움 — 검사 기다리다 항생제 늦으면 안 돼. 요추천자 빨리 하되, 의식 나쁘거나 국소징후 있으면 CT 먼저 보고. 핵심은 ‘항생제를 빨리, 늦추지 말 것’. 수막알균 의심되면 비말격리도 잊지 마.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "뇌·척수를 싸는 수막의 염증. 세균성은 급속 진행하는 응급, 바이러스성은 비교적 양호.", "basis": "병원체가 지주막하 공간 감염 → 염증·뇌압↑. 세균성은 빠르게 패혈증·뇌손상.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전", "content": "혈행성·인접 전파로 수막 감염 → 염증·부종·뇌압↑·뇌관류↓", "basis": "염증반응이 뇌압 상승·혈관염·뇌손상 유발 → 빠른 치료가 예후 결정.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">뇌수막염 — 수막 감염</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\
