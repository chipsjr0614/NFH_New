0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">신장결석 처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#00695c\">대개 보존, 감염은 응급</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">옆구리→서혜부 방사통·혈뇨</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">비조영 복부 CT(표준)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#00695c\">NSAID 1차 진통(+α차단제 배출)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">수분 유지·작은 결석은 자연배출</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"800\" fill=\"#00695c\">결석+발열(폐색성 감염)→스텐트/신루</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "진통", "content": "NSAID(1차)/필요시 마약성 진통제", "basis": "산통의 신우압·염증 매개 → NSAID가 효과적. 통증 조절이 핵심.", "img": ""}, {"item": "배출·수분", "content": "수분 유지, 작은 원위 요관석은 α차단제(배출 촉진)", "basis": "작은 결석은 보존적 자연배출. 과도한 강제수액은 근거 약함.", "img": ""}, {"item": "응급 감압", "content": "결석+감염(발열)·폐색성 신부전·단일신 폐색 → 요관스텐트/신루", "basis": "감염된 폐색은 패혈증 위험 → 즉시 배액이 생명. 비뇨기과 응급.", "img": ""}], "svg": ""}], "redflags": ["결석 폐색+발열·농뇨 → 폐색성 요로감염, 응급 감압(스텐트/신루)", "양측 폐색·단일신 폐색·무뇨 → 신부전 위험, 즉시 비뇨기과", "조절 안 되는 통증·구토 → 입원·중재 고려", "가임 여성 옆구리통 → 자궁외임신 등 감별(임신검사)"], "memo": "옆구리→서혜부 산통·혈뇨 / 비조영CT / NSAID 진통+수분±α차단제 / 결석+감염·폐색=응급 감압"}, {"no": "42", "name": "요로감염 / 신우신염", "cat": "🩺 신장/비뇨기", "diff": "★★☆☆☆", "kw": "배뇨통·빈뇨 / 상부=발열·옆구리통 / 소변배양 / 항생제 / 패혈증·폐색 감별", "mentor": "“오줌 눌 때 따갑고 자주 마려우면 방광염(하부)이야. 여기에 열나고 옆구리(콩팥) 두드리면 아프면 신우신염(상부)으로 올라간 거라 더 신경 써야 해. 노인·당뇨·임산부는 합병 위험이 높아. 소변 배양 ‘뽑고’ 항생제 시작하고, 결석 같은 게 막고 있으면(폐색) 그냥 항생제론 안 낫고 뚫어야 해.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "요로의 세균 감염. 하부(방광염)와 상부(신우신염)로 나뉘며 전신증상 차이가 있다.", "basis": "대개 상행성 세균감염(대장균 등). 상부 감염은 발열·신실질 침범으로 전신적.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전·위험인자", "content": "요정체·역류·기구·폐색·당뇨·임신 → 세균 정착·상행", "basis": "폐색·정체가 감염·재발·패혈증 위험을 키움 → 교정 필요.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 880 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"880\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">하부(방광염) vs 상부(신우신염)</text><line x1=\"34\" y1=\"64\" x2=\"846\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"106\" y=\"92\" width=\"320\" height=\"290\" rx=\"14\" fill=\"#eef4fd\" stroke=\"#1559a8\" stroke-width=\"2\"/><text x=\"124\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#1559a8\">하부 방광염</text><text x=\"124\" y=\"156\" font-size=\"14.5\" fill=\"#3a4654\">배뇨통·빈뇨·절박뇨</text><text x=\"124\" y=\"184\" font-size=\"14.5\" fill=\"#3a4654\">치골상부 불편</text><text x=\"124\" y=\"212\" font-size=\"14.5\" fill=\"#3a4654\">발열 없음</text><text x=\"124\" y=\"240\" font-size=\"14.5\" fill=\"#3a4654\">경구 항생제</text><rect x=\"454\" y=\"92\" width=\"320\" height=\"290\" rx=\"14\" fill=\"#fdeced\" stroke=\"#b23039\" stroke-width=\"2\"/><text x=\"472\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#b23039\">상부 신우신염</text><text x=\"472\" y=\"156\" font-size=\"14.5\" fill=\"#3a4654\">발열·오한</text><text x=\"472\" y=\"184\" font-size=\"14.5\" fill=\"#3a4654\">옆구리통(CVA 압통)</text><text x=\"472\" y=\"212\" font-size=\"14.5\" fill=\"#3a4654\">오심·구토</text><text x=\"472\" y=\"240\" font-size=\"14.5\" fill=\"#3a4654\">적극 항생제(중증=정주)</text><text x=\"40\" y=\"412\" font-size=\"13.5\" fill=\"#8b98a8\">배양 후 항생제 / 폐색=감압 / 패혈증 주의</text></svg>"}, {"title": "😣 증상", "items": [{"item": "하부(방광염)", "content": "배뇨통·빈뇨·절박뇨·치골상부 불편, 발열 없음", "basis": "하부 요로 자극 증상. 전신증상 적음.", "img": ""}, {"item": "상부(신우신염)", "content": "발열·오한, 옆구리통(CVA 압통), 오심·구토 + 하부증상", "basis": "신실질 감염의 전신반응. 패혈증으로 진행 가능.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "소변", "content": "소변검사(농뇨·아질산염·백혈구), 소변배양·감수성(항생제 전)", "basis": "진단·원인균 확인. 배양으로 표적 항생제 선택.", "img": ""}, {"item": "상부·중증", "content": "CBC·CRP·신기능, 혈액배양(중증), 폐색·농양 의심 시 영상", "basis": "중증도·합병증 평가. 폐색·농양은 영상 필요.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">요로감염 주의</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#b23039\">폐색·패혈증 경계</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">소변검사(농뇨)·배양(항생제 전)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">폐색(결석 등)+감염→감압 필수</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">저혈압·의식저하→요로패혈증(번들)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">임산부·당뇨·남성·노인=복잡성</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">상부·복잡성은 적극 치료</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "하부", "content": "경험적 경구 항생제(지역 내성 고려)", "basis": "단순 방광염은 단기 경구로 충분. 배양은 재발·복잡 시.", "img": ""}, {"item": "상부·복잡성", "content": "배양 후 경험적 항생제(중증=정주), 수분·해열", "basis": "신우신염·복잡성은 적극 치료. 임산부·당뇨·남성은 복잡성으로 관리.", "img": ""}, {"item": "폐색·패혈증", "content": "폐색 동반=감압(스텐트/신루), 패혈증=번들·소생", "basis": "폐색된 감염은 배액 없이는 안 나음. 패혈증은 응급.", "img": ""}], "svg": ""}], "redflags": ["발열+옆구리통(CVA 압통) → 신우신염, 적극 항생제", "폐색(결석 등)+감염 → 감압 필수, 항생제만으론 부족", "저혈압·빈호흡·의식저하 → 요로패혈증, 즉시 소생·번들", "임산부·당뇨·남성·노인 → 복잡성으로 관리, 합병 주의"], "memo": "하부=배뇨통·빈뇨 / 상부=발열·옆구리통(CVA) / 배양 후 항생제 / 폐색=감압 / 패혈증·고위험군 주의"}, {"no": "43", "name": "투석 환자 응급", "cat": "🩺 신장/비뇨기", "diff": "★★★☆☆", "kw": "고칼륨·체액과잉 / 투석 부족·거름 / 혈관통로 보호 / 저혈압 / 감염·심혈관 위험", "mentor": "“투석 환자는 ‘콩팥이 없는 셈’이라 응급이 특이해. 투석을 거르면 칼륨·물이 차서 부정맥·폐부종이 와. 그리고 그 팔의 투석 통로(누공)는 생명선이야 — 거기엔 혈압 재거나 채혈·주사 절대 금지, 진동(thrill) 느껴지는지 확인해. 또 면역·심혈관이 약해서 감염·심근경색을 흔하게 달고 와.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "말기신부전으로 투석 중인 환자에게 생기는 특유의 응급(전해질·체액·통로·감염 등).", "basis": "신배설 기능 부재 → 칼륨·체액·노폐물 축적이 빠르고, 혈관통로·감염·심혈관 합병이 잦다.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "축적·변동", "content": "투석 간 칼륨·체액 축적, 투석 중·후 저혈압·전해질 급변", "basis": "투석 스케줄·체중변화가 응급의 배경. 거르면 고칼륨·폐부종.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">투석 환자 — 거르면 쌓인다</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">투석 거름/부족</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">칼륨·체액 축적</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">부정맥·폐부종</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">응급투석 필요</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">통로(누공) 보호 · 심혈관·감염 흔함</text></svg>"}, {"title": "😣 증상", "items": [{"item": "고칼륨/체액과잉", "content": "위약·부정맥(고K), 호흡곤란·부종·고혈압(체액과잉)", "basis": "투석 부족·거름의 흔한 결과. ECG 확인 필수.", "img": ""}, {"item": "기타", "content": "통로 감염·출혈·혈전, 발열(감염), 흉통(심혈관), 투석 중 저혈압", "basis": "통로·감염·심혈관 문제는 투석 환자에서 흔하고 치명적.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "즉시", "content": "칼륨·전해질·ECG, 체액상태·체중, 통로 진찰(thrill/bruit)", "basis": "고칼륨·체액과잉·통로 평가가 핵심. 흉통이면 심장 평가.", "img": ""}, {"item": "감염", "content": "혈액배양(통로 감염 의심), CBC·CRP", "basis": "카테터·누공 감염은 균혈증 위험 → 배양·항생제.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "고칼륨·체액", "content": "고칼륨 응급처치(칼슘·이동요법)→근본은 응급투석, 폐부종도 투석", "basis": "약물은 임시, 신배설 없어 투석이 확정 치료. 신장팀 연락.", "img": ""}, {"item": "혈관통로 보호", "content": "통로 팔 혈압측정·채혈·정맥주사 금지, thrill 확인, 출혈은 압박", "basis": "통로는 생명선 → 손상·폐쇄 방지. 감염 의심 시 배양·항생제.", "img": ""}, {"item": "심혈관·감염", "content": "흉통=ACS 평가, 발열=배양·항생제, 투석 중 저혈압=수액·UF 조절", "basis": "투석 환자 사망 1위는 심혈관 → 흉통 적극 평가.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">투석 응급 핵심</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#00695c\">통로 보호·심혈관·감염</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#00695c\">고칼륨·폐부종→응급투석(약물은 임시)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#00695c\">통로 팔: 혈압·채혈·주사 금지</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">thrill(진동) 확인 / 출혈은 압박</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">발열·통로 발적→감염(배양·항생제)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"800\" fill=\"#00695c\">흉통→심혈관 위험 매우 높음(ACS)</text></svg>"}], "redflags": ["투석 거름+고칼륨(ECG 변화)/폐부종 → 응급투석, 약물은 임시", "투석 통로 팔에 혈압·채혈·주사 금지, thrill 소실=혈전 응급", "발열·통로 발적 → 통로 감염/균혈증, 배양 후 항생제", "흉통 → 심혈관 위험 매우 높음, ACS 적극 배제"], "memo": "거르면 고칼륨·폐부종→투석 / 통로 보호(혈압·채혈 금지, thrill) / 감염·심혈관 흔함 / 흉통=ACS 평가"}, {"no": "44", "name": "당뇨성 케톤산증 (DKA)", "cat": "🍬 내분비/대사", "diff": "★★★★☆", "kw": "인슐린 부족 / 케톤증 / 산증 / Kussmaul 호흡 / 수액 교정", "mentor": "\"DKA는 겉보기엔 그냥 당뇨 악화같아 보이지만 제대로 교정 안 하면 죽어. 수액, 인슐린, 전해질 — 이 세 가지의 순서와 이유가 핵심이야. 특히 칼륨 수치를 모르고 인슐린 먼저 주면 큰일나. 순서가 생명이야.\"", "sections": [{"title": "📖 정의", "items": [{"item": "진단 3요소", "content": "① 고혈당 (혈당>250mg/dL)\n② 대사성 산증 (pH<7.3, HCO₃<15)\n③ 케톤증 (혈청·소변 케톤 양성)", "basis": "세 가지 모두 있어야 DKA. 혈당이 많이 안 높아도(Euglycemic DKA) DKA 가능 — SGLT-2 억제제 복용 환자에서.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "인슐린 없으면 이렇게 된다", "content": "인슐린 부족 → 세포가 포도당 이용 불가\n→ 지방 분해 → 케톤체(β-OHB, AcAc) 생성\n→ 혈액 산성화 (pH↓)\n→ Kussmaul 호흡 (CO₂ 배출로 산증 보상)\n→ 삼투압 이뇨 → 탈수·전해질 소실", "basis": "Kussmaul 호흡은 보상 기전. 몸이 폐를 통해 산을 내보내려는 시도. 호흡수↑, 깊고 규칙적.", "img": ""}, {"item": "칼륨이 왜 위험한가", "content": "산증 상태: 세포 밖 K⁺ 높아 보임 (실제 총 칼륨은 부족)\n인슐린 투여 → K⁺ 세포 안으로 이동 → 급격한 저칼륨\n→ 심부정맥·심정지 위험!\n칼륨 3.5 미만이면 인슐린 먼저 주면 안 됨!", "basis": "인슐린 시작 전 반드시 K⁺ 확인 필수. K<3.5이면 보충 먼저, K>5.0이면 인슐린 단독.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">DKA — 인슐린 결핍</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">인슐린 결핍</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">지방분해·케톤</text><text x=\"396\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">산증</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">고혈당·삼투성 이뇨</text><text x=\"642\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">탈수</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">전해질 소실</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">수액→인슐린→칼륨 · 혈당 서서히 · 유발인자 교정</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상 & 이유", "content": "다뇨·다음: 삼투압 이뇨 → 수분 손실\n체중 감소: 지방·근육 분해\nKussmaul 호흡: 산증 보상, 깊고 빠른 호흡\n과일향 숨: 아세톤(케톤체)이 폐로 배출\n오심·구토·복통: 케톤증·산증이 위장관 자극\n의식 저하: 심한 탈수 + 고삼투압", "basis": "", "img": ""}], "svg": ""}, {"title": "📈 ECG & 검사", "items": [{"item": "필수 검사", "content": "혈당: 기준 및 치료 반응 평가\nABGA: pH·HCO₃·PCO₂ (산증 중증도)\n전해질: K⁺ 필수! Na·Cl·Mg\nBUN·Cr: 신기능·탈수 정도\n소변 케톤·혈청 β-OHB: 케톤증 확인\nECG: 고칼륨 징후(peaked T), 저칼륨 징후(U파) 확인", "basis": "ECG에서 peaked T파 보이면 고칼륨 응급 → 인슐린+D50·칼슘 즉시", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">DKA 치료 순서</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#e65100\">수액·칼륨·인슐린</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#e65100\">수액 소생(탈수 교정) 먼저</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">칼륨 확인(인슐린 전 K&lt;3.3이면 보류)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">정주 인슐린(혈당 서서히↓)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">산증·케톤·전해질 추적</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">유발인자(감염·심근경색) 교정</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "치료 순서 (순서가 생명)", "content": "① 수액 먼저: NS 1L/hr × 첫 1~2시간\n   근거: 탈수 교정 → 신장 기능 회복 → 자연스러운 혈당 하강\n② K⁺ 확인 후 인슐린:\n   K>3.5이면 RI 0.1unit/kg/hr 시작\n   K<3.5이면 K 보충 먼저!\n③ 포도당 추가: 혈당 200 이하 → D5 or D10 병행 (저혈당 방지)\n④ 전해질 교정: K·Mg·Phosphate 지속 모니터링\n⑤ 원인 치료: 감염·인슐린 누락·수술 등", "basis": "정상화 기준: 혈당<200 + pH>7.3 + HCO₃>15 + 케톤 음성. 이 4가지 모두 정상화되어야 종료.", "img": ""}], "svg": ""}], "redflags": ["K<3.5 → 인슐린 절대 먼저 투여 금지! K 보충 후 시작", "혈당만 보고 인슐린 중단 금지 — pH·HCO₃·케톤도 확인", "의식 저하 + 혈당 >600 → HHS(고삼투압 혼수) 감별", "수액 너무 빠르게 → 뇌부종 위험 (소아에서 특히)", "Euglycemic DKA: SGLT-2i 복용자는 혈당 낮아도 DKA 가능"], "memo": "진단 3요소(고혈당·산증·케톤증) / 순서: 수액→K확인→인슐린 / K<3.5면 K먼저 / Kussmaul 호흡"}, {"no": "45", "name": "고혈당 고삼투압 (HHS)", "cat": "🍬 내분비/대사", "diff": "★★★★☆", "kw": "극심한 고혈당 / 산증 거의 없음 / 심한 탈수·의식저하 / 대량 수액 우선 / 칼륨·인슐린", "mentor": "“HHS는 DKA의 사촌인데, 케톤·산증은 거의 없고 혈당이 어마어마하게(600 넘게) 올라가면서 물이 쫙 빠지는 게 특징이야. 주로 노인 2형 당뇨에서 와. 의식이 처지고 탈수가 심해. 치료의 1번은 인슐린이 아니라 ‘수액’이야 — 물부터 채워. 칼륨 보면서 인슐린은 천천히. 너무 빨리 떨어뜨리면 뇌부종 위험.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "극심한 고혈당과 고삼투압·심한 탈수가 특징인 당뇨 응급. 케톤산증은 거의 없다.", "basis": "잔존 인슐린이 케톤 생성은 막지만 고혈당은 못 막음 → 삼투성 이뇨로 극심한 탈수·고삼투.", "img": ""}, {"item": "DKA와 차이", "content": "HHS: 혈당 매우↑(>600), pH·케톤 정상~경미, 탈수·의식저하 심함\nDKA: 케톤산증 뚜렷", "basis": "산증 유무가 핵심 차이. HHS는 탈수·삼투압 문제가 주.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전", "content": "상대적 인슐린 부족+유발(감염 등) → 고혈당 → 삼투성 이뇨 → 탈수·고삼투·전해질 소실", "basis": "대량 수분·전해질 소실이 핵심 → 수액 소생이 1순위.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 880 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"880\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">DKA vs HHS</text><line x1=\"34\" y1=\"64\" x2=\"846\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"106\" y=\"92\" width=\"320\" height=\"290\" rx=\"14\" fill=\"#fff1e0\" stroke=\"#e65100\" stroke-width=\"2\"/><text x=\"124\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#e65100\">DKA</text><text x=\"124\" y=\"156\" font-size=\"14.5\" fill=\"#3a4654\">케톤산증 뚜렷</text><text x=\"124\" y=\"184\" font-size=\"14.5\" fill=\"#3a4654\">pH↓·케톤↑</text><text x=\"124\" y=\"212\" font-size=\"14.5\" fill=\"#3a4654\">주로 1형·젊음</text><rect x=\"454\" y=\"92\" width=\"320\" height=\"290\" rx=\"14\" fill=\"#fdeced\" stroke=\"#b23039\" stroke-width=\"2\"/><text x=\"472\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#b23039\">HHS</text><text x=\"472\" y=\"156\" font-size=\"14.5\" fill=\"#3a4654\">산증 거의 없음</text><text x=\"472\" y=\"184\" font-size=\"14.5\" fill=\"#3a4654\">극심한 고혈당(&gt;600)</text><text x=\"472\" y=\"212\" font-size=\"14.5\" fill=\"#3a4654\">노인 2형·의식저하</text><text x=\"40\" y=\"412\" font-size=\"13.5\" fill=\"#8b98a8\">HHS는 수액이 1순위 · 혈당·삼투압 서서히(뇌부종)</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "다뇨·다음 후 심한 탈수, 의식저하·혼수, 위약, 국소신경징후·경련 가능", "basis": "고삼투·탈수의 신경학적 영향. DKA보다 의식저하가 두드러짐.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "랩", "content": "혈당(매우 높음), 삼투압↑, pH·케톤 정상~경미, Na(보정)·K·신기능", "basis": "HHS 진단·DKA 감별. 측정 Na는 고혈당으로 낮아보임(보정 필요).", "img": ""}, {"item": "유발인자", "content": "감염·심근경색·약물·순응도 평가", "basis": "HHS는 보통 유발인자 동반 → 함께 치료.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">HHS 치료</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#e65100\">수액 먼저·서서히</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#e65100\">대량 수액이 1순위(탈수)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">K 확인 후 보충(인슐린 전 K&lt;3.3 보류)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">수액 후 인슐린, 혈당 서서히↓</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#e65100\">급격 강하→뇌부종 위험</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">유발인자(감염·MI) 함께 치료</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "① 대량 수액", "content": "생리식염수 적극 수액 소생(우선)", "basis": "극심한 탈수 교정이 최우선 → 혈당·삼투압도 수액만으로 상당히 호전.", "img": ""}, {"item": "② 칼륨", "content": "K 확인 후 보충(인슐린 전 K<3.3이면 인슐린 보류)", "basis": "인슐린이 K를 세포 내로 이동 → 저칼륨 부정맥 예방. K 모니터링.", "img": ""}, {"item": "③ 인슐린", "content": "수액 후 정주 인슐린, 혈당 서서히 강하", "basis": "수액 먼저, 인슐린은 보조. 급격한 강하·삼투압 급변은 뇌부종 위험.", "img": ""}, {"item": "유발 교정", "content": "감염·심근경색 등 치료", "basis": "유발인자 제거 없이는 호전 어려움.", "img": ""}], "svg": ""}], "redflags": ["치료 1순위는 인슐린이 아니라 ‘대량 수액’ → 탈수부터 교정", "인슐린 전 K<3.3 → 인슐린 보류·칼륨 먼저(부정맥 위험)", "혈당·삼투압 너무 빠른 강하 → 뇌부종 위험, 서서히", "노인 의식저하+극심한 고혈당 → 유발인자(감염·MI) 함께 탐색"], "memo": "극심한 고혈당·고삼투·탈수, 산증 거의 없음 / 수액이 1순위 / K 보며 인슐린 / 서서히 강하 / 유발 교정"}, {"no": "46", "name": "저혈당", "cat": "🍬 내분비/대사", "diff": "★★★★★", "kw": "교감항진→신경당결핍 / 즉시 포도당 / 의식따라 경구·정맥 / 재발 감시 / 원인(약물)", "mentor": "“저혈당은 1초가 급해 — 뇌는 포도당만 먹고 살거든. 식은땀·떨림·두근거림에서 시작해 헷갈리고 의식 잃고 경련까지 가. 의식 있으면 단 거 먹이고, 의식 없으면 즉시 정맥 포도당(없으면 글루카곤). 혈당 안 재고 ‘술 취했나·뇌졸중인가’ 하다 놓치면 큰일이야. 모든 의식저하는 혈당부터!”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "혈당이 정상 이하로 떨어져(보통 <70) 교감신경·신경당결핍 증상이 생기는 응급.", "basis": "뇌는 포도당 의존 → 저혈당은 즉각 뇌기능 장애. 지속되면 영구 뇌손상.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "2단계 증상", "content": "경도: 교감항진(에피네프린)→떨림·발한·빈맥\n중증: 신경당결핍→혼돈·의식저하·경련", "basis": "처음엔 경고증상(교감), 더 떨어지면 뇌기능 마비. 무자각 저혈당은 경고 없이 진행.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">저혈당 — 뇌는 포도당 의존</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">혈당 &lt;70</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">교감 항진</text><text x=\"396\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">떨림·발한·빈맥</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">신경당결핍</text><text x=\"642\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">혼돈·의식저하</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">경련·뇌손상</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">모든 의식저하는 혈당부터 · 의식따라 경구/정맥/글루카곤</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "발한·떨림·심계·공복감·불안 → 혼돈·이상행동·국소신경증상·의식저하·경련", "basis": "교감→신경당결핍 순. 뇌졸중·중독·정신질환으로 오인 주의.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "즉시", "content": "현장 혈당 측정(모든 의식저하 환자)", "basis": "진단·치료가 곧바로 연결. 의식저하면 반드시 혈당부터.", "img": ""}, {"item": "원인", "content": "당뇨약(인슐린·설폰요소제), 음주·금식, 간/신부전, 패혈증·부신부전", "basis": "재발·지속 저혈당의 원인. 설폰요소제·장시간 인슐린은 지속·재발 위험.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "의식 있음", "content": "경구 단순당(주스·포도당정) 15~20g, 15분 후 재측정", "basis": "빠른 흡수 당으로 교정. 호전 후 복합탄수화물로 유지.", "img": ""}, {"item": "의식 없음", "content": "정맥 포도당(50% 등) 즉시, 정맥 없으면 글루카곤 IM", "basis": "의식저하·흡인위험엔 정맥/글루카곤. 신속 교정이 뇌 보호.", "img": ""}, {"item": "재발 감시·원인", "content": "설폰요소제·지속형 인슐린은 재발 → 지속 포도당·관찰, 원인 교정", "basis": "약물 반감기 길면 한 번 올려도 다시 떨어짐 → 입원 관찰.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">저혈당 처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#e65100\">1초가 급하다</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#e65100\">모든 의식저하 환자 혈당부터</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">의식 있음: 경구 단순당 15~20g</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#e65100\">의식 없음: 정맥 포도당/글루카곤(경구 금지)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">15분 후 재측정·복합탄수화물 유지</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"800\" fill=\"#e65100\">설폰요소제·지속형 인슐린→재발(관찰)</text></svg>"}], "redflags": ["모든 의식저하 환자는 혈당부터 측정(뇌졸중·중독으로 오인 금지)", "의식 없는데 경구 투여 금지 → 흡인 위험, 정맥 포도당/글루카곤", "설폰요소제·지속형 인슐린 → 재발 저혈당, 입원·지속 관찰", "교정 후에도 처지면 재측정·재투여 → 뇌손상 예방"], "memo": "뇌는 포도당 의존, 1초가 급함 / 교감→신경당결핍 / 의식따라 경구·정맥(글루카곤) / 재발 감시·원인(약물)"}, {"no": "47", "name": "갑상선 중독증 / 갑상선 위기", "cat": "🍬 내분비/대사", "diff": "★★★★☆", "kw": "고열·빈맥·의식변화 / 유발인자 / 다장기 항진 / β차단·항갑상선·요오드 순서 / 지지", "mentor": "“갑상선 호르몬이 폭주하는 응급이야. 열이 펄펄 나고 맥이 엄청 빠르고(심방세동도) 안절부절·헛소리·설사… 온몸이 ‘과열’돼. 감염·수술 같은 게 방아쇠가 돼. 치료엔 순서가 있어 — β차단제로 증상 잡고, 항갑상선제로 생성 막고, 그 다음 요오드(거꾸로 주면 안 돼). 열·탈수도 적극 잡아.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "갑상선호르몬 과다의 극단적·생명위협 형태(thyroid storm). 다장기 기능 항진·부전.", "basis": "과도한 갑상선호르몬 → 대사·교감 항진 극대화 → 고열·심부전·뇌증. 유발인자가 방아쇠.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전·유발", "content": "기저 갑상선항진 + 감염·수술·외상·조영제·약물중단 → 호르몬 작용·교감 폭발", "basis": "유발인자가 보상 한계를 넘김 → 다장기 부전. 유발 교정이 필수.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">갑상선 위기 — 호르몬 폭주</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">기저 항진+유발</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">호르몬·교감 폭발</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">다장기 항진</text><text x=\"642\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">고열·빈맥·뇌증</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">다장기 부전</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">치료 순서: β차단→항갑상선제→요오드(거꾸로 금지)</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "고열, 심한 빈맥·심방세동·심부전, 초조·섬망·혼수, 발한, 설사·구토·황달", "basis": "대사·교감·심혈관 항진의 극단. 체온·심박·의식이 중증도 지표.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "랩", "content": "TSH↓·free T4/T3↑, CBC·간기능·전해질·혈당", "basis": "진단 확인. 치료는 임상적으로 즉시 시작(검사 기다리지 않음).", "img": ""}, {"item": "유발·감별", "content": "감염 검사, ECG, 유발인자 탐색", "basis": "유발 원인 동시 치료. 고열은 감염 동반 흔함.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "① β차단제", "content": "Propranolol 등(빈맥·증상 조절, T4→T3 전환 일부 억제)", "basis": "교감 항진·심혈관 증상 즉시 완화. 심부전 동반 시 신중.", "img": ""}, {"item": "② 항갑상선제", "content": "PTU 또는 Methimazole", "basis": "호르몬 ‘생성’ 차단. 중증·임신초기는 PTU 선호.", "img": ""}, {"item": "③ 요오드", "content": "항갑상선제 ‘이후’ 요오드 투여(분비 억제)", "basis": "순서 중요 — 먼저 주면 호르몬 재료가 돼 악화. 1시간 이상 간격.", "img": ""}, {"item": "지지·유발", "content": "해열(냉각, 아세트아미노펜), 수액, 스테로이드, 유발인자 치료", "basis": "고열·탈수·부신예비 보강. 아스피린은 호르몬 유리로 지양.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">갑상선 위기 치료 순서</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#e65100\">순서가 생명</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#e65100\">①β차단제(증상·심박)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#e65100\">②항갑상선제(생성 차단, PTU/MMI)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#e65100\">③요오드(항갑상선제 이후! 분비 억제)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">해열(냉각·아세트아미노펜)·수액·스테로이드</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">아스피린 지양(호르몬 유리)</text></svg>"}], "redflags": ["고열+심한 빈맥+의식변화 → 갑상선 위기, 검사 전 즉시 치료 시작", "요오드를 항갑상선제보다 먼저 주면 악화 → 반드시 순서 지킬 것", "심방세동·심부전 동반 → 심혈관 붕괴 위험, β차단 신중·지지", "해열에 아스피린 지양(유리 호르몬↑) → 아세트아미노펜 사용"], "memo": "호르몬 폭주 다장기 항진 / 유발인자 / ①β차단→②항갑상선제→③요오드(순서!) / 해열·수액·스테로이드"}, {"no": "48", "name": "부신 위기", "cat": "🍬 내분비/대사", "diff": "★★★★☆", "kw": "코르티솔 결핍 / 저혈압·쇼크(수액·승압 불응) / 저Na·고K·저혈당 / 즉시 스테로이드 / 유발", "mentor": "“원인 모를 쇼크인데 수액·승압제에도 혈압이 안 오르면 부신 위기를 떠올려. 스테로이드를 오래 먹다 갑자기 끊었거나, 감염·수술 같은 스트레스가 방아쇠야. 코르티솔이 없으니 혈압이 무너지고 나트륨↓·칼륨↑·혈당↓이 와. 검사 확인보다 ‘스테로이드(하이드로코르티손) 즉시 투여’가 생명이야 — 망설이지 마.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "코르티솔(±알도스테론) 급성 결핍으로 순환허탈이 오는 생명위협 응급.", "basis": "부신호르몬 부족 → 혈관긴장·당·전해질 유지 실패 → 쇼크. 즉시 보충 필요.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전·유발", "content": "만성 부신부전·스테로이드 중단/감량 + 스트레스(감염·수술·외상)→ 수요↑ 공급↓", "basis": "스트레스 시 코르티솔 수요 급증인데 못 만들면 위기 → 유발인자가 방아쇠.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">부신 위기 — 코르티솔 결핍</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" 생리식염수 적극 수액, 저혈당 시 포도당", "basis": "저혈량·저나트륨·저혈당 교정. 스테로이드와 함께 쇼크 회복.", "img": ""}, {"item": "유발·전해질", "content": "감염 등 치료, 고칼륨·전해질 교정", "basis": "유발 제거·전해질 안정으로 재발·합병 방지.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">부신 위기 치료</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#e65100\">스테로이드가 생명</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#e65100\">수액·승압 불응 쇼크→의심</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#e65100\">Hydrocortisone 즉시(확진 기다리지 말 것)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">생리식염수 적극 수액·저혈당 교정</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">저Na·고K·저혈당 조합이 단서</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">유발(감염 등)·전해질 교정</text></svg>"}], "redflags": ["수액·승압제에 불응하는 쇼크 → 부신 위기 의심, 즉시 스테로이드", "검사 결과 기다리며 하이드로코르티손 늦추지 말 것(의심=투여)", "스테로이드 만성복용/갑작스런 중단력 → 강력한 단서", "저Na·고K·저혈당 조합 → 부신부전 패턴, 함께 교정"], "memo": "코르티솔 결핍→불응성 쇼크 / 저Na·고K·저혈당 / 스테로이드 즉시(의심만으로)+수액·포도당 / 유발 교정"}, {"no": "49", "name": "저나트륨혈증", "cat": "🍬 내분비/대사", "diff": "★★★☆☆", "kw": "체액상태별 감별 / 뇌부종(급성)·삼투성탈수초(과교정) / 속도 제한 / 중증=고장성식염수", "mentor": "“나트륨이 낮으면 물이 뇌세포로 들어가 뇌가 부어 — 그래서 헷갈리고 경련하고 의식이 처져. 두 가지만 기억해. ① 체액상태(탈수냐·과잉이냐)로 원인을 나눠 치료가 갈려. ② 교정 ‘속도’가 생명이야 — 너무 빨리 올리면 뇌 신경이 녹아(삼투성 탈수초증). 증상 심하면 고장성 식염수, 하지만 천천히.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "혈청 나트륨이 낮은 상태(보통 <135). 대부분 수분 과잉(희석)의 문제.", "basis": "Na 자체보다 수분 균형 문제. 저장성 → 물이 세포 안으로 → 뇌부종이 핵심 위험.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "뇌 영향", "content": "저나트륨 → 혈장 저삼투 → 물이 뇌세포로 이동 → 뇌부종", "basis": "급성·중증일수록 뇌부종 증상. 만성은 뇌가 적응(과교정 시 위험).", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">저나트륨혈증 — 뇌부종</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">수분 과잉(희석)</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">혈장 저삼투</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">물이 뇌세포로</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">뇌부종(두통·경련)</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">교정 속도 제한(과교정=ODS) · 체액상태로 원인 분류</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "오심·두통·혼돈·기면 → 중증은 경련·혼수(뇌부종), 위약", "basis": "속도·정도에 비례. 급성 중증은 응급.", "img": ""}, {"item": "체액상태 분류", "content": "저혈량(탈수·이뇨·구토), 정상혈량(SIADH·갑상선·부신), 고혈량(심부전·간경변·신부전)", "basis": "원인·치료가 체액상태로 갈림 → 평가가 필수.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "랩", "content": "혈청·소변 삼투압, 소변 Na, 체액상태 평가, 갑상선·부신·신기능", "basis": "원인 분류(SIADH 등) 핵심. 고혈당 등 가성저나트륨 배제.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 892 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"892\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">체액상태로 원인 분류</text><line x1=\"34\" y1=\"64\" x2=\"858\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"92\" width=\"252\" height=\"290\" rx=\"14\" fill=\"#eef4fd\" stroke=\"#1559a8\" stroke-width=\"2\"/><text x=\"58\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#1559a8\">저혈량</text><text x=\"58\" y=\"156\" font-size=\"14.5\" fill=\"#3a4654\">구토·이뇨·탈수</text><text x=\"58\" y=\"184\" font-size=\"14.5\" fill=\"#3a4654\">→ 등장식염수</text><rect x=\"320\" y=\"92\" width=\"252\" height=\"290\" rx=\"14\" fill=\"#eef7f0\" stroke=\"#1d6b36\" stroke-width=\"2\"/><text x=\"338\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#1d6b36\">정상혈량</text><text x=\"338\" y=\"156\" font-size=\"14.5\" fill=\"#3a4654\">SIADH·갑상선·부신</text><text x=\"338\" y=\"184\" font-size=\"14.5\" fill=\"#3a4654\">→ 수분제한</text><rect x=\"600\" y=\"92\" width=\"252\" height=\"290\" rx=\"14\" fill=\"#fdeced\" stroke=\"#b23039\" stroke-width=\"2\"/><text x=\"618\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#b23039\">고혈량</text><text x=\"618\" y=\"156\" font-size=\"14.5\" fill=\"#3a4654\">심부전·간경변·신부전</text><text x=\"618\" y=\"184\" font-size=\"14.5\" fill=\"#3a4654\">→ 수분·염분 제한</text><text x=\"40\" y=\"412\" font-size=\"13.5\" fill=\"#8b98a8\">중증(경련)만 3% 식염수 신중·소폭 / 과교정 금지</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "속도 제한", "content": "교정 속도 제한(과교정 금지) — 24시간 한계 준수", "basis": "급속 교정 시 삼투성 탈수초증(ODS) → 비가역 신경손상. 천천히가 안전.", "img": ""}, {"item": "중증 증상", "content": "경련·혼수 등 중증은 고장성(3%) 식염수로 신중히 소량 상승", "basis": "뇌부종 응급은 소폭·신중 상승으로 증상만 완화. 그래도 속도 제한.", "img": ""}, {"item": "원인별", "content": "저혈량=등장식염수, SIADH=수분제한, 고혈량=수분·염분제한·기저치료", "basis": "체액상태에 맞춘 치료. 잘못 분류하면 악화.", "img": ""}], "svg": ""}], "redflags": ["교정 속도 초과(과교정) → 삼투성 탈수초증(비가역 신경손상)", "경련·혼수(중증 뇌부종) → 고장성식염수로 신중히 소폭 상승", "체액상태 오분류 → 치료 방향이 반대로 악화", "고혈당 등 가성 저나트륨 배제 후 해석"], "memo": "저Na=물 과잉→뇌부종 / 체액상태로 원인 분류 / 교정 속도 제한(과교정=ODS) / 중증만 3% 식염수 신중"}, {"no": "50", "name": "패혈증 (Sepsis)", "cat": "🦠 감염/패혈증", "diff": "★★★★★", "kw": "qSOFA / Sepsis-3 / Hour-1 Bundle / 젖산 / 혈액배양 / 항생제", "mentor": "\"패혈증은 무서운 게 처음엔 그냥 열나는 환자처럼 보인다는 거야. 그러다 갑자기 혈압이 떨어지고 장기가 망가지기 시작해. 조기 인식과 1시간 안에 번들 치료를 하느냐 안 하느냐가 생사를 가른다는 게 연구로 증명됐어.\"", "sections": [{"title": "📖 정의", "items": [{"item": "Sepsis-3 정의", "content": "패혈증: 감염에 대한 조절되지 않는 숙주반응 → 생명을 위협하는 장기 기능 장애\n진단: qSOFA 2점↑ or SOFA 2점↑ 상승\nSeptic Shock: 패혈증 + 수액 불응 저혈압 + 젖산>2mmol/L → 사망률 40~50%", "basis": "SIRS 기준(구분류)보다 Sepsis-3가 더 정확. 장기기능 이상이 핵심 개념.", "img": ""}, {"item": "qSOFA 기준", "content": "① 의식 변화 (GCS<15)\n② 호흡수 ≥22회/분\n③ 수축기혈압 ≤100mmHg\n2가지 이상 = 패혈증 의심 → 즉시 평가", "basis": "ICU 밖에서 빠르게 선별하는 도구. 검사 없이 침상에서 바로 평가 가능.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "왜 장기가 망가지나", "content": "감염원(균·독소) → 과도한 면역 반응 활성화\n→ 사이토카인 폭풍 (TNF-α·IL-1·IL-6)\n→ 혈관 내피 손상 → 혈관 투과성↑\n→ 혈관 확장 → 혈압 하강\n→ 미세혈전 형성 → 말초 조직 허혈\n→ 신장·폐·간·뇌 순으로 장기 부전", "basis": "혈관이 확장되어 혈압이 낮아지는 것 = 분배성 쇼크(Distributive shock). 심박출량은 오히려 높다(패러독스).", "img": ""}, {"item": "젖산이 왜 중요한가", "content": "정상 세포: 산소 → 유산소 대사 → ATP\n패혈증: 산소 공급↓ or 이용↓ → 무산소 대사 → 젖산 생성↑\n젖산>2 = 조직 저관류 증거 = 중증 패혈증 경고\n젖산>4 = Septic Shock 기준", "basis": "젖산은 치료 반응 모니터링에도 사용. 2~4시간 내 10% 이상 감소하면 치료 효과 있음.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">패혈증 — 감염의 전신 반응</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">감염</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">전신 염증 반응</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">혈관확장·투과성↑</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">조직 저관류·장기부전</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">qSOFA(의식·호흡↑·SBP↓) · Hour-1 번들</text></svg>"}, {"title": "😣 증상", "items": [{"item": "조기 vs 후기 증상", "content": "조기(Warm Shock): 발열·오한, 빠른 맥, 빠른 호흡, 피부 따뜻·홍조\n후기(Cold Shock): 저혈압, 피부 차고 창백·얼룩덜룩, 소변↓, 의식 변화\n주의: 면역저하·노인·신생아는 발열 없이 저체온으로 올 수도 있음!", "basis": "", "img": ""}], "svg": ""}, {"title": "📈 ECG & 검사", "items": [{"item": "Hour-1 Bundle 필수 검사", "content": "① 젖산(Lactate): 조직 저관류 지표\n② 혈액배양 2세트: 항생제 주기 전!\n③ CBC·BMP·LFT·Coag: 장기기능 평가\n④ 소변배양·흉부X선: 감염원 확인\n⑤ 지속 모니터링: 심전도·맥산소포화도·소변량", "basis": "혈액배양은 항생제 주기 전에 뽑아야 의미 있음. 항생제 주고 뽑으면 균 자라지 않을 수 있음.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">Hour-1 번들</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#1b5e20\">1시간 안에 동시 진행</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#1b5e20\">젖산 측정(관류·반응 지표)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#1b5e20\">혈액배양 2세트(항생제 전)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#1b5e20\">광범위 항생제 신속 투여</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">저혈압/젖산↑→결정질 30mL/kg</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">불응성 저혈압→노르에피네프린</text></svg>"}, {"title": "💊 치료 근거 (Hour-1 Bundle)", "items": [{"item": "1시간 안에 할 것", "content": "① 젖산 측정\n② 혈액배양 2세트 (항생제 전!)\n③ 광범위 항생제 투여 (1시간 이내)\n④ 저혈압 or 젖산>4면 수액 30mL/kg 빠르게\n⑤ 수액에도 저혈압이면 Norepinephrine 시작", "basis": "1시간마다 사망률 7.6%씩 증가. \"1시간 안에 항생제\"는 연구로 입증된 사실.", "img": ""}, {"item": "약물 근거", "content": "항생제: 균을 모르므로 광범위 커버리지로 시작. 배양 결과 나오면 de-escalation\nNorepinephrine(1차 선택 혈압약): α1↑ → 혈관 수축 → 혈압 유지\n수액(NS or LR): 혈관내 용적 보충 → 심박출량↑\nHydrocortisone: Septic shock에서 스테로이드 저항 의심 시 (노르에피네프린 고용량에도 혈압 안 오를 때)", "basis": "혈압이 오르지 않는다고 수액을 무한정 주면 폐부종. CVP·PICCO 등 모니터링으로 수액 반응성 평가.", "img": ""}], "svg": ""}], "redflags": ["혈액배양은 항생제 주기 전에 뽑을 것", "항생제는 1시간 이내 투여 — 지연될수록 사망률↑", "젖산>4 = Septic Shock = 즉각적 적극 치료", "저체온인 패혈증 환자 → 발열 없어도 패혈증 가능", "소변량 <0.5mL/kg/hr → 신기능 저하 조기 신호"], "memo": "qSOFA 2점↑ / Hour-1 Bundle: 젖산→배양→항생제→수액→Norepi / 배양은 항생제 전에!"}, {"no": "51", "name": "패혈성 쇼크", "cat": "🦠 감염/패혈증", "diff": "★★★★★", "kw": "감염성 분포성 쇼크 / 수액불응 저혈압·젖산↑ / 번들 1시간 / 승압(노르에피) / 감염원 제거", "mentor": "“패혈증이 쇼크까지 간 거야 — 감염 때문에 혈관이 확 늘어나고 새서 혈압이 무너져. 정의가 중요해: ‘충분히 수액 줬는데도 승압제가 필요하고 젖산이 높은’ 상태야. 1시간 번들 외워 — 젖산·혈액배양, 광범위 항생제, 수액 30mL/kg. 그래도 혈압 안 오르면 노르에피네프린. 그리고 어디가 곪았는지(감염원) 찾아 빼야 해.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "패혈증 중 적절한 수액에도 저혈압·고젖산이 지속돼 승압제가 필요한 상태(분포성 쇼크).", "basis": "감염 유발 전신염증 → 혈관확장·투과성↑·심기능저하 → 조직 저관류. 사망률 높음.", "img": ""}, {"item": "진단 핵심", "content": "수액 소생 후에도 평균동맥압 유지에 승압제 필요 + 젖산 상승", "basis": "‘수액불응’이 패혈성 쇼크의 정의. 단순 패혈증과 구분되는 지점.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전", "content": "감염→염증매개체·NO→혈관확장·누출+심억제→전신 저관류→젖산↑·장기부전", "basis": "분포성+저혈량+심억제 복합. 빠른 관류 회복이 생존 결정.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">패혈성 쇼크 — 분포성 쇼크</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">감염·염증매개체</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">혈관확장·누출+심억제</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">수액불응 저혈압</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">젖산↑·장기부전</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">수액 후에도 승압제 필요+젖산↑ = 패혈성 쇼크</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "저혈압·빈맥·빈호흡, 의식저하, 따뜻하다 차가워지는 말초, 핍뇨, 젖산↑", "basis": "조직 저관류의 신호. 감염 병소 증상 동반.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "즉시", "content": "젖산, 혈액배양(항생제 전) 2세트, CBC·신간기능·전해질·응고, 감염원 검사", "basis": "번들 지표·감염원 규명. 젖산은 관류·치료반응 지표.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "1시간 번들", "content": "젖산 측정, 배양 후 광범위 항생제, 저혈압/젖산↑ 시 결정질 30mL/kg", "basis": "조기 항생제·수액이 사망률 직결. 시간 싸움.", "img": ""}, {"item": "승압제", "content": "수액 후에도 저혈압 → 노르에피네프린 1차(MAP≥65 목표)", "basis": "혈관긴장 회복으로 관류 유지. 노르에피가 1차 승압제.", "img": ""}, {"item": "감염원 제거", "content": "농양 배농·감염 장치 제거·괴사조직 제거 등", "basis": "원천 제거 없이는 호전 어려움 → source control이 핵심.", "img": ""}, {"item": "재평가", "content": "젖산 청소·관류·소변량 추세 재평가", "basis": "치료반응 모니터링으로 추가 처치 결정.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">패혈성 쇼크 처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#1b5e20\">번들+승압+감염원 제거</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#1b5e20\">1시간 번들(젖산·배양·항생제·수액30mL/kg)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#1b5e20\">수액 불응→노르에피네프린(MAP≥65)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#1b5e20\">감염원 제거(농양 배농·장치 제거)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">젖산 청소·관류·소변량 재평가</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">배양은 항생제 전(단, 늦추지 말 것)</text></svg>"}], "redflags": ["수액 줘도 저혈압·젖산↑ → 패혈성 쇼크, 즉시 승압제(노르에피)", "항생제·수액 1시간 번들 지연 금지 → 사망률 직결", "배양은 항생제 ‘전’에 채취(단, 항생제를 늦추지 말 것)", "감염원(농양·장치·괴사) 미제거 → 호전 안 됨, source control"], "memo": "수액불응 저혈압·젖산↑=패혈성 쇼크 / 1시간 번들(젖산·배양·항생제·수액30mL/kg) / 노르에피 / 감염원 제거"}, {"no": "52", "name": "봉소염 / 연조직감염", "cat": "🦠 감염/패혈증", "diff": "★★☆☆☆", "kw": "국소 발적·열감·압통 / 경계 표시 추적 / 항생제 / 농양 배농 / 괴사근막염 감별", "mentor": "“피부가 빨갛게 붓고 뜨겁고 아프면 봉소염이야. 경계를 펜으로 그려놓고 번지는지 봐 — 좋아지는지 나빠지는지 한눈에 보여. 대부분 항생제로 낫고, 고름주머니(농양)면 째서 빼야 해. 진짜 무서운 건 ‘괴사성 근막염’ — 겉보기보다 통증이 극심하고 빠르게 번지고 전신이 나빠지면 응급수술이야.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "진피·피하조직의 세균감염으로 발적·부종·열감·압통이 생기는 상태.", "basis": "피부 장벽 손상으로 세균 침입·확산 → 국소 염증. 대개 연쇄구균·포도구균.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전·위험", "content": "상처·짓무름·부종·당뇨·정맥부전 → 세균 침입·증식", "basis": "위험인자가 발생·재발·중증화에 관여. 당뇨·면역저하는 합병 위험↑.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 820 420\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"820\" height=\"420\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">봉소염 — 피부밑 감염 · 경계 표시로 추적</text>\n  <line x1=\"32\" y1=\"60\" x2=\"788\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <g transform=\"translate(40,90)\">\n    <rect x=\"0\" y=\"0\" width=\"430\" height=\"40\" fill=\"#f6d9bf\" stroke=\"#cda077\" stroke-width=\"1.5\"/><text x=\"445\" y=\"26\" font-size=\"14\" fill=\"#8b6a4f\">표피</text>\n    <rect x=\"0\" y=\"40\" width=\"430\" height=\"90\" fill=\"#fbe3e5\" stroke=\"#dca9ae\" stroke-width=\"1.5\"/><text x=\"445\" y=\"90\" font-size=\"14\" fill=\"#8b6a4f\">진피</text>\n    <rect x=\"0\" y=\"130\" width=\"430\" height=\"90\" fill=\"#fff6d6\" stroke=\"#d9c98a\" stroke-width=\"1.5\"/><text x=\"445\" y=\"180\" font-size=\"14\" fill=\"#8b6a4f\">피하지방</text>\n    <ellipse cx=\"200\" cy=\"95\" rx=\"120\" ry=\"55\" fill=\"#ef6a72\" opacity=\"0.45\"/>\n    <text x=\"200\" y=\"100\" font-size=\"14\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">감염·염증 확산</text>\n    <path d=\"M70 70 q10 -16 20 0 q10 16 20 0\" fill=\"none\" stroke=\"#b23039\" stroke-width=\"2\" stroke-dasharray=\"4 3\"/>\n    <text x=\"200\" y=\"250\" font-size=\"13.5\" fill=\"#5b6876\" text-anchor=\"middle\">발적·열감·압통(경계 불분명) — 펜으로 경계 그려 진행 추적</text>\n  </g>\n  <g font-size=\"14.5\" fill=\"#3a4654\">\n    <text x=\"540\" y=\"120\" font-weight=\"800\" fill=\"#b23039\">위험 신호(괴사성)</text>\n    <text x=\"540\" y=\"150\">소견보다 극심한 통증</text>\n    <text x=\"540\" y=\"178\">빠른 진행·수포·피부괴사</text>\n    <text x=\"540\" y=\"206\">捻발음(가스)·전신독성</text>\n    <text x=\"540\" y=\"244\" font-weight=\"800\" fill=\"#b23039\">→ 응급 변연절제</text>\n    <text x=\"540\" y=\"272\" font-size=\"13.5\" fill=\"#5b6876\">농양은 절개배농(항생제만 X)</text>\n  </g>\n</svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "경계 불분명한 발적·부종·열감·압통, 국소 림프절·미열, 농양 시 파동감", "basis": "염증의 전형. 경계 표시로 진행 추적이 유용.", "img": ""}, {"item": "위험 신호(괴사성)", "content": "통증이 소견보다 극심, 빠른 진행, 수포·피 3", "name": "요로패혈증", "cat": "🦠 감염/패혈증", "diff": "★★★☆☆", "kw": "요로감염→패혈증 / 폐색 동반 위험 / 번들·배양 / 항생제 / 폐색 감압이 핵심", "mentor": "“요로감염이 전신으로 번져 패혈증이 된 거야. 노인·당뇨·결석 있는 사람한테 잘 와. 핵심 포인트 하나만 기억해 — 소변길이 막혀 있으면(결석·전립선) 항생제만으론 절대 안 나아. 막힌 걸 뚫어서(스텐트·신루) 고인 고름을 빼줘야 해. 그래서 ‘폐색이 있나’를 꼭 확인하고, 패혈증 번들도 같이 돌려.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "요로 감염(특히 신우신염)이 전신으로 파급돼 패혈증·쇼크로 진행한 상태.", "basis": "요로 병소에서 균혈증·전신염증 → 장기 저관류. 폐색 동반 시 특히 중증.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "폐색의 의미", "content": "폐색된 요로의 감염 → 농(고름)이 갇혀 배출 안 됨 → 항생제 도달·효과↓", "basis": "갇힌 감염은 배액 없이는 조절 불가 → 감압이 치료의 핵심.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">요로패혈증</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">요로감염</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">균혈증·전신염증</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">저관류·장기부전</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x= t></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "번들·항생제", "content": "패혈증 번들(수액·젖산·배양) + 경험적 광범위 항생제 신속", "basis": "조기 항생제·수액이 예후 결정. 그람음성 표적.", "img": ""}, {"item": "폐색 감압", "content": "폐색 동반 시 즉시 요관스텐트/경피신루로 배액", "basis": "감압 없이는 패혈증 조절 안 됨 → 비뇨기과 응급.", "img": ""}, {"item": "승압·지지", "content": "수액불응 저혈압 시 노르에피네프린, 모니터링", "basis": "쇼크면 패혈성 쇼크에 준해 관리.", "img": ""}], "svg": ""}], "redflags": ["요로감염+폐색(결석·수신증) → 항생제만으론 안 됨, 즉시 감압", "저혈압·젖산↑·의식저하 → 패혈성 쇼크, 1시간 번들·승압", "배양은 항생제 전 채취(단, 항생제 늦추지 말 것)", "노인·당뇨·면역저하 → 급격 악화, 면밀 감시"], "memo": "요로감염→패혈증 / 폐색 동반 여부가 핵심(있으면 감압) / 번들·배양·광범위 항생제 / 쇼크=승압"}, {"no": "54", "name": "호흡기 감염 / 격리", "cat": "🦠 감염/패혈증", "diff": "★★☆☆☆", "kw": "전파경로별 격리 / 비말 vs 공기 / 개인보호구 / 조기 선별·코호트 / 손위생", "mentor": "“응급실에서 호흡기 증상 환자가 오면 ‘옮기는 병인가’부터 판단해야 해. 핵심은 전파경로야 — 비말(독감·코로나 등)은 마스크·1인실, 공기매개(결핵·홍역·수두)는 N95+음압실이야. 둘은 차원이 달라. 들어올 때 바로 마스크 씌우고 선별해서 분리해. 그리고 모든 감염관리의 기본은 손위생이라는 거, 잊지 마.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "전파 가능한 호흡기 감염 환자에 대해 경로에 맞는 격리·보호로 원내 전파를 막는 것.", "basis": "병원체 전파경로(비말/공기/접촉)에 따라 격리 수준·보호구가 다르다.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "전파경로", "content": "비말: 큰 입자, 근거리(독감·코로나·수막알균 등)\n공기: 비말핵, 장거리 부유(결핵·홍역·수두)", "basis": "입자 크기·부유 거리가 격리 수준을 결정. 공기매개가 가장 엄격.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 880 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"880\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">전파경로별 격리</text><line x1=\"34\" y1=\"64\" x2=\"846\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"106\" y=\"92\" width=\"320\" height=\"290\" rx=\"14\" fill=\"#eef4fd\" stroke=\"#1559a8\" stroke-width=\"2\"/><text x=\"124\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#1559a8\">비말주의</text><text x=\"124\" y=\"150\" font-size=\"13.5\" fill=\"#5b6876\">큰 비말·근거리</text><text x=\"124\" y=\"174\" font-size=\"14.5\" fill=\"#3a4654\">독감·코로나·수막알균</text><text x=\"124\" y=\"202\" font-size=\"14.5\" fill=\"#3a4654\">수술용 마스크</text><text x=\"124\" y=\"230\" font-size=\"14.5\" fill=\"#3a4654\">1인실/코호트·1~2m</text><rect x=\"454\" y=\"92\" width=\"320\" height=\"290\" rx=\"14\" fill=\"#fdeced\" stroke=\"#b23039\" stroke-width=\"2\"/><text x=\"472\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#b23039\">공기주의</text><text x=\"472\" y=\"150\" font-size=\"13.5\" fill=\"#5b6876\">비말핵·장거리</text><text x=\"472\" y=\"174\" font-size=\"14.5\" fill=\"#3a4654\">결핵·홍역·수두</text><text x=\"472\" y=\"202\" font-size=\"14.5\" fill=\"#3a4654\">*N95+음압 1인실</text><text x=\"472\" y=\"230\" font-size=\"14.5\" fill=\"#3a4654\">이동 최소화</text><text x=\"40\" y=\"412\" font-size=\"13.5\" fill=\"#8b98a8\">의심부터 격리(검사 전)·조기 선별·손위생</text></svg>"}, {"title": "😣 증상", "items": [{"item": "선별 단서", "content": "발열·기침·인후통·호흡곤란, 발진(홍역·수두), 여행·접촉·유행력", "basis": "증상+역학으로 의심 질환 분류 → 즉시 적절 격리.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "검사", "content": "호흡기 바이러스 PCR/항원, 결핵 의심 시 객담 AFB·PCR, 흉부영상", "basis": "원인 확인. 의심 단계부터 격리(검사 결과 전에).", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "비말주의", "content": "수술용 마스크(환자·의료진), 1인실/코호트, 1~2m 거리", "basis": "큰 비말 차단. 독감·코로나·수막알균 등에 적용.", "img": ""}, {"item": "공기주의", "content": "N95 이상, 음압 1인실, 환자 이동 최소화·이동 시 마스크", "basis": "비말핵 공기전파 차단. 결핵·홍역·수두는 필수.", "img": ""}, {"item": "기본·조기선별", "content": "입구 선별·즉시 마스크, 손위생, 개인보호구 착·탈의 수칙", "basis": "조기 분리·손위생이 원내 전파 차단의 토대.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">감염관리 기본</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#1b5e20\">조기 분리·손위생</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">입구 선별·즉시 마스크</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">의심 단계부터 격리 시작</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">공기매개(결핵·홍역·수두)=N95·음압</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">개인보호구 착·탈의 수칙</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"800\" fill=\"#1b5e20\">손위생이 모든 것의 기본</text></svg>"}], "redflags": ["결핵·홍역·수두 의심 → 공기주의(N95+음압), 비말로 부족", "확진 전에도 의심 단계부터 격리 시작(검사 기다리지 말 것)", "내원 즉시 선별·마스크 착용으로 대기실 전파 차단", "개인보호구 탈의·손위생 부주의 → 의료진·환자 전파"], "memo": "전파경로별 격리 / 비말=마스크·1인실, 공기=N95·음압 / 의심부터 격리·조기선별 / 손위생 기본"}, {"no": "55", "name": "급성 출혈성 빈혈", "cat": "😰 기타 내과", "diff": "★★★☆☆", "kw": "실혈→저혈량 / 빈맥·기립성 먼저 / 초기 Hb 정상 함정 / 출혈원 / 수액·수혈·지혈", "mentor": "“피가 갑자기 많이 빠지면 빈혈인데, 함정이 있어 — 처음엔 Hb 수치가 멀쩡해 보여. 피가 통째로 빠져서 농도는 그대로거든. 그래서 수치만 믿지 말고 ‘맥이 빠르고 일어서면 어지러운지(기립성)’를 봐. 그게 더 빨리 알려줘. 어디서 새는지(위장관·외상·복강) 찾고, 수액·수혈하면서 출혈을 멈추는 게 핵심이야.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "급성 출혈로 혈액량·산소운반능이 급감한 상태. 저혈량성 쇼크로 진행 가능.", "basis": "적혈구·혈액량 소실 → 조직 산소공급↓·전부하↓. 출혈원 규명·지혈이 핵심.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "Hb의 함정", "content": "급성기엔 혈장·적혈구 함께 소실 → Hb 농도 초기 정상 → 수액·혈액이동 후 하강", "basis": "초기 Hb 정상이 실혈을 가린다 → 활력징후·임상으로 판단.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">급성 출혈성 빈혈</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4f x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">출혈성 빈혈 핵심</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#455a64\">활력징후가 Hb보다 빠르다</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#455a64\">초기 Hb 정상도 안심 금지</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">빈맥·기립성 저혈압=조기 단서</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">출혈원 탐색(위장관·복강·후복막·외상)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">굵은 IV·수액·수혈 소생</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"800\" fill=\"#455a64\">대량출혈→균형수혈+지혈+응고교정</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "소생", "content": "굵은 IV 2개, 수액 소생, 산소·모니터링", "basis": "순환 회복이 우선. 활력징후 추세로 적정.", "img": ""}, {"item": "수혈", "content": "실혈·증상에 따라 적혈구 수혈, 대량출혈은 균형수혈", "basis": "산소운반능 회복. 대량출혈은 혈장·혈소판 균형 수혈.", "img": ""}, {"item": "지혈·교정", "content": "출혈원 지혈(내시경·중재·수술), 응고·항응고 교정", "basis": "근본은 출혈 멈춤. 응고장애 동반 시 교정.", "img": ""}], "svg": ""}], "redflags": ["초기 Hb 정상도 안심 금지 → 활력징후·기립성으로 실혈 판단", "빈맥·기립성 저혈압 → 유효순환량 감소, 적극 소생", "숨은 출혈(후복막·복강·소화관) 적극 탐색", "대량출혈 → 균형수혈+지혈, 응고 교정 병행"], "memo": "급성 실혈→저혈량 / 초기 Hb 정상 함정 / 빈맥·기립성 먼저 / 출혈원 규명 / 수액·수혈+지혈·응고교정"}, {"no": "56", "name": "파종성 혈관내응고 (DIC)", "cat": "😰 기타 내과", "diff": "★★★★★", "kw": "기저질환 합병 / 응고+출혈 동시 / 소모성 / 검사패턴(PT·혈소판·D-dimer·fibrinogen) / 기저치료", "mentor": "“DIC는 그 자체 병이 아니라 ‘다른 큰 병(패혈증·산과·암·외상)’이 일으키는 재앙이야. 온몸에서 피가 굳다가(미세혈전) 재료가 다 떨어져 이번엔 곳곳에서 새. 굳기와 출혈이 동시에 일어나는 게 핵심이야. 검사가 알려줘 — 혈소판↓·PT 연장·D-dimer↑·피브리노겐↓. 제일 중요한 치료는 ‘원인 병을 잡는 것’이야.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "기저질환에 의해 전신 응고계가 과활성화돼 미세혈전과 출혈이 동시에 일어나는 후천적 응고장애.", "basis": "광범위 응고인자·혈소판 소모 → 혈전(장기손상)+소모성 출혈. 항상 기저질환 동반.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전", "content": "유발(패혈증·산과·암·외상) → 조직인자 노출 → 전신 응고활성 → 인자·혈소판 소모 + 이차 섬유소용해", "basis": "‘굳음으로 다 써버려 출혈’ → 소모성. 원인 제거가 치료의 본질.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">DIC — 소모성 응고장애</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">기저질환(패혈증 등)</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">전신 응고 활성</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">인자·혈소판 소모</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">출혈 + 미세혈전</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" fo
