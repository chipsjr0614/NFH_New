↓+PT연장+피브리노겐↓+D-dimer↑ → DIC 패턴", "출혈과 혈전이 동시 → 단순 출혈/혈전으로 오판 금지", "성분 수혈은 출혈/시술 시 표적 보충(무조건 아님)"], "memo": "기저질환이 일으키는 소모성 응고장애 / 응고+출혈 동시 / 혈소판↓·PT↑·피브리노겐↓·D-dimer↑ / 원인치료"}, {"no": "57", "name": "발열성 호중구감소증", "cat": "😰 기타 내과", "diff": "★★★★☆", "kw": "항암 후 면역붕괴 / 발열=응급 / 1시간 내 항생제 / 배양·감염소 / 보호격리·집락자극인자", "mentor": "“항암치료 받은 환자가 열나면 그 자체가 응급이야. 백혈구(특히 호중구)가 바닥이라 면역이 거의 없어서, 평범한 균도 몇 시간 만에 패혈증으로 죽일 수 있어. 핵심은 단순해 — 배양 뽑고 ‘1시간 안에’ 광범위 항생제를 때려넣는 거야. 그리고 균을 더 옮기지 않게 보호격리하고 손위생 철저히 해.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "호중구가 심하게 감소한 상태에서 발열이 동반된 응급(흔히 항암치료 후).", "basis": "면역 최전선 호중구 부재 → 경미한 감염도 급속히 패혈증화. 발열이 유일 단서일 수 있음.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전", "content": "세포독성 항암 → 골수억제 → 호중구↓ → 염증반응 미약(발열만)", "basis": "호중구가 없어 농·발적 등 징후가 약함 → 발열 하나도 응급으로 간주.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">발열성 호중구감소증</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">세포독성 항암</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">골수억제·호중구↓</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">면역 최전선 부재</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">발열로도 패혈증 급속</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">발열=응급 · 배양 후 1시간 내 광범위 항생제</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "발열(때로 유일 징후), 감염 징후는 미약·비전형, 빠른 패혈증 진행", "basis": "면역반응 약화로 국소 소견 적음 → 작은 단서도 중대하게 평가.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "즉시", "content": "CBC(절대호중구수), 혈액배양 2세트(말초+카테터)·감염소별 배양, 젖산·장기기능", "basis": "호중구수 확인·감염원 탐색. 단, 항생제를 검사로 늦추지 말 것.", "img": ""}, {"item": "감염소", "content": "흉부영상, 소변·도관·점막·피부·항문 주위 평가", "basis": "숨은 감염소 탐색. 직장체온계·관장 등 점막손상 시술은 지양.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "즉시 광범위 항생제", "content": "1시간 내 경험적 광범위 항생제(항녹농균 포함)", "basis": "조기 항생제가 생존 직결 — 배양 후 즉시. 위험도 따라 약제 선택.", "img": ""}, {"item": "보호격리·지지", "content": "손위생·보호격리, 활력징후 감시, 패혈증이면 번들", "basis": "외인성 감염·전파 차단. 쇼크면 패혈성 쇼크 처치.", "img": ""}, {"item": "집락자극인자·조정", "content": "상황 따라 G-CSF 고려, 종양내과 협진", "basis": "호중구 회복 촉진(선택적). 원발질환·항암 조정은 전문과와.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">발열성 호중구감소증</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#455a64\">1시간이 생명</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#455a64\">항암 후 발열=그 자체가 응급</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#455a64\">1시간 내 경험적 광범위 항생제(항녹농균)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">혈액배양 2세트(말초+카테터)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">보호격리·손위생</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">직장체온·관장 등 점막손상 시술 지양</text></svg>"}], "redflags": ["항암 후 발열 = 그 자체가 응급 → 1시간 내 광범위 항생제", "호중구 부재로 감염 징후 미약 → 발열만으로도 중대 평가", "직장체온·관장 등 점막손상 시술 지양 → 균혈증 유발", "급속 패혈증화 → 활력징후 면밀 감시, 쇼크 시 번들"], "memo": "항암 후 발열=응급 / 면역붕괴로 징후 미약 / 배양 후 1시간 내 광범위 항생제 / 보호격리·손위생 / G-CSF"}, {"no": "58", "name": "악성종양 고칼슘혈증", "cat": "😰 기타 내과", "diff": "★★★☆☆", "kw": "암 합병 / stones·bones·groans·moans / 탈수·의식저하 / 대량 수액 우선 / 비스포스포네이트", "mentor": "“암 환자가 자꾸 토하고 변비 심하고 헷갈려 하고 소변을 많이 보면 고칼슘혈증을 의심해. 칼슘이 높으면 물을 끌고 빠져나가 탈수가 심해지고, 그게 또 칼슘을 못 빼서 악순환이야. 그래서 치료 1번은 ‘수액’ — 식염수로 충분히 채워. 그 다음 칼슘을 떨어뜨리는 약(비스포스포네이트)을 줘. 효과는 며칠 걸려.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "악성종양에 의해 혈청 칼슘이 상승한 상태. 암 관련 대사 응급 중 흔하다.", "basis": "종양의 PTHrP 분비·골용해 등으로 칼슘↑ → 다장기 증상·탈수. 예후 지표이기도.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "악순환", "content": "고칼슘 → 신장 농축능 장애·삼투성 이뇨 → 탈수 → 칼슘 배설↓ → 더 상승", "basis": "탈수가 고칼슘을 악화 → 수액으로 고리를 끊는 게 1차.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">악성종양 고칼슘혈증</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">종양(PTHrP·골용해)</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">칼슘↑</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">삼투성 이뇨·탈수</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">칼슘 배설↓ 악순환</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">대량 수액이 1순위 · 비스포스포네이트(±칼시토닌)</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "다뇨·탈수, 오심·구토·변비, 의식저하·기면·혼돈, 위약, 신결석", "basis": "‘stones, bones, groans, moans’. 비특이적이라 암 환자에서 적극 의심.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "랩", "content": "혈청 칼슘(이온화/보정), 알부민·PTH·PTHrP, 신기능·전해질, ECG(QT단축)", "basis": "중증도·기전 평가. 알부민 보정 칼슘으로 해석.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "① 대량 수액", "content": "생리식염수 적극 수액(탈수 교정·칼슘뇨 배설 촉진)", "basis": "치료의 토대 — 수분 회복이 칼슘을 즉시 낮추기 시작.", "img": ""}, {"item": "② 칼슘 강하제", "content": "비스포스포네이트(지속), 칼시토닌(빠르나 일시적), 중증은 데노수맙", "basis": "골흡수 억제로 칼슘↓. 비스포스포네이트는 며칠 후 효과, 칼시토닌은 가교.", "img": ""}, {"item": "원인·주의", "content": "원발 암 치료, 신기능 따라 약물·용량 조정, 과거 루틴 이뇨제는 신중", "basis": "근본은 종양 치료. 탈수 전 이뇨제 사용은 금물(먼저 수액).", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">고칼슘혈증 치료</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#455a64\">수액→칼슘강하제</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">증상: 다뇨·변비·오심·혼돈(stones·bones·groans)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#455a64\">①대량 생리식염수(탈수 교정 먼저)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">②비스포스포네이트(효과 며칠)±칼시토닌</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#455a64\">탈수 전 이뇨제 금물</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">원발 암 치료·신기능 따라 용량</text></svg>"}], "redflags": ["치료 1순위는 ‘대량 수액’ → 탈수 교정 전 이뇨제 금물", "의식저하·심한 탈수·QT 단축 → 중증 고칼슘, 적극 치료", "비스포스포네이트는 효과까지 며칠 → 중증은 칼시토닌 가교", "암 환자의 비특이 증상(변비·혼돈·다뇨) → 칼슘 확인"], "memo": "암 합병 고칼슘 / 탈수 악순환 / 대량 수액이 1순위 / 비스포스포네이트(±칼시토닌) / 원발암 치료"}, {"no": "59", "name": "아나필락시스", "cat": "😰 기타 내과", "diff": "★★★★★", "kw": "IgE 과민반응 / 에피네프린 IM 즉시 / 대퇴 전외측 / 이상성 반응 / 기도부종", "mentor": "\"아나필락시스는 1분이 생명이야. 신규들이 제일 많이 하는 실수가 '항히스타민·스테로이드 먼저 주자'인데, 절대 아니야. 무조건 에피네프린 근육주사부터! 허벅지 바깥쪽에 0.3~0.5mg. 망설이면 기도가 붓고 혈압이 떨어져. 약 순서만 제대로 알아도 사람 살려.\"", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "알레르겐에 노출돼 전신적으로 빠르게 진행하는 중증 즉시형(제1형) 과민반응. 기도·순환이 무너지는 생명 응급.", "basis": "IgE가 비만세포·호염기구를 자극 → 히스타민 등 매개물질 대량 방출 → 혈관확장·투과성↑·기관지수축이 동시에 전신에서 발생.", "img": "🖼️ 비만세포 탈과립 → 전신 매개물질 방출 모식도"}, {"item": "흔한 유발인자", "content": "음식(견과·갑각류·우유·계란), 약물(항생제·NSAIDs·조영제), 벌독, 라텍스", "basis": "이전 노출로 감작(IgE 형성)된 항원에 재노출 시 발생. 첫 노출보다 재노출이 위험.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전", "content": "알레르겐 → 비만세포 표면 IgE 교차결합 → 탈과립 → 히스타민·트립타제·류코트리엔 방출 → 혈관확장·모세혈관 누출·기관지수축", "basis": "혈관 누출로 혈장이 조직으로 빠져 '분포성 쇼크' + 후두·기관지 부종으로 기도 폐쇄 → 에피네프린이 이 모든 경로를 한 번에 되돌림.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">아나필락시스 — 즉시형 과민</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">알레르겐 노출</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">비만세포 탈과립</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">히스타민 등 방출</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">혈관확장+기관지수축</text><text x=\"888\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">쇼크·기도부종</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">에피네프린 IM이 1순위(항히스타민·스테로이드는 보조)</text></svg>"}, {"title": "😣 증상", "items": [{"item": "장기별 증상", "content": "피부(80~90%): 두드러기·혈관부종·홍조·가려움\n호흡기: 협착음(stridor)·천명·호흡곤란·후두부종\n순환: 저혈압·빈맥·쇼크·실신\n소화기: 구토·복통·설사", "basis": "피부 증상이 가장 흔하지만 없을 수도 있음. 피부 증상 없이 저혈압·기도증상만으로도 아나필락시스 → 피부만 보고 배제 금지.", "img": "🖼️ 두드러기·혈관부종·후두부종 임상사진"}], "svg": ""}, {"title": "📈 진단", "items": [{"item": "임상 진단 기준", "content": "① 급성 피부·점막 증상 + 호흡곤란 또는 저혈압\n② 의심 항원 노출 후 2개 이상 장기 침범\n③ 알려진 항원 노출 후 저혈압", "basis": "검사 기다리지 말고 임상으로 즉시 진단·치료. 혈청 트립타제는 사후 확인용(치료를 늦추지 않음).", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">아나필락시스 처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#455a64\">에피네프린이 1순위</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#455a64\">①에피네프린 IM(대퇴 전외측) 즉시</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">1:1000 0.3~0.5mg, 5~15분마다 반복</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">②기도·산소·앙와위+다리거상</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">③수액(저혈압시 빠른 볼루스)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">④보조: 항히스타민·스테로이드 / β차단제→글루카곤</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "① 에피네프린 IM (최우선)", "content": "1:1000 0.3~0.5mg, 대퇴 전외측(허벅지 바깥)에 근육주사. 5~15분마다 반복 가능", "basis": "α1: 혈관수축→혈압↑·부종↓ / β1: 심박출↑ / β2: 기관지확장·매개물질 방출 억제. 대퇴 근육은 흡수 빠름. SC·삼각근보다 IM 대퇴가 표준.", "img": "🖼️ 에피네프린 대퇴 전외측 IM 주사 부위 + 처치 순서"}, {"item": "② 기도·체위·산소", "content": "고유량 산소, 앙와위 + 다리 거상(구토 시 측위), 기도부종 시 조기 기도확보 준비", "basis": "분포성 쇼크에 다리 거상으로 정맥환류 유지. 후두부종 진행 시 늦기 전에 삽관 준비.", "img": ""}, {"item": "③ 수액", "content": "저혈압 시 등장성 수액(N/S) 빠른 볼루스", "basis": "혈관 누출로 빠진 혈장을 보충 → 전부하 유지. 쇼크엔 에피네프린+대량수액.", "img": ""}, {"item": "④ 보조 약물", "content": "항히스타민(H1: 클로르페니라민, H2: 라니티딘), 스테로이드(하이드로코르티손), 천명 시 흡입 살부타몰", "basis": "보조일 뿐 1차 아님. 항히스타민은 피부증상, 스테로이드는 이상성 반응 예방 목적. 에피네프린을 절대 대체 못 함.", "img": ""}, {"item": "⑤ 불응성", "content": "반복에도 안 되면 에피네프린 IV 지속주입, β차단제 복용자는 글루카곤", "basis": "β차단제 복용자는 에피네프린 반응↓ → 글루카곤으로 우회. 불응성은 중환자 관리.", "img": ""}], "svg": ""}], "redflags": ["협착음(stridor)·쉰 목소리·후두부종 → 기도 응급, 즉시 에피네프린 + 기도확보 준비", "항히스타민·스테로이드 먼저 주느라 에피네프린 지연 절대 금지 (1차는 무조건 에피네프린 IM)", "피부 증상 없어도 저혈압·기도증상이면 아나필락시스로 대응", "증상 호전돼도 4~12시간 후 이상성(biphasic) 반응 가능 → 관찰 필수", "β차단제 복용자는 에피네프린 반응 저하 → 글루카곤 고려"], "memo": "에피네프린 1:1000 0.3~0.5mg 대퇴 IM 즉시·5~15분 반복 / 항히스타민·스테로이드는 보조 / 수액·산소·다리거상 / 이상성 반응 4~12h 관찰"}, {"no": "60", "name": "약물 과용량 / 중독", "cat": "😰 기타 내과", "diff": "★★★☆☆", "kw": "ABC·기도 우선 / 독성증후군 / 해독제 / 흡수감소(활성탄) / 특정약물(아세트아미노펜·오피오이드)", "mentor": "“중독 환자는 ‘무슨 약인지’보다 ‘지금 숨·혈압·의식이 괜찮은지(ABC)’가 먼저야. 안정시키고 나서 무엇을·얼마나·언제 먹었는지 캐물어. 증상 묶음(독성증후군)으로 약을 추정할 수 있어. 해독제 있는 것들 꼭 기억해 — 오피오이드는 날록손, 아세트아미노펜은 NAC. 특히 아세트아미노펜은 초기에 멀쩡해도 간이 망가지니 농도 꼭 확인해.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "약물·물질의 과량 노출로 독성이 나타난 상태. 우발적·의도적 모두 포함.", "basis": "흡수된 독성물질이 장기 기능을 교란. 지지요법이 기본, 일부는 특이 해독제 존재.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "독성증후군(toxidrome)", "content": "증상 묶음으로 계열 추정: 콜린성/항콜린성/교감흥분/오피오이드/진정-수면", "basis": "활력징후·동공·피부·의식 패턴으로 미상 물질 추정 → 치료 방향.", "img": ""}], "svg": ""}, {"title": "😣 증상", "items": [{"item": "증상", "content": "의식·호흡·혈압·동공·체온·피부 변화 등 물질별 다양; 의도적은 다약물 가능", "basis": "독성증후군으로 분류. 동공·발한·장음 등이 단서.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">독성증후군(Toxidrome)으로 추정</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#455a64\">증상 묶음으로 계열 추정</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">오피오이드: 의식↓·호흡↓·동공축소→날록손</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">교감흥분: 빈맥·고혈압·산동·발한</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">항콜린성: 고열·홍조·산동·섬망·장음↓</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">콜린성: 침·눈물·서맥·축동·설사</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">진정-수면: 졸림·호흡억제</text></svg>"}, {"title": "📈 검사", "items": [{"item": "즉시", "content": "혈당·ECG(QRS/QT), 아세트아미노펜·살리실산 농도, 동맥혈가스·전해질·삼투압차·신간기능", "basis": "숨은 치명 중독(아세트아미노펜) 선별. ECG로 심독성 평가.", "img": ""}, {"item": "병력", "content": "무엇·얼마나·언제·동반물질·의도 여부, 약병·정보 확보", "basis": "용량·시점이 해독제·관찰시간 결정. 의도적이면 정신과 평가.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "ABC·지지", "content": "기도·호흡·순환 안정, 모니터링, 저혈당·경련 교정", "basis": "대부분 중독은 지지요법으로 회복. 안정화가 최우선.", "img": ""}, {"item": "해독제", "content": "오피오이드→날록손, 아세트아미노펜→NAC, 벤조→(신중)플루마제닐, TCA→중탄산 등", "basis": "특이 해독제가 있는 물질은 적시 투여가 생명. 계열별 숙지.", "img": ""}, {"item": "흡수 감소·제거", "content": "적응 시 활성탄(조기·기도보호), 일부 약물 소변알칼리화·투석", "basis": "활성탄은 이른 시점·기도 안전 시. 의식저하 흡인 위험 주의.", "img": ""}, {"item": "독성정보·정신과", "content": "중독관리센터 자문, 의도적 음독은 안전·정신과 평가", "basis": "전문 자문으로 처치 최적화. 자살 위험 평가 필수.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">중독 처치 원칙</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#455a64\">ABC→해독제→흡수감소</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#455a64\">약물보다 ABC(기도·호흡·순환) 우선</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#455a64\">아세트아미노펜: 초기 무증상도 간부전→농도·NAC</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">오피오이드→날록손, TCA→중탄산</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">활성탄: 조기·기도안전 시(흡인 주의)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">의도적 음독→다약물·정신과 평가</text></svg>"}], "redflags": ["약물 종류보다 ABC(기도·호흡·순환) 안정이 우선", "아세트아미노펜은 초기 무증상도 간부전 위험 → 농도 확인·NAC", "오피오이드 호흡억제 → 즉시 날록손, 기도 확보", "의식저하 환자에 활성탄 → 흡인 위험, 기도보호 없이는 금물", "의도적 음독 → 다약물·재시도 위험, 정신과 평가"], "memo": "ABC 우선 / 독성증후군으로 추정 / 해독제(날록손·NAC 등) / 활성탄은 조기·기도안전 시 / 아세트아미노펜 농도"}];
const CAT_COLOR = {
  '❤️ 심장/순환기':'#B71C1C','🫁 호흡기':'#00838F','🧠 신경계':'#1A237E','🫀 소화기':'#5D4037',
  '🩺 신장/비뇨기':'#00695C','🍬 내분비/대사':'#E65100','🦠 감염/패혈증':'#1B5E20','😰 기타 내과':'#455A64'};
const SEC_COLOR = ['#1565C0','#2e7d32','#e65100','#8e24aa','#c62828','#00838f'];
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
let VIEWED = new Set(JSON.parse(localStorage.getItem('erEduViewed')||'[]'));

function theme(t){
  document.body.classList.toggle('light',t==='light');
  document.getElementById('bd').classList.toggle('on',t==='dark');
  document.getElementById('bl').classList.toggle('on',t==='light');
  localStorage.setItem('erEduTheme',t);
}
if(localStorage.getItem('erEduTheme')==='light') theme('light');

function catColor(cat){ return CAT_COLOR[cat] || '#666'; }
function updateProg(){
  const n=VIEWED.size, t=CASES.length;
  document.getElementById('progTxt').textContent = n+' / '+t;
  document.getElementById('pfill').style.width = (t? n/t*100:0)+'%';
}
function renderHome(){
  const q=(document.getElementById('q').value||'').toLowerCase().trim();
  const list=CASES.filter(c=> !q || (c.name+c.kw+c.cat).toLowerCase().includes(q));
  const cats={};
  list.forEach(c=>{(cats[c.cat]=cats[c.cat]||[]).push(c);});
  const el=document.getElementById('catList');
  if(!list.length){ el.innerHTML='<div class="noresult">검색 결과가 없어요 🔍</div>'; return; }
  let html='';
  Object.keys(cats).forEach(cat=>{
    html+=`<div class="cat"><div class="cat-h">${esc(cat)} <span class="cnt">${cats[cat].length}개</span></div><div class="grid">`;
    cats[cat].forEach(c=>{
      html+=`<div class="card ${VIEWED.has(c.no)?'viewed':''}" style="--cc:${catColor(c.cat)}" onclick="openCase('${c.no}')">
        <span class="vchk">✅</span>
        <div class="no">CASE #${esc(c.no)}</div>
        <div class="nm">${esc(c.name)}</div>
        <div class="df">${esc(c.diff)}</div>
      </div>`;
    });
    html+='</div></div>';
  });
  el.innerHTML=html;
}
function openCase(no){
  const i=CASES.findIndex(c=>c.no===no); if(i<0) return;
  const c=CASES[i];
  VIEWED.add(no); localStorage.setItem('erEduViewed',JSON.stringify([...VIEWED])); updateProg();
  const col=catColor(c.cat);
  let tabs='', panels='';
  c.sections.forEach((s,si)=>{
    const sc=SEC_COLOR[si%SEC_COLOR.length];
    tabs+=`<button class="tab ${si===0?'active':''}" style="${si===0?'background:'+sc:''}" onclick="selTab(this,'pn${si}','${sc}')">${esc(s.title)}</button>`;
    let items='';
    s.items.forEach(it=>{
      items+=`<div class="item"><div class="item-title">${esc(it.item)}</div>
        <div class="item-body">${esc(it.content)}</div>
        ${it.basis?`<div class="why"><div class="wl">💡 왜?</div><div class="wt">${esc(it.basis)}</div></div>`:''}
        ${it.img?`<div class="imgnote">${esc(it.img)}</div>`:''}</div>`;
    });
    const fig = s.svg?`<div class="fig">${s.svg}</div>`:'';
    panels+=`<div class="panel ${si===0?'active':''}" id="pn${si}">
      <div class="sec-head"><h2>${esc(s.title)}</h2></div>${fig}${items}</div>`;
  });
  const rf = c.redflags.length? `<div class="redbox"><h2>🔴 Red Flag — 절대 놓치면 안 되는 것</h2>
    ${c.redflags.map(r=>`<div class="rf"><span class="ri">⚠️</span><span>${esc(r)}</span></div>`).join('')}</div>`:'';
  const memo = c.memo? `<div class="memo"><div class="ml">⚡ 핵심 암기</div><p>${esc(c.memo)}</p></div>`:'';
  const prev = i>0? CASES[i-1]:null, next = i<CASES.length-1? CASES[i+1]:null;
  document.getElementById('detail').innerHTML = `
    <button class="back" onclick="goHome()">← 목록으로</button>
    <div class="hero" style="background:linear-gradient(135deg,${col}cc,${col})">
      <div class="cno">CASE #${esc(c.no)} · ${esc(c.cat)}</div>
      <h1>${esc(c.name)}</h1>
      <div class="meta"><span class="chip">난이도 ${esc(c.diff)}</span>${
        c.kw.split('/').map(k=>k.trim()).filter(k=>k).map(k=>`<span class="chip">${esc(k)}</span>`).join('')}</div>
    </div>
    ${c.mentor?`<div class="mentor"><div class="mh">💬 선배 말씀 (프셉마음)</div><p>${esc(c.mentor)}</p></div>`:''}
    <div class="tabs">${tabs}</div>
    ${panels}
    ${rf}${memo}
    <div class="navbtns">
      <button ${prev?'':'disabled'} onclick="${prev?`openCase('${prev.no}')`:''}">← ${prev?esc(prev.name):'이전'}</button>
      <button ${next?'':'disabled'} onclick="${next?`openCase('${next.no}')`:''}">${next?esc(next.name):'다음'} →</button>
    </div>`;
  document.getElementById('home').style.display='none';
  document.getElementById('detail').style.display='block';
  window.scrollTo(0,0);
}
function selTab(btn,pid,color){
  document.querySelectorAll('.tab').forEach(t=>{t.classList.remove('active');t.style.background='';});
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active'); btn.style.background=color;
  document.getElementById(pid).classList.add('active');
}
function goHome(){
  document.getElementById('detail').style.display='none';
  document.getElementById('home').style.display='block';
  renderHome(); window.scrollTo(0,0);
}
document.getElementById('totalN').textContent=CASES.length;
updateProg(); renderHome();
</script>
</body>
</html>
