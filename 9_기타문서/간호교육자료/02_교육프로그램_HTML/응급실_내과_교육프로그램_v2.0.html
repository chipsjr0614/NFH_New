늦추지 말 것)", "basis": "세균성은 분초가 예후를 좌우 → 검사보다 치료가 우선될 수 있음.", "img": ""}, {"item": "덱사메타손", "content": "세균성(특히 폐렴구균) 의심 시 항생제와 함께/직전", "basis": "염증반응 억제로 신경학적 후유증·청력손실 감소 근거.", "img": ""}, {"item": "격리·지지", "content": "수막알균 의심 시 비말격리, 수액·뇌압·경련 관리, 접촉자 예방", "basis": "비말 전파 차단·합병증 관리. 밀접접촉자 예방적 항생제.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">뇌수막염 — 놓치면 안 될 것</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#b23039\">조기 항생제가 생명</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">세균성 의심→검사로 항생제 늦추지 말 것</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">덱사메타손(폐렴구균)을 항생제와 함께</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">의식저하·국소징후→LP 전 CT</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">점상출혈성 발진→수막알균(비말격리)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">CSF: 다형핵↑·당↓·단백↑</text></svg>"}], "redflags": ["세균성 의심 → 검사 기다리다 항생제 늦추지 말 것(즉시 투여)", "의식저하·국소징후·유두부종 → LP 전 CT로 뇌압 병변 배제", "점상출혈성 발진+발열 → 수막알균혈증, 비말격리+즉시 치료", "발열·두통·경부강직 3징 → 수막염 적극 평가(노인은 비전형)"], "memo": "발열·두통·경부강직 / 세균성=응급 즉시 항생제+덱사메타손 / LP(필요시 CT 먼저) / 수막알균=비말격리"}, {"no": "25", "name": "경련 / 간질 발작", "cat": "🧠 신경계", "diff": "★★★☆☆", "kw": "전신강직간대 / 기도·외상 보호 / 발작 후 상태 / 유발원인(저혈당·전해질) / 5분=지속상태", "mentor": "“발작 나면 당황하지 말고 ‘다치지 않게’가 먼저야. 입에 뭐 물리지 말고, 옆으로 눕히고, 주변 치우고 시간 재. 대부분 몇 분 안에 멈춰. 근데 5분 넘게 가면 ‘지속상태’로 약을 줘야 해. 그리고 발작엔 항상 이유가 있어 — 혈당부터 찍어, 저혈당이 흔한 범인이야.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "뇌의 비정상적 과도 전기활동으로 생기는 발작. 전신강직간대가 대표적.", "basis": "뉴런 동시 과흥분 → 운동·의식·감각 증상. 유발성(급성 원인)과 비유발성(간질)으로 구분.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전·유발", "content": "흥분-억제 균형 붕괴; 저혈당·저나트륨·저산소·발열·약물/금단·뇌병변", "basis": "급성 유발 원인 교정이 재발 방지의 핵심 → 원인 탐색 필수.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">경련 — 뇌 과흥분</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">흥분-억제 균형 붕괴</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">뉴런 동시 과흥분</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">발작(운동·의식)</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">발작 후 회복기</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">유발: 저혈당·저Na·저산소·발열·약물/금단 → 혈당부터</text></svg>"}, {"title": "😣 증상", "items": [{"item": "발작기", "content": "의식소실, 전신 강직→간대 운동, 청색증, 요실금, 혀 깨물기", "basis": "전신성 발작의 전형. 외상·흡인 위험 → 보호가 우선.", "img": ""}, {"item": "발작 후", "content": "혼돈·졸림(postictal), 일시적 국소위약(Todd 마비)", "basis": "발작 후 회복기. 점차 호전되며, 지속되면 다른 원인 의심.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "즉시", "content": "혈당(현장), 전해질(Na·Ca·Mg)·신기능, 산소포화, 약물·음주력", "basis": "저혈당·저나트륨 등 교정 가능 원인 즉시 확인.", "img": ""}, {"item": "추가", "content": "ECG, 임신·독성 검사, 첫 발작·국소징후 시 뇌영상, EEG", "basis": "원인·재발위험 평가. 새 국소병변·구조이상 배제.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "발작 중 보호", "content": "측위, 주변 위험물 제거, 산소, 흡인 방지, 시간 측정(억지 제지·구강삽입 금지)", "basis": "손상·흡인 예방이 우선. 입에 물건 넣으면 외상·기도폐색 위험.", "img": ""}, {"item": "지속상태(>5분)", "content": "Benzodiazepine(Lorazepam/Midazolam) 1차 → 이후 항경련제 부하", "basis": "5분 이상 지속/반복은 지속상태 → 즉시 약물로 중단(뇌손상 예방).", "img": ""}, {"item": "원인 교정", "content": "저혈당이면 포도당, 저Na·전해질 교정, 유발약물·발열 관리", "basis": "유발 원인 제거 없이는 재발. 저혈당은 즉시 교정.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">발작 대응</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#c2611a\">보호와 원인 동시</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#c2611a\">보호: 측위·주변 안전·시간 측정</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">구강 내 물건·억지 제지 금지</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#c2611a\">모든 경련은 혈당부터</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">5분 이상 지속→지속상태(벤조)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">발열+발작·국소징후→수막염/구조병변</text></svg>"}], "redflags": ["발작 5분 이상 지속/반복(회복 없이) → 간질지속상태, 즉시 약물", "발작 시 입에 물건 넣거나 억지로 누르기 금지(외상·흡인)", "모든 발작은 혈당부터 확인 → 저혈당이 흔한 가역 원인", "발열+발작·새 국소징후 → 수막염/뇌염·구조병변 배제"], "memo": "보호 우선(측위·시간측정, 구강삽입 금지) / 혈당부터 / 5분↑=지속상태→벤조 / 유발원인 교정"}, {"no": "26", "name": "뇌전증 지속상태", "cat": "🧠 신경계", "diff": "★★★★☆", "kw": "5분↑ 지속/연속발작 / 뇌손상 응급 / 벤조→항경련제→마취 / 기도·원인 동시", "mentor": "“이건 ‘멈추지 않는 발작’이라 진짜 응급이야. 오래 갈수록 약도 안 듣고 뇌가 상해. 단계가 있어 — 먼저 벤조디아제핀, 안 멈추면 항경련제 부하, 그래도 안 되면 마취제 깔고 삽관. 멈추는 것과 ‘왜 멈추지 않나(원인)’를 동시에 찾아야 해. 혈당·전해질·약물 끊김부터.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "발작이 5분 이상 지속되거나, 의식 회복 없이 반복되는 신경학적 응급.", "basis": "장시간 발작 → 흥분독성·대사부담으로 뇌신경 손상. 시간이 갈수록 약물 반응성↓.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "난치화 기전", "content": "지속 발작 → GABA 수용체 내재화·감소 → 벤조 반응성↓", "basis": "시간 경과로 벤조 효과가 떨어짐 → 조기·충분량 투여가 중요.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">간질지속상태 — 시간이 약효를 깎는다</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">지속·반복 발작</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">GABA 수용체 감소</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">벤조 반응성↓</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">흥분독성·뇌손상</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">조기·충분량 투여가 관건 · 5분↑ 또는 회복없는 반복</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "지속·반복 경련(경련성), 또는 의식저하 지속(비경련성), 자율신경 불안정", "basis": "겉으로 멈춘 듯해도 의식 안 돌아오면 비경련성 지속상태 의심 → EEG.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "동시 평가", "content": "혈당·전해질·신간기능, ABG, 항경련제 농도, 독성·감염, 뇌영상, EEG", "basis": "치료와 병행해 유발 원인 탐색. 비경련성은 EEG로 확인.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "1단계", "content": "Benzodiazepine(Lorazepam IV/Midazolam IM) 충분량", "basis": "1차 약. 신속·충분 투여가 중단율↑. 기도·산소 동시 확보.", "img": ""}, {"item": "2단계", "content": "항경련제 부하(Levetiracetam/Valproate/Phenytoin/Fosphenytoin)", "basis": "벤조로 안 멈추면 추가 부하로 재발 방지.", "img": ""}, {"item": "3단계(불응성)", "content": "마취제 지속주입(Midazolam/Propofol) + 기관삽관·EEG 감시", "basis": "불응성은 전신마취로 발작 억제. 환기·혈역학 관리 필수.", "img": ""}, {"item": "원인·지지", "content": "혈당·전해질 교정, 기도·순환 유지, 발열·감염 관리", "basis": "유발 교정 없이는 재발. 기도·산소·순환이 토대.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">지속상태 단계 치료</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#b23039\">벤조→항경련제→마취제</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">1단계: 벤조디아제핀(충분량)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">2단계: 항경련제 부하(Levetiracetam 등)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">3단계(불응성): 마취제+삽관+EEG</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">기도·산소·혈당·전해질 동시 교정</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">멈춰도 의식 안 돌아오면 비경련성(EEG)</text></svg>"}], "redflags": ["발작 멈춰도 의식 회복 없음 → 비경련성 지속상태, EEG 필요", "벤조에 안 멈추면 지체 없이 항경련제 부하→마취제 단계 진행", "오래 지속될수록 약물 반응성↓·뇌손상↑ → 조기·충분 투여", "기도·산소 확보와 원인(혈당·전해질·약물중단) 교정 동시 진행"], "memo": "5분↑/회복없는 반복=응급 / 벤조(충분량)→항경련제→마취제+삽관 / EEG(비경련성) / 원인 동시 교정"}, {"no": "27", "name": "현훈 / 어지럼증", "cat": "🧠 신경계", "diff": "★★☆☆☆", "kw": "말초 vs 중추 감별 / HINTS / 안진 양상 / 뇌졸중 배제 / 대증·전정재활", "mentor": "“어지럼은 ‘빙빙 도는 진짜 현훈’인지부터 구분해. 대부분 귀 문제(말초)라 양호하지만, 가끔 소뇌·뇌간 뇌졸중(중추)이 숨어 있어. 그게 무서운 거야. 똑바로 못 걷거나, 다른 신경증상 있거나, 안진이 방향 바뀌면 중추를 의심하고 영상 봐야 해. HINTS가 도움이 돼.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "주위가 도는 듯한 회전성 어지럼(현훈). 전정계(말초/중추) 이상에서 비롯.", "basis": "전정 정보 불균형 → 회전 착각·안진·균형장애. 말초(내이)와 중추(뇌간·소뇌) 감별이 핵심.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "말초 vs 중추", "content": "말초: BPPV·전정신경염·메니에르(내이)\n중추: 소뇌·뇌간 뇌졸중·종양", "basis": "말초는 양호·대증, 중추는 응급. 동반 신경증상·보행으로 구분.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 880 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"880\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">현훈 — 말초 vs 중추</text><line x1=\"34\" y1=\"64\" x2=\"846\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"106\" y=\"92\" width=\"320\" height=\"290\" rx=\"14\" fill=\"#eef7f0\" stroke=\"#1d6b36\" stroke-width=\"2\"/><text x=\"124\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#1d6b36\">말초(내이)</text><text x=\"124\" y=\"156\" font-size=\"14.5\" fill=\"#3a4654\">BPPV·전정신경염·메니에르</text><text x=\"124\" y=\"184\" font-size=\"14.5\" fill=\"#3a4654\">수평-회선 안진(방향 일정)</text><text x=\"124\" y=\"212\" font-size=\"14.5\" fill=\"#3a4654\">이명·청력저하 가능</text><text x=\"124\" y=\"240\" font-size=\"14.5\" fill=\"#3a4654\">신경결손 없음(대개 양호)</text><rect x=\"454\" y=\"92\" width=\"320\" height=\"290\" rx=\"14\" fill=\"#fdeced\" stroke=\"#b23039\" stroke-width=\"2\"/><text x=\"472\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#b23039\">중추(뇌)</text><text x=\"472\" y=\"156\" font-size=\"14.5\" fill=\"#3a4654\">소뇌·뇌간 뇌졸중</text><text x=\"472\" y=\"184\" font-size=\"14.5\" fill=\"#3a4654\">보행 불가·국소신경징후</text><text x=\"472\" y=\"212\" font-size=\"14.5\" fill=\"#3a4654\">방향 바뀌는/수직 안진</text><text x=\"472\" y=\"240\" font-size=\"14.5\" fill=\"#3a4654\">약한 어지럼인데 증상 심함</text><text x=\"40\" y=\"412\" font-size=\"13.5\" fill=\"#8b98a8\">중추 의심→MRI(후방순환은 초기 CT 음성 가능)</text></svg>"}, {"title": "😣 증상", "items": [{"item": "말초 시사", "content": "심한 회전감, 체위 유발(BPPV), 이명·청력저하(메니에르), 수평-회선 안진(방향 일정)", "basis": "내이 기원 단서. 대개 자세 변화로 악화·호전, 신경결손 없음.", "img": ""}, {"item": "중추 시사", "content": "보행 불가, 복시·구음·연하장애·국소위약, 방향 바뀌는/수직 안진, 약한 어지럼인데 증상 심함", "basis": "뇌간·소뇌 병변 신호 → 뇌졸중 배제 필요.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "HINTS·진찰", "content": "두부충동검사·안진방향·교대가림(skew), 보행·소뇌검사, 신경학적 진찰", "basis": "급성 지속현훈에서 중추/말초 감별. ‘중추 시사’면 영상.", "img": ""}, {"item": "영상", "content": "중추 의심 시 뇌 MRI(확산), 초기 CT는 후두와 민감도 낮음", "basis": "후방순환 경색은 CT로 놓치기 쉬움 → MRI 선호.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">HINTS — 급성 지속현훈 감별</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#1559a8\">감별이 곧 분류</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">Head Impulse(두부충동검사)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">Nystagmus(안진 방향)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">Test of Skew(교대가림 편위)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">보행·소뇌검사·신경학적 진찰</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"800\" fill=\"#1559a8\">‘중추 시사’면 뇌졸중 경로로</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "말초 대증", "content": "전정억제제(단기), 항구토제, BPPV는 이석정복술(Epley)", "basis": "증상 완화·BPPV는 물리적 정복이 효과적. 전정억제제 장기사용은 회복 지연.", "img": ""}, {"item": "중추", "content": "뇌졸중 경로로 전환(영상·신경과/뇌졸중팀)", "basis": "중추 원인은 응급 뇌졸중 관리. 감별이 곧 분류.", "img": ""}], "svg": ""}], "redflags": ["혼자 못 걸음/똑바로 못 섬 → 중추(소뇌) 의심, 뇌졸중 배제", "복시·구음장애·연하장애·국소위약 동반 → 중추 병변", "방향이 바뀌는 안진·수직 안진 → 중추 시사, 영상 필요", "후방순환 경색은 초기 CT 음성 가능 → 의심되면 MRI"], "memo": "회전성 현훈 / 말초(내이)↔중추(뇌졸중) 감별 / 보행불가·신경증상·방향바뀌는 안진=중추 / HINTS·MRI"}, {"no": "28", "name": "길랑-바레 증후군", "cat": "🧠 신경계", "diff": "★★★★☆", "kw": "상행성 마비 / 자가면역 탈수초 / 호흡근·자율신경 위험 / 신경전도·CSF / IVIG·혈장교환", "mentor": "“발끝부터 힘이 빠져서 위로 올라오는 마비가 특징이야. 며칠 전에 설사나 감기 앓은 적 있는지 물어봐 — 자가면역이라 감염 뒤에 잘 와. 제일 무서운 건 호흡근까지 마비되는 거랑 자율신경이 출렁여서 혈압·맥박이 널뛰는 거야. 그래서 호흡(폐활량)이랑 활력징후를 자주 봐야 해.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "말초신경 자가면역성 탈수초로 ‘상행성’ 대칭 마비가 진행하는 급성 다발신경병증.", "basis": "감염 후 면역이 말초신경 수초를 공격 → 전도장애 → 하지→상지→호흡근으로 진행.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전·선행감염", "content": "Campylobacter·바이러스 감염 후 분자모방 → 신경수초 공격", "basis": "선행 감염력이 흔한 단서. 탈수초로 전도 차단 → 위약·반사소실.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">길랑-바레 — 감염 후 자가면역</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">선행 감염</text><text x=\"150\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">설사·상기도</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">분자모방·자가면역</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">말초신경 탈수초</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">상행성 대칭 마비</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">호흡근·자율신경 위험 → FVC 추세 감시 · IVIG/혈장교환</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "발끝부터 대칭성 상행 위약, 심부건반사 소실, 감각이상, 안면·연하·안구 침범 가능", "basis": "말초신경 손상의 전형. 진행 속도·범위가 위험도를 좌우.", "img": ""}, {"item": "위험 징후", "content": "호흡근 침범(얕은 호흡·기침약화), 자율신경 불안정(혈압·맥박 변동·부정맥)", "basis": "호흡부전·자율신경 위기가 주요 사망 원인 → 집중 감시 필요.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "진단", "content": "신경전도검사(전도속도↓), 뇌척수액(단백↑·세포 정상=알부민세포해리)", "basis": "탈수초·알부민세포해리가 특징적 소견.", "img": ""}, {"item": "호흡·자율 감시", "content": "폐활량(FVC)·음성흡기압 추세, 활력징후·심전도 모니터", "basis": "FVC 감소는 삽관 결정 지표. 자율신경 변동 감시.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">GBS 감시·치료</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#b23039\">호흡·자율신경이 위험</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">발끝부터 상행 대칭 위약·반사소실</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">CSF: 알부민세포해리(단백↑·세포정상)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">호흡근 침범→FVC 추세·삽관 준비</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">자율신경 불안정(혈압·맥박 급변)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">IVIG 또는 혈장교환(조기)</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "면역치료", "content": "IVIG 또는 혈장교환(plasmapheresis)", "basis": "병의 진행·기간 단축. 두 치료 효과는 비슷, 조기 시작이 중요.", "img": ""}, {"item": "호흡 지원", "content": "FVC 저하·연하장애 시 기관삽관·기계환기 준비", "basis": "호흡근 마비에 대비. 흡인·호흡부전 예방이 생명.", "img": ""}, {"item": "자율신경·지지", "content": "부정맥·혈압 변동 감시·대응, 통증·VTE 예방·재활", "basis": "자율신경 위기 관리. 장기 부동 합병증 예방.", "img": ""}], "svg": ""}], "redflags": ["상행 마비가 호흡근까지 → 호흡부전 위험, FVC 추세·삽관 준비", "자율신경 불안정(혈압·맥박 급변·부정맥) → 지속 모니터링", "연하장애·기침 약화 → 흡인 위험, 기도 보호", "최근 설사·상기도감염 후 대칭성 위약·반사소실 → GBS 의심"], "memo": "감염 후 상행성 대칭 마비·반사소실 / 알부민세포해리 / 호흡근·자율신경 감시(FVC) / IVIG·혈장교환"}, {"no": "29", "name": "상부 위장관 출혈", "cat": "🫀 소화기", "diff": "★★★★☆", "kw": "토혈·흑색변 / 소생 우선 / 2개 큰 IV·수혈 / 내시경 / PPI·정맥류 감별", "mentor": "“피를 토하거나 새까만 변(흑색변)을 보면 윗쪽 출혈이야. 여기서 1번은 진단이 아니라 ‘소생’이야 — 굵은 IV 두 개 잡고 수액·수혈 준비부터. 혈압 떨어지고 맥 빨라지면 이미 많이 샌 거야. 간경변 환자면 정맥류 출혈일 수 있어서 약·접근이 달라져. 빨리 내시경팀 불러.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "트라이츠 인대 상부(식도·위·십이지장)에서의 출혈. 토혈·흑색변으로 발현.", "basis": "상부 소화관 출혈이 위산·소화효소를 거쳐 흑색변(melena)·커피색 토혈로 나타남.", "img": ""}, {"item": "주요 원인", "content": "소화성 궤양(흔함), 식도·위 정맥류, 미란성 위염, Mallory-Weiss", "basis": "정맥류는 간경변 동반·대량출혈 경향 → 치료·약물이 달라 감별이 중요.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "쇼크 진행", "content": "실혈→ 전부하↓·심박출↓ → 빈맥·저혈압·관류저하 → 출혈성 쇼크", "basis": "초기엔 빈맥·기립성 변화만, 진행하면 저혈압. 활력징후 추세가 실혈량 단서.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">상부 위장관 출혈</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">궤양/정맥류 등</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">상부 소화관 출혈</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">토혈·흑색변</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">저혈량·쇼크</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">소생 1순위(굵은 IV2개·수혈) · 비정맥류=PPI / 정맥류=Octreotide+항생제</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "토혈(선홍/커피색), 흑색변, 어지럼·실신, 빈맥·저혈압·창백, 대량 시 혈변 가능", "basis": "실혈·쇼크의 결과. 기립성 어지럼은 유효순환량 감소 신호.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "즉시", "content": "CBC(Hb)·혈액형/교차·응고검사, 활력징후·기립성, 직장수지검사", "basis": "수혈 준비·실혈 평가. 초기 Hb는 정상일 수 있음(혈액농축).", "img": ""}, {"item": "내시경", "content": "안정화 후 상부내시경(진단+지혈)", "basis": "원인 확인·내시경적 지혈. 정맥류/궤양 감별 및 치료 동시.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 880 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"880\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">비정맥류 vs 정맥류</text><line x1=\"34\" y1=\"64\" x2=\"846\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"106\" y=\"92\" width=\"320\" height=\"290\" rx=\"14\" fill=\"#eef4fd\" stroke=\"#1559a8\" stroke-width=\"2\"/><text x=\"124\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#1559a8\">비정맥류(궤양 등)</text><text x=\"124\" y=\"156\" font-size=\"14.5\" fill=\"#3a4654\">고용량 PPI 정주</text><text x=\"124\" y=\"184\" font-size=\"14.5\" fill=\"#3a4654\">내시경 지혈</text><text x=\"124\" y=\"212\" font-size=\"14.5\" fill=\"#3a4654\">커피색 토혈·흑색변</text><rect x=\"454\" y=\"92\" width=\"320\" height=\"290\" rx=\"14\" fill=\"#fdeced\" stroke=\"#b23039\" stroke-width=\"2\"/><text x=\"472\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#b23039\">정맥류(간경변)</text><text x=\"472\" y=\"156\" font-size=\"14.5\" fill=\"#3a4654\">Octreotide/Terlipressin</text><text x=\"472\" y=\"184\" font-size=\"14.5\" fill=\"#3a4654\">*예방적 항생제(생존↑)</text><text x=\"472\" y=\"212\" font-size=\"14.5\" fill=\"#3a4654\">내시경 결찰(EVL)</text><text x=\"40\" y=\"412\" font-size=\"13.5\" fill=\"#8b98a8\">간경변 단서면 접근이 달라진다</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "소생 우선", "content": "굵은 IV 2개, 수액 소생, 적응 시 수혈, O₂·모니터링", "basis": "ABC·순환 안정이 1순위. 진단보다 소생이 먼저.", "img": ""}, {"item": "약물(비정맥류)", "content": "고용량 PPI 정주", "basis": "위산 억제로 혈괴 안정·재출혈 감소. 내시경 전 시작 가능.", "img": ""}, {"item": "약물(정맥류 의심)", "content": "Octreotide/Terlipressin + 예방적 항생제", "basis": "내장혈류↓로 정맥류압 감소, 간경변 출혈엔 항생제가 예후 개선.", "img": ""}, {"item": "지혈·교정", "content": "내시경 지혈, 응고장애·항응고 교정", "basis": "근본 지혈+응고 정상화로 재출혈 방지.", "img": ""}], "svg": ""}], "redflags": ["빈맥·저혈압·기립성 어지럼 → 대량 실혈/쇼크, 즉시 소생·수혈 준비", "초기 Hb 정상도 안심 금지 → 혈액농축으로 실혈 과소평가 가능", "간경변·정맥류 의심 → Octreotide+예방적 항생제, 접근이 다름", "항응고제·간기능장애 동반 → 응고 즉시 교정"], "memo": "토혈·흑색변 / 소생 1순위(IV2개·수혈) / 내시경 지혈 / 비정맥류=PPI, 정맥류=Octreotide+항생제"}, {"no": "30", "name": "하부 위장관 출혈", "cat": "🫀 소화기", "diff": "★★★☆☆", "kw": "혈변·선홍색 / 게실·혈관이형성 / 상부 배제 / 대장내시경·CT혈관조영 / 소생·관찰", "mentor": "“선홍색 피가 변에 섞이거나 그냥 나오면 아랫쪽 출혈일 가능성이 높아. 그래도 윗쪽에서 빨리 많이 새도 선홍색이 나오니까 ‘상부 배제’는 꼭 해. 대부분 저절로 멎지만, 노인은 금방 불안정해져. 소생하면서 활력징후 추세 보고, 출혈량 많으면 영상·내시경으로 위치 찾아.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "트라이츠 인대 하부(소장·대장)에서의 출혈. 주로 선홍/적색 혈변.", "basis": "하부 출혈은 위산을 거치지 않아 적색. 단, 빠른 대량 상부출혈도 적색일 수 있음.", "img": ""}, {"item": "주요 원인", "content": "게실, 혈관이형성, 치질, 허혈성·감염성 대장염, 종양", "basis": "노인은 게실·혈관이형성이 흔함. 원인별 치료 다름.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "경과", "content": "대부분 자연 지혈, 일부 지속·재출혈 → 실혈·쇼크 가능", "basis": "경과가 다양 → 소생하며 활력징후로 중증도 판단.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">하부 위장관 출혈</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">게실·혈관이형성 등</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">하부 소화관 출혈</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">적색 혈변</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">대부분 자연지혈</text><text x=\"888\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">일부 대량</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">대량 적색변은 빠른 상부출혈도 가능→상부 배제 필수</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "적색 혈변(hematochezia), 복통(원인따라), 어지럼·빈맥(대량 시)", "basis": "출혈량·원인에 따라 다양. 무통성 다량 혈변은 게실 시사.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "상부 배제", "content": "비위관/상부내시경 고려(대량 적색변 시)", "basis": "빠른 상부출혈 배제. 적색변=하부라 단정 금물.", "img": ""}, {"item": "위치 진단", "content": "대장내시경, 활동성 출혈 시 CT 혈관조영/혈관조영술", "basis": "원인·위치 확인 및 중재적 지혈 가능.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">하부 출혈 접근</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#1d6b36\">상부 배제 후 위치 진단</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#1d6b36\">적색 혈변이라도 상부 배제</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">대장내시경(위치·지혈)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">활동성 출혈→CT 혈관조영/색전</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">소생·응고/항응고 교정</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">노인·항응고제는 급격 불안정 주의</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "소생·교정", "content": "수액·수혈(적응 시), 응고·항응고 교정, 모니터링", "basis": "순환 안정이 우선. 불안정하면 적극 소생.", "img": ""}, {"item": "지혈", "content": "내시경적/혈관조영 색전/드물게 수술", "basis": "위치 확인 후 표적 지혈. 대부분은 보존적 관찰로 호전.", "img": ""}], "svg": ""}], "redflags": ["대량 적색 혈변 → 빠른 상부출혈 가능성, 상부 배제 필수", "노인·항응고제 복용 → 급격히 불안정해질 수 있어 면밀 감시", "빈맥·저혈압 동반 → 활동성 대량출혈, 소생·영상/내시경", "혈변+복통+발열 → 허혈성/감염성 대장염 감별"], "memo": "적색 혈변=주로 하부(상부 배제는 필수) / 게실·혈관이형성 / 소생·교정 / 대장내시경·CT혈관조영 지혈"}, {"no": "31", "name": "급성 복통", "cat": "🫀 소화기", "diff": "★★★☆☆", "kw": "위치·양상별 감별 / 외과적 복통 신호 / 복막자극징후 / 영상·랩 / 진통 보류 금물", "mentor": "“복통은 ‘어디가·어떻게·언제부터’를 잘 물어보는 게 절반이야. 위치마다 의심 질환이 달라(우상복부=담낭, 우하복부=충수, 등으로 뻗으면=췌장·대동맥). 배가 판자처럼 굳고 반발통 있으면 ‘외과 복통’이라 빨리 의뢰. 옛말처럼 진단 전 진통 참게 하는 거, 요즘은 적절히 줘도 돼.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "급성으로 발생한 복부 통증. 양성부터 즉시 수술이 필요한 응급까지 폭넓다.", "basis": "장기별 통증 기전(내장통·체성통·연관통)과 위치로 원인을 좁혀간다.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "통증 유형", "content": "내장통(둔하고 위치 모호)→체성통(국소·복막자극)으로 진행", "basis": "염증이 벽측 복막에 닿으면 국소화·악화 → 외과적 진행 신호.", "img": ""}], "svg": ""}, {"title": "😣 증상", "items": [{"item": "위치별 단서", "content": "RUQ:담낭/간, RLQ:충수, LLQ:게실, 상복부→등:췌장/대동맥, 배꼽주위→RLQ 이동:충수", "basis": "위치·이동 양상이 진단 방향. 등으로 뻗는 통증은 췌장·대동맥 경계.", "img": ""}, {"item": "위험 동반", "content": "발열, 토혈/혈변, 실신, 복부 팽만·구토, 박동성 종괴", "basis": "천공·출혈·폐색·동맥류 등 위중 신호.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 800 460\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"800\" height=\"460\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">급성 복통 — 위치로 원인을 좁힌다</text>\n  <line x1=\"32\" y1=\"60\" x2=\"768\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <g transform=\"translate(250,250)\">\n    <rect x=\"-170\" y=\"-150\" width=\"340\" height=\"320\" rx=\"40\" fill=\"#fdeef0\" stroke=\"#d9a9b0\" stroke-width=\"2.5\"/>\n    <line x1=\"0\" y1=\"-150\" x2=\"0\" y2=\"170\" stroke=\"#cbb3b8\" stroke-width=\"2\"/>\n    <line x1=\"-170\" y1=\"10\" x2=\"170\" y2=\"10\" stroke=\"#cbb3b8\" stroke-width=\"2\"/>\n    <text x=\"-85\" y=\"-90\" font-size=\"15\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">RUQ</text>\n    <text x=\"85\" y=\"-90\" font-size=\"15\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">LUQ</text>\n    <text x=\"-85\" y=\"100\" font-size=\"15\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">RLQ</text>\n    <text x=\"85\" y=\"100\" font-size=\"15\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">LLQ</text>\n    <circle cx=\"0\" cy=\"10\" r=\"7\" fill=\"#8e24aa\"/><text x=\"0\" y=\"38\" font-size=\"12\" fill=\"#6a1b9a\" text-anchor=\"middle\">배꼽주위</text>\n  </g>\n  <g font-size=\"14.5\" fill=\"#3a4654\">\n    <text x=\"470\" y=\"120\" font-weight=\"800\" fill=\"#b23039\">RUQ</text><text x=\"470\" y=\"146\">담낭·간·담관</text>\n    <text x=\"470\" y=\"186\" font-weight=\"800\" fill=\"#1559a8\">LUQ</text><text x=\"470\" y=\"212\">비장·위·췌장(체부)</text>\n    <text x=\"470\" y=\"252\" font-weight=\"800\" fill=\"#1d6b36\">RLQ</text><text x=\"470\" y=\"278\">충수염·난소·요관</text>\n    <text x=\"470\" y=\"318\" font-weight=\"800\" fill=\"#c2611a\">LLQ</text><text x=\"470\" y=\"344\">게실염·난소·요관</text>\n    <text x=\"470\" y=\"384\" font-weight=\"800\" fill=\"#6a1b9a\">상복부→등</text><text x=\"470\" y=\"410\">췌장염·대동맥</text>\n  </g>\n</svg>"}, {"title": "📈 검사", "items": [{"item": "진찰", "content": "복막자극징후(반발통·강직), 장음, 직장/골반 진찰, 활력징후", "basis": "외과적 복통 식별의 핵심. 강직·반발통은 즉시 의뢰 단서.", "img": ""}, {"item": "검사", "content": "CBC·CRP·간담도·아밀라제/리파제·소변·임신검사·젖산, 영상(초음파/CT)", "basis": "원인 감별·중증도. 가임여성은 임신·자궁외임신 배제.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">외과적 복통 신호</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#b23039\">복막자극=외과 의뢰</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">판자배(강직)·반발통=복막자극</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">박동성 종괴+저혈압→대동맥류 파열</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">가임 여성 하복통→자궁외임신(임신검사)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">고령·면역저하는 증상 경미해도 중증</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">검사: CBC·CRP·리파제·젖산·임신·영상</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "초기 안정", "content": "금식, 수액, 진토, 적절한 진통(진단 위해 참게 하지 않음)", "basis": "현대 근거상 적절한 진통이 진찰을 방해하지 않음 → 통증 조절 가능.", "img": ""}, {"item": "외과 의뢰", "content": "복막염·천공·폐색·허혈·동맥류 의심 시 즉시 외과/영상", "basis": "수술적 응급은 시간 싸움 → 조기 의뢰가 예후 결정.", "img": ""}], "svg": ""}], "redflags": ["판자처럼 굳은 배·반발통(복막자극) → 천공/복막염, 즉시 외과", "박동성 복부 종괴+저혈압 → 복부대동맥류 파열 의심", "가임 여성 하복통 → 자궁외임신 배제(임신검사 필수)", "고령·면역저하는 증상 경미해도 중증 가능 → 영상 적극"], "memo": "위치·양상·이동으로 감별 / 복막자극=외과 신호 / 임신검사·젖산 / 적절한 진통 OK / 위중 신호=조기 의뢰"}, {"no": "32", "name": "급성 췌장염", "cat": "🫀 소화기", "diff": "★★★☆☆", "kw": "상복부→등 통증 / 리파제 3배↑ / 담석·음주 / 적극적 수액 / 중증도·장기부전 감시", "mentor": "“명치가 등으로 뻗치게 아프고 토하면 췌장염을 떠올려. 술이나 담석이 흔한 원인이야. 진단은 리파제가 정상 3배 넘으면 거의 확실해. 치료의 핵심은 의외로 단순해 — 수액을 충분히, 금식, 진통. 근데 중증이면 췌장이 썩고 장기부전이 와서 죽을 수 있어, 그래서 활력징후·소변량·산소를 계속 봐야 해.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "췌장 효소가 췌장 내에서 활성화돼 자가소화·염증을 일으키는 상태.", "basis": "효소 조기 활성 → 췌장 자가소화·염증·부종, 중증은 괴사·전신염증(SIRS)·장기부전.", "img": ""}, {"item": "주요 원인", "content": "담석, 음주(2대 원인), 고중성지방, 약물, ERCP 후", "basis": "원인 교정(담석 제거 등)이 재발 예방. 원인별 추가 처치 결정.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "중증화", "content": "효소·염증매개체 전신 유출 → 혈관투과성↑·제3공간 체액이동 → 저혈량·장기부전", "basis": "대량 수액 소실 → 적극적 수액이 필요한 이유. 괴사·감염은 사망률↑.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">췌장염 — 효소 자가소화</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">담석·음주 등</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">효소 조기 활성</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">자가소화·염증</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">전신염증·제3공간</text><text x=\"888\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">저혈량</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">리파제 3배↑ · 적극적 수액+금식+진통 · 담석성 담관염→ERCP</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "지속적 상복부 통증(등으로 방사), 오심·구토, 복부압통·팽만, 발열·빈맥", "basis": "효소 누출·염증의 결과. 통증이 앉아 굽히면 다소 완화.", "img": ""}, {"item": "중증 신호", "content": "저혈압·빈호흡·핍뇨·의식저하, 측복부 반상출혈(Grey-Turner)", "basis": "장기부전·출혈성 괴사 시사 → 중환자 관리.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "효소·랩", "content": "리파제(또는 아밀라제) 정상 상한 3배↑, CBC·BUN·Cr·Ca·중성지방·간기능", "basis": "리파제가 더 특이적. BUN·헤마토크릿 상승은 중증·탈수 지표.", "img": ""}, {"item": "영상", "content": "복부 초음파(담석), 진단 불명확/중증 시 조영 CT", "basis": "담석 원인 확인·괴사 평가. CT는 보통 발병 후 시점에.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">췌장염 핵심</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#c2611a\">수액이 치료의 중심</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#c2611a\">리파제(아밀라제) 정상 3배↑</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#c2611a\">적극적 수액(소변량으로 적정)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">금식·충분한 진통·진토</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">담석 확인(초음파)·중증시 조영 CT</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">저혈압·핍뇨·빈호흡→중증(장기부전)</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "적극적 수액", "content": "초기 균형수액 적극 투여, 소변량·활력징후로 적정", "basis": "제3공간 체액소실 보충·췌장 관류 유지 → 괴사·장기부전 예방의 핵심.", "img": ""}, {"item": "금식·진통·진토", "content": "금식(호전되면 조기 경구 재개), 충분한 진통, 항구토", "basis": "췌장 자극 최소화. 통증·구토 조절로 회복 도움.", "img": ""}, {"item": "원인·합병증", "content": "담석성 담관염 동반 시 ERCP, 감염성 괴사 시 항생제·배액", "basis": "원인 교정과 합병증 치료. 단순 췌장염에 예방적 항생제는 권장 안 함.", "img": ""}], "svg": ""}], "redflags": ["저혈압·핍뇨·빈호흡 → 장기부전/중증 췌장염, 중환자 관리", "발열·황달 동반(담석성 담관염) → ERCP 대상, 즉시 보고", "BUN·헤마토크릿 상승 지속 → 수액 부족·중증화 지표", "측복부/배꼽주위 반상출혈 → 출혈성 괴사, 위중"], "memo": "상복부→등 통증·리파제 3배↑ / 담석·음주 / 적극적 수액+금식+진통 / 중증도·장기부전 감시 / 담석=ERCP"}, {"no": "33", "name": "급성 담낭염 / 담석증", "cat": "🫀 소화기", "diff": "★★☆☆☆", "kw": "RUQ 통증·Murphy / 담석 폐색 / 초음파 / 항생제·금식 / 담낭절제·담관염 감별", "mentor": "“기름진 거 먹고 오른쪽 윗배가 아프면 담낭이야. 담석이 목을 막으면 염증이 생기지. 숨 들이쉬며 그 부위 누르면 아파서 숨 멈추면(Murphy 양성) 담낭염 신호야. 초음파가 제일 좋은 검사고, 금식·수액·항생제 하면서 담낭절제 시기를 봐. 열나고 노랗고 혼미하면 담관염이라 더 응급이야.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "담석이 담낭관을 막아 담낭에 염증이 생긴 상태(급성 담낭염). 담석증은 담석 보유.", "basis": "담석 폐색 → 담즙정체·담낭벽 염증·세균중복. 담관 폐색·감염 시 담관염으로 진행.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "진행", "content": "담낭관 폐색 → 내압↑·염증 → 부종·허혈 → 괴저·천공(중증)", "basis": "폐색 지속이 합병증을 키움 → 조기 치료·담낭절제.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">담낭염 — 담석 폐색</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">담석이 담낭관 폐색</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\" ontent": "복수·하지부종, 정맥류 출혈(토혈·흑색변), 간성뇌증(혼돈·asterixis), 황달, 응고장애·멍", "basis": "문맥압·간기능저하의 결과. 뇌증·출혈·감염이 급성 악화 축.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">간경변 합병증</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#5d4037\">합병증별로 대응</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">정맥류 출혈(토혈·흑색변)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">복수·하지부종 / *SBP(복수+발열·복통)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#5d4037\">간성뇌증: Lactulose+유발인자 교정</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">응고장애(INR↑)·황달</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">뇌증 유발: 출혈·감염·변비·전해질</text></svg>"}, {"title": "📈 검사", "items": [{"item": "랩", "content": "간기능·빌리루빈·알부민, 응고(PT/INR), 암모니아, CBC·신기능·전해질", "basis": "합성능(알부민·INR)·뇌증·신기능 평가. INR↑은 출혈경향.", "img": ""}, {"item": "복수 평가", "content": "진단적 복수천자(세포수·배양)로 SBP 감별, 초음파/내시경", "basis": "복수 호중구↑면 SBP. 정맥류 평가 내시경.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "간성뇌증", "content": "Lactulose(±Rifaximin), 유발인자(출혈·감염·변비·전해질) 교정", "basis": "장내 암모니아 배출·생성 억제. 유발인자 제거가 핵심.", "img": ""}, {"item": "복수·SBP", "content": "염분제한·이뇨제, 대량복수 천자, SBP는 항생제+알부민", "basis": "체액 관리. SBP(자발성세균성복막염)는 즉시 항생제.", "img": ""}, {"item": "정맥류 출혈", "content": "Octreotide+항생제+내시경 지혈(앞 29번 참조)", "basis": "문맥압·출혈 관리. 간경변 출혈에 예방적 항생제 필수.", "img": ""}], "svg": ""}], "redflags": ["복수+발열·복통·뇌증 → 자발성세균성복막염(SBP), 진단천자+항생제", "의식저하 간경변 → 간성뇌증, 출혈·감염·변비 등 유발인자부터 탐색", "토혈·흑색변 → 정맥류 출혈 가능, 소생+Octreotide+항생제", "INR 상승·혈소판 감소 → 출혈경향, 시술·외상 주의"], "memo": "문맥압항진(정맥류·복수)+간기능저하 / 뇌증=Lactulose+유발인자 교정 / 복수+열=SBP / 정맥류 출혈 관리"}, {"no": "35", "name": "식도 정맥류 출혈", "cat": "🫀 소화기", "diff": "★★★★★", "kw": "간경변 대량 토혈 / 문맥압항진 / 기도보호 / Octreotide+항생제 / 내시경 결찰·풍선압박", "mentor": "“간경변 환자가 피를 왈칵 토하면 정맥류 파열을 생각해. 양이 많고 빨라서 진짜 위험해. 1번은 기도야 — 의식 처지면 토한 피로 막혀서 죽으니까 기도부터 지켜. 그리고 Octreotide로 문맥압 낮추고, 항생제 꼭 주고(생존율 올라가), 빨리 내시경으로 결찰해. 안 멎으면 풍선으로 임시 압박.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "문맥압 항진으로 늘어난 식도 정맥류가 파열돼 발생하는 대량 상부위장관 출혈.", "basis": "문맥압↑ → 식도 점막하 정맥류 확장·파열 → 급격한 대량출혈, 사망률 높음.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전", "content": "간경변 → 문맥압↑ → 측부순환 정맥류 → 압력·벽긴장으로 파열", "basis": "압력이 높을수록 파열·재출혈 위험↑ → 문맥압 낮추는 약물이 핵심.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">식도 정맥류 출혈</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">간경변·문맥압↑</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">측부순환 정맥류</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">압력·벽긴장→파열</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">대량 출혈</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">기도보호 1순위 · Octreotide+예방적 항생제 · 결찰→실패시 풍선·TIPS</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "대량 선홍색 토혈, 흑색변/혈변, 빈맥·저혈압·쇼크, 간경변 징후", "basis": "대량 실혈로 빠르게 불안정. 의식저하 시 흡인 위험 급증.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "즉시", "content": "Hb·혈액형/교차·응고, 활력징후, 간기능", "basis": "수혈·교정 준비. 응고장애 흔해 함께 교정.", "img": ""}, {"item": "내시경", "content": "소생 후 응급 상부내시경(진단+결찰)", "basis": "정맥류 확인·결찰술(EVL). 진단과 지혈을 동시에.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "기도·소생", "content": "의식저하·대량출혈 시 기도보호(필요시 삽관), IV 2개·수혈", "basis": "흡인·질식 예방이 최우선. 순환 소생 병행.", "img": ""}, {"item": "혈관수축제", "content": "Octreotide/Terlipressin 정주", "basis": "내장혈류·문맥압↓ → 출혈 감소. 내시경 전부터 시작.", "img": ""}, {"item": "예방적 항생제", "content": "세프트리악손 등 즉시", "basis": "간경변 출혈에서 감염·재출혈·사망 감소(근거 강함).", "img": ""}, {"item": "내시경·구조", "content": "정맥류 결찰(EVL), 실패 시 풍선탐포네이드·TIPS", "basis": "결찰이 표준 지혈. 난치성은 풍선 임시압박 후 TIPS.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">정맥류 출혈 처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#b23039\">기도→약물→내시경</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">대량 토혈+의식저하→기도보호(삽관)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">굵은 IV 2개·균형수혈 소생</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">Octreotide/Terlipressin(문맥압↓)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">예방적 항생제(생존율 직결)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">내시경 결찰→실패시 풍선/TIPS</text></svg>"}], "redflags": ["대량 토혈+의식저하 → 흡인·질식 위험, 기도보호(삽관) 우선", "간경변 출혈에 예방적 항생제 누락 금지 → 생존율 직결", "빈맥·저혈압 → 출혈성 쇼크, 즉시 수혈·소생", "내시경 지혈 실패·재출혈 → 풍선탐포네이드/TIPS 고려"], "memo": "간경변 대량 토혈 / 기도보호 1순위 / Octreotide+예방적 항생제 / 내시경 결찰→실패시 풍선·TIPS"}, {"no": "36", "name": "장폐색 (Ileus)", "cat": "🫀 소화기", "diff": "★★★☆☆", "kw": "복부팽만·구토·배변정지 / 기계적 vs 마비성 / 비위관 감압 / 교액 신호 / 영상", "mentor": "“배가 빵빵하고 토하고 가스·변이 안 나오면 장이 막힌 거야. ‘진짜로 막힌(기계적)’ 건지 ‘장이 안 움직이는(마비성)’ 건지 구분해. 기계적은 수술이 필요할 수도 있어. 제일 무서운 건 장이 꼬여 피가 안 통하는 ‘교액’ — 심한 통증·발열·젖산 오르면 응급수술이야. 일단 금식·비위관으로 풀어줘.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "장 내용물 통과가 막힌 상태. 물리적 폐색(기계적)과 운동저하(마비성)로 나뉜다.", "basis": "폐색 부위 위로 가스·액체 정체 → 팽만·구토. 혈류 차단(교액)되면 괴사·천공 위험.", "img": ""}, {"item": "기계적 vs 마비성", "content": "기계적: 유착·탈장·종양 등 물리적 막힘\n마비성: 수술 후·복막염·전해질이상으로 운동 정지", "basis": "치료가 다름. 기계적(특히 교액)은 수술 가능성, 마비성은 원인 교정.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "교액 진행", "content": "폐색·염전 → 장벽 혈류 차단 → 허혈·괴사·천공 → 패혈증", "basis": "교액은 시간 싸움. 지속 통증·발열·복막징후·젖산↑이 경고.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 880 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"880\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">장폐색 — 기계적 vs 마비성</text><line x1=\"34\" y1=\"64\" x2=\"846\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"106\" y=\"92\" width=\"320\" height=\"290\" rx=\"14\" fill=\"#fdeced\" stroke=\"#b23039\" stroke-width=\"2\"/><text x=\"124\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#b23039\">기계적</text><text x=\"124\" y=\"156\" font-size=\"14.5\" fill=\"#3a4654\">유착·탈장·종양</text><text x=\"124\" y=\"184\" font-size=\"14.5\" fill=\"#3a4654\">고음 금속성 장음</text><text x=\"124\" y=\"212\" font-size=\"14.5\" fill=\"#3a4654\">교액=수술 응급</text><text x=\"124\" y=\"240\" font-size=\"14.5\" fill=\"#3a4654\">완전폐색→수술 평가</text><rect x=\"454\" y=\"92\" width=\"320\" height=\"290\" rx=\"14\" fill=\"#eef4fd\" stroke=\"#1559a8\" stroke-width=\"2\"/><text x=\"472\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#1559a8\">마비성</text><text x=\"472\" y=\"156\" font-size=\"14.5\" fill=\"#3a4654\">수술후·복막염·전해질</text><text x=\"472\" y=\"184\" font-size=\"14.5\" fill=\"#3a4654\">장음 감소·소실</text><text x=\"472\" y=\"212\" font-size=\"14.5\" fill=\"#3a4654\">원인 교정(전해질 등)</text><text x=\"472\" y=\"240\" font-size=\"14.5\" fill=\"#3a4654\">대개 보존적 호전</text><text x=\"40\" y=\"412\" font-size=\"13.5\" fill=\"#8b98a8\">팽만·구토·배변정지 공통 / 금식·비위관 감압·수액</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "복부팽만, 구토(소장=조기·담즙성, 대장=지연·분변성), 산통성/지속성 복통, 배변·배가스 정지", "basis": "폐색 부위·기전에 따른 양상. 고음 금속성 장음(기계적)→소실(마비/교액).", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "영상", "content": "복부 X선(확장 장루프·공기액체층), CT(부위·원인·교액 평가)", "basis": "CT가 폐색 부위·원인·허혈 평가에 유용. 교액 징후 확인.", "img": ""}, {"item": "랩", "content": "전해질·신기능, 젖산, CBC·CRP", "basis": "탈수·전해질 교정 지표. 젖산↑·백혈구↑은 교액 의심.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">교액(허혈) 경고</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#b23039\">교액은 시간 싸움</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">지속·심한 통증</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">발열·복막자극</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">젖산↑·백혈구↑</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">분변성 구토·심한 팽만(완전폐색)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">→ 응급수술(장괴사 전)</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "감압·보존", "content": "금식, 비위관 감압, 수액·전해질 교정", "basis": "장 휴식·감압으로 팽만 완화. 단순 폐색·마비성은 보존으로 호전.", "img": ""}, {"item": "원인·수술", "content": "마비성=원인(전해질·약물·감염) 교정\n기계적·교액·완전폐색=수술 평가", "basis": "교액·천공·완전폐색은 외과적 응급. 보존 실패 시 수술.", "img": ""}], "svg": ""}], "redflags": ["지속·심한 통증+발열+복막자극+젖산↑ → 교액/허혈, 응급수술", "분변성 구토·심한 팽만 → 완전폐색, 외과 의뢰", "탈수·전해질 이상 → 교정 필수(마비성 악화·부정맥)", "유착·탈장·종양 병력 → 기계적 폐색 가능성, CT 평가"], "memo": "팽만·구토·배변정지 / 기계적↔마비성 감별 / 금식·비위관 감압·수액 / 교액(통증·열·젖산↑)=응급수술"}, {"no": "37", "name": "위장관염 / 식중독", "cat": "🫀 소화기", "diff": "★☆☆☆☆", "kw": "구토·설사·탈수 / 대증·수분보충 / 경고징후 감별 / 항생제 선택적 / 격리·위생", "mentor": "“토하고 설사하면 대부분 장염이야. 90%는 약 없이 수분만 잘 채워도 나아. 핵심은 ‘탈수’ 관리 — 입으로 못 먹으면 수액 줘. 그런데 피 섞인 설사·고열·심한 복통·심한 탈수는 그냥 장염 아닐 수 있으니 걸러내. 손위생·접촉주의 잊지 말고, 특히 노로는 잘 퍼져.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "바이러스·세균·독소에 의한 위·장 염증으로 구토·설사가 생기는 상태.", "basis": "장점막 자극·독소로 분비·운동 증가 → 구토·설사·복통. 대개 자가 한정적.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "탈수 기전", "content": "구토·설사로 수분·전해질 소실 → 탈수·전해질 불균형", "basis": "소실량 보충이 치료의 핵심. 소아·노인은 탈수에 취약.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">위장관염 — 탈수가 핵심</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">바이러스·세균·독소</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">장점막 자극</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">구토·설사</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"230\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">수분·전해질 소실</text><text x=\"888\" y=\"258\" font-size=\"13.5\" fill=\"#3a4654\" text-anchor=\"middle\">탈수</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">ORS 소량 자주(1차) · 혈변·고열·심한 복통은 경고</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "오심·구토, 수양성 설사, 복통·경련, 미열, 탈수징후(갈증·소변감소·빈맥)", "basis": "장 자극의 결과. 탈수 정도 평가가 중증도 판단.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "대개 불필요/선택적", "content": "중증·고위험만 전해질·신기능, 혈성 설사·고열 시 대변검사·배양", "basis": "경증은 임상진단. 경고징후 있을 때만 검사.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "수분 보충", "content": "경구수분보충(ORS) 우선, 못 먹으면 정맥수액·전해질 교정", "basis": "탈수 교정이 치료의 중심. 대부분 수분만으로 회복.", "img": ""}, {"item": "대증", "content": "진토제(선택적), 조기 식이 재개, 지사제는 신중", "basis": "증상 완화. 혈성 설사·발열엔 지사제 신중(독소·균 정체).", "img": ""}, {"item": "항생제", "content": "대부분 불필요 — 중증 세균성·고위험군 선택적", "basis": "바이러스성엔 무효. 부적절 사용은 합병증(HUS 등) 위험.", "img": ""}, {"item": "감염관리", "content": "손위생·접촉주의, 노로 등 유행 시 격리", "basis": "전파 차단. 환경·손위생이 핵심.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">위장관염 — 관리·경고</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#1d6b36\">수분 보충이 중심</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">경·중등도: 경구수분보충(ORS)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">중증 탈수·쇼크: 정맥수액</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">항생제 대부분 불필요(선택적)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"800\" fill=\"#1d6b36\">혈성 설사+고열+심한 복통→감별</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">EHEC 의심시 항생제·지사제 신중(HUS)</text></svg>"}], "redflags": ["혈성 설사+고열+심한 복통 → 단순 장염 아님(침습성·염증성) 감별", "심한 탈수(저혈압·핍뇨·의식저하) → 정맥수액 적극 소생", "EHEC 의심 시 항생제·지사제 신중 → 용혈성요독증후군 위험", "노로 등 유행성 → 접촉·환경 관리로 집단발생 차단"], "memo": "구토·설사=대부분 자가한정 / 수분보충(ORS·수액)이 핵심 / 경고징후(혈변·고열·탈수) 감별 / 손위생·격리"}, {"no": "38", "name": "복막염", "cat": "🫀 소화기", "diff": "★★★★☆", "kw": "복막 염증·천공 / 판자배·반발통 / 패혈증 / 영상·소생 / 광범위 항생제·수술", "mentor": "“배가 ‘판자처럼’ 굳고 살짝만 건드려도, 떼면 더 아프면(반발통) 복막염이야. 장이 터졌거나(천공) 염증이 복강 전체로 퍼진 거라 패혈증으로 금방 가. 치료는 동시에 세 가지 — 소생(수액), 광범위 항생제, 그리고 ‘원인을 막는 수술’. 수술이 핵심이라 외과를 빨리 불러야 해.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "복강을 싸는 복막의 염증. 천공·감염 등으로 복강 전체 또는 국소에 발생.", "basis": "천공·세균오염 → 복막 염증·전신염증 → 패혈증 위험. 외과적 응급이 많음.", "img": ""}, {"item": "분류", "content": "일차성(SBP, 복수 감염)·이차성(천공·장기 파열)·삼차성", "basis": "이차성은 원인 장기 수술이 필요. SBP는 항생제 중심.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "진행", "content": "복강 오염 → 복막 염증·체액 이동·세균혈증 → 패혈증·쇼크", "basis": "대량 체액 제3공간 이동·감염 → 저혈량·장기부전. 빠른 소생·원인 제거 필요.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">복막염 — 천공·오염</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">천공/장기 파열</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">복강 오염·염증</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">체액이동·세균혈증</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">패혈증·쇼크</text><rect x=\"34\" y=\"322\" width=\"970\" height=\"86\" rx=\"11\" fill=\"#fff7ef\" stroke=\"#b23039\" stroke-width=\"1.6\"/><text x=\"54\" y=\"354\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">판자배·반발통·free air · 소생+광범위 항생제+수술</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "심한 지속 복통, 판자배(강직)·반발통·압통, 발열·빈맥, 장음 소실, 쇼크 진행", "basis": "복막자극·전신염증의 전형. 움직임·기침에 통증 악화.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "영상", "content": "기립/측와위 X선(유리공기=천공), 복부 CT(원인·농양)", "basis": "천공·원인 병소 확인. CT가 원인 규명에 유용.", "img": ""}, {"item": "랩", "content": "CBC·CRP·젖산, 전해질·신기능, 혈액배양, (복수 시)복수검사", "basis": "패혈증·중증도 평가. SBP 감별 위해 복수천자.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">복막염 처치</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#b23039\">수술이 근본</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">판자배+반발통+발열→외과 즉시</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">X선 유리공기(free air)=천공</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">소생(수액)·패혈증 번들</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">경험적 광범위 항생제</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">수술적 감염원 제거(source control)</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "소생", "content": "수액 소생, 산소·모니터링, 패혈증 번들", "basis": "순환 안정·관류 회복이 우선. 쇼크 진행 막기.", "img": ""}, {"item": "광범위 항생제", "content": "경험적 광범위 항생제 신속 투여(배양 후)", "basis": "복강 감염 조절. 조기 투여가 예후 개선.", "img": ""}, {"item": "수술적 원인 제거", "content": "이차성 복막염은 천공 봉합·절제·세척·배액", "basis": "감염원 제거가 근본 치료 → 외과 조기 의뢰가 핵심.", "img": ""}], "svg": ""}], "redflags": ["판자배+반발통+발열 → 복막염, 즉시 외과 의뢰", "X선 유리공기(free air) → 소화관 천공, 응급수술", "저혈압·젖산↑·빈호흡 → 패혈증/쇼크, 즉시 소생·항생제", "복수 있는 간경변+복통·발열 → SBP 가능, 진단천자"], "memo": "판자배·반발통=복막염 / 천공(유리공기) / 소생+광범위 항생제+수술적 원인제거(외과 조기) / 패혈증 감시"}, {"no": "39", "name": "급성 신부전 (AKI)", "cat": "🩺 신장/비뇨기", "diff": "★★★☆☆", "kw": "신전·신성·신후 / 소변량·Cr↑ / 원인 감별 / 용량·신독성약물 / 응급투석 적응", "mentor": "“콩팥이 갑자기 일을 멈춘 거야. 원인을 셋으로 나눠서 봐 — 피가 안 가서(신전·탈수·쇼크), 콩팥 자체가 망가져서(신성), 소변길이 막혀서(신후·요폐). 이걸 구분해야 치료가 돼. 탈수면 수액, 막혔으면 도뇨. 그리고 신독성 약·조영제 조심하고, 고칼륨·산증·폐부종 심하면 투석이야.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "수시간~수일에 걸쳐 신기능이 급격히 떨어지는 상태(Cr 상승·소변량 감소).", "basis": "사구체여과율 급감 → 노폐물·수분·전해질 배설 장애. 가역적인 경우가 많아 원인 교정이 핵심.", "img": ""}, {"item": "3분류", "content": "신전성(관류↓: 탈수·쇼크·심부전)\n신성(실질: ATN·신독소·사구체신염)\n신후성(폐색: 요폐·결석·전립선)", "basis": "원인별 치료가 완전히 다름 → 분류가 우선. 신후성은 도뇨/감압으로 즉시 호전 가능.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전", "content": "관류↓·독성·폐색 → 여과 저하 → 요독·수분과잉·고칼륨·대사성 산증", "basis": "축적되는 칼륨·산·수분이 생명위협 합병증(부정맥·폐부종)을 만든다.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 892 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"892\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">급성 신부전 — 3분류가 먼저</text><line x1=\"34\" y1=\"64\" x2=\"858\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"92\" width=\"252\" height=\"290\" rx=\"14\" fill=\"#eef4fd\" stroke=\"#1559a8\" stroke-width=\"2\"/><text x=\"58\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#1559a8\">신전성</text><text x=\"58\" y=\"150\" font-size=\"13.5\" fill=\"#5b6876\">관류↓</text><text x=\"58\" y=\"174\" font-size=\"14.5\" fill=\"#3a4654\">탈수·쇼크·심부전</text><text x=\"58\" y=\"202\" font-size=\"14.5\" fill=\"#3a4654\">→ 수액·관류 회복</text><rect x=\"320\" y=\"92\" width=\"252\" height=\"290\" rx=\"14\" fill=\"#fdeced\" stroke=\"#b23039\" stroke-width=\"2\"/><text x=\"338\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#b23039\">신성</text><text x=\"338\" y=\"150\" font-size=\"13.5\" fill=\"#5b6876\">실질 손상</text><text x=\"338\" y=\"174\" font-size=\"14.5\" fill=\"#3a4654\">ATN·신독소·사구체염</text><text x=\"338\" y=\"202\" font-size=\"14.5\" fill=\"#3a4654\">→ 원인 치료</text><rect x=\"600\" y=\"92\" width=\"252\" height=\"290\" rx=\"14\" fill=\"#eef7f0\" stroke=\"#1d6b36\" stroke-width=\"2\"/><text x=\"618\" y=\"126\" font-size=\"17.5\" font-weight=\"800\" fill=\"#1d6b36\">신후성</text><text x=\"618\" y=\"150\" font-size=\"13.5\" fill=\"#5b6876\">폐색</text><text x=\"618\" y=\"174\" font-size=\"14.5\" fill=\"#3a4654\">요폐·결석·전립선</text><text x=\"618\" y=\"202\" font-size=\"14.5\" fill=\"#3a4654\">→ 도뇨·감압</text><text x=\"40\" y=\"412\" font-size=\"13.5\" fill=\"#8b98a8\">소변량·Cr·K 추세 / 신독성약 회피</text></svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "소변량 감소(핍뇨)·부종, 오심·식욕부진·의식저하(요독), 호흡곤란(체액과잉)", "basis": "배설 장애·축적의 결과. 무증상으로 검사에서 발견되기도.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "랩", "content": "Cr·BUN 추세·전해질(특히 K)·동맥혈가스, 소변검사·소변전해질", "basis": "원인 분류(신전/신성)·합병증 평가. FENa 등으로 감별.", "img": ""}, {"item": "영상·도뇨", "content": "신초음파(수신증·폐색), 잔뇨 측정·도뇨", "basis": "신후성(폐색) 배제. 수신증·요폐 확인.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "원인 교정", "content": "신전성=수액·관류 회복, 신후성=도뇨·폐색 해소, 신성=원인 치료", "basis": "원인별 맞춤. 탈수면 수액, 막혔으면 즉시 감압.", "img": ""}, {"item": "신보호", "content": "신독성 약물·조영제 회피, 용량 신기능에 맞게 조정", "basis": "추가 손상 방지. NSAID·아미노글리코사이드 등 주의.", "img": ""}, {"item": "합병증·투석", "content": "고칼륨·중증 산증·체액과잉(폐부종)·요독증상 → 응급투석", "basis": "약물로 안 잡히는 생명위협 합병증은 투석으로 교정.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 900 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"900\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">응급투석 적응 (AEIOU)</text><line x1=\"34\" y1=\"64\" x2=\"866\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"40\" y=\"88\" width=\"820\" height=\"320\" rx=\"14\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/><text x=\"62\" y=\"128\" font-size=\"16.5\" font-weight=\"800\" fill=\"#00695c\">약물 불응 생명위협 합병증</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#00695c\">고칼륨혈증(ECG 변화)</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">중증 대사성 산증</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"800\" fill=\"#00695c\">체액과잉(폐부종)</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">요독 증상(뇌증·심막염)</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">약물로 안 잡히는 생명위협→투석</text></svg>"}], "redflags": ["고칼륨혈증(ECG 변화)·중증 산증·폐부종 → 응급투석 적응", "수신증·요폐 → 신후성, 도뇨/감압으로 즉시 호전 가능", "신독성 약물·조영제 지속 사용 → 손상 악화, 즉시 회피", "무뇨/급격한 Cr 상승 → 중증, 원인 신속 규명·신장내과 보고"], "memo": "신전·신성·신후 분류가 우선 / 소변량·Cr·K 추세 / 원인교정(수액·도뇨)+신독성 회피 / 투석 적응 판단"}, {"no": "40", "name": "고칼륨혈증", "cat": "🩺 신장/비뇨기", "diff": "★★★★★", "kw": "치명적 부정맥 / 첨예T파→QRS확장 / 칼슘으로 심장보호 / 세포내 이동 / 체외 제거", "mentor": "“칼륨은 조용한 살인자야. 별 증상 없다가 갑자기 심장이 멈춰. ECG에서 T파가 뾰족해지고 QRS가 넓어지면 위험 신호야. 순서를 외워 — ① 칼슘으로 심장 먼저 보호(ECG 변화 있으면), ② 인슐린+포도당·베타작용제로 칼륨을 세포 안으로 밀어넣고, ③ 진짜로 몸 밖으로 빼는 건 이뇨·투석이야. 칼슘은 칼륨을 안 낮춰, 심장만 지켜.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "혈청 칼륨이 상승한 상태(보통 >5.5). 치명적 부정맥·심정지를 유발할 수 있는 응급.", "basis": "세포막 흥분성 변화 → 전도장애·부정맥. 신부전·약물·세포파괴가 흔한 원인.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전", "content": "K↑ → 심근 안정막전위 변화 → 전도지연·재분극 이상 → 부정맥·심정지", "basis": "고칼륨이 심장 전기활동을 마비시킴. ECG 변화는 중증도 지표.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">고칼륨혈증 — 조용한 살인자</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/><text x=\"150\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">신부전·약물·세포파괴</text><path d=\"M256 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"296\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/><text x=\"396\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#c2611a\" text-anchor=\"middle\">혈청 K↑</text><path d=\"M502 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"542\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/><text x=\"642\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">심근 막전위 변화</text><path d=\"M748 239 l24 0 l0 -7 l14 12 l-14 12 l0 -7 l-24 0 Z\" fill=\"#9aa7b5\"/><rect x=\"788\" y=\"176\" width=\"200\" height=\"126\" rx=\"13\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/><text x=\"888\" y=\"246\" font-size=\"15.5\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">치명적 부정맥·심정지</text><rect x=\"34\" y=\"322\" width=\"970\" height=\  font-weight=\"800\" fill=\"#00695c\">보호→이동→제거</text><text x=\"62\" y=\"164\" font-size=\"16\" font-weight=\"800\" fill=\"#00695c\">①칼슘(심장 보호): ECG 변화시 즉시</text><text x=\"62\" y=\"198\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">칼슘은 K를 낮추지 않음(보호만)</text><text x=\"62\" y=\"232\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">②세포 내 이동: 인슐린+포도당, β2</text><text x=\"62\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">(산증시 중탄산) — 일시적</text><text x=\"62\" y=\"300\" font-size=\"16\" font-weight=\"800\" fill=\"#00695c\">③체외 제거: 이뇨·양이온수지·투석</text><text x=\"62\" y=\"334\" font-size=\"16\" font-weight=\"500\" fill=\"#3a4654\">유발약 중단·원인 교정</text></svg>"}], "redflags": ["ECG에서 첨예 T파·QRS 확장 → 즉시 칼슘으로 심장 보호", "칼슘은 칼륨을 낮추지 않음 → 반드시 이동·제거 요법 병행", "인슐린 투여 시 저혈당 위험 → 포도당 동반·혈당 감시", "신부전·불응성 고칼륨 → 투석 준비, 신장내과 보고"], "memo": "무증상 치명적 부정맥 / T파 첨예·QRS확장 / ①칼슘(보호)→②인슐린·포도당/β2(이동)→③이뇨·투석(제거)"}, {"no": "41", "name": "신장결석", "cat": "🩺 신장/비뇨기", "diff": "★★☆☆☆", "kw": "산통·옆구리→서혜부 / 혈뇨 / CT 무조영 / 진통·수분 / 감염동반·폐색 응급", "mentor": "“옆구리가 찢어지게 아프면서 사타구니로 뻗치고, 가만히 못 있고 데굴데굴 구르면 요로결석이야. 소변에 피가 섞이는 경우도 많아. 대부분 작은 돌은 진통 잘 해주고 수분 주면 빠져. 진짜 응급은 ‘결석+감염(열)’이나 ‘양쪽/단일신 폐색’ — 이건 막힌 걸 빨리 뚫어야(감압) 패혈증·신손상 막아.”", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "요로에 결석이 생겨 통과·폐색되며 극심한 산통을 일으키는 상태.", "basis": "결석이 요관 등에서 폐색·자극 → 신우내압↑·평활근 경련 → 산통·혈뇨.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전", "content": "결석 폐색 → 요 정체·신우압↑ → 산통; 점막 손상 → 혈뇨", "basis": "폐색 지속 시 신기능 저하·감염 위험. 크기·위치가 자연배출 좌우.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1038 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><rect width=\"1038\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"48\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">신장결석 — 산통의 기전</text><line x1=\"34\" y1=\"64\" x2=\"1004\" y2=\"64\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"50\" y=\"176\" width=\"200\" height=\"126\"
