<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>응급실 내과 교육 프로그램 v2.0 — 국립소방병원</title>
<style>
:root{
  --bg:#0d1117;--surf:#161b22;--surf2:#1c2330;--brd:#2a3441;
  --txt:#e6edf3;--mute:#8b98a8;--dim:#586273;
  --gold:#e3b341;
  --why:#4d9fff;--whybg:#0d2440;--whybd:#1e4976;
  --red:#ef4444;--redbg:#2a1012;--redbd:#7f1d1d;
  --c0:#1565C0;--c1:#2e7d32;--c2:#e65100;--c3:#8e24aa;--c4:#c62828;--c5:#00838f;
}
body.light{
  --bg:#eef2f6;--surf:#ffffff;--surf2:#f5f8fb;--brd:#dde5ee;
  --txt:#16202c;--mute:#5b6876;--dim:#9aa7b5;
  --why:#1565C0;--whybg:#eaf2fd;--whybd:#bcd6f5;
  --redbg:#fdeced;--redbd:#f5b5b5;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-size:18px;line-height:1.7;
  font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  transition:background .2s,color .2s;}
.wrap{max-width:880px;margin:0 auto;padding:0 18px;}

/* 상단바 */
.top{position:sticky;top:0;z-index:40;background:var(--surf);border-bottom:1px solid var(--brd);}
.top-in{max-width:880px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:12px;}
.brand{font-size:18px;font-weight:800;letter-spacing:-.4px;cursor:pointer;white-space:nowrap;}
.brand em{color:var(--red);font-style:normal;}
.top .sp{flex:1;}
.tgl{display:flex;gap:5px;}
.tgl button{padding:7px 12px;border:1px solid var(--brd);background:var(--surf2);color:var(--mute);
  border-radius:18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.tgl button.on{background:var(--red);border-color:var(--red);color:#fff;}

/* 홈 */
#home{padding:20px 0 60px;}
.hero-home{text-align:center;padding:14px 0 18px;}
.hero-home h1{font-size:27px;font-weight:800;margin-bottom:6px;}
.hero-home p{color:var(--mute);font-size:15px;}
.prog{margin:14px auto 0;max-width:420px;background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:12px 16px;}
.prog .pbar{height:8px;background:var(--surf2);border-radius:5px;overflow:hidden;margin-top:8px;}
.prog .pfill{height:100%;background:linear-gradient(90deg,#2e7d32,#43a047);transition:width .4s;}
.search{position:relative;margin:18px 0 8px;}
.search input{width:100%;background:var(--surf);border:1.5px solid var(--brd);border-radius:12px;
  padding:14px 16px 14px 46px;color:var(--txt);font-size:16px;font-family:inherit;outline:none;}
.search input:focus{border-color:var(--why);}
.search .si{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:20px;}

.cat{margin-top:26px;}
.cat-h{font-size:17px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.cat-h .cnt{font-size:13px;color:var(--mute);font-weight:600;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:11px;}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:13px;padding:15px;cursor:pointer;
  transition:.15s;position:relative;border-left:4px solid var(--cc,#666);}
.card:hover{transform:translateY(-2px);border-color:var(--why);}
.card .no{font-size:12px;color:var(--mute);font-weight:700;}
.card .nm{font-size:16.5px;font-weight:800;margin:3px 0 7px;line-height:1.35;}
.card .df{font-size:13px;color:var(--gold);}
.card .vchk{position:absolute;top:13px;right:13px;font-size:16px;display:none;}
.card.viewed .vchk{display:block;}
.card.viewed{opacity:.78;}
.noresult{text-align:center;color:var(--mute);padding:40px 0;}

/* 케이스 상세 */
#detail{display:none;padding-bottom:70px;}
.back{display:inline-flex;align-items:center;gap:6px;margin:16px 0 4px;background:var(--surf);
  border:1px solid var(--brd);color:var(--txt);padding:9px 15px;border-radius:20px;font-size:14px;
  font-weight:600;cursor:pointer;font-family:inherit;}
.hero{color:#fff;border-radius:18px;padding:24px 22px;margin:8px 0 18px;}
.hero .cno{font-size:14px;font-weight:700;opacity:.9;letter-spacing:.5px;}
.hero h1{font-size:30px;font-weight:800;margin:4px 0 12px;letter-spacing:-.5px;line-height:1.2;}
.hero .meta{display:flex;flex-wrap:wrap;gap:8px;}
.chip{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);
  padding:5px 12px;border-radius:16px;font-size:13.5px;font-weight:600;}

.mentor{background:var(--surf2);border:1px solid var(--brd);border-left:4px solid var(--gold);
  border-radius:12px;padding:17px 19px;margin-bottom:20px;}
.mentor .mh{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:7px;}
.mentor p{font-size:16.5px;}

.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:10px 15px;border-radius:20px;border:1px solid var(--brd);background:var(--surf);
  color:var(--mute);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.15s;}
.tab.active{color:#fff;border-color:transparent;}

.panel{display:none;animation:fade .25s ease;}
.panel.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.sec-head{display:flex;align-items:center;gap:9px;margin:14px 0 12px;}
.sec-head h2{font-size:20px;font-weight:800;}
.item{background:var(--surf);border:1px solid var(--brd);border-radius:13px;padding:18px;margin-bottom:13px;}
.item-title{font-size:17.5px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.item-title::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;}
.item-body{font-size:16px;white-space:pre-line;}
.why{margin-top:12px;background:var(--whybg);border:1px solid var(--whybd);border-radius:10px;padding:13px 15px;}
.why .wl{font-size:13px;font-weight:800;color:var(--why);letter-spacing:.5px;margin-bottom:5px;}
.why .wt{font-size:15px;white-space:pre-line;}
.imgnote{margin-top:11px;font-size:14px;color:var(--mute);background:var(--surf2);border:1px dashed var(--brd);
  border-radius:9px;padding:10px 13px;}
.fig{background:#fff;border:1px solid var(--brd);border-radius:14px;padding:14px;margin:6px 0 16px;box-shadow:0 1px 5px rgba(0,0,0,.07);}
.fig svg{width:100%;height:auto;display:block;}

.redbox{background:var(--redbg);border:1px solid var(--redbd);border-radius:14px;padding:18px;margin:22px 0 14px;}
.redbox h2{color:var(--red);font-size:19px;font-weight:800;margin-bottom:12px;}
.rf{display:flex;gap:10px;padding:11px 0;border-bottom:1px dashed var(--redbd);font-size:16px;}
.rf:last-child{border:none;}
.rf .ri{color:var(--red);flex-shrink:0;}

.memo{background:linear-gradient(135deg,#1A237E,#283593);color:#fff;border-radius:14px;padding:20px;margin-bottom:14px;}
.memo .ml{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:8px;}
.memo p{font-size:16.5px;font-weight:600;}

.navbtns{display:flex;gap:10px;margin-top:18px;}
.navbtns button{flex:1;padding:13px;border:1px solid var(--brd);background:var(--surf);color:var(--txt);
  border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.navbtns button:disabled{opacity:.4;cursor:default;}
</style>
</head>
<body>

<div class="top"><div class="top-in">
  <div class="brand" onclick="goHome()"><em>ER</em> 내과 교육</div>
  <div class="sp"></div>
  <div class="tgl">
    <button id="bd" class="on" onclick="theme('dark')">🌙</button>
    <button id="bl" onclick="theme('light')">☀️</button>
  </div>
</div></div>

<div class="wrap">
  <!-- 홈 -->
  <div id="home">
    <div class="hero-home">
      <h1>🏥 응급실 내과 교육 프로그램</h1>
      <p>국립소방병원 응급실 · 신규 의료인 자기주도 학습 · 케이스 <span id="totalN"></span>개</p>
      <div class="prog">
        <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:600">
          <span>학습 진행</span><span id="progTxt">0 / 0</span>
        </div>
        <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="search">
      <span class="si">🔍</span>
      <input id="q" type="text" placeholder="병명·증상·키워드 검색…" oninput="renderHome()">
    </div>
    <div id="catList"></div>
  </div>

  <!-- 상세 -->
  <div id="detail"></div>
</div>

<script>
const CASES = [{"no": "01", "name": "급성 심근경색 (STEMI)", "cat": "❤️ 심장/순환기", "diff": "★★★★☆", "kw": "Door-to-Balloon 90분 / 12-lead ECG / DAPT / PCI / ST 상승", "mentor": "\"AMI는 응급실에서 제일 긴장되는 케이스야. 근데 신규 때 제일 힘든 게 뭔지 알아? 왜 이걸 하는지 모르고 손만 움직이는 것이야. 오늘은 검사 하나, 약 하나에도 전부 이유를 붙여서 설명해줄게. 이유를 알면 흔들리지 않아.\"", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "관상동맥이 완전히 막혀 심근세포가 산소를 못 받아 죽어가는 상태", "basis": "심근세포는 한번 죽으면 절대 재생 불가. Time is Muscle — 20분부터 괴사 시작, 6시간이면 광범위 괴사 완성.", "img": ""}, {"item": "위험인자", "content": "고칠 수 있음: 고혈압, 당뇨, 고지혈증, 흡연, 비만, 스트레스\n고칠 수 없음: 고령(남45↑ 여55↑), 남성, 가족력", "basis": "죽상경화증은 수년간 진행. 위험인자가 많을수록 플라크 형성 속도↑, 파열 위험↑", "img": ""}, {"item": "STEMI vs NSTEMI", "content": "STEMI: 완전 폐색, ST 상승, D2B 90분 PCI\nNSTEMI: 부분 폐색, ST 하강/정상, 안정화 후 PCI", "basis": "폐색 정도의 차이. 둘 다 심근효소 상승하지만 STEMI가 훨씬 긴박함.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "진행 4단계", "content": "1) 죽상경화반 수년 형성\n2) 플라크 파열 (스트레스·흡연 방아쇠)\n3) 혈소판 집합 → 혈전 형성\n4) 완전 폐색 → 심근 괴사", "basis": "DAPT(Aspirin+Clopidogrel)는 3단계 혈전 형성을 두 가지 경로에서 동시 차단", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 880 460\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <defs>\n    <radialGradient id=\"lumen\" cx=\"0.5\" cy=\"0.4\" r=\"0.6\"><stop offset=\"0\" stop-color=\"#ffe1e3\"/><stop offset=\"1\" stop-color=\"#f2b8bc\"/></radialGradient>\n    <linearGradient id=\"wall\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#f5c9a0\"/><stop offset=\"1\" stop-color=\"#e0a173\"/></linearGradient>\n  </defs>\n  <rect width=\"880\" height=\"460\" rx=\"18\" fill=\"#ffffff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"25\" font-weight=\"800\" fill=\"#1a2a3a\">죽상경화 진행 4단계 — 혈관이 막히기까지</text>\n  <line x1=\"32\" y1=\"60\" x2=\"848\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <g transform=\"translate(120,210)\"><circle r=\"95\" fill=\"url(#wall)\" stroke=\"#c98248\" stroke-width=\"3\"/><circle r=\"62\" fill=\"url(#lumen)\" stroke=\"#d98a90\" stroke-width=\"2\"/><text x=\"0\" y=\"6\" font-size=\"15\" fill=\"#b23039\" font-weight=\"700\" text-anchor=\"middle\">정상 혈류</text><text x=\"0\" y=\"135\" font-size=\"18\" font-weight=\"800\" fill=\"#1a2a3a\" text-anchor=\"middle\">① 정상</text><text x=\"0\" y=\"160\" font-size=\"13.5\" fill=\"#5b6876\" text-anchor=\"middle\">내강이 넓게 열림</text></g>\n  <g transform=\"translate(345,210)\"><circle r=\"95\" fill=\"url(#wall)\" stroke=\"#c98248\" stroke-width=\"3\"/><circle r=\"62\" fill=\"url(#lumen)\" stroke=\"#d98a90\" stroke-width=\"2\"/><path d=\"M-62 0 A62 62 0 0 1 40 -47 C8 -18 8 18 40 47 A62 62 0 0 1 -62 0 Z\" fill=\"#ffd54a\" stroke=\"#d9a200\" stroke-width=\"2\"/><text x=\"-6\" y=\"6\" font-size=\"13\" fill=\"#7a5b00\" font-weight=\"700\" text-anchor=\"middle\">플라크</text><text x=\"0\" y=\"135\" font-size=\"18\" font-weight=\"800\" fill=\"#1a2a3a\" text-anchor=\"middle\">② 플라크 축적</text><text x=\"0\" y=\"160\" font-size=\"13.5\" fill=\"#5b6876\" text-anchor=\"middle\">콜레스테롤 쌓여 좁아짐</text></g>\n  <g transform=\"translate(570,210)\"><circle r=\"95\" fill=\"url(#wall)\" stroke=\"#c98248\" stroke-width=\"3\"/><circle r=\"62\" fill=\"url(#lumen)\" stroke=\"#d98a90\" stroke-width=\"2\"/><path d=\"M-62 0 A62 62 0 0 1 40 -47 C8 -18 8 18 40 47 A62 62 0 0 1 -62 0 Z\" fill=\"#ffd54a\" stroke=\"#d9a200\" stroke-width=\"2\"/><path d=\"M-2 -40 L-18 -8 L2 2 L-14 38\" fill=\"none\" stroke=\"#b23039\" stroke-width=\"4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><text x=\"-6\" y=\"-52\" font-size=\"13\" fill=\"#b23039\" font-weight=\"800\" text-anchor=\"middle\">파열!</text><text x=\"0\" y=\"135\" font-size=\"18\" font-weight=\"800\" fill=\"#1a2a3a\" text-anchor=\"middle\">③ 플라크 파열</text><text x=\"0\" y=\"160\" font-size=\"13.5\" fill=\"#5b6876\" text-anchor=\"middle\">표면 터지며 혈액 노출</text></g>\n  <g transform=\"translate(795,210)\"><circle r=\"95\" fill=\"url(#wall)\" stroke=\"#c98248\" stroke-width=\"3\"/><circle r=\"62\" fill=\"url(#lumen)\" stroke=\"#d98a90\" stroke-width=\"2\"/><path d=\"M-62 0 A62 62 0 0 1 40 -47 C8 -18 8 18 40 47 A62 62 0 0 1 -62 0 Z\" fill=\"#ffd54a\" stroke=\"#d9a200\" stroke-width=\"2\"/><circle cx=\"-8\" cy=\"0\" r=\"34\" fill=\"#6b2d34\"/><circle cx=\"-22\" cy=\"-12\" r=\"9\" fill=\"#8d3a43\"/><circle cx=\"6\" cy=\"10\" r=\"8\" fill=\"#8d3a43\"/><text x=\"-8\" y=\"5\" font-size=\"12\" fill=\"#ffd7da\" font-weight=\"700\" text-anchor=\"middle\">혈전</text><text x=\"0\" y=\"135\" font-size=\"18\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">④ 혈전 폐색</text><text x=\"0\" y=\"160\" font-size=\"13.5\" fill=\"#5b6876\" text-anchor=\"middle\">완전 막힘 → 심근경색</text></g>\n  <g fill=\"#9aa7b5\"><path d=\"M222 200 l24 0 l0 -7 l16 12 l-16 12 l0 -7 l-24 0 Z\"/><path d=\"M447 200 l24 0 l0 -7 l16 12 l-16 12 l0 -7 l-24 0 Z\"/><path d=\"M672 200 l24 0 l0 -7 l16 12 l-16 12 l0 -7 l-24 0 Z\"/></g>\n  <text x=\"440\" y=\"410\" font-size=\"14\" fill=\"#8b98a8\" text-anchor=\"middle\">※ \"수도관에 녹이 쌓이다 → 터지고 → 막힌다\"  ·  DAPT는 ③④단계(혈전 형성)를 차단</text>\n</svg>"}, {"title": "🗺️ 해부 지도", "items": [{"item": "관상동맥 3가지", "content": "LAD(전하행): 심실 전벽 → V1~V4 ST↑ ★가장 위험\nRCA(우관상): 하벽·우심실 → II·III·aVF ST↑ → NTG 금기!\nLCX(좌선회): 측벽 → I·aVL·V5~V6 ST↑ → 진단 어려움", "basis": "RCA 막히면 우심실 경색 동반 가능. 우심실은 전부하 의존 → NTG로 혈관 확장하면 혈압 급락 위험.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 780 540\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <defs>\n    <linearGradient id=\"myo\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#e9656b\"/><stop offset=\"1\" stop-color=\"#b23039\"/></linearGradient>\n    <filter id=\"sh\" x=\"-20%\" y=\"-20%\" width=\"140%\" height=\"140%\"><feDropShadow dx=\"0\" dy=\"4\" stdDeviation=\"6\" flood-color=\"#000\" flood-opacity=\"0.18\"/></filter>\n  </defs>\n  <rect width=\"780\" height=\"540\" rx=\"18\" fill=\"#ffffff\"/>\n  <text x=\"32\" y=\"48\" font-size=\"26\" font-weight=\"800\" fill=\"#1a2a3a\">관상동맥 지도 — 어느 혈관이 막히면 어디가?</text>\n  <line x1=\"32\" y1=\"62\" x2=\"748\" y2=\"62\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <g filter=\"url(#sh)\"><path d=\"M300 150 C250 110 175 120 160 195 C148 255 175 330 250 405 C300 455 360 480 400 488 C440 480 500 455 550 405 C625 330 652 255 640 195 C625 120 550 110 500 150 C465 175 430 200 400 200 C370 200 335 175 300 150 Z\" fill=\"url(#myo)\" stroke=\"#8d242c\" stroke-width=\"3\"/></g>\n  <path d=\"M360 150 C360 95 345 70 330 55\" fill=\"none\" stroke=\"#c98b95\" stroke-width=\"14\" stroke-linecap=\"round\"/>\n  <path d=\"M445 150 C448 100 470 78 492 66\" fill=\"none\" stroke=\"#c98b95\" stroke-width=\"14\" stroke-linecap=\"round\"/>\n  <path d=\"M398 175 C396 250 392 330 386 430\" fill=\"none\" stroke=\"#f2a900\" stroke-width=\"9\" stroke-linecap=\"round\"/>\n  <circle cx=\"398\" cy=\"178\" r=\"7\" fill=\"#f2a900\"/>\n  <path d=\"M420 188 C500 205 560 250 560 330\" fill=\"none\" stroke=\"#2e9d4f\" stroke-width=\"9\" stroke-linecap=\"round\"/>\n  <path d=\"M362 188 C275 215 222 270 235 360\" fill=\"none\" stroke=\"#1f7ae0\" stroke-width=\"9\" stroke-linecap=\"round\"/>\n  <g font-size=\"16\">\n    <rect x=\"560\" y=\"120\" width=\"196\" height=\"74\" rx=\"10\" fill=\"#fff7e6\" stroke=\"#f2a900\" stroke-width=\"2\"/>\n    <circle cx=\"578\" cy=\"142\" r=\"6\" fill=\"#f2a900\"/><text x=\"592\" y=\"147\" font-weight=\"800\" fill=\"#9a6b00\">LAD (전하행지)</text>\n    <text x=\"574\" y=\"170\" fill=\"#5b4a1f\">심실 전벽 · V1~V4 ST↑</text><text x=\"574\" y=\"188\" fill=\"#b23039\" font-weight=\"700\">가장 위험</text>\n    <line x1=\"560\" y1=\"157\" x2=\"430\" y2=\"300\" stroke=\"#f2a900\" stroke-width=\"2\" stroke-dasharray=\"4 4\"/>\n    <rect x=\"560\" y=\"350\" width=\"196\" height=\"74\" rx=\"10\" fill=\"#eafaef\" stroke=\"#2e9d4f\" stroke-width=\"2\"/>\n    <circle cx=\"578\" cy=\"372\" r=\"6\" fill=\"#2e9d4f\"/><text x=\"592\" y=\"377\" font-weight=\"800\" fill=\"#1d6b36\">LCX (좌회선지)</text>\n    <text x=\"574\" y=\"400\" fill=\"#264f33\">측벽 · I·aVL·V5·V6 ST↑</text><text x=\"574\" y=\"418\" fill=\"#5b6876\">진단이 까다로움</text>\n    <line x1=\"560\" y1=\"387\" x2=\"558\" y2=\"330\" stroke=\"#2e9d4f\" stroke-width=\"2\" stroke-dasharray=\"4 4\"/>\n    <rect x=\"24\" y=\"350\" width=\"200\" height=\"92\" rx=\"10\" fill=\"#eaf3fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/>\n    <circle cx=\"42\" cy=\"372\" r=\"6\" fill=\"#1f7ae0\"/><text x=\"56\" y=\"377\" font-weight=\"800\" fill=\"#1559a8\">RCA (우관상동맥)</text>\n    <text x=\"38\" y=\"400\" fill=\"#1d3a5f\">하벽·우심실 · II·III·aVF ST↑</text><text x=\"38\" y=\"420\" fill=\"#b23039\" font-weight=\"700\">NTG 금기 · 수액 필요</text>\n    <text x=\"38\" y=\"438\" fill=\"#5b6876\">서맥 동반 잦음</text>\n    <line x1=\"224\" y1=\"395\" x2=\"240\" y2=\"360\" stroke=\"#1f7ae0\" stroke-width=\"2\" stroke-dasharray=\"4 4\"/>\n  </g>\n  <text x=\"32\" y=\"520\" font-size=\"14\" fill=\"#8b98a8\">※ \"막히는 혈관 → 변하는 ECG 유도 → 임상 주의점\"을 한눈에</text>\n</svg>"}, {"title": "😣 증상", "items": [{"item": "증상별 근거", "content": "흉통·압박감 30분↑: 허혈 심근 → 젖산·브레디키닌 축적 → 통증수용체 자극\n왼팔·턱 방사통: 심장 구심신경(C8~T4) = 왼팔·턱 피부분절 같은 척수레벨 → 연관통\n식은땀·창백: 심박출량↓ → 교감신경↑ → 카테콜아민 → 말초혈관 수축\n오심·구토: RCA경색 → 하벽 자극 → 미주신경 반사항진", "basis": "당뇨·노인·여성은 신경 둔화로 흉통 없는 경우 多. \"그냥 피곤해요\"도 ECG 먼저!", "img": ""}], "svg": ""}, {"title": "📈 ECG & 검사", "items": [{"item": "ECG 근거 & 읽기", "content": "근거: 심근 허혈 → 이온 펌프 손상 → 재분극 이상 → ST↑\n변화 순서: 과첨예 T파 → ST 상승★ → T파 역전 → 병적 Q파\n진단: 인접 2개 유도 1mm↑ (V2-V3은 2mm↑)", "basis": "V1-V4: LAD / II·III·aVF: RCA / I·aVL·V5-V6: LCX\n새로운 LBBB + 흉통 = STEMI로 취급", "img": ""}, {"item": "심근효소 근거", "content": "Troponin I: 3h↑ → 24h 정점 → 7~10일 지속\nCK-MB: 3h↑ → 18h 정점 → 3~4일\n초기 음성 가능 → Serial Troponin (6h 재검) 필수!", "basis": "심근세포 괴사 → 세포막 파괴 → 세포내 단백질 혈액 유출. Troponin은 심근에만 특이적으로 존재.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1180 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><defs><pattern id=\"g_sm\" width=\"10\" height=\"10\" patternUnits=\"userSpaceOnUse\"><path d=\"M10 0H0V10\" fill=\"none\" stroke=\"#f3c7cb\" stroke-width=\"0.7\"/></pattern><pattern id=\"g_lg\" width=\"50\" height=\"50\" patternUnits=\"userSpaceOnUse\"><rect width=\"50\" height=\"50\" fill=\"url(#g_sm)\"/><path d=\"M50 0H0V50\" fill=\"none\" stroke=\"#e88e95\" stroke-width=\"1.5\"/></pattern></defs><rect width=\"1180\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"50\" font-size=\"27\" font-weight=\"800\" fill=\"#1a2a3a\">정상 vs STEMI — ST를 보라</text><line x1=\"34\" y1=\"66\" x2=\"1146\" y2=\"66\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"34\" y=\"90\" width=\"540\" height=\"210\" rx=\"10\" fill=\"url(#g_lg)\" stroke=\"#e88e95\" stroke-width=\"1.6\"/><text x=\"50\" y=\"116\" font-size=\"17\" font-weight=\"800\" fill=\"#2e9d4f\">정상</text><line x1=\"46\" y1=\"235\" x2=\"566\" y2=\"235\" stroke=\"#2e9d4f\" stroke-width=\"1.1\" stroke-dasharray=\"6 5\"/><polyline fill=\"none\" stroke=\"#1a2a3a\" stroke-width=\"3\" stroke-linejoin=\"round\" stroke-linecap=\"round\" points=\"70,235 83,223 96,235 112,235 118,246 127,155 137,263 146,235 176,235 196,211 220,235 234,235 235,235 248,223 261,235 277,235 283,246 292,155 302,263 311,235 341,235 361,211 385,235 399,235 400,235 413,223 426,235 442,235 448,246 457,155 467,263 476,235 506,235 526,211 550,235 564,235\"/><text x=\"150\" y=\"290\" font-size=\"14.5\" fill=\"#5b6876\">ST 분절이 기준선과 같은 높이</text><rect x=\"606\" y=\"90\" width=\"540\" height=\"210\" rx=\"10\" fill=\"url(#g_lg)\" stroke=\"#e88e95\" stroke-width=\"1.6\"/><text x=\"622\" y=\"116\" font-size=\"17\" font-weight=\"800\" fill=\"#b23039\">STEMI (ST 상승)</text><line x1=\"618\" y1=\"235\" x2=\"1138\" y2=\"235\" stroke=\"#2e9d4f\" stroke-width=\"1.1\" stroke-dasharray=\"6 5\"/><polyline fill=\"none\" stroke=\"#b23039\" stroke-width=\"3.2\" stroke-linejoin=\"round\" stroke-linecap=\"round\" points=\"642,235 655,223 668,235 684,235 690,246 699,155 709,263 718,193 748,193 768,169 792,193 806,235 807,235 820,223 833,235 849,235 855,246 864,155 874,263 883,193 913,193 933,169 957,193 971,235 972,235 985,223 998,235 1014,235 1020,246 1029,155 1039,263 1048,193 1078,193 1098,169 1122,193 1136,235\"/><circle cx=\"757\" cy=\"183\" r=\"22\" fill=\"none\" stroke=\"#ff7a00\" stroke-width=\"3\"/><text x=\"700\" y=\"290\" font-size=\"14.5\" fill=\"#b23039\" font-weight=\"700\">ST가 기준선 위로 볼록하게 상승</text><rect x=\"34\" y=\"318\" width=\"1112\" height=\"92\" rx=\"11\" fill=\"#fff4ec\" stroke=\"#ff7a00\" stroke-width=\"1.8\"/><text x=\"54\" y=\"348\" font-size=\"17\" font-weight=\"800\" fill=\"#b23039\">💡 ST 상승 = 즉시 보고</text><text x=\"54\" y=\"376\" font-size=\"15.5\" fill=\"#3a4654\">진단기준: 인접 2개 유도 1mm↑ (V2·V3은 2mm↑)  ·  변화순서: 과첨예T → ST상승 → T역전 → 병적Q파</text><text x=\"54\" y=\"400\" font-size=\"14.5\" fill=\"#8b6a4f\">처음엔 ST만 봐 — 기준선보다 올라갔으면 일단 보고. 나머지는 나중에 배워도 돼.</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "즉시 처치", "content": "12-lead ECG 10분내: 혈관위치·폐색범위 파악\nIV 라인 2개: 응급약물·수액 동시투여\n채혈(Troponin·CK-MB·CBC·BMP·Coag·혈형): 진단확인+PCI전 출혈위험평가\n지속 심전도: VF·VT 즉각 대비", "basis": "D2B 90분 = Door to Balloon. 응급실 도착 → 스텐트 삽입까지 90분 이내 목표.", "img": ""}, {"item": "약물 근거", "content": "Aspirin 300mg 씹어서: COX-1억제→TXA₂차단→혈소판응집억제. 씹으면 3분 vs 삼키면 15분\nClopidogrel: ADP수용체(P2Y12) 차단 → Aspirin과 다른 경로 → DAPT=이중차단\n산소: SpO₂<90%만! 과산소→활성산소↑→심근손상 악화\nNTG: 혈관확장→전부하↓→심근산소요구량↓ BUT SBP<90 / 하벽STEMI 금기!\nMorphine: 통증·교감흥분완화→심근산소소비↓", "basis": "Primary PCI(스텐트): 혈전직접제거+고정. 약물보다 재개통률·생존율 압도적↑", "img": ""}], "svg": ""}], "redflags": ["하벽 STEMI + 저혈압 → NTG 금지! NS 250~500mL 수액", "초기 Troponin 음성 → 6시간 후 Serial 재검 필수", "새로운 LBBB + 흉통 → STEMI 동일 대응", "SBP<90 + 의식변화 → 심인성 쇼크, 즉시 보고", "30분마다 통증 NRS 재평가 기록"], "memo": "DAPT (Aspirin씹어서 + Clopidogrel) / D2B 90분 / NTG 금기 2가지(SBP<90, 하벽STEMI) / Serial Troponin 6h"}, {"no": "02", "name": "급성 심근경색 (NSTEMI)", "cat": "❤️ 심장/순환기", "diff": "★★★☆☆", "kw": "부분폐색 / ST하강·T역전 / Troponin↑ / GRACE / 위험도층화 PCI", "mentor": "\"STEMI는 '당장 뚫어'지만 NSTEMI는 '위험한 만큼 빨리'야. ST가 안 올라갔다고 안심하면 안 돼. Troponin 오르고 ST 내려가 있으면 이미 심근은 죽고 있는 거야. GRACE 점수로 얼마나 급한지 판단해.\"", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "관상동맥이 '부분' 폐색되어 심근 일부가 허혈·괴사되는 상태. ST 상승은 없지만 Troponin이 오른다.", "basis": "혈류가 완전히 끊긴 게 아니라 줄어든 상태 → 심내막하(subendocardial) 괴사 위주 → ST 상승 대신 하강·T 역전.", "img": "🖼️ 부분 폐색 관상동맥 단면 — 혈전이 내강 일부만 막은 모습"}, {"item": "STEMI와 차이", "content": "STEMI: 완전폐색·ST상승·즉시 PCI(90분)\nNSTEMI: 부분폐색·ST하강/정상·위험도 따라 PCI(보통 24~72h)", "basis": "둘 다 Troponin↑(심근 괴사 동반). 차이는 폐색 정도와 긴급도. NSTEMI도 고위험군은 24h 내 조기 침습.", "img": ""}, {"item": "UA와 차이", "content": "불안정협심증(UA): 같은 증상이지만 Troponin 정상(괴사 없음)\nNSTEMI: Troponin 상승(괴사 있음)", "basis": "UA와 NSTEMI는 ECG·증상이 같음. Troponin 상승 여부가 갈림길 → Serial Troponin 필수.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "진행 과정", "content": "불안정 플라크 파열 → 혈전 형성 → 내강 부분 폐색 → 심내막하 허혈", "basis": "심근벽은 안쪽(내막)이 혈류 마지막에 도달 → 부분 폐색 시 내막부터 손상 → ST 하강으로 표현.", "img": "🖼️ 불안정 플라크 파열 → 혈소판 혈전 형성 단계도"}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 820 420\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"820\" height=\"420\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">부분 폐색(NSTEMI) vs 완전 폐색(STEMI)</text>\n  <line x1=\"32\" y1=\"60\" x2=\"788\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <!-- 부분 폐색 -->\n  <g transform=\"translate(0,40)\">\n    <rect x=\"60\" y=\"70\" width=\"700\" height=\"64\" rx=\"32\" fill=\"#f7d8c0\" stroke=\"#d9a276\" stroke-width=\"3\"/>\n    <rect x=\"70\" y=\"84\" width=\"680\" height=\"36\" rx=\"18\" fill=\"#ffd9dc\"/>\n    <path d=\"M360 84 q60 18 0 36 q-60 -18 0 -36 Z\" fill=\"#6b2d34\"/>\n    <path d=\"M120 102 H330\" stroke=\"#c0392b\" stroke-width=\"6\" stroke-linecap=\"round\" marker-end=\"url(#a1)\"/>\n    <text x=\"70\" y=\"56\" font-size=\"18\" font-weight=\"800\" fill=\"#c2611a\">NSTEMI · 부분 폐색</text>\n    <text x=\"420\" y=\"100\" font-size=\"14\" fill=\"#b23039\" font-weight=\"700\">혈전이 내강 일부만</text>\n    <text x=\"420\" y=\"120\" font-size=\"13.5\" fill=\"#5b6876\">→ ST 하강·T역전 / Troponin↑</text>\n  </g>\n  <!-- 완전 폐색 -->\n  <g transform=\"translate(0,210)\">\n    <rect x=\"60\" y=\"70\" width=\"700\" height=\"64\" rx=\"32\" fill=\"#f7d8c0\" stroke=\"#d9a276\" stroke-width=\"3\"/>\n    <rect x=\"70\" y=\"84\" width=\"680\" height=\"36\" rx=\"18\" fill=\"#ffd9dc\"/>\n    <ellipse cx=\"380\" cy=\"102\" rx=\"48\" ry=\"20\" fill=\"#6b2d34\"/>\n    <path d=\"M120 102 H300\" stroke=\"#c0392b\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n    <text x=\"500\" y=\"98\" font-size=\"22\" fill=\"#b23039\" font-weight=\"800\">✕ 막힘</text>\n    <text x=\"70\" y=\"56\" font-size=\"18\" font-weight=\"800\" fill=\"#b23039\">STEMI · 완전 폐색</text>\n    <text x=\"430\" y=\"122\" font-size=\"13.5\" fill=\"#5b6876\">→ ST 상승 / D2B 90분 PCI</text>\n  </g>\n  <text x=\"32\" y=\"404\" font-size=\"13.5\" fill=\"#8b98a8\">※ 둘 다 Troponin↑(괴사 동반). 차이는 폐색 정도와 ECG·긴급도.</text>\n</svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "흉통·압박감(STEMI보다 약하거나 단속적일 수 있음), 방사통, 식은땀, 호흡곤란, 오심", "basis": "허혈 심근의 통증 기전은 STEMI와 동일. 단 부분 폐색이라 강도·지속이 변동적일 수 있어 놓치기 쉬움.", "img": ""}, {"item": "비전형", "content": "당뇨·고령·여성은 흉통 없이 '기운 없음·소화불량'만 호소", "basis": "자율신경 둔화 → 통증 인지 저하. 비전형 증상도 ECG·Troponin 먼저 확인.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "ECG", "content": "ST 분절 하강(≥0.5mm) 또는 T파 역전. 정상일 수도 있음.", "basis": "심내막하 허혈 → 재분극 이상이 ST 상승이 아닌 '하강'으로 나타남. 정상 ECG도 NSTEMI 배제 못 함.", "img": "🖼️ NSTEMI 12-lead — ST 하강·T파 역전 강조"}, {"item": "Serial Troponin", "content": "0h·3~6h 재검. 상승·변화 패턴 확인.", "basis": "초기 음성 가능 → 시간 경과 후 상승(rising pattern)이 진단. 한 번 정상으로 배제 금지.", "img": ""}, {"item": "GRACE 위험도", "content": "나이·HR·SBP·Cr·Killip·심정지·ECG·Troponin으로 점수화 → 침습 시기 결정", "basis": "고위험(GRACE>140)은 24h 내 조기 침습이 예후 개선. 위험도 층화가 NSTEMI 관리의 핵심.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1180 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><defs><pattern id=\"g_sm\" width=\"10\" height=\"10\" patternUnits=\"userSpaceOnUse\"><path d=\"M10 0H0V10\" fill=\"none\" stroke=\"#f3c7cb\" stroke-width=\"0.7\"/></pattern><pattern id=\"g_lg\" width=\"50\" height=\"50\" patternUnits=\"userSpaceOnUse\"><rect width=\"50\" height=\"50\" fill=\"url(#g_sm)\"/><path d=\"M50 0H0V50\" fill=\"none\" stroke=\"#e88e95\" stroke-width=\"1.5\"/></pattern></defs><rect width=\"1180\" height=\"430\" rx=\"18\" fill=\"#ffffff\"/><text x=\"34\" y=\"50\" font-size=\"27\" font-weight=\"800\" fill=\"#1a2a3a\">NSTEMI 심전도 — ST 하강 · T파 역전</text><line x1=\"34\" y1=\"66\" x2=\"1146\" y2=\"66\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"34\" y=\"92\" width=\"1112\" height=\"210\" rx=\"10\" fill=\"url(#g_lg)\" stroke=\"#e88e95\" stroke-width=\"1.6\"/><line x1=\"46\" y1=\"235\" x2=\"1134\" y2=\"235\" stroke=\"#2e9d4f\" stroke-width=\"1.1\" stroke-dasharray=\"6 5\"/><polyline fill=\"none\" stroke=\"#b23039\" stroke-width=\"3.2\" stroke-linejoin=\"round\" stroke-linecap=\"round\" points=\"70,235 83,223 96,235 112,235 118,246 127,155 137,263 146,265 176,265 196,289 220,265 234,235 340,235 353,223 366,235 382,235 388,246 397,155 407,263 416,265 446,265 466,289 490,265 504,235 610,235 623,223 636,235 652,235 658,246 667,155 677,263 686,265 716,265 736,289 760,265 774,235 880,235 893,223 906,235 922,235 928,246 937,155 947,263 956,265 986,265 1006,289 1030,265 1044,235\"/><circle cx=\"170\" cy=\"265\" r=\"24\" fill=\"none\" stroke=\"#ff7a00\" stroke-width=\"3\"/><path d=\"M170 207 l0 20 l-8 0 l8 14 l8 -14 l-8 0 Z\" fill=\"#ff7a00\"/><text x=\"186\" y=\"223\" font-size=\"20\" font-weight=\"800\" fill=\"#ff7a00\">ST 하강</text><rect x=\"34\" y=\"324\" width=\"1112\" height=\"84\" rx=\"11\" fill=\"#fff4ec\" stroke=\"#ff7a00\" stroke-width=\"1.8\"/><text x=\"54\" y=\"356\" font-size=\"17\" font-weight=\"800\" fill=\"#b23039\">ST 분절 하강(≥0.5mm) 또는 T파 역전 — ST는 안 올라가지만 Troponin은 오른다</text><text x=\"54\" y=\"382\" font-size=\"17\" font-weight=\"500\" fill=\"#3a4654\">심내막하 허혈 → 재분극 이상이 '하강'으로 나타남 · 정상 ECG도 NSTEMI 배제 못 함</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "즉시 처치", "content": "12-lead ECG, IV 2개, 채혈(Troponin·CBC·BMP·Coag), 지속 모니터링, 산소(SpO₂<90%)", "basis": "STEMI 가능성 배제·위험도 평가 동시 진행. 산소 과투여는 심근 손상 악화로 제한적.", "img": ""}, {"item": "항혈소판", "content": "Aspirin 300mg 씹어서 + P2Y12 억제제(Clopidogrel/Ticagrelor)", "basis": "DAPT로 혈전 진행 차단. 두 경로(COX-1, P2Y12) 동시 억제.", "img": ""}, {"item": "항응고", "content": "Heparin / Enoxaparin / Fondaparinux", "basis": "혈전 추가 형성 억제. PCI 전후 출혈위험 고려해 선택.", "img": ""}, {"item": "항허혈", "content": "NTG(SBP≥90), β차단제, 통증 시 Morphine", "basis": "전부하·심박수↓ → 심근 산소요구량↓. NSTEMI는 즉시 PCI가 아니라 약물로 안정화 후 위험도 따라 PCI.", "img": ""}], "svg": ""}], "redflags": ["Troponin 상승 + ST 하강 → 이미 괴사 진행 중, STEMI 못지않게 위험", "흉통 지속 + 혈역학 불안정 → 즉시 침습(긴급 PCI) 대상", "초기 Troponin 음성이라고 귀가 금지 → Serial 재검 필수", "GRACE 고위험 / 재발성 흉통 / 새 ST변화 → 24h 내 조기 침습 보고"], "memo": "부분폐색·ST하강/T역전 / Troponin Serial(0·3~6h) / DAPT+항응고 / GRACE로 PCI 시기 결정"}, {"no": "03", "name": "불안정 협심증 (UA)", "cat": "❤️ 심장/순환기", "diff": "★★★☆☆", "kw": "안정시 흉통 / Crescendo / Troponin 정상 / ACS 스펙트럼 / 배제진단", "mentor": "\"'협심증인데 불안정'이 무슨 뜻일까? 전에는 계단 오를 때만 아프던 게, 이제 가만히 있어도 아프면 곧 막힐 신호야. Troponin이 정상이라 안심되겠지만, 이건 NSTEMI 바로 전 단계야. 절대 가볍게 보지 마.\"", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "관상동맥 협착으로 인한 흉통이지만 심근 괴사는 아직 없는 상태(Troponin 정상). ACS의 가장 이른 단계.", "basis": "플라크가 불안정해져 혈류가 위태롭지만 완전·부분 폐색에 이르진 않음 → 괴사 표지자(Troponin) 정상.", "img": "🖼️ 안정형 vs 불안정형 협심증 — 플라크 안정도 비교"}, {"item": "불안정의 3유형", "content": "① 안정시 발생 ② 새로 생긴 중증 협심증 ③ 점점 심해지는(crescendo) 협심증", "basis": "기존 안정형과 달리 '예측 불가'·'악화' 패턴 → 곧 폐색될 수 있다는 경고.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 820 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <defs><radialGradient id=\"lm2\" cx=\"0.5\" cy=\"0.4\" r=\"0.6\"><stop offset=\"0\" stop-color=\"#ffe1e3\"/><stop offset=\"1\" stop-color=\"#f2b8bc\"/></radialGradient></defs>\n  <rect width=\"820\" height=\"430\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">안정형 vs 불안정형 플라크 — 막의 두께가 운명</text>\n  <line x1=\"32\" y1=\"60\" x2=\"788\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <g transform=\"translate(215,235)\">\n    <circle r=\"105\" fill=\"#f5c9a0\" stroke=\"#c98248\" stroke-width=\"3\"/><circle r=\"70\" fill=\"url(#lm2)\"/>\n    <path d=\"M-70 0 A70 70 0 0 1 50 -50 C30 -20 30 20 50 50 A70 70 0 0 1 -70 0 Z\" fill=\"#ffe08a\"/>\n    <path d=\"M-70 0 A70 70 0 0 1 50 -50\" fill=\"none\" stroke=\"#2e9d4f\" stroke-width=\"9\"/>\n    <text x=\"-8\" y=\"0\" font-size=\"13\" fill=\"#7a5b00\" font-weight=\"700\" text-anchor=\"middle\">지질핵(작음)</text>\n    <text x=\"0\" y=\"150\" font-size=\"18\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">안정형 협심증</text>\n    <text x=\"0\" y=\"174\" font-size=\"13.5\" fill=\"#5b6876\" text-anchor=\"middle\">두꺼운 섬유막 → 잘 안 터짐</text>\n  </g>\n  <g transform=\"translate(605,235)\">\n    <circle r=\"105\" fill=\"#f5c9a0\" stroke=\"#c98248\" stroke-width=\"3\"/><circle r=\"70\" fill=\"url(#lm2)\"/>\n    <path d=\"M-70 0 A70 70 0 0 1 50 -50 C20 -10 20 10 50 50 A70 70 0 0 1 -70 0 Z\" fill=\"#ffcf4d\"/>\n    <path d=\"M-70 0 A70 70 0 0 1 50 -50\" fill=\"none\" stroke=\"#e08a00\" stroke-width=\"3\" stroke-dasharray=\"6 5\"/>\n    <path d=\"M2 -48 l-14 26 l16 10 l-12 30\" fill=\"none\" stroke=\"#b23039\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n    <text x=\"-8\" y=\"6\" font-size=\"13\" fill=\"#7a5b00\" font-weight=\"700\" text-anchor=\"middle\">지질핵(큼)</text>\n    <text x=\"0\" y=\"150\" font-size=\"18\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">불안정형(UA)</text>\n    <text x=\"0\" y=\"174\" font-size=\"13.5\" fill=\"#5b6876\" text-anchor=\"middle\">얇은 막 → 파열 임박</text>\n  </g>\n  <text x=\"32\" y=\"414\" font-size=\"13.5\" fill=\"#8b98a8\">※ UA = 안정시 흉통·악화 패턴, Troponin 정상. 곧 NSTEMI/STEMI로 갈 수 있는 경고.</text>\n</svg>"}, {"title": "🔬 병태생리", "items": [{"item": "기전", "content": "플라크 파열·미란 → 일시적 혈전·혈관수축 → 간헐적 혈류 감소(괴사 직전)", "basis": "혈전이 자연 용해되거나 혈관 수축이 풀리면 증상 완화 → 변동성. 다음엔 완전 폐색될 수 있음.", "img": ""}], "svg": ""}, {"title": "😣 증상", "items": [{"item": "증상", "content": "안정시·경미한 활동에도 흉통, 지속시간 길어짐, NTG 반응 둔화", "basis": "산소 공급-요구 불균형이 휴식 중에도 발생 → 협착이 심해졌다는 의미.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "ECG", "content": "흉통 시 일과성 ST 하강·T파 역전, 통증 멎으면 정상화 가능", "basis": "허혈이 가역적 → 변화도 일과성. 통증 중 ECG가 진단에 유리.", "img": "🖼️ UA에서의 일과성 ST 하강/T 역전 ECG"}, {"item": "Serial Troponin", "content": "0h·3~6h 모두 정상이어야 UA. 상승하면 NSTEMI로 재분류", "basis": "UA와 NSTEMI 구분은 Troponin뿐 → 반드시 연속 측정으로 괴사 배제.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1180 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><defs><pattern id=\"g_sm\" width=\"10\" height=\"10\" patternUnits=\"userSpaceOnUse\"><path d=\"M10 0H0V10\" fill=\"none\" stroke=\"#f3c7cb\" stroke-width=\"0.7\"/></pattern><pattern id=\"g_lg\" width=\"50\" height=\"50\" patternUnits=\"userSpaceOnUse\"><rect width=\"50\" height=\"50\" fill=\"url(#g_sm)\"/><path d=\"M50 0H0V50\" fill=\"none\" stroke=\"#e88e95\" stroke-width=\"1.5\"/></pattern></defs><rect width=\"1180\" height=\"430\" rx=\"18\" fill=\"#ffffff\"/><text x=\"34\" y=\"50\" font-size=\"27\" font-weight=\"800\" fill=\"#1a2a3a\">불안정 협심증 — 일과성 ST 하강 / T 역전</text><line x1=\"34\" y1=\"66\" x2=\"1146\" y2=\"66\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"34\" y=\"92\" width=\"1112\" height=\"210\" rx=\"10\" fill=\"url(#g_lg)\" stroke=\"#e88e95\" stroke-width=\"1.6\"/><line x1=\"46\" y1=\"235\" x2=\"1134\" y2=\"235\" stroke=\"#2e9d4f\" stroke-width=\"1.1\" stroke-dasharray=\"6 5\"/><polyline fill=\"none\" stroke=\"#c2611a\" stroke-width=\"3.2\" stroke-linejoin=\"round\" stroke-linecap=\"round\" points=\"70,235 83,223 96,235 112,235 118,246 127,155 137,263 146,257 176,257 196,281 220,257 234,235 340,235 353,223 366,235 382,235 388,246 397,155 407,263 416,257 446,257 466,281 490,257 504,235 610,235 623,223 636,235 652,235 658,246 667,155 677,263 686,257 716,257 736,281 760,257 774,235 880,235 893,223 906,235 922,235 928,246 937,155 947,263 956,257 986,257 1006,281 1030,257 1044,235\"/><circle cx=\"170\" cy=\"260\" r=\"22\" fill=\"none\" stroke=\"#ff7a00\" stroke-width=\"3\"/><path d=\"M170 204 l0 20 l-8 0 l8 14 l8 -14 l-8 0 Z\" fill=\"#ff7a00\"/><text x=\"186\" y=\"220\" font-size=\"20\" font-weight=\"800\" fill=\"#ff7a00\">일과성</text><rect x=\"34\" y=\"324\" width=\"1112\" height=\"84\" rx=\"11\" fill=\"#fff4ec\" stroke=\"#ff7a00\" stroke-width=\"1.8\"/><text x=\"54\" y=\"356\" font-size=\"17\" font-weight=\"800\" fill=\"#b23039\">흉통 때 ST 하강·T역전 → 통증 멎으면 정상화(가역적·일과성)</text><text x=\"54\" y=\"382\" font-size=\"17\" font-weight=\"500\" fill=\"#3a4654\">UA와 NSTEMI 구분은 Troponin뿐 — Serial(0·3~6h)로 괴사 배제</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "기본 처치", "content": "모니터링, IV, 산소(필요시), Aspirin, NTG, β차단제", "basis": "NSTEMI에 준해 항혈소판·항허혈로 진행 차단. ACS 스펙트럼으로 동일 선상 관리.", "img": ""}, {"item": "입원 관찰", "content": "흉통통제실/관찰병상, Serial Troponin·ECG, 위험도 평가", "basis": "괴사로 진행하는지 감시. 고위험은 침습적 평가(관상동맥조영) 고려.", "img": ""}], "svg": ""}], "redflags": ["안정시 지속 흉통 + NTG 무반응 → 임박한 완전 폐색 신호, 즉시 보고", "Troponin 상승 전환 → 더 이상 UA 아님, NSTEMI로 격상 대응", "흉통 중 ECG 변화 포착이 중요 → 통증 시 즉시 12-lead", "'협심증 약 받으러 왔어요' 환자도 패턴 악화면 ACS로 접근"], "memo": "Troponin 정상 = UA / 상승 = NSTEMI / 안정시·악화 패턴 = 폐색 임박 / Aspirin+NTG, Serial 추적"}, {"no": "04", "name": "급성 심부전 / 폐부종", "cat": "❤️ 심장/순환기", "diff": "★★★★☆", "kw": "좌심실 부전 / 폐울혈 / 기좌호흡 / BNP / LMNOP / NIV·이뇨제", "mentor": "\"숨차서 못 눕는 환자 오면 폐부종부터 떠올려. 앉으면 좀 낫고 누우면 더 힘들어하지? 그게 핵심 단서야. 일단 앉히고 산소 줘. 약 순서는 LMNOP로 외우면 편해. 단, 모르핀은 요즘 조심해서 써.\"", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "심장 펌프 기능 저하로 폐·전신에 체액이 정체되는 상태. 급성은 주로 폐부종으로 발현.", "basis": "좌심실이 못 짜냄 → 좌심방·폐정맥 압력↑ → 폐모세혈관에서 폐포로 체액 누출 → 가스교환 장애.", "img": "🖼️ 폐포로 체액이 새어 나온 폐부종 단면도"}, {"item": "좌심부전 vs 우심부전", "content": "좌심부전: 폐울혈(호흡곤란·기좌호흡·crackle)\n우심부전: 전신울혈(경정맥 팽대·하지부종·간비대)", "basis": "막힌 쪽 '뒤'로 피가 정체됨. 좌심 뒤=폐, 우심 뒤=전신정맥.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "악순환", "content": "심박출↓ → 신장 관류↓ → RAAS·교감신경 활성 → 수분저류·후부하↑ → 심장 부담 가중", "basis": "보상기전이 오히려 전·후부하를 늘려 악화 → 이뇨제·혈관확장제로 이 고리를 끊는다.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 820 440\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"820\" height=\"440\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">심인성 폐부종 — 좌심실이 못 짜내면</text>\n  <line x1=\"32\" y1=\"60\" x2=\"788\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <!-- 흐름 박스 -->\n  <g font-size=\"14.5\" font-weight=\"700\" fill=\"#1a2a3a\">\n    <rect x=\"40\" y=\"86\" width=\"150\" height=\"58\" rx=\"10\" fill=\"#ffe7e9\" stroke=\"#b23039\" stroke-width=\"2\"/>\n    <text x=\"115\" y=\"110\" text-anchor=\"middle\">좌심실 펌프</text><text x=\"115\" y=\"130\" text-anchor=\"middle\" fill=\"#b23039\">기능 저하</text>\n    <rect x=\"230\" y=\"86\" width=\"160\" height=\"58\" rx=\"10\" fill=\"#fff1e0\" stroke=\"#e08a00\" stroke-width=\"2\"/>\n    <text x=\"310\" y=\"110\" text-anchor=\"middle\">좌심방·폐정맥</text><text x=\"310\" y=\"130\" text-anchor=\"middle\" fill=\"#c2611a\">압력 상승</text>\n    <rect x=\"430\" y=\"86\" width=\"170\" height=\"58\" rx=\"10\" fill=\"#eaf3fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/>\n    <text x=\"515\" y=\"110\" text-anchor=\"middle\">폐모세혈관에서</text><text x=\"515\" y=\"130\" text-anchor=\"middle\" fill=\"#1559a8\">체액 누출</text>\n    <rect x=\"640\" y=\"86\" width=\"150\" height=\"58\" rx=\"10\" fill=\"#e9f7ee\" stroke=\"#2e9d4f\" stroke-width=\"2\"/>\n    <text x=\"715\" y=\"110\" text-anchor=\"middle\">폐포에 물</text><text x=\"715\" y=\"130\" text-anchor=\"middle\" fill=\"#1d6b36\">가스교환 장애</text>\n  </g>\n  <g fill=\"#9aa7b5\"><path d=\"M192 115 l30 0 l0 -7 l16 12 l-16 12 l0 -7 l-30 0 Z\"/><path d=\"M392 115 l30 0 l0 -7 l16 12 l-16 12 l0 -7 l-30 0 Z\"/><path d=\"M602 115 l30 0 l0 -7 l16 12 l-16 12 l0 -7 l-30 0 Z\"/></g>\n  <!-- 폐포 단면 -->\n  <g transform=\"translate(250,290)\">\n    <circle r=\"110\" fill=\"#fde9ec\" stroke=\"#e0a9b0\" stroke-width=\"3\"/>\n    <circle r=\"70\" fill=\"#cfe6ff\" stroke=\"#1f7ae0\" stroke-width=\"2\"/>\n    <text x=\"0\" y=\"-30\" font-size=\"14\" fill=\"#1559a8\" text-anchor=\"middle\" font-weight=\"700\">폐포(공기)</text>\n    <g fill=\"#1f7ae0\"><circle cx=\"-20\" cy=\"20\" r=\"7\"/><circle cx=\"10\" cy=\"40\" r=\"6\"/><circle cx=\"30\" cy=\"5\" r=\"5\"/><circle cx=\"-35\" cy=\"-10\" r=\"5\"/></g>\n    <text x=\"0\" y=\"70\" font-size=\"13\" fill=\"#1559a8\" text-anchor=\"middle\">체액 차오름</text>\n    <path d=\"M95 0 A95 95 0 0 0 70 -64\" fill=\"none\" stroke=\"#b23039\" stroke-width=\"10\" stroke-linecap=\"round\"/>\n    <text x=\"118\" y=\"-30\" font-size=\"13.5\" fill=\"#b23039\" font-weight=\"700\">모세혈관</text>\n  </g>\n  <g font-size=\"15\" fill=\"#3a4654\">\n    <text x=\"430\" y=\"250\" font-weight=\"800\" fill=\"#b23039\">왜 이런 증상?</text>\n    <text x=\"430\" y=\"280\">• 기좌호흡: 누우면 정맥환류↑ → 폐울혈 악화</text>\n    <text x=\"430\" y=\"306\">• 분홍빛 거품 가래: 폐포 누출액 + 공기</text>\n    <text x=\"430\" y=\"332\">• 양폐 수포음(crackle): 폐포 내 액체</text>\n    <text x=\"430\" y=\"358\" fill=\"#1559a8\" font-weight=\"700\">→ 앉히고 산소·NIV / LMNOP(이뇨·혈관확장)</text>\n  </g>\n</svg>"}, {"title": "😣 증상", "items": [{"item": "증상별 근거", "content": "기좌호흡·발작야간호흡곤란: 누우면 정맥환류↑ → 폐울혈 악화\n분홍빛 거품 가래: 폐포 누출액+공기\n양폐 crackle: 폐포 내 액체\n불안·발한: 저산소+교감항진", "basis": "체위에 따른 정맥환류 변화가 증상을 좌우 → 앉히면 전부하 감소로 완화.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 820 420\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"820\" height=\"420\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">좌심부전 vs 우심부전 — 막힌 쪽 '뒤'로 정체된다</text>\n  <line x1=\"32\" y1=\"60\" x2=\"788\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <g transform=\"translate(210,250)\">\n    <ellipse cx=\"0\" cy=\"-70\" rx=\"80\" ry=\"55\" fill=\"#cfe6ff\" stroke=\"#1f7ae0\" stroke-width=\"2.5\"/>\n    <text x=\"0\" y=\"-66\" font-size=\"15\" fill=\"#1559a8\" text-anchor=\"middle\" font-weight=\"800\">폐 울혈</text>\n    <path d=\"M0 -16 C-40 -16 -50 30 0 60 C50 30 40 -16 0 -16 Z\" fill=\"#e9656b\" stroke=\"#b23039\" stroke-width=\"2.5\"/>\n    <text x=\"0\" y=\"100\" font-size=\"18\" font-weight=\"800\" fill=\"#1559a8\" text-anchor=\"middle\">좌심부전</text>\n    <text x=\"0\" y=\"126\" font-size=\"13.5\" fill=\"#5b6876\" text-anchor=\"middle\">호흡곤란·기좌호흡</text>\n    <text x=\"0\" y=\"146\" font-size=\"13.5\" fill=\"#5b6876\" text-anchor=\"middle\">수포음·분홍거품가래</text>\n  </g>\n  <line x1=\"410\" y1=\"90\" x2=\"410\" y2=\"380\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <g transform=\"translate(610,250)\">\n    <path d=\"M0 -16 C-40 -16 -50 30 0 60 C50 30 40 -16 0 -16 Z\" fill=\"#e9656b\" stroke=\"#b23039\" stroke-width=\"2.5\"/>\n    <g stroke=\"#2e9d4f\" stroke-width=\"6\" stroke-linecap=\"round\"><line x1=\"-70\" y1=\"-60\" x2=\"-70\" y2=\"0\"/><line x1=\"70\" y1=\"-60\" x2=\"70\" y2=\"0\"/></g>\n    <text x=\"0\" y=\"-50\" font-size=\"15\" fill=\"#1d6b36\" text-anchor=\"middle\" font-weight=\"800\">전신 정맥 울혈</text>\n    <text x=\"0\" y=\"100\" font-size=\"18\" font-weight=\"800\" fill=\"#1d6b36\" text-anchor=\"middle\">우심부전</text>\n    <text x=\"0\" y=\"126\" font-size=\"13.5\" fill=\"#5b6876\" text-anchor=\"middle\">경정맥 팽대·하지부종</text>\n    <text x=\"0\" y=\"146\" font-size=\"13.5\" fill=\"#5b6876\" text-anchor=\"middle\">간비대·복수</text>\n  </g>\n  <text x=\"32\" y=\"404\" font-size=\"13.5\" fill=\"#8b98a8\">※ 좌심 뒤 = 폐, 우심 뒤 = 전신정맥. 급성 비대상성은 주로 좌심부전→폐부종.</text>\n</svg>"}, {"title": "📈 검사", "items": [{"item": "BNP/NT-proBNP", "content": "상승 → 심부전 시사(호흡곤란 감별)", "basis": "심실벽 신장 → BNP 분비. 호흡곤란이 심장성인지 폐성인지 구분에 유용.", "img": "🖼️ 폐부종 흉부 X선 — 양측 음영·Kerley B선·심비대"}, {"item": "흉부 X선", "content": "폐문부 음영, Kerley B선, 흉수, 심비대", "basis": "폐울혈·체액 정체의 직접 증거.", "img": ""}, {"item": "기타", "content": "ECG(허혈·부정맥 유발인자), Troponin, 전해질, 동맥혈가스", "basis": "유발 원인(허혈·부정맥) 찾고 산소화·산염기 평가.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "체위·산소", "content": "상체 거상(앉히기) + 산소/NIV(CPAP/BiPAP)", "basis": "앉히면 전부하↓. NIV 양압은 폐포 액체 밀어내고 호흡일 감소 → 삽관 회피.", "img": "🖼️ LMNOP 처치 흐름 + NIV 적용 그림"}, {"item": "이뇨제(L)", "content": "Furosemide IV", "basis": "체액 배출로 전부하↓·폐울혈 완화. 정맥확장 효과도 일부.", "img": ""}, {"item": "혈관확장(N)", "content": "Nitroglycerin(SBP 적정 시)", "basis": "정맥·동맥 확장 → 전·후부하↓ → 심장 부담 즉각 감소.", "img": ""}, {"item": "모르핀(M)", "content": "통증·불안 시 신중히(호흡억제 주의)", "basis": "불안·전부하 감소 효과 있으나 호흡억제·예후 논란 → 일상 권장 아님, 선택적.", "img": ""}, {"item": "원인 교정", "content": "허혈·부정맥·고혈압·판막 등 유발인자 치료", "basis": "근본 원인 제거 없으면 재발. 급성 악화의 방아쇠를 찾는다.", "img": ""}], "svg": ""}], "redflags": ["분홍빛 거품 가래 + 양폐 crackle → 전형적 급성 폐부종, 즉시 산소·NIV", "SBP<90 + 말초 차가움 + 의식저하 → 심인성 쇼크, 강심제·중환자 보고", "NIV에도 산소포화 안 오르고 지치는 호흡 → 기관삽관 준비", "급성 악화엔 항상 유발인자(허혈·부정맥) 동반 → ECG·Troponin 확인"], "memo": "기좌호흡=폐부종 단서 / 앉히고 산소·NIV / LMNOP(이뇨·혈관확장 핵심, 모르핀 신중) / 원인 교정"}, {"no": "05", "name": "고혈압성 위기", "cat": "❤️ 심장/순환기", "diff": "★★★☆☆", "kw": "Urgency vs Emergency / 표적장기손상 / MAP 25% / IV 강압제 / 급강압 금기", "mentor": "\"혈압 230이라고 무조건 확 떨어뜨리면 안 돼. 핵심은 '장기 손상이 있냐'야. 손상 없으면(urgency) 천천히, 손상 있으면(emergency) IV로. 그래도 첫 1시간에 25% 이상 떨어뜨리면 뇌·콩팥이 오히려 허혈돼. 천천히가 안전이야.\"", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "보통 SBP>180 또는 DBP>120의 심한 고혈압. 표적장기손상 동반 여부로 둘로 나뉜다.", "basis": "숫자 자체보다 '장기 손상'이 응급도를 결정. 같은 혈압이라도 손상 유무로 처치가 완전히 달라짐.", "img": "🖼️ Urgency vs Emergency 분류 도식 (표적장기손상 유무)"}, {"item": "Urgency vs Emergency", "content": "Urgency: 표적장기손상 없음 → 경구약·외래, 수 시간~일 단위 강압\nEmergency: 손상 있음(뇌·심장·신장·대동맥·눈) → IV, 즉시", "basis": "손상 없으면 급강압이 더 위험. 손상 있으면 진행 막기 위해 즉시 조절.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 820 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"820\" height=\"430\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">고혈압 위기 — 핵심은 '표적장기손상' 유무</text>\n  <line x1=\"32\" y1=\"60\" x2=\"788\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <rect x=\"300\" y=\"80\" width=\"220\" height=\"48\" rx=\"24\" fill=\"#fff4ec\" stroke=\"#ff7a00\" stroke-width=\"2\"/>\n  <text x=\"410\" y=\"110\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\" text-anchor=\"middle\">SBP&gt;180 / DBP&gt;120</text>\n  <path d=\"M380 128 L250 160\" stroke=\"#9aa7b5\" stroke-width=\"2\"/><path d=\"M440 128 L570 160\" stroke=\"#9aa7b5\" stroke-width=\"2\"/>\n  <!-- Urgency -->\n  <g>\n    <rect x=\"50\" y=\"160\" width=\"330\" height=\"230\" rx=\"14\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/>\n    <text x=\"70\" y=\"190\" font-size=\"18\" font-weight=\"800\" fill=\"#1d6b36\">Urgency (긴급)</text>\n    <text x=\"70\" y=\"218\" font-size=\"15\" fill=\"#3a4654\">표적장기손상 <tspan font-weight=\"800\">없음</tspan></text>\n    <text x=\"70\" y=\"250\" font-size=\"14.5\" fill=\"#3a4654\">→ 경구약·외래</text>\n    <text x=\"70\" y=\"276\" font-size=\"14.5\" fill=\"#3a4654\">→ 수 시간~일 단위로 천천히</text>\n    <text x=\"70\" y=\"316\" font-size=\"14\" fill=\"#b23039\" font-weight=\"700\">급강압이 오히려 위험!</text>\n  </g>\n  <!-- Emergency -->\n  <g>\n    <rect x=\"440\" y=\"160\" width=\"330\" height=\"230\" rx=\"14\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/>\n    <text x=\"460\" y=\"190\" font-size=\"18\" font-weight=\"800\" fill=\"#b23039\">Emergency (응급)</text>\n    <text x=\"460\" y=\"218\" font-size=\"15\" fill=\"#3a4654\">표적장기손상 <tspan font-weight=\"800\" fill=\"#b23039\">있음</tspan></text>\n    <text x=\"460\" y=\"246\" font-size=\"14\" fill=\"#5b6876\">뇌(뇌증·뇌졸중)·심장(ACS·폐부종)</text>\n    <text x=\"460\" y=\"270\" font-size=\"14\" fill=\"#5b6876\">신장·대동맥(박리)·눈(망막)</text>\n    <text x=\"460\" y=\"304\" font-size=\"14.5\" fill=\"#3a4654\">→ IV 강압제, 즉시</text>\n    <text x=\"460\" y=\"332\" font-size=\"14\" fill=\"#c2611a\" font-weight=\"700\">단, 첫 1시간 MAP 25%만 ↓</text>\n  </g>\n</svg>"}, {"title": "🔬 병태생리", "items": [{"item": "기전", "content": "극심한 혈압 → 혈관내피 손상·섬유소양 괴사 → 장기 허혈·출혈", "basis": "자동조절(autoregulation) 한계 초과 → 미세혈관 손상 → 뇌증·신손상·심부전 등.", "img": ""}], "svg": ""}, {"title": "😣 증상 (표적장기손상 신호)", "items": [{"item": "장기별 신호", "content": "뇌: 심한 두통·시야장애·의식저하·국소신경징후(고혈압뇌증·뇌졸중)\n심장: 흉통·호흡곤란(ACS·폐부종)\n신장: 핍뇨·Cr↑\n대동맥: 찢어지는 등 통증(박리)\n눈: 시력저하(망막출혈·유두부종)", "basis": "어느 장기가 손상됐는지가 강압 목표·약물 선택을 좌우 → 증상으로 손상 장기 추적.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "필수 평가", "content": "양팔 혈압, ECG, Troponin, BUN/Cr·전해질, 소변검사, 흉부X선, 신경학적 진찰; 필요시 뇌CT·대동맥CT, 안저", "basis": "표적장기손상 스크리닝. 양팔 혈압 차이는 대동맥 박리 단서.", "img": ""}], "svg": ""}, {"title": "💊 치료 근거", "items": [{"item": "강압 목표", "content": "Emergency: 첫 1시간 MAP 약 25%↓ → 이후 2~6h에 160/100 → 24~48h 정상화", "basis": "뇌·신장 자동조절이 고혈압에 적응돼 있어 급강압 시 분수령 허혈. 단계적 강압이 안전.", "img": "🖼️ MAP 시간별 강압 목표 그래프 (첫1h 25%)"}, {"item": "IV 약물", "content": "Labetalol, Nicardipine, Nitroprusside, Esmolol 등 적정주입", "basis": "적정 가능한 IV제로 부드럽게 조절. 질환별로 선택(아래).", "img": ""}, {"item": "질환별 선택", "content": "대동맥박리: β차단제 먼저(HR<60, SBP100~120)\n폐부종: NTG+이뇨제\n뇌졸중: 기준 따라 신중 강압", "basis": "박리는 맥압·shear stress 줄이려 β차단 우선. 질환마다 목표·약이 다름.", "img": ""}, {"item": "Urgency", "content": "경구약 재개·조정, 외래 추적", "basis": "손상 없으므로 급할 필요 없음. 급강압이 오히려 위험.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 800 420\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"800\" height=\"420\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">강압 목표 — 첫 1시간 MAP 25%만 낮춘다</text>\n  <line x1=\"32\" y1=\"60\" x2=\"768\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <!-- 축 -->\n  <line x1=\"90\" y1=\"100\" x2=\"90\" y2=\"330\" stroke=\"#9aa7b5\" stroke-width=\"2\"/>\n  <line x1=\"90\" y1=\"330\" x2=\"740\" y2=\"330\" stroke=\"#9aa7b5\" stroke-width=\"2\"/>\n  <text x=\"50\" y=\"110\" font-size=\"13\" fill=\"#5b6876\">MAP</text>\n  <text x=\"700\" y=\"355\" font-size=\"13\" fill=\"#5b6876\">시간</text>\n  <!-- 위험대 (급강압 금지 영역) -->\n  <rect x=\"90\" y=\"300\" width=\"650\" height=\"30\" fill=\"#fdeced\"/>\n  <text x=\"110\" y=\"320\" font-size=\"12.5\" fill=\"#b23039\">과도한 급강압 = 분수령 허혈(금지)</text>\n  <!-- 곡선 -->\n  <polyline fill=\"none\" stroke=\"#1f7ae0\" stroke-width=\"4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"\n    points=\"120,120 250,200 450,250 690,280\"/>\n  <circle cx=\"120\" cy=\"120\" r=\"6\" fill=\"#b23039\"/><circle cx=\"250\" cy=\"200\" r=\"6\" fill=\"#ff7a00\"/>\n  <circle cx=\"450\" cy=\"250\" r=\"6\" fill=\"#2e9d4f\"/><circle cx=\"690\" cy=\"280\" r=\"6\" fill=\"#2e9d4f\"/>\n  <g font-size=\"13.5\" fill=\"#3a4654\">\n    <text x=\"120\" y=\"108\" text-anchor=\"middle\" font-weight=\"700\" fill=\"#b23039\">시작</text>\n    <text x=\"250\" y=\"188\" text-anchor=\"middle\" font-weight=\"700\" fill=\"#c2611a\">1h: 약 25%↓</text>\n    <text x=\"450\" y=\"238\" text-anchor=\"middle\" font-weight=\"700\" fill=\"#1d6b36\">2~6h: 160/100</text>\n    <text x=\"690\" y=\"268\" text-anchor=\"middle\" font-weight=\"700\" fill=\"#1d6b36\">24~48h: 정상화</text>\n  </g>\n  <text x=\"90\" y=\"392\" font-size=\"13.5\" fill=\"#8b98a8\">※ 뇌·신장 자동조절이 고혈압에 적응돼 있어 급강압 시 허혈. 단계적 강압이 안전.</text>\n</svg>"}], "redflags": ["찢어지는 흉통/등통 + 양팔 혈압 차이 → 대동맥 박리, β차단제 먼저", "심한 두통+의식저하+국소신경징후 → 고혈압뇌증/뇌졸중, 뇌영상", "첫 1시간 MAP 25% 초과 급강압 금지 → 장기 허혈 유발", "표적장기손상 없으면(urgency) IV 급강압 하지 말 것"], "memo": "손상 유무가 핵심(Urgency vs Emergency) / 첫1h MAP 25%만↓ / 박리=β차단 먼저 / 양팔 혈압 필수"}, {"no": "06", "name": "심실세동 / 심정지 (VF Arrest)", "cat": "❤️ 심장/순환기", "diff": "★★★★★", "kw": "CPR / AED / 제세동 / 에피네프린 / ROSC / BLS-ACLS", "mentor": "\"심정지는 생각보다 훨씬 많이 와. 연습만이 답이야. 처음엔 손이 떨리지만 BLS를 몸에 익히면 자동으로 움직이게 돼. 오늘은 왜 빠르게 눌러야 하는지, 왜 에피네프린을 쓰는지 이유까지 같이 알아보자.\"", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "심장이 혈액을 펌프질하지 못해 뇌·장기에 혈류가 차단된 상태", "basis": "심정지 4분 → 뇌손상 시작. 10분 → 심각한 뇌손상 또는 사망. CPR이 뇌 혈류를 30~40% 유지.", "img": ""}, {"item": "심정지 4가지 리듬", "content": "Shockable: VF(심실세동), Pulseless VT(무맥성 심실빈맥) → 즉시 제세동!\nNon-shockable: Asystole(무수축), PEA(무맥성 전기활동) → CPR+에피네프린", "basis": "VF: 심실이 불규칙하게 떨림 → 전기충격으로 리셋. Asystole: 전기 자체 없음 → 충격 소용없음.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "왜 심정지가 생기나", "content": "원인 기억법 5H5T:\n5H: 저산소증, 저혈량, 수소이온(산증), 저/고칼륨, 저체온\n5T: 독소, 심낭압전, 긴장성기흉, 혈전(PE), 혈전(AMI)", "basis": "ROSC(자발순환회복) 후 5H5T 원인을 찾아 교정하지 않으면 재발. 가역적 원인 교정이 핵심.", "img": ""}, {"item": "CPR 왜 효과적인가", "content": "흉부 압박 깊이 5~6cm, 속도 100~120회/분, 이완 완전히\n→ 인공 심박출량 생성 → 뇌·심장에 최소 혈류 유지\n→ 제세동 성공률↑", "basis": "압박이 얕거나 빠르면 혈류 생성 불충분. 이완 불완전하면 심장 충만 방해. 30:2 비율이 산소공급과 혈류 균형.", "img": ""}], "svg": ""}, {"title": "📈 ECG & 검사", "items": [{"item": "리듬 확인", "content": "VF: 불규칙한 큰 파형 → 200J 즉시 제세동\nVT: 넓은 QRS 빠른 맥 → 맥박 확인 → 없으면 200J\nAsystole: 직선(flat) → 제세동 금기, CPR+에피네프린\nPEA: 정상처럼 보이는 ECG + 맥박 없음", "basis": "리듬 확인은 CPR 잠시 중단 시에만. 10초 이내. 맥박 없으면 즉시 재개.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1180 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><defs><pattern id=\"g_sm\" width=\"10\" height=\"10\" patternUnits=\"userSpaceOnUse\"><path d=\"M10 0H0V10\" fill=\"none\" stroke=\"#f3c7cb\" stroke-width=\"0.7\"/></pattern><pattern id=\"g_lg\" width=\"50\" height=\"50\" patternUnits=\"userSpaceOnUse\"><rect width=\"50\" height=\"50\" fill=\"url(#g_sm)\"/><path d=\"M50 0H0V50\" fill=\"none\" stroke=\"#e88e95\" stroke-width=\"1.5\"/></pattern></defs><rect width=\"1180\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"50\" font-size=\"27\" font-weight=\"800\" fill=\"#1a2a3a\">심실세동 (VF) — 무질서한 파형, 식별 가능한 QRS 없음</text><line x1=\"34\" y1=\"66\" x2=\"1146\" y2=\"66\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"34\" y=\"92\" width=\"1112\" height=\"210\" rx=\"10\" fill=\"url(#g_lg)\" stroke=\"#e88e95\" stroke-width=\"1.6\"/><polyline fill=\"none\" stroke=\"#b23039\" stroke-width=\"3\" stroke-linejoin=\"round\" stroke-linecap=\"round\" points=\"58,203 71,177 79,302 87,258 103,179 118,219 125,187 138,272 146,226 154,273 161,196 171,180 187,266 194,221 201,199 212,272 221,303 229,243 244,211 252,213 264,189 279,181 295,180 311,217 325,301 338,245 352,281 364,241 374,211 384,185 400,241 415,291 427,279 438,183 446,296 459,207 471,203 485,272 492,184 507,245 519,254 535,292 551,281 559,188 570,286 578,180 589,279 600,263 612,170 626,255 635,194 649,180 659,238 668,228 681,265 695,185 704,279 717,305 728,200 741,305 752,271 764,262 774,203 782,210 791,224 801,168 815,211 826,237 833,202 846,301 858,246 867,296 883,178 897,265 910,267 923,191 937,267 944,213 952,218 966,206 974,252 990,178 998,165 1014,203 1029,190 1041,171 1049,218 1065,261 1074,229 1086,258 1100,196 1108,289 1122,287 1136,244\"/><rect x=\"34\" y=\"324\" width=\"1112\" height=\"84\" rx=\"11\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"1.8\"/><text x=\"54\" y=\"356\" font-size=\"17\" font-weight=\"800\" fill=\"#b23039\">💡 즉시 제세동 + CPR (맥 확인에 시간 끌지 말 것)</text><text x=\"54\" y=\"384\" font-size=\"15\" fill=\"#3a4654\">제세동 → 2분 CPR → 리듬확인 반복 · Epinephrine · 불응성엔 Amiodarone · 가역원인(H&amp;T) 교정</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "BLS → ACLS 흐름", "content": "① 반응확인·119신고·AED요청\n② CPR 시작 (30:2, 강하게·빠르게·완전이완)\n③ AED 도착 → 리듬 분석 → Shockable이면 즉시 충격\n④ ACLS: 에피네프린 1mg IV 3~5분마다\n⑤ Amiodarone 300mg (VF/VT 지속 시)\n⑥ 원인 교정 (5H5T)", "basis": "", "img": ""}, {"item": "약물 근거", "content": "에피네프린 1mg IV: α1 수용체 → 말초혈관 수축 → 관상동맥·뇌혈관 관류압↑ → 제세동 성공률↑\nAmiodarone 300mg: K⁺·Na⁺·Ca²⁺ 채널 차단 → 심실 흥분성↓ → VF/VT 재발 방지\nNaHCO₃: 대사성 산증 교정 (과도 사용 주의)", "basis": "ROSC 후 목표체온관리(TTM 33~36℃): 뇌 대사↓ → 재관류 손상 최소화", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 860 380\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"860\" height=\"380\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">제세동 가능 리듬(VF/무맥성VT) 대응</text>\n  <line x1=\"32\" y1=\"60\" x2=\"828\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <g font-size=\"15\" font-weight=\"700\">\n    <rect x=\"40\" y=\"100\" width=\"170\" height=\"80\" rx=\"12\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/>\n    <text x=\"125\" y=\"135\" text-anchor=\"middle\" fill=\"#b23039\">① 즉시 제세동</text>\n    <text x=\"125\" y=\"160\" text-anchor=\"middle\" font-size=\"13\" fill=\"#5b6876\">(비동기)</text>\n    <rect x=\"250\" y=\"100\" width=\"170\" height=\"80\" rx=\"12\" fill=\"#fff4ec\" stroke=\"#ff7a00\" stroke-width=\"2\"/>\n    <text x=\"335\" y=\"135\" text-anchor=\"middle\" fill=\"#c2611a\">② CPR 2분</text>\n    <text x=\"335\" y=\"160\" text-anchor=\"middle\" font-size=\"13\" fill=\"#5b6876\">고품질 가슴압박</text>\n    <rect x=\"460\" y=\"100\" width=\"170\" height=\"80\" rx=\"12\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"2\"/>\n    <text x=\"545\" y=\"135\" text-anchor=\"middle\" fill=\"#1559a8\">③ 리듬 확인</text>\n    <text x=\"545\" y=\"160\" text-anchor=\"middle\" font-size=\"13\" fill=\"#5b6876\">→ 반복</text>\n    <rect x=\"670\" y=\"100\" width=\"150\" height=\"80\" rx=\"12\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/>\n    <text x=\"745\" y=\"135\" text-anchor=\"middle\" fill=\"#1d6b36\">④ 약물</text>\n    <text x=\"745\" y=\"160\" text-anchor=\"middle\" font-size=\"12.5\" fill=\"#5b6876\">Epi · Amiodarone</text>\n  </g>\n  <g fill=\"#9aa7b5\"><path d=\"M210 140 l24 0 l0 -7 l16 12 l-16 12 l0 -7 l-24 0 Z\"/><path d=\"M420 140 l24 0 l0 -7 l16 12 l-16 12 l0 -7 l-24 0 Z\"/><path d=\"M630 140 l24 0 l0 -7 l16 12 l-16 12 l0 -7 l-24 0 Z\"/></g>\n  <rect x=\"40\" y=\"220\" width=\"780\" height=\"120\" rx=\"12\" fill=\"#f7f9fc\" stroke=\"#dde5ee\" stroke-width=\"1.6\"/>\n  <text x=\"60\" y=\"252\" font-size=\"16\" font-weight=\"800\" fill=\"#b23039\">핵심</text>\n  <text x=\"60\" y=\"282\" font-size=\"15\" fill=\"#3a4654\">• 끊김 없는 고품질 가슴압박(속도·깊이·완전 이완)이 생존을 결정</text>\n  <text x=\"60\" y=\"310\" font-size=\"15\" fill=\"#3a4654\">• 가역 원인(H&amp;T): 저산소·저혈량·저/고칼륨·저체온·산증 / 긴장성기흉·압전·혈전·독소</text>\n  <text x=\"60\" y=\"332\" font-size=\"13.5\" fill=\"#8b98a8\">무맥성 VT는 VF와 동일하게 대응 — 빠른 제세동이 핵심</text>\n</svg>"}], "redflags": ["CPR 중단 최소화 — Hands-off time < 10초", "에피네프린은 ROSC 후 과도 투여 금지 (고혈압→뇌출혈)", "ROSC 후 혈압 90 이상 유지, 저혈압은 즉시 교정", "PEA → 원인(5H5T) 즉시 탐색", "제세동 후 즉시 CPR 재개 (리듬 먼저 확인하지 말 것)"], "memo": "5H5T / VF·VT→제세동 / Asystole·PEA→에피네프린+CPR / 에피 3~5분마다 / Amiodarone 300mg"}, {"no": "07", "name": "심실빈맥 (VT)", "cat": "❤️ 심장/순환기", "diff": "★★★★☆", "kw": "Wide QRS / 단형·다형 / 맥박유무 / 동기화 제세동 / Amiodarone·Mg", "mentor": "\"넓은 QRS 빈맥 보면 일단 VT로 생각해. 맥 있나 없나, 안정하냐 불안정하냐 — 이 두 가지로 처치가 갈려. 맥 없으면 바로 제세동·CPR, 맥 있는데 불안정하면 동기화 심율동전환. 헷갈리면 VT로 대응하는 게 안전해.\"", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "심실에서 시작된 빈맥(보통 HR>100, 넓은 QRS≥120ms)이 3개 이상 연속되는 부정맥.", "basis": "정상 전도(His-Purkinje)를 안 거치고 심실 근육으로 퍼져 QRS가 넓고 변형됨.", "img": "🖼️ 단형성 VT ECG — 넓고 규칙적인 QRS 연속"}, {"item": "분류", "content": "단형성(monomorphic): 모양 일정\n다형성(polymorphic): 모양 변동, Torsades=QT연장 동반\n지속(>30s) vs 비지속", "basis": "다형성·Torsades는 원인·치료가 다름(Mg). 지속·혈역학 불안정일수록 위험.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "기전·유발", "content": "허혈·심근반흔의 회귀회로, 전해질이상(K·Mg), QT연장약물", "basis": "VT 대부분은 기질적 심질환(허혈·심근증) 바탕. 빠른 심실수축 → 심실 충만 부족 → 심박출 급감.", "img": ""}], "svg": ""}, {"title": "😣 증상", "items": [{"item": "증상", "content": "두근거림·실신·흉통·호흡곤란, 심하면 무맥성 심정지", "basis": "심박출 급감으로 뇌·관상 관류 저하. 무맥 VT는 즉시 심정지 알고리즘.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "ECG", "content": "넓은 QRS 규칙 빈맥, 방실해리·융합/포획박동 → VT 강력 시사", "basis": "방실해리(P·QRS 독립)는 VT의 결정적 단서. 애매하면 VT로 간주가 안전.", "img": "🖼️ VT vs SVT(편위전도) 감별 포인트 도식"}, {"item": "전해질·기타", "content": "K·Mg·Ca, Troponin, 약물력, QT 측정", "basis": "교정 가능한 원인(저K·저Mg·QT연장) 찾기. Torsades면 Mg가 1차.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1180 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><defs><pattern id=\"g_sm\" width=\"10\" height=\"10\" patternUnits=\"userSpaceOnUse\"><path d=\"M10 0H0V10\" fill=\"none\" stroke=\"#f3c7cb\" stroke-width=\"0.7\"/></pattern><pattern id=\"g_lg\" width=\"50\" height=\"50\" patternUnits=\"userSpaceOnUse\"><rect width=\"50\" height=\"50\" fill=\"url(#g_sm)\"/><path d=\"M50 0H0V50\" fill=\"none\" stroke=\"#e88e95\" stroke-width=\"1.5\"/></pattern></defs><rect width=\"1180\" height=\"430\" rx=\"18\" fill=\"#ffffff\"/><text x=\"34\" y=\"50\" font-size=\"27\" font-weight=\"800\" fill=\"#1a2a3a\">심실빈맥 (VT) — 넓고 규칙적인 QRS</text><line x1=\"34\" y1=\"66\" x2=\"1146\" y2=\"66\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"34\" y=\"92\" width=\"1112\" height=\"210\" rx=\"10\" fill=\"url(#g_lg)\" stroke=\"#e88e95\" stroke-width=\"1.6\"/><line x1=\"46\" y1=\"235\" x2=\"1134\" y2=\"235\" stroke=\"#2e9d4f\" stroke-width=\"1.1\" stroke-dasharray=\"6 5\"/><polyline fill=\"none\" stroke=\"#b23039\" stroke-width=\"3.2\" stroke-linejoin=\"round\" stroke-linecap=\"round\" points=\"70,235 112,235 120,251 148,140 178,269 202,235 232,235 252,259 276,235 290,235 280,235 322,235 330,251 358,140 388,269 412,235 442,235 462,259 486,235 500,235 490,235 532,235 540,251 568,140 598,269 622,235 652,235 672,259 696,235 710,235 700,235 742,235 750,251 778,140 808,269 832,235 862,235 882,259 906,235 920,235 910,235 952,235 960,251 988,140 1018,269 1042,235 1072,235 1092,259 1116,235 1130,235\"/><circle cx=\"148\" cy=\"150\" r=\"30\" fill=\"none\" stroke=\"#ff7a00\" stroke-width=\"3\"/><path d=\"M148 86 l0 20 l-8 0 l8 14 l8 -14 l-8 0 Z\" fill=\"#ff7a00\"/><text x=\"164\" y=\"102\" font-size=\"20\" font-weight=\"800\" fill=\"#ff7a00\">넓은 QRS</text><rect x=\"34\" y=\"324\" width=\"1112\" height=\"84\" rx=\"11\" fill=\"#fff4ec\" stroke=\"#ff7a00\" stroke-width=\"1.8\"/><text x=\"54\" y=\"356\" font-size=\"17\" font-weight=\"800\" fill=\"#b23039\">넓은 QRS(≥120ms) 빈맥이 규칙적으로 연속 — 방실해리·융합/포획박동이면 VT 강력 시사</text><text x=\"54\" y=\"382\" font-size=\"17\" font-weight=\"500\" fill=\"#3a4654\">넓은 QRS 빈맥은 일단 VT로 대응(SVT로 단정 금지) · 무맥이면 즉시 제세동</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "무맥성 VT", "content": "즉시 제세동(비동기) + CPR + Epinephrine + Amiodarone", "basis": "VF와 동일한 심정지 처치. 빠른 제세동이 생존 결정.", "img": "🖼️ 맥박·안정성 따른 VT 처치 알고리즘"}, {"item": "맥박O·불안정", "content": "동기화 심율동전환(synchronized cardioversion)", "basis": "QRS에 동기화해 충격 → R-on-T로 VF 유발 방지. 불안정(저혈압·의식저하·흉통)이면 즉시.", "img": ""}, {"item": "맥박O·안정", "content": "Amiodarone IV (또는 Procainamide), 원인 교정", "basis": "약물로 율동 전환 시도. 시간 여유 있으므로 항부정맥제 우선.", "img": ""}, {"item": "다형성/Torsades", "content": "MgSO₄ IV, 유발약 중단, K 교정, 필요시 제세동", "basis": "Torsades는 QT연장 기반 → Mg가 핵심. 무맥이면 비동기 제세동.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 840 440\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"840\" height=\"440\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">넓은 QRS 빈맥(VT) — 맥박·안정성으로 갈린다</text>\n  <line x1=\"32\" y1=\"60\" x2=\"808\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <rect x=\"320\" y=\"80\" width=\"200\" height=\"48\" rx=\"24\" fill=\"#1a2a3a\"/>\n  <text x=\"420\" y=\"110\" font-size=\"16\" font-weight=\"800\" fill=\"#fff\" text-anchor=\"middle\">넓은 QRS 빈맥</text>\n  <!-- 3갈래 -->\n  <g font-size=\"14.5\">\n    <rect x=\"40\" y=\"170\" width=\"240\" height=\"120\" rx=\"12\" fill=\"#fdeced\" stroke=\"#ef4444\" stroke-width=\"2\"/>\n    <text x=\"160\" y=\"198\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"800\" fill=\"#b23039\">맥박 없음</text>\n    <text x=\"160\" y=\"226\" text-anchor=\"middle\" fill=\"#3a4654\">즉시 제세동(비동기)</text>\n    <text x=\"160\" y=\"250\" text-anchor=\"middle\" fill=\"#3a4654\">+ CPR + Epi</text>\n    <text x=\"160\" y=\"274\" text-anchor=\"middle\" fill=\"#3a4654\">+ Amiodarone</text>\n\n    <rect x=\"300\" y=\"170\" width=\"240\" height=\"120\" rx=\"12\" fill=\"#fff4ec\" stroke=\"#ff7a00\" stroke-width=\"2\"/>\n    <text x=\"420\" y=\"198\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"800\" fill=\"#c2611a\">맥박O · 불안정</text>\n    <text x=\"420\" y=\"224\" text-anchor=\"middle\" fill=\"#5b6876\">(저혈압·의식저하·흉통)</text>\n    <text x=\"420\" y=\"252\" text-anchor=\"middle\" fill=\"#3a4654\">동기화 심율동전환</text>\n    <text x=\"420\" y=\"276\" text-anchor=\"middle\" fill=\"#8b6a4f\">(synchronized)</text>\n\n    <rect x=\"560\" y=\"170\" width=\"240\" height=\"120\" rx=\"12\" fill=\"#eef7f0\" stroke=\"#2e9d4f\" stroke-width=\"2\"/>\n    <text x=\"680\" y=\"198\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"800\" fill=\"#1d6b36\">맥박O · 안정</text>\n    <text x=\"680\" y=\"226\" text-anchor=\"middle\" fill=\"#3a4654\">Amiodarone IV</text>\n    <text x=\"680\" y=\"250\" text-anchor=\"middle\" fill=\"#3a4654\">(또는 Procainamide)</text>\n    <text x=\"680\" y=\"274\" text-anchor=\"middle\" fill=\"#3a4654\">+ 원인 교정</text>\n  </g>\n  <g stroke=\"#9aa7b5\" stroke-width=\"2\" fill=\"none\"><path d=\"M380 128 L160 170\"/><path d=\"M420 128 L420 170\"/><path d=\"M460 128 L680 170\"/></g>\n  <rect x=\"40\" y=\"320\" width=\"760\" height=\"92\" rx=\"12\" fill=\"#f3eaff\" stroke=\"#8e24aa\" stroke-width=\"1.8\"/>\n  <text x=\"60\" y=\"350\" font-size=\"15\" font-weight=\"800\" fill=\"#6a1b9a\">다형성 / Torsades</text>\n  <text x=\"60\" y=\"378\" font-size=\"14.5\" fill=\"#3a4654\">MgSO₄ IV · QT 연장 유발약 중단 · K 교정 · 무맥이면 비동기 제세동</text>\n  <text x=\"60\" y=\"400\" font-size=\"13.5\" fill=\"#8b98a8\">넓은 QRS 빈맥은 애매하면 VT로 간주하는 게 안전</text>\n</svg>"}], "redflags": ["넓은 QRS 빈맥은 일단 VT로 대응 (SVT로 단정 금지)", "무맥성 VT → 즉시 제세동·CPR (약 기다리지 말 것)", "맥박 있어도 불안정(저혈압·의식저하·흉통) → 동기화 심율동전환", "다형성/Torsades → MgSO₄, QT 연장 약물 즉시 중단"], "memo": "넓은QRS=VT간주 / 무맥→제세동+CPR / 맥O 불안정→동기화전환 / 안정→Amiodarone / Torsades→Mg"}, {"no": "08", "name": "심방세동 (AF)", "cat": "❤️ 심장/순환기", "diff": "★★★☆☆", "kw": "불규칙 불규칙 / P파 소실 / 율박수조절 / 항응고 CHA2DS2-VASc / 색전", "mentor": "\"맥이 '불규칙하게 불규칙'하면 AF야. ECG에 P파가 안 보이지. 두 가지만 기억해 — 빠르면 심박수 떨어뜨리고(rate control), 피떡 안 생기게 항응고. 그리고 48시간 넘은 AF를 함부로 정상으로 돌리면(cardioversion) 굳어있던 혈전이 튀어 뇌졸중 와.\"", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "심방이 무질서하게 떨려(350~600회/분) 효과적 수축을 못 하는 부정맥. 맥박이 불규칙하게 불규칙.", "basis": "여러 회귀회로가 심방에서 난립 → 방실결절이 일부만 통과시켜 심실반응이 불규칙.", "img": "🖼️ AF ECG — P파 소실·불규칙 R-R 간격"}, {"item": "위험", "content": "① 빠른 심실반응(RVR) → 심박출↓·심부전\n② 심방 정체 → 좌심방이 혈전 → 색전성 뇌졸중", "basis": "수축 못 하는 심방(특히 좌심방이)에 피가 고여 혈전 → 떨어져 나가면 뇌·전신 색전.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "유발인자", "content": "고혈압·판막질환·갑상선기능항진·음주·심부전·폐질환·패혈증", "basis": "심방 확장·자극이 회귀회로 형성. 급성 유발인자(갑상선·감염) 교정이 중요.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 820 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"820\" height=\"430\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">심방세동의 진짜 위험 — 좌심방 혈전 → 색전</text>\n  <line x1=\"32\" y1=\"60\" x2=\"788\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <g transform=\"translate(250,250)\">\n    <path d=\"M0 -70 C-90 -70 -110 40 0 110 C110 40 90 -70 0 -70 Z\" fill=\"#e9656b\" stroke=\"#b23039\" stroke-width=\"3\"/>\n    <ellipse cx=\"-35\" cy=\"-40\" rx=\"42\" ry=\"30\" fill=\"#c0454c\" stroke=\"#8d242c\" stroke-width=\"2\"/>\n    <text x=\"-35\" y=\"-36\" font-size=\"12.5\" fill=\"#fff\" text-anchor=\"middle\" font-weight=\"700\">좌심방</text>\n    <!-- 좌심방이 + 혈전 -->\n    <path d=\"M-72 -48 q-26 -6 -30 14 q22 8 34 -2 Z\" fill=\"#7a2f37\" stroke=\"#5b2228\" stroke-width=\"2\"/>\n    <circle cx=\"-92\" cy=\"-40\" r=\"9\" fill=\"#3a1418\"/>\n    <text x=\"-118\" y=\"-58\" font-size=\"12.5\" fill=\"#b23039\" font-weight=\"700\">좌심방이</text>\n    <text x=\"-118\" y=\"-42\" font-size=\"12.5\" fill=\"#b23039\" font-weight=\"700\">혈전</text>\n  </g>\n  <!-- 화살표 → 뇌 -->\n  <path d=\"M430 170 C520 130 590 120 640 130\" fill=\"none\" stroke=\"#c0392b\" stroke-width=\"5\" stroke-dasharray=\"2 0\" marker-end=\"\"/>\n  <path d=\"M636 128 l-20 -8 l6 9 l-7 9 Z\" fill=\"#c0392b\"/>\n  <g transform=\"translate(690,150)\">\n    <path d=\"M0 0 C-34 -30 14 -64 30 -34 C54 -52 78 -16 50 6 C58 30 20 40 8 22 C-12 30 -22 12 0 0 Z\" fill=\"#f1c0c4\" stroke=\"#b23039\" stroke-width=\"2.5\"/>\n    <circle cx=\"22\" cy=\"-12\" r=\"8\" fill=\"#3a1418\"/>\n    <text x=\"24\" y=\"46\" font-size=\"15\" fill=\"#b23039\" text-anchor=\"middle\" font-weight=\"800\">뇌색전</text>\n  </g>\n  <g font-size=\"15\" fill=\"#3a4654\">\n    <text x=\"60\" y=\"350\" font-weight=\"800\" fill=\"#b23039\">왜?</text>\n    <text x=\"60\" y=\"378\">수축 못 하는 심방(특히 좌심방이)에 피가 고임 → 혈전 → 떨어져 나가 뇌·전신 색전</text>\n    <text x=\"60\" y=\"404\" fill=\"#1559a8\" font-weight=\"700\">→ CHA₂DS₂-VASc로 항응고 · AF&gt;48h는 항응고 후 율동전환</text>\n  </g>\n</svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "두근거림·불규칙 맥, 어지럼·피로·호흡곤란, 무증상도 흔함", "basis": "심박출 변동·빈맥으로 인한 증상. 무증상 AF도 색전 위험은 동일 → 우연 발견도 평가.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "ECG", "content": "P파 소실, 불규칙한 R-R, f파(잔물결)", "basis": "무질서한 심방 활동 → 뚜렷한 P 대신 잔물결. R-R 완전 불규칙이 특징.", "img": ""}, {"item": "평가", "content": "갑상선기능, 전해질, 심초음파(혈전·판막·기능), 발생 시점 확인", "basis": "유발 원인·구조 평가 + 발생<48h 여부(cardioversion 안전성 판단).", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1180 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><defs><pattern id=\"g_sm\" width=\"10\" height=\"10\" patternUnits=\"userSpaceOnUse\"><path d=\"M10 0H0V10\" fill=\"none\" stroke=\"#f3c7cb\" stroke-width=\"0.7\"/></pattern><pattern id=\"g_lg\" width=\"50\" height=\"50\" patternUnits=\"userSpaceOnUse\"><rect width=\"50\" height=\"50\" fill=\"url(#g_sm)\"/><path d=\"M50 0H0V50\" fill=\"none\" stroke=\"#e88e95\" stroke-width=\"1.5\"/></pattern></defs><rect width=\"1180\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"50\" font-size=\"2 697,155 707,263 716,235 746,235 766,211 790,235 804,235 860,235 902,235 908,246 917,155 927,263 936,235 966,235 986,211 1010,235 1024,235 1010,235 1052,235 1058,246 1067,155 1077,263 1086,235 1116,235\"/><rect x=\"34\" y=\"324\" width=\"1112\" height=\"84\" rx=\"11\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"1.8\"/><text x=\"54\" y=\"356\" font-size=\"17\" font-weight=\"800\" fill=\"#1559a8\">💡 R-R 간격이 제멋대로 · 뚜렷한 P 대신 잔물결(f파)</text><text x=\"54\" y=\"384\" font-size=\"15\" fill=\"#3a4654\">빠르면(RVR) 심박수 조절 · 색전 예방 위해 CHA₂DS₂-VASc로 항응고 · 48h↑는 항응고 후 율동전환</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "불안정 시", "content": "즉시 동기화 심율동전환", "basis": "저혈압·허혈·심부전 등 혈역학 붕괴면 율동 회복이 우선.", "img": "🖼️ Rate vs Rhythm + 항응고 의사결정 흐름"}, {"item": "심박수 조절", "content": "β차단제 또는 비DHP CCB(Diltiazem/Verapamil), 일부 Digoxin", "basis": "방실결절 전도 늦춰 심실반응↓ → 심박출 회복·증상 완화. 대개 1차 전략.", "img": ""}, {"item": "율동 조절", "content": "항부정맥제/전기적 심율동전환(적응증 시)", "basis": "증상 지속·젊은 환자 등에서 정상동율 회복 시도.", "img": ""}, {"item": "항응고", "content": "CHA₂DS₂-VASc로 위험도 평가 → 항응고제(DOAC/Warfarin)", "basis": "색전성 뇌졸중 예방이 AF 관리의 핵심. 점수 기반으로 출혈위험과 저울질.", "img": ""}, {"item": "Cardioversion 주의", "content": "AF>48h(또는 불명)면 전처치 항응고 3주 또는 TEE로 혈전 배제 후 시행", "basis": "고여 있던 혈전이 율동 회복 시 떨어져 색전 → 사전 항응고·TEE 필수.", "img": ""}], "svg": ""}], "redflags": ["혈역학 불안정 RVR → 즉시 동기화 심율동전환", "AF>48h를 항응고 없이 cardioversion → 색전성 뇌졸중 위험", "갑상선기능항진·패혈증 등 유발인자 동반 확인 (원인 교정)", "WPW 동반 AF에 방실결절 차단제(Digoxin/Verapamil) 금기 → 심실세동 유발"], "memo": "불규칙불규칙·P소실 / 빠르면 rate control / CHA₂DS₂-VASc로 항응고 / >48h는 항응고 후 전환"}, {"no": "09", "name": "완전방실차단 (3rd AVB)", "cat": "❤️ 심장/순환기", "diff": "★★★★☆", "kw": "방실해리 / P·QRS 독립 / 서맥 / 이탈박동 / 경피 페이싱", "mentor": "\"3도 차단은 심방이랑 심실이 따로 노는 거야. P파랑 QRS가 각자 자기 박자로 가지. 심박수 30~40으로 뚝 떨어지면 아트로핀 줘도 잘 안 들어, 특히 QRS 넓은 이탈박동이면. 그땐 망설이지 말고 경피 페이싱 준비해.\"", "sections": [{"title": "📖 정의", "items": [{"item": "한 줄 정의", "content": "방실결절/전도계가 완전히 차단되어 심방 신호가 심실로 전혀 전달되지 않는 상태.", "basis": "심방(P)과 심실(QRS)이 각자 독립 박동(방실해리) → 심실은 느린 이탈박동에 의존.", "img": "🖼️ 3도 방실차단 ECG — P와 QRS가 무관하게 진행"}, {"item": "이탈박동 위치", "content": "접합부 이탈: QRS 좁음, 40~60회(비교적 안정)\n심실 이탈: QRS 넓음, 20~40회(불안정·불신뢰)", "basis": "차단 부위가 낮을수록 이탈박동이 느리고 불안정 → 넓은 QRS 이탈은 응급.", "img": ""}], "svg": ""}, {"title": "🔬 병태생리", "items": [{"item": "원인", "content": "하벽 심근경색(RCA), 전도계 퇴행성 섬유화, 약물(β차단제·CCB·Digoxin), 고칼륨혈증", "basis": "교정 가능한 원인(약물·고K·허혈) 동반 흔함 → 원인 찾으면 가역적일 수 있음.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 760 470\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\">\n  <rect width=\"760\" height=\"470\" rx=\"18\" fill=\"#fff\"/>\n  <text x=\"32\" y=\"46\" font-size=\"24\" font-weight=\"800\" fill=\"#1a2a3a\">심장 전도계 — 3도 차단은 'AV에서 끊김'</text>\n  <line x1=\"32\" y1=\"60\" x2=\"728\" y2=\"60\" stroke=\"#e3e8ee\" stroke-width=\"2\"/>\n  <g transform=\"translate(300,260)\">\n    <path d=\"M0 -120 C-150 -120 -175 70 0 175 C175 70 150 -120 0 -120 Z\" fill=\"#f3b5ba\" stroke=\"#b23039\" stroke-width=\"3\"/>\n    <line x1=\"0\" y1=\"-110\" x2=\"0\" y2=\"120\" stroke=\"#d98a90\" stroke-width=\"2\"/>\n    <!-- SA node -->\n    <circle cx=\"48\" cy=\"-78\" r=\"11\" fill=\"#f2a900\" stroke=\"#9a6b00\" stroke-width=\"2\"/>\n    <text x=\"66\" y=\"-82\" font-size=\"13.5\" font-weight=\"700\" fill=\"#9a6b00\">SA결절 (박동원)</text>\n    <!-- AV node -->\n    <circle cx=\"6\" cy=\"6\" r=\"12\" fill=\"#1f7ae0\" stroke=\"#1559a8\" stroke-width=\"2\"/>\n    <text x=\"24\" y=\"2\" font-size=\"13.5\" font-weight=\"700\" fill=\"#1559a8\">AV결절</text>\n    <!-- His-Purkinje -->\n    <path d=\"M6 18 C6 50 -40 80 -70 120\" fill=\"none\" stroke=\"#2e9d4f\" stroke-width=\"5\"/>\n    <path d=\"M6 18 C6 50 50 80 80 120\" fill=\"none\" stroke=\"#2e9d4f\" stroke-width=\"5\"/>\n    <path d=\"M6 18 L6 70\" stroke=\"#2e9d4f\" stroke-width=\"5\"/>\n    <text x=\"-150\" y=\"135\" font-size=\"13\" fill=\"#1d6b36\" font-weight=\"700\">His속·각·Purkinje</text>\n    <!-- 차단 표시 -->\n    <line x1=\"-30\" y1=\"30\" x2=\"42\" y2=\"-18\" stroke=\"#ef4444\" stroke-width=\"5\"/>\n    <text x=\"40\" y=\"40\" font-size=\"15\" fill=\"#b23039\" font-weight=\"800\">⛔ 차단</text>\n  </g>\n  <g font-size=\"14.5\" fill=\"#3a4654\">\n    <text x=\"500\" y=\"150\" font-weight=\"800\" fill=\"#b23039\">3도(완전) 차단</text>\n    <text x=\"500\" y=\"180\">심방→심실 전달이 완전 차단</text>\n    <text x=\"500\" y=\"206\">→ 심실은 느린 '이탈박동'에 의존</text>\n    <text x=\"500\" y=\"240\" font-weight=\"700\" fill=\"#1559a8\">접합부 이탈: 좁은 QRS 40~60</text>\n    <text x=\"500\" y=\"266\" font-weight=\"700\" fill=\"#b23039\">심실 이탈: 넓은 QRS 20~40(위험)</text>\n    <text x=\"500\" y=\"300\">Atropine 무효 많음 → 경피 페이싱</text>\n  </g>\n</svg>"}, {"title": "😣 증상", "items": [{"item": "증상", "content": "실신·전실신, 어지럼·피로, 운동 못 견딤, 흉통·심부전, Adams-Stokes 발작", "basis": "심박출 급감으로 뇌관류 저하 → 실신. 서맥이 심하면 심정지로 진행.", "img": ""}], "svg": ""}, {"title": "📈 검사", "items": [{"item": "ECG", "content": "P-P 규칙·R-R 규칙이지만 P와 QRS 무관(PR 일정치 않음), 심실수 < 심방수", "basis": "방실해리가 핵심 소견. P가 QRS보다 많고 둘이 독립적이면 3도.", "img": ""}, {"item": "원인 평가", "content": "전해질(K), 약물력, 심근효소/ECG(하벽 MI), 디곡신 농도", "basis": "가역 원인 교정이 우선. 하벽 MI 동반 시 재관류로 회복 가능.", "img": ""}], "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1180 430\" font-family=\"'Apple SD Gothic Neo','Noto Sans KR',sans-serif\"><defs><pattern id=\"g_sm\" width=\"10\" height=\"10\" patternUnits=\"userSpaceOnUse\"><path d=\"M10 0H0V10\" fill=\"none\" stroke=\"#f3c7cb\" stroke-width=\"0.7\"/></pattern><pattern id=\"g_lg\" width=\"50\" height=\"50\" patternUnits=\"userSpaceOnUse\"><rect width=\"50\" height=\"50\" fill=\"url(#g_sm)\"/><path d=\"M50 0H0V50\" fill=\"none\" stroke=\"#e88e95\" stroke-width=\"1.5\"/></pattern></defs><rect width=\"1180\" height=\"430\" rx=\"18\" fill=\"#fff\"/><text x=\"34\" y=\"50\" font-size=\"27\" font-weight=\"800\" fill=\"#1a2a3a\">완전방실차단 — P와 QRS가 따로 논다(방실해리)</text><line x1=\"34\" y1=\"66\" x2=\"1146\" y2=\"66\" stroke=\"#e3e8ee\" stroke-width=\"2\"/><rect x=\"34\" y=\"92\" width=\"1112\" height=\"210\" rx=\"10\" fill=\"url(#g_lg)\" stroke=\"#e88e95\" stroke-width=\"1.6\"/><line x1=\"46\" y1=\"235\" x2=\"1134\" y2=\"235\" stroke=\"#2e9d4f\" stroke-width=\"1\" stroke-dasharray=\"6 5\"/><path d=\"M80 235 Q 93 215 106 235\" fill=\"none\" stroke=\"#1f7ae0\" stroke-width=\"2.6\"/><text x=\"86\" y=\"209\" font-size=\"14\" fill=\"#1f7ae0\" font-weight=\"700\">P</text><path d=\"M200 235 Q 213 215 226 235\" fill=\"none\" stroke=\"#1f7ae0\" stroke-width=\"2.6\"/><text x=\"206\" y=\"209\" font-size=\"14\" fill=\"#1f7ae0\" font-weight=\"700\">P</text><path d=\"M320 235 Q 333 215 346 235\" fill=\"none\" stroke=\"#1f7ae0\" stroke-width=\"2.6\"/><text x=\"326\" y=\"209\" font-size=\"14\" fill=\"#1f7ae0\" font-weight=\"700\">P</text><path d=\"M440 235 Q 453 215 466 235\" fill=\"none\" stroke=\"#1f7ae0\" stroke-width=\"2.6\"/><text x=\"446\" y=\"209\" font-size=\"14\" fill=\"#1f7ae0\" font-weight=\"700\">P</text><path d=\"M560 235 Q 573 215 586 235\" fill=\"none\" stroke=\"#1f7ae0\" stroke-width=\"2.6\"/><text x=\"566\" y=\"209\" font-size=\"14\" fill=\"#1f7ae0\" font-weight=\"700\">P</text><path d=\"M680 235 Q 693 215 706 235\" fill=\"none\" stroke=\"#1f7ae0\" stroke-width=\"2.6\"/><text x=\"686\" y=\"209\" font-size=\"14\" fill=\"#1f7ae0\" font-weight=\"700\">P</text><path d=\"M800 235 Q 813 215 826 235\" fill=\"none\" stroke=\"#1f7ae0\" stroke-width=\"2.6\"/><text x=\"806\" y=\"209\" font-size=\"14\" fill=\"#1f7ae0\" font-weight=\"700\">P</text><path d=\"M920 235 Q 933 215 946 235\" fill=\"none\" stroke=\"#1f7ae0\" stroke-width=\"2.6\"/><text x=\"926\" y=\"209\" font-size=\"14\" fill=\"#1f7ae0\" font-weight=\"700\">P</text><path d=\"M1040 235 Q 1053 215 1066 235\" fill=\"none\" stroke=\"#1f7ae0\" stroke-width=\"2.6\"/><text x=\"1046\" y=\"209\" font-size=\"14\" fill=\"#1f7ae0\" font-weight=\"700\">P</text><polyline fill=\"none\" stroke=\"#b23039\" stroke-width=\"3.1\" stroke-linejoin=\"round\" stroke-linecap=\"round\" points=\"120,235 162,235 170,251 198,150 228,269 252,235 282,235 302,211 326,235 340,235\"/><polyline fill=\"none\" stroke=\"#b23039\" stroke-width=\"3.1\" stroke-linejoin=\"round\" stroke-linecap=\"round\" points=\"470,235 512,235 520,251 548,150 578,269 602,235 632,235 652,211 676,235 690,235\"/><polyline fill=\"none\" stroke=\"#b23039\" stroke-width=\"3.1\" stroke-linejoin=\"round\" stroke-linecap=\"round\" points=\"820,235 862,235 870,251 898,150 928,269 952,235 982,235 1002,211 1026,235 1040,235\"/><rect x=\"34\" y=\"324\" width=\"1112\" height=\"84\" rx=\"11\" fill=\"#eef4fd\" stroke=\"#1f7ae0\" stroke-width=\"1.8\"/><text x=\"54\" y=\"356\" font-size=\"17\" font-weight=\"800\" fill=\"#1559a8\">💡 P는 P대로(빠름), QRS는 QRS대로(느림) — 서로 무관</text><text x=\"54\" y=\"384\" font-size=\"15\" fill=\"#3a4654\">넓은 QRS·HR 20~40 이탈박동은 불안정 · Atropine 무효 많음 → 경피 페이싱 / 가역원인 교정</text></svg>"}, {"title": "💊 치료 근거", "items": [{"item": "즉시 처치", "content": "모니터·IV·산소, 증상성 서맥이면 Atropine 시도", "basis": "Atropine은 미주신경 차단으로 심박↑ 시도. 단 결절하 차단(넓은 QRS)엔 효과 적음.", "img": "🖼️ 증상성 서맥 알고리즘 — 아트로핀→페이싱"}, {"item": "경피 페이싱(TCP)", "content": "Atropine 무효/넓은QRS 이탈/불안정 → 즉시 경피 페이싱", "basis": "외부 전기자극으로 심실 박동 확보. 3도 차단의 핵심 응급 처치.", "img": ""}, {"item": "약물 보조", "content": "Dopamine 또는 Epinephrine 주입(페이싱 준비 중 가교)", "basis": "심박수·관류 유지용 임시 수단. 경정맥 영구 페이싱으로 가는 다리.", "img": ""}, {"item": "근본 치료", "content": "가역 원인 교정 후에도 지속 시 경정맥 임시→영구 인공심박동기", "basis": "전도계 비가역 손상이면 페이스메이커가 확정 치료.", "img": ""}], "svg": ""}], "redflags": ["넓은 QRS·HR 20~40 이탈박동 → 불안정·심정지 임박, 즉시 경피 페이싱", "Atropine에 반응 없는 서맥 → 페이싱으로 바로 전환 (반복 투여로 시간 낭비 금지)", "하벽 MI 동반 3도 차단 → 재관류로 가역 가능, 즉시 보고", "고칼륨혈증·약물(Digoxin·β차단제) 원인 → 교정하면 회복 가능"], "memo": "P·QRS 독립(방실해리) / 넓은QRS 이탈=위험 / Atropine 무효 많음 → 경피 페이싱 / 가역원인 교정"}, {"no": "10", "name": "심낭염 / 심낭압전", "cat": "❤️ 심장/순환기", "diff": "★★★★☆", "kw": "흉막성 흉통 / 광범위 ST상승·PR하강 / Beck 3징 / 기이맥 / 심낭천자", "mentor": "\"심낭염 흉통은 AMI랑 헷갈려. 근데 '앉아서 앞으로 숙이면 편하고 누우면 아프다'·'숨 들이쉬면 아프다'면 심낭염 쪽이야. ECG도 광범위하게 ST가 올라가지(한 혈관 영역 아님). 진짜 무서운 건 압전 — 혈압 떨어지고 목정맥 튀어나오고 심음 멀어지면 바로 심낭천자야.
