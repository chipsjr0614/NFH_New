<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFH ER Mate v4</title>
<style>
:root{
  --bg:#0a0e14; --panel:#12181f; --card:#1a212b; --card2:#222b38;
  --line:#2a3441; --tx:#e6edf3; --tx2:#8b97a7; --red:#ff4d5e; --red2:#3a1216;
  --green:#2ecc71; --gold:#ffc857; --blue:#4aa8ff;
}
[data-theme=light]{
  --bg:#f2f4f7; --panel:#ffffff; --card:#ffffff; --card2:#f0f3f7;
  --line:#dde3ea; --tx:#1a2230; --tx2:#5a6878; --red:#e02436; --red2:#fde8ea;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;word-break:keep-all;overflow-wrap:anywhere}
body{margin:0;background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  padding-bottom:40px}
header{position:sticky;top:0;z-index:30;background:var(--panel);border-bottom:1px solid var(--line);
  padding:14px 16px 0}
.htop{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:8px;font-size:22px;font-weight:800;letter-spacing:-.5px}
.logo .b{background:var(--red);color:#fff;font-size:13px;font-weight:900;padding:3px 7px;border-radius:7px}
.logo em{color:var(--red);font-style:normal}
.hbtns{margin-left:auto;display:flex;gap:8px}
.hbtns button{background:var(--card2);color:var(--tx);border:1px solid var(--line);
  border-radius:9px;padding:8px 12px;font-size:13px;cursor:pointer}
.search{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:11px 14px;margin-bottom:12px}
.search input{flex:1;background:none;border:none;color:var(--tx);font-size:16px;outline:none}
.fav{display:flex;gap:7px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.fav::-webkit-scrollbar{display:none}
.fav .chip{flex:none;background:var(--card2);border:1px solid var(--line);border-radius:20px;
  padding:7px 13px;font-size:13px;cursor:pointer;white-space:nowrap}
.fav .chip:active{border-color:var(--red)}
.tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;padding:11px 14px;font-size:14px;font-weight:600;color:var(--tx2);
  border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap}
.tab.on{color:var(--tx);border-bottom-color:var(--red)}
main{max-width:980px;margin:0 auto;padding:16px}
.sec-h{font-size:13px;font-weight:700;color:var(--tx2);margin:18px 4px 10px;text-transform:uppercase;letter-spacing:.5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.cardx{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;
  transition:.12s;position:relative;overflow:hidden}
.cardx:active{transform:scale(.97);border-color:var(--red)}
.cardx .ic{font-size:24px}
.cardx .ti{font-weight:700;margin-top:8px;font-size:15px;line-height:1.3}
.cardx .su{color:var(--tx2);font-size:12px;margin-top:3px}
.cardx .kd{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;
  padding:2px 6px;border-radius:6px}
.kd.prep{background:#16324a;color:#7cc4ff}.kd.flow{background:#3a2a16;color:#ffc857}
.kd.ref{background:#1d3324;color:#6ee7a0}.kd.judge{background:#3a1630;color:#ff9ee0}
[data-theme=light] .kd.prep{background:#dbeeff;color:#1668b0}
[data-theme=light] .kd.flow{background:#fff0d6;color:#a06a00}
[data-theme=light] .kd.ref{background:#d6f5e1;color:#1a7a42}
[data-theme=light] .kd.judge{background:#fbe0f4;color:#a01a7a}
/* 상세 패널 */
.ov{position:fixed;inset:0;z-index:50;background:var(--bg);display:none;flex-direction:column}
.ov.on{display:flex}
.ovh{position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--line);
  padding:14px 16px;display:flex;align-items:center;gap:12px}
.ovh .bk{background:none;border:none;color:var(--tx);font-size:22px;cursor:pointer;padding:0 4px}
.ovh .tt{font-size:18px;font-weight:800}.ovh .ss{font-size:12px;color:var(--tx2)}
.ovbody{flex:1;overflow-y:auto;padding:16px;max-width:760px;margin:0 auto;width:100%}
.progress{display:flex;align-items:center;gap:10px;margin:0 0 16px}
.pbar{flex:1;height:9px;background:var(--card2);border-radius:6px;overflow:hidden}
.pfill{height:100%;background:var(--red);width:0;transition:.25s}
.ptx{font-size:13px;color:var(--tx2);font-weight:600;min-width:42px;text-align:right}
.sgroup{margin-bottom:14px}
.sglab{font-size:13px;font-weight:700;color:var(--red);margin:0 0 8px;padding-left:2px}
.it{display:flex;gap:11px;padding:13px 12px;background:var(--card);border:1px solid var(--line);
  border-radius:11px;margin-bottom:7px;cursor:pointer;align-items:flex-start}
.it.warn{border-color:var(--red);background:var(--red2)}
.it.done{opacity:.5}
.it .ck{width:22px;height:22px;border:2px solid var(--tx2);border-radius:6px;flex:none;margin-top:1px;
  display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
.it.done .ck{background:var(--green);border-color:var(--green)}
.it .tx{flex:1;font-size:15px;line-height:1.45}
.it.done .tx{text-decoration:line-through}
.it .wb{color:var(--red);font-weight:800;margin-right:3px}
/* flow 타임라인 */
.fl{display:flex;gap:12px;margin-bottom:4px}
.fl .num{flex:none;width:30px;height:30px;border-radius:50%;background:var(--card2);
  border:2px solid var(--line);display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;cursor:pointer}
.fl.done .num{background:var(--green);border-color:var(--green);color:#fff}
.fl .ln{flex:1;padding:0 0 16px}
.fl .ft{font-weight:700;font-size:15px;cursor:pointer}
.fl.done .ft{text-decoration:line-through;opacity:.6}
.fl .fd{font-size:13px;color:var(--tx2);margin-top:3px;line-height:1.5}
.fl .wb{color:var(--red);font-weight:800}
/* ref 참조 */

.refbox{overflow-x:auto;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px 4px}
.refrow{padding:11px 14px;border-bottom:1px solid var(--line);font-size:15px;line-height:1.5}
.refrow:last-child{border:none}
.refrow.warn{color:var(--red);font-weight:600}
.gate{position:sticky;bottom:0;margin-top:10px;padding:14px;border-radius:13px;text-align:center;
  font-weight:800;font-size:16px;background:var(--card2);color:var(--tx2);border:1px solid var(--line)}
.gate.ok{background:var(--green);color:#063;border-color:var(--green);cursor:pointer}
.hint{font-size:12px;color:var(--tx2);background:var(--card);border:1px dashed var(--line);
  border-radius:10px;padding:10px 12px;margin-bottom:14px;line-height:1.5}
.empty{text-align:center;color:var(--tx2);padding:50px 0}
.note{font-size:11px;color:var(--tx2);text-align:center;padding:20px 0 0}
</style>
</head>
<body>
<header>
  <div class="htop">
    <div class="logo"><span class="b">NFH</span> <span><em>ER</em> Mate</span></div>
    <div class="hbtns">
      <button onclick="toggleTheme()" id="thBtn">🌙</button>
      <button onclick="exportTxt()">📤 내보내기</button>
    </div>
  </div>
  <div class="search">
    🔍 <input id="q" placeholder="시술·업무·가이드 검색 (CT, 수혈, 전원…)" oninput="doSearch()">
  </div>
  <div class="fav" id="fav"></div>
  <div class="tabs" id="tabs">
    <div class="tab on" data-t="home" onclick="setTab('home')">🏠 전체</div>
    <div class="tab" data-t="proc" onclick="setTab('proc')">🏥 시술/검사</div>
    <div class="tab" data-t="task" onclick="setTab('task')">📋 필수업무</div>
    <div class="tab" data-t="guide" onclick="setTab('guide')">📚 업무가이드</div>
  </div>
</header>
<main id="main"></main>

<div class="ov" id="ov">
  <div class="ovh">

    <div><div class="tt" id="ovtt"></div><div class="ss" id="ovss"></div></div>
  </div>
  <div class="ovbody" id="ovbody"></div>
</div>

const KIND_LABEL={prep:"준비물",flow:"절차",ref:"참조",judge:"판단"};
const ICON={prep:"🏥",flow:"📋",ref:"📚",judge:"❓"};
const PROC_ICON={"CT":"🩻","MRI":"🧲","CAG":"❤️","OP":"🔪","C-line":"💉","PEG":"🍽️",
  "Echo":"🫀","EEG":"🧠","Pacemaker":"⏱️","Cardioversion":"⚡"};
let checks={};

function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function markWarn(t){return esc(t).replace(/⚠️/g,'<span class="wb">⚠️</span>');}

// 통합 인덱스
let IDX=[];
DATA.procedures.forEach((p,i)=>IDX.push({type:"proc",i,kind:p.kind,
  ko:p.ko,en:p.en,title:p.ko||p.en,sub:p.en}));
DATA.tasks.forEach((t,i)=>IDX.push({type:"task",i,kind:t.kind,ko:t.name,title:t.name,sub:t.items.length+"단계"}));
DATA.guides.forEach((g,i)=>IDX.push({type:"guide",i,kind:g.kind,ko:g.ko,en:g.en,title:g.ko||g.en,sub:g.cat}));

function pic(it){ if(it.type==="proc"){for(const k in PROC_ICON){if((it.en||"").startsWith(k)||it.title.includes(k))return PROC_ICON[k];}} return ICON[it.kind]; }

function card(it,gi){
  return `<div class="cardx" onclick="openDetail('${it.type}',${it.i})">
    <span class="kd ${it.kind}">${KIND_LABEL[it.kind]}</span>
    <div class="ic">${pic(it)}</div>
    <div class="ti">${esc(it.title)}</div>
    <div class="su">${esc(it.sub||"")}</div></div>`;
}

const FAV=["CT","CAG","MRI","수혈","전원","고칼륨혈증 처치","GCS","파상풍 접종"];
function renderFav(){
  document.getElementById("fav").innerHTML=FAV.map(f=>{
    const hit=IDX.find(x=>x.title.includes(f)||(x.en||"").startsWith(f));
    if(!hit)return "";
    return `<div class="chip" onclick="openDetail('${hit.type}',${hit.i})">${esc(f)}</div>`;
  }).join("");
}

let curTab="home";
function setTab(t){curTab=t;document.querySelectorAll(".tab").forEach(e=>e.classList.toggle("on",e.dataset.t===t));render();}
function render(){
  const m=document.getElementById("main");
  const sec=(title,arr)=>`<div class="sec-h">${title}</div><div class="grid">${arr.map(x=>card(x)).join("")}</div>`;
  let h="";
  if(curTab==="home"){
    h+=sec("🏥 시술 / 검사 ("+DATA.procedures.length+")",IDX.filter(x=>x.type==="proc"));
    h+=sec("📋 필수업무 ("+DATA.tasks.length+")",IDX.filter(x=>x.type==="task"));
    h+=sec("📚 업무가이드 ("+DATA.guides.length+")",IDX.filter(x=>x.type==="guide"));
  }else if(curTab==="proc") h+=sec("시술 / 검사",IDX.filter(x=>x.type==="proc"));
  else if(curTab==="task") h+=sec("필수업무",IDX.filter(x=>x.type==="task"));
  else if(curTab==="guide") h+=sec("업무가이드",IDX.filter(x=>x.type==="guide"));
  h+=`<div class="note">데이터 출처: ER-Mate_간호기록_병합완성본_수정본20260607.xlsx · 분기(스무고개)는 임상 검수 후 추가 예정</div>`;
  m.innerHTML=h;
}

function doSearch(){
  const q=document.getElementById("q").value.trim().toLowerCase();
  if(!q){render();return;}
  const m=document.getElementById("main");
  const hits=IDX.filter(x=>{
    if((x.title||"").toLowerCase().includes(q)||(x.en||"").toLowerCase().includes(q)||(x.sub||"").toLowerCase().includes(q))return true;
    // 내용까지 검색
    let txt="";
    if(x.type==="proc")DATA.procedures[x.i].sections.forEach(s=>s.items.forEach(i=>txt+=i.t));
    if(x.type==="task")DATA.tasks[x.i].items.forEach(i=>txt+=i.title+i.detail);
    if(x.type==="guide")DATA.guides[x.i].items.forEach(i=>txt+=i.t);
    return txt.toLowerCase().includes(q);
  });
  m.innerHTML = hits.length
    ? `<div class="sec-h">검색 결과 ${hits.length}</div><div class="grid">${hits.map(x=>card(x)).join("")}</div>`
    : `<div class="empty">검색 결과 없음</div>`;
}

let curDetail=null;
function openDetail(type,i){
  document.getElementById("ov").classList.add("on");
  let obj,kind,title,sub;
  if(type==="proc"){obj=DATA.procedures[i];kind=obj.kind;title=obj.ko||obj.en;sub=obj.en;}
  else if(type==="task"){obj=DATA.tasks[i];kind=obj.kind;title=obj.name;sub="필수업무 · "+obj.items.length+"단계";}
  else {obj=DATA.guides[i];kind=obj.kind;title=obj.ko||obj.en;sub=obj.cat+" 가이드";}
  curDetail={type,i,obj,kind};
  document.getElementById("ovtt").textContent=title;
  document.getElementById("ovss").textContent=KIND_LABEL[kind]+" · "+(sub||"");
  renderDetail();
}
function ckKey(a,b){return curDetail.type+curDetail.i+"_"+a+"_"+b;}

function renderDetail(){
  const {obj,kind}=curDetail; const b=document.getElementById("ovbody");
  let h="";
  if(kind==="prep"){
    // 시술 or 준비물 가이드
    const secs = obj.sections || [{label:obj.cat||"항목",items:obj.items}];
    let tot=0,done=0,reqTot=0,reqDone=0;
    secs.forEach((s,si)=>s.items.forEach((it,ii)=>{tot++;if(checks[ckKey(si,ii)])done++;
      if(it.w){reqTot++;if(checks[ckKey(si,ii)])reqDone++;}}));
    h+=`<div class="hint">✅ 준비물형 — 빠뜨리면 안 되는 항목을 체크하세요. <span class="wb">⚠️</span>는 놓치면 사고 위험.</div>`;
    h+=progBar(done,tot);
    secs.forEach((s,si)=>{
      h+=`<div class="sgroup"><div class="sglab">${esc(s.label)}</div>`;
      s.items.forEach((it,ii)=>{
        const on=checks[ckKey(si,ii)];
        h+=`<div class="it ${it.w?'warn':''} ${on?'done':''}" onclick="tog(${si},${ii})">
          <div class="ck">${on?'✓':''}</div><div class="tx">${markWarn(it.t)}</div></div>`;
      });
      h+=`</div>`;
    });
    const ok=reqTot===0?done===tot:reqDone===reqTot;
    h+=`<div class="gate ${ok?'ok':''}">${ok?'🚑 이송 준비 완료':'🔒 필수항목('+reqDone+'/'+reqTot+') 남음'}</div>`;
  }
  else if(kind==="flow"){
    let done=0;obj.items.forEach((it,ii)=>{if(checks[ckKey(0,ii)])done++;});
    h+=`<div class="hint">📋 절차형 — 위에서 아래로 순서대로 진행하세요.</div>`;
    h+=progBar(done,obj.items.length);
    obj.items.forEach((it,ii)=>{
      const on=checks[ckKey(0,ii)];
      const wb=it.w?'<span class="wb">⚠️ </span>':'';
      h+=`<div class="fl ${on?'done':''}">
        <div class="num" onclick="tog(0,${ii})">${on?'✓':(it.no||ii+1)}</div>
        <div class="ln"><div class="ft" onclick="tog(0,${ii})">${wb}${esc(it.title||it.t)}</div>
        ${it.detail?`<div class="fd">${markWarn(it.detail)}</div>`:''}</div></div>`;
    });
  }
  else if(kind==="judge"){
    h+=`<div class="hint">❓ 판단형 — 조건을 확인하고 해당되면 아래대로 진행하세요.</div>`;
    h+=`<div class="refbox">`+obj.items.map(it=>`<div class="refrow ${it.w?'warn':''}">${markWarn(it.t)}</div>`).join("")+`</div>`;
  }
  else { // ref
    h+=`<div class="hint">📚 참조 — 보는 자료입니다 (체크 없음).</div>`;
    h+=`<div class="refbox">`+obj.items.map(it=>`<div class="refrow ${it.w?'warn':''}">${markWarn(it.t)}</div>`).join("")+`</div>`;
  }
  b.innerHTML=h;
}
function progBar(d,t){const p=t?Math.round(d/t*100):0;
  return `<div class="progress"><div class="pbar"><div class="pfill" style="width:${p}%"></div></div><div class="ptx">${d}/${t}</div></div>`;}
function tog(si,ii){const k=ckKey(si,ii);checks[k]=!checks[k];renderDetail();}
function closeOv(){document.getElementById("ov").classList.remove("on");curDetail=null;}

function exportTxt(){
  if(!curDetail){alert("내보낼 항목을 먼저 여세요.");return;}
  const {obj,kind}=curDetail;
  let title=obj.ko||obj.en||obj.name;
  let lines=["["+title+"] 체크 결과 - "+new Date().toLocaleString("ko-KR")];
  const secs = obj.sections || [{label:obj.cat||"",items:obj.items}];
  secs.forEach((s,si)=>{ if(s.label)lines.push("\n■ "+s.label);
    s.items.forEach((it,ii)=>{const on=checks[ckKey(si,ii)];
      lines.push((on?"[v] ":"[ ] ")+(it.title||it.t)+(it.detail?" - "+it.detail:""));});});
  const txt=lines.join("\n");
  navigator.clipboard?.writeText(txt).then(()=>alert("복사됨! 간호기록에 붙여넣기 하세요.")).catch(()=>prompt("복사:",txt));
}

function toggleTheme(){
  const d=document.body.getAttribute("data-theme")==="light";
  document.body.setAttribute("data-theme",d?"":"light");
  document.getElementById("thBtn").textContent=d?"🌙":"☀️";
}

renderFav();render();
</script>
