<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NFH ER Mate</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NFH ER Mate">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B3A4B">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%231B3A4B'/%3E%3Ccircle cx='90' cy='90' r='56' fill='%23048A81'/%3E%3Cpath d='M62 90h56M90 62v56' stroke='white' stroke-width='10' stroke-linecap='round'/%3E%3Ccircle cx='90' cy='90' r='18' fill='none' stroke='white' stroke-width='8'/%3E%3C/svg%3E">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22NFH+ER+Mate%22%2C%22short_name%22%3A%22ER+Mate%22%2C%22start_url%22%3A%22.%2Fer_mate_v2.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%231B3A4B%22%2C%22theme_color%22%3A%22%231B3A4B%22%7D">
<style>
:root {
  --primary:#048A81; --primary-dk:#1B3A4B; --primary-lt:#E0F5F3;
  --danger:#E63946; --warn:#FFB703;
  --c-warn-bg:#FFF3CD; --c-warn-txt:#7A5A00; --c-warn-bdr:#FFB703;
  --bg:#F4F6F8; --card:#FFFFFF; --text:#1B2A3B; --text-muted:#6B7C93;
  --border:#E2E8F0; --shadow:0 2px 8px rgba(0,0,0,0.08); --radius:12px;
}
.dark {
  --c-warn-bg:#3D2E00; --c-warn-txt:#FFD966; --c-warn-bdr:#A87800;
  --bg:#0F1923; --card:#1A2535; --text:#E8EDF3; --text-muted:#8A9BB0;
  --border:#2A3A4E; --primary-lt:#0D2A28; --shadow:0 2px 8px rgba(0,0,0,0.3);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Noto Sans KR',sans-serif}

#pg-main,#pg-detail,#pg-admin{
  position:fixed;inset:0;overflow-y:auto;background:var(--bg);
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
#pg-detail{transform:translateX(100%);z-index:10}
#pg-admin{transform:translateX(100%);z-index:10}
#pg-detail.active,#pg-admin.active{transform:translateX(0)}

.header{background:var(--primary-dk);color:white;
  padding:env(safe-area-inset-top) 20px 0;
  height:calc(56px + env(safe-area-inset-top));
  display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:0;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.header-logo,.header-actions{padding-bottom:12px}
.header-logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:700}
.header-logo svg{width:28px;height:28px}
.header-actions{display:flex;gap:8px}
.btn-icon{background:rgba(255,255,255,0.15);border:none;color:white;padding:6px 12px;
  border-radius:8px;cursor:pointer;font-size:13px;transition:background 0.2s}
.btn-icon:hover{background:rgba(255,255,255,0.25)}

.detail-header{background:var(--primary-dk);color:white;
  padding:env(safe-area-inset-top) 16px 0;
  height:calc(56px + env(safe-area-inset-top));
  display:flex;align-items:flex-end;gap:12px;padding-bottom:0;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.btn-back{background:rgba(255,255,255,0.15);border:none;color:white;padding:6px 14px;
  border-radius:8px;cursor:pointer;font-size:15px;font-weight:700;transition:background 0.2s}
.btn-back:hover{background:rgba(255,255,255,0.25)}
.detail-title{flex:1;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detail-header .btn-back,.detail-header .detail-title,.detail-header .btn-reset{padding-bottom:12px}
.btn-reset{background:rgba(255,255,255,0.2);border:none;color:white;padding:6px 12px;
  border-radius:8px;cursor:pointer;font-size:12px}

.search-wrap{padding:12px 20px 10px;background:var(--card);border-bottom:1px solid var(--border)}
.search-box{position:relative}
.search-box input{width:100%;padding:10px 16px 10px 40px;border:2px solid var(--border);
  border-radius:10px;font-size:14px;background:var(--bg);color:var(--text);outline:none;transition:border-color 0.2s}
.search-box input:focus{border-color:var(--primary)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted)}
.search-results{position:absolute;top:100%;left:0;right:0;background:var(--card);
  border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);
  max-height:320px;overflow-y:auto;z-index:200;display:none}
.search-results.show{display:block}
.search-item{padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border)}
.search-item:hover{background:var(--primary-lt)}
.search-item-title{font-size:14px;font-weight:600}
.search-item-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.search-badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;
  background:var(--primary);color:white;margin-left:6px}

.tabs{display:flex;overflow-x:auto;background:var(--card);border-bottom:2px solid var(--border);
  padding:0 12px;gap:4px;scrollbar-width:none;position:sticky;top:calc(56px + env(safe-area-inset-top));z-index:50}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;
  border-bottom:3px solid transparent;color:var(--text-muted);transition:all 0.2s;user-select:none}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab:hover{color:var(--text)}

.content{padding:16px 20px;max-width:900px;margin:0 auto}
.section-title{font-size:15px;font-weight:700;margin:20px 0 10px;color:var(--text);
  display:flex;align-items:center;gap:6px}
.section-title::before{content:'';display:block;width:4px;height:16px;background:var(--primary);border-radius:2px}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
.proc-card{background:var(--card);border-radius:var(--radius);padding:14px 8px;
  text-align:center;cursor:pointer;box-shadow:var(--shadow);transition:all 0.2s;border:2px solid transparent}
.proc-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 16px rgba(4,138,129,0.2)}
.proc-card-icon{font-size:28px;margin-bottom:6px}
.proc-card-name{font-size:12px;font-weight:700;color:var(--text)}
.proc-card-sub{font-size:10px;color:var(--text-muted);margin-top:2px}

.list-item{background:var(--card);border-radius:var(--radius);padding:14px 16px;
  margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow);display:flex;
  align-items:center;justify-content:space-between;transition:all 0.2s}
.list-item:hover{border-left:4px solid var(--primary);padding-left:12px}
.list-item-left{flex:1}
.list-item-title{font-size:14px;font-weight:700}
.list-item-sub{font-size:12px;color:var(--text-muted);margin-top:3px}
.list-item-arrow{color:var(--text-muted);font-size:16px}

.cat-header{background:var(--primary);color:white;padding:8px 14px;border-radius:8px;
  font-size:13px;font-weight:700;margin:16px 0 8px;display:flex;align-items:center;gap:6px}

.drug-filter{display:flex;gap:8px;overflow-x:auto;padding:12px 0 8px;scrollbar-width:none}
.drug-filter::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;
  cursor:pointer;background:var(--card);border:2px solid var(--border);
  color:var(--text-muted);transition:all 0.2s;white-space:nowrap}
.chip.active{background:var(--primary);color:white;border-color:var(--primary)}
.chip:hover:not(.active){border-color:var(--primary);color:var(--primary)}

.checklist-section{margin-bottom:16px}
.checklist-section-title{font-size:13px;font-weight:700;padding:8px 12px;border-radius:8px;margin-bottom:8px}
.t-ae{background:#E3F2FD;color:#1565C0}
.t-diag{background:#FFF3E0;color:#E65100}
.t-plan{background:#E8F5E9;color:#2E7D32}
.t-prep{background:#E8F5E9;color:#2E7D32}
.t-med{background:#FFF3E0;color:#E65100}
.t-post{background:#E3F2FD;color:#1565C0}
.t-warn{background:#FFF3CD;color:#856404}
.t-trans{background:#F3E5F5;color:#6A1B9A}
.dark .t-ae{background:#0D2744;color:#90CAF9}
.dark .t-diag{background:#3E1A00;color:#FFB74D}
.dark .t-plan,.dark .t-prep{background:#0B2512;color:#81C784}
.dark .t-med{background:#3E1A00;color:#FFB74D}
.dark .t-post{background:#0D2744;color:#90CAF9}
.dark .t-warn{background:#3D2E00;color:#FFD966}
.dark .t-trans{background:#2D0A3E;color:#CE93D8}

.check-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;
  border-radius:8px;margin-bottom:6px;background:var(--bg);cursor:pointer;
  transition:background 0.15s;user-select:none}
.check-item:hover{background:var(--primary-lt)}
.check-item.checked{opacity:0.6}
.check-item.checked .check-text{text-decoration:line-through;color:var(--text-muted)}
.check-box{width:20px;height:20px;border:2px solid var(--primary);border-radius:5px;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.15s}
.check-item.checked .check-box{background:var(--primary);border-color:var(--primary)}
.check-box-inner{color:white;font-size:12px;display:none}
.check-item.checked .check-box-inner{display:block}
.check-text{font-size:13px;line-height:1.5}
.check-note{font-size:11px;color:var(--text-muted);margin-top:2px}

.warn-item{background:var(--c-warn-bg);border-left:3px solid var(--c-warn-bdr);
  color:var(--c-warn-txt);padding:8px 12px;border-radius:0 8px 8px 0;margin-bottom:6px;font-size:13px}

.progress-wrap{padding:12px 16px;background:var(--card);border-top:1px solid var(--border);
  position:sticky;bottom:0}
.progress-text{font-size:12px;color:var(--text-muted);margin-bottom:6px;display:flex;justify-content:space-between}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width 0.3s}

.drug-table{width:100%;border-collapse:collapse;margin:12px 0}
.drug-table tr{border-bottom:1px solid var(--border)}
.drug-table td:first-child{width:110px;padding:10px 12px;font-size:12px;font-weight:700;
  color:var(--text-muted);background:var(--bg)}
.drug-table td:last-child{padding:10px 12px;font-size:13px}
.drug-alias{font-size:12px;color:var(--text-muted);margin:4px 0 12px}
.drug-category-badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;
  background:var(--primary-lt);color:var(--primary);font-weight:600;margin-bottom:8px}

.detail-body{padding:16px}
.nursing-note{font-size:11px;color:var(--text-muted);margin-top:2px;font-style:italic}

.cat-준비{background:#E8F5E9;color:#2E7D32}
.cat-기입{background:#E3F2FD;color:#1565C0}
.cat-참고{background:#F3E5F5;color:#6A1B9A}
.cat-주의{background:#FFF3CD;color:#856404}
.cat-절차{background:#FFF8E1;color:#F57F17}
.cat-동의서{background:#FCE4EC;color:#880E4F}
.cat-안내{background:#E0F2F1;color:#00695C}
.dark .cat-준비{background:#0B2512;color:#81C784}
.dark .cat-기입{background:#0D2744;color:#90CAF9}
.dark .cat-참고{background:#2D0A3E;color:#CE93D8}
.dark .cat-주의{background:#3D2E00;color:#FFD966}
.dark .cat-절차{background:#3E2600;color:#FFB74D}
.dark .cat-동의서{background:#3D0018;color:#F48FB1}
.dark .cat-안내{background:#003734;color:#80CBC4}

.admin-login{max-width:380px;margin:60px auto;background:var(--card);
  border-radius:16px;padding:40px;box-shadow:var(--shadow)}
.admin-login h2{text-align:center;margin-bottom:24px;font-size:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.form-group input{width:100%;padding:10px 14px;border:2px solid var(--border);
  border-radius:8px;font-size:14px;background:var(--bg);color:var(--text);outline:none}
.form-group input:focus{border-color:var(--primary)}
.btn-primary{width:100%;padding:12px;background:var(--primary);color:white;
  border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
.btn-primary:hover{background:#036B63}
.admin-wrap{display:flex;min-height:calc(100vh - 56px)}
.admin-sidebar{width:180px;background:var(--card);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0}
.admin-nav-item{padding:12px 20px;cursor:pointer;font-size:14px;font-weight:600;transition:all 0.2s}
.admin-nav-item:hover,.admin-nav-item.active{background:var(--primary-lt);color:var(--primary)}
.admin-main{flex:1;padding:20px;overflow-y:auto}
.admin-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.btn-export{background:var(--primary);color:white;border:none;padding:10px 18px;
  border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px}
.admin-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
.admin-table th{background:var(--primary-dk);color:white;padding:10px 14px;font-size:13px;text-align:left}
.admin-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border)}
.admin-table tr:hover td{background:var(--primary-lt)}
.btn-edit{background:#E3F2FD;color:#1565C0;border:none;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;margin-right:4px}
.btn-del{background:#FFEBEE;color:#C62828;border:none;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}

.modal{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5)}
.modal-box{position:relative;background:var(--card);border-radius:16px;padding:28px;
  width:min(480px,90%);box-shadow:0 8px 32px rgba(0,0,0,0.2);z-index:1}
.modal-box h3{margin-bottom:20px;font-size:17px}
.modal-box .form-group input,.modal-box .form-group select,.modal-box .form-group textarea{
  width:100%;padding:9px 12px;border:2px solid var(--border);
  border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);outline:none}
.modal-box .form-group textarea{min-height:80px;resize:vertical}
.modal-btns{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-cancel{padding:9px 18px;border:2px solid var(--border);border-radius:8px;background:none;color:var(--text);cursor:pointer;font-size:13px;font-weight:600}
.confirm-modal .modal-box{text-align:center;max-width:320px}
.confirm-modal .modal-box h3{color:var(--danger)}
.confirm-modal .modal-box p{font-size:14px;color:var(--text-muted);margin-bottom:20px}
.btn-danger{padding:9px 18px;background:var(--danger);color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}

@media(max-width:600px){.content{padding:12px 14px}.card-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}}
</style>
</head>
<body>

<div id="pg-main">
  <header class="header">
    <div class="header-logo">
      <svg viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="14" fill="#048A81"/>
        <path d="M8 14h12M14 8v12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="14" cy="14" r="4" fill="none" stroke="white" stroke-width="2"/>
      </svg>
      NFH ER Mate
    </div>
    <div class="header-actions">
      <button class="btn-icon" onclick="goHome()">🏠 홈</button>
      <button class="btn-icon" onclick="toggleDark()">🌙 다크</button>
      <button class="btn-icon" onclick="showAdmin()">⚙️ 관리자</button>
    </div>
  </header>
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="시술, 약물, 증상, 업무 등 검색..."
        oninput="handleSearch(this.value)" onblur="setTimeout(()=>hideSearch(),200)">
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab active" onclick="showTab('home')">🏠 전체</div>
    <div class="tab" onclick="showTab('procedure')">🏥 시술/검사</div>
    <div class="tab" onclick="showTab('drug')">💊 약물</div>
    <div class="tab" onclick="showTab('task')">📋 필수업무</div>
    <div class="tab" onclick="showTab('nursing')">📝 간호기록</div>
    <div class="tab" onclick="showTab('guide')">📚 업무가이드</div>
  </div>
  <div class="content" id="mainContent"></div>
</div>

<div id="pg-detail">
  <div class="detail-header">
    <button class="btn-back" onclick="closePage()">&#8592; 뒤로</button>
    <span class="detail-title" id="detailTitle"></span>
    <button class="btn-reset" id="detailResetBtn" onclick="resetChecks()" style="display:none">초기화</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
  <div class="progress-wrap" id="progressWrap" style="display:none">
    <div class="progress-text">
      <span id="progressText">0 / 0 완료</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</div>

<div id="pg-admin">
  <div class="detail-header">
    <button class="btn-back" onclick="closeAdmin()">&#8592; 뒤로</button>
    <span class="detail-title">관리자 페이지</span>
  </div>
  <div id="adminContent" class="content"></div>
</div>

<div class="modal" id="editModal">
  <div class="modal-overlay" onclick="closeEditModal()"></div>
  <div class="modal-box">
    <h3>항목 수정</h3>
    <div class="form-group"><label>이름</label><input type="text" id="editName" placeholder="항목 이름"></div>
    <div class="form-group"><label>내용</label><textarea id="editContent" placeholder="내용"></textarea></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeEditModal()">취소</button>
      <button class="btn-primary" style="width:auto;padding:9px 18px" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div class="modal confirm-modal" id="confirmModal">
  <div class="modal-overlay" onclick="closeConfirm()"></div>
  <div class="modal-box">
    <h3>삭제 확인</h3>
    <p id="confirmText"></p>
    <div class="modal-btns" style="justify-content:center">
      <button class="btn-cancel" onclick="closeConfirm()">취소</button>
      <button class="btn-danger" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<script>
const DB = {
  "procedures": [
    {
      "id": "★ ERCP",
      "name_en": "★ ERCP",
      "name_ko": "내시경역행담췌관조영",
      "준비사항": [
        "진정 내시경적 역행성 담췌관 배액술 동의서 확인",
        "NPO(금식) 유지",
        "보호자 동반 필수",
        "Pre-lab: CBC, PT/aPTT"
      ],
      "투약/약물": [
        "예방적 항생제 확인",
        "첫 ERCP 시 Futhan(Nafamostat) 투약할지 확인"
      ],
      "검사 후": [
        "4hr Post-lab: Amy/Lip + Abd supine/erect 확인",
        "Abd pain 사정"
      ],
      "주의사항": [
        "⚠️ Pancreatitis 발생 주의",
        "⚠️ Massive Hydration(Hartmann Sol) 필요 가능성"
      ],
      "이송 부서": [
        "소화기내시경센터 (☏2574, 7266)"
      ]
    },
    {
      "id": "EGD",
      "name_en": "EGD",
      "name_ko": "위내시경",
      "준비사항": [
        "L-tube 있으면 제거",

function toggleDark(){
  isDark=!isDark;
  document.body.classList.toggle('dark',isDark);
}

function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const tabs=['home','procedure','drug','task','nursing','guide'];
    t.classList.toggle('active',tabs[i]===tab);
  });
  ({home:renderHome,procedure:renderProcedure,drug:renderDrug,
    task:renderTask,nursing:renderNursing,guide:renderGuide})[tab]?.();
  document.getElementById('pg-main').scrollTop=0;
}

function handleSearch(q){
  const box=document.getElementById('searchResults');
  if(!q.trim()){box.classList.remove('show');return}
  const kw=q.toLowerCase(), results=[];
  DB.procedures.forEach(p=>{
    if(p.name_en.toLowerCase().includes(kw)||p.name_ko.includes(kw))
      results.push({type:'procedure',id:p.id,title:p.name_ko,sub:p.name_en,badge:'시술'});
  });
  DB.drugs.forEach(d=>{
    const m=d.name_en.toLowerCase().includes(kw)||d.name_ko.includes(kw)
      ||d.aliases.toLowerCase().includes(kw)||(d.keywords||[]).some(k=>k.toLowerCase().includes(kw));
    if(m) results.push({type:'drug',id:d.id,title:d.name_ko,sub:d.name_en,badge:'약물'});
  });
  DB.tasks.forEach(t=>{
    if(t.name.includes(kw)) results.push({type:'task',id:t.id,title:t.name+' 체크리스트',sub:t.items.length+'개 항목',badge:'필수업무'});
    t.items.forEach(item=>{if(item.item.includes(kw)) results.push({type:'task',id:t.id,title:item.item,sub:t.name,badge:'필수업무'});});
  });
  DB.nursing.forEach(n=>{
    Object.values(n.symptoms).forEach(s=>{
      if(s.name.includes(kw)||n.name.includes(kw))
        results.push({type:'nursing',id:n.id+'|||'+s.name,title:s.name,sub:n.name,badge:'간호기록'});
    });
  });
  DB.guides.forEach(g=>{
    if(g.name_ko.includes(kw)||g.name_en.toLowerCase().includes(kw))
      results.push({type:'guide',id:g.id,title:g.name_ko,sub:g.name_en,badge:'업무가이드'});
  });
  if(!results.length){
    box.innerHTML='<div class="search-item"><div class="search-item-title">검색 결과 없음</div></div>';
  } else {
    box.innerHTML=results.slice(0,12).map(r=>
      `<div class="search-item" onclick="openFromSearch('${r.type}',this.dataset.id)" data-id="${encodeURIComponent(r.id)}">
        <div class="search-item-title">${r.title}<span class="search-badge">${r.badge}</span></div>
        <div class="search-item-sub">${r.sub}</div>
      </div>`).join('');
  }
  box.classList.add('show');
}
function hideSearch(){document.getElementById('searchResults').classList.remove('show')}
function openFromSearch(type,eid){
  hideSearch();
  document.getElementById('searchInput').value='';
  const id=decodeURIComponent(eid);
  if(type==='procedure') openProcedure(id);
  else if(type==='drug') openDrug(id);
  else if(type==='task') openTask(id);
  else if(type==='guide') openGuide(id);
  else if(type==='nursing'){const sep=id.indexOf('|||');openNursing(id.slice(0,sep),id.slice(sep+3));}
}

function openPage(title,html,hasProgress){
  document.getElementById('detailTitle').textContent=title;
  document.getElementById('detailBody').innerHTML=html;
  document.getElementById('detailResetBtn').style.display=hasProgress?'':'none';
  document.getElementById('progressWrap').style.display=hasProgress?'':'none';
  document.getElementById('pg-detail').classList.add('active');
  document.getElementById('pg-detail').scrollTop=0;
}
function closePage(){document.getElementById('pg-detail').classList.remove('active')}

  const guideShortcuts=guideIds.map(id=>DB.guides.find(g=>g.id===id)).filter(Boolean);
  const nursShortcuts=[
    {nid:'통증',sname:'복부통증',icon:'🤢',label:'복부통증'},
    {nid:'통증',sname:'흉부통증',icon:'💔',label:'흉부통증'},
    {nid:'호흡',sname:'호흡곤란(가래 없거나 적을떄- 기타 호흡곤란)',icon:'😮‍💨',label:'호흡곤란'},
    {nid:'Seizure',sname:'지금 Seizure 할 때',icon:'⚡',label:'Seizure'},
  ];
  const topProcs=DB.procedures.slice(0,8);
  const drugCats=[...new Set(DB.drugs.map(d=>d.category))].slice(0,6);
  c.innerHTML=`
    <div class="section-title">🏥 시술/검사 바로가기</div>
    <div class="card-grid">
      ${topProcs.map(p=>`
        <div class="proc-card" onclick="openProcedure(this.dataset.id)" data-id="${p.id}">
          <div class="proc-card-icon">${PROC_ICONS[p.id]||'🏥'}</div>
          <div class="proc-card-name">${p.name_ko||p.name_en}</div>
        </div>`).join('')}
      <div class="proc-card" onclick="showTab('procedure')">
        <div class="proc-card-icon">📋</div><div class="proc-card-name">전체보기</div>
      </div>
    </div>
    <div class="section-title">💊 약물 카테고리</div>
    <div class="card-grid">
      ${drugCats.map(cat=>`
        <div class="proc-card" onclick="showTab('drug');setTimeout(()=>setDrugFilter(this.dataset.cat),50)" data-cat="${cat}">
          <div class="proc-card-icon">${DRUG_ICONS[cat]||'💊'}</div>
          <div class="proc-card-name" style="font-size:10px">${cat.replace('/',' ')}</div>
        </div>`).join('')}
    </div>
    <div class="section-title">📋 필수업무</div>
    <div class="card-grid">
      ${DB.tasks.map(t=>`
        <div class="proc-card" onclick="openTask(this.dataset.id)" data-id="${t.id}">
          <div class="proc-card-icon">${TASK_ICONS[t.name]||'📋'}</div>
          <div class="proc-card-name">${t.name}</div>
          <div class="proc-card-sub">${t.items.length}개 항목</div>
        </div>`).join('')}
    </div>
    <div class="section-title">📝 간호기록 바로가기</div>
    <div class="card-grid">
      ${nursShortcuts.map(n=>`
        <div class="proc-card" onclick="openNursing(this.dataset.nid,this.dataset.sname)" data-nid="${n.nid}" data-sname="${n.sname}">
          <div class="proc-card-icon">${n.icon}</div>
          <div class="proc-card-name">${n.label}</div>
        </div>`).join('')}
    </div>
    <div class="section-title">📚 업무가이드 바로가기</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px">
      ${guideShortcuts.map(g=>`
        <div class="list-item" onclick="openGuide(this.dataset.id)" data-id="${g.id}" style="padding:10px 12px">
          <div class="list-item-left">
            <div class="list-item-title" style="font-size:13px">${g.name_ko}</div>
          </div>
          <div class="list-item-arrow">›</div>
        </div>`).join('')}

}

function renderProcedure(){
  const c=document.getElementById('mainContent');
  c.innerHTML=`<div class="section-title">🏥 시술/검사 준비 체크리스트</div>
    <div class="card-grid">
      ${DB.procedures.map(p=>`
        <div class="proc-card" onclick="openProcedure(this.dataset.id)" data-id="${p.id}">
          <div class="proc-card-icon">${PROC_ICONS[p.id]||'🏥'}</div>
          <div class="proc-card-name">${p.name_ko||p.name_en}</div>
          <div class="proc-card-sub">${p.name_en}</div>
        </div>`).join('')}
    </div>`;
}

function openProcedure(id){
  const p=DB.procedures.find(x=>x.id===id);
  if(!p) return;
  _panelId=id;
  if(!panelChecks[id]) panelChecks[id]={};
  const cats=[['준비사항','📋','t-prep'],['투약/약물','💉','t-med'],
    ['검사 후','🔍','t-post'],['주의사항','⚠️','t-warn'],['이송 부서','🏥','t-trans']];
  let html='';
  cats.forEach(([cat,icon,cls])=>{
    const items=p[cat]||[];
    if(!items.length) return;
    const isWarn=cat==='주의사항'||cat==='이송 부서';
    html+=`<div class="checklist-section"><div class="checklist-section-title ${cls}">${icon} ${cat}</div>`;
    items.forEach((item,i)=>{
      const key=cat+'_'+i;
      if(isWarn){
        html+=`<div class="warn-item">⚠️ ${item}</div>`;
      } else {
        const chk=panelChecks[id][key]?'checked':'';
        html+=`<div class="check-item ${chk}" onclick="toggleCheck(this.dataset.k)" data-k="${key}">
          <div class="check-box"><span class="check-box-inner">✓</span></div>
          <div><div class="check-text">${item}</div></div></div>`;
      }
    });
    html+='</div>';
  });
  openPage(p.name_ko||p.name_en,html,true);
  updateProgress(id);
}

function renderDrug(){
  const c=document.getElementById('mainContent');
  const cats=[...new Set(DB.drugs.map(d=>d.category))];
  _drugFilter=null;
  c.innerHTML=`<div class="section-title">💊 약물 참고</div>
    <div class="drug-filter" id="drugChips">
      <div class="chip active" onclick="setDrugFilter(null)">전체</div>
      ${cats.map(cat=>`<div class="chip" onclick="setDrugFilter(this.dataset.cat)" data-cat="${cat}">${cat}</div>`).join('')}
    </div>
    <div id="drugList"></div>`;
  renderDrugList();
}

function setDrugFilter(cat){
  _drugFilter=cat;
  document.querySelectorAll('#drugChips .chip').forEach(el=>{
    el.classList.toggle('active', cat===null ? el.textContent==='전체' : el.dataset.cat===cat);
  });
  renderDrugList();
  document.getElementById('pg-main').scrollTop=0;
}

function renderDrugList(){
  const listEl=document.getElementById('drugList');
  if(!listEl) return;
  const cats=_drugFilter?[_drugFilter]:[...new Set(DB.drugs.map(d=>d.category))];
  listEl.innerHTML=cats.map(cat=>{
    const drugs=DB.drugs.filter(d=>d.category===cat);
    return `<div class="cat-header">${DRUG_ICONS[cat]||'💊'} ${cat}</div>
      ${drugs.map(d=>`
        <div class="list-item" onclick="openDrug(this.dataset.id)" data-id="${d.id}">
          <div class="list-item-left">
            <div class="list-item-title">${d.name_en} <span style="font-weight:400;color:var(--text-muted)">${d.name_ko}</span></div>
            <div class="list-item-sub">${d.aliases.split(',').slice(0,3).join(' · ')}</div>
          </div>
          <div class="list-item-arrow">›</div>
        </div>`).join('')}`;
  }).join('');
}

function openDrug(id){
  const d=DB.drugs.find(x=>x.id===id);
  if(!d) return;
  _panelId=id;
  const rows=[['💊 용량',d.dose],['🧪 믹스법',d.mix],['🚗 투여경로',d.route],['⏱️ 속도',d.speed]]
    .filter(r=>r[1]).map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');
  const html=`<div class="drug-category-badge">${d.category}</div>
    <div class="drug-alias">별칭: ${d.aliases||'-'}</div>
    <table class="drug-table"><tbody>${rows}</tbody></table>
    ${d.warning?`<div style="margin-top:12px">
      <div class="checklist-section-title t-warn">⚠️ 주의사항</div>
      ${d.warning.split('/').map(w=>`<div class="warn-item">${w.trim()}</div>`).join('')}
    </div>`:''}`;
  openPage(d.name_en+' / '+d.name_ko,html,false);
}

function renderTask(){
  const c=document.getElementById('mainContent');
  c.innerHTML=`<div class="section-title">📋 필수업무 체크리스트</div>
    <div class="card-grid">
      ${DB.tasks.map(t=>`
        <div class="proc-card" onclick="openTask(this.dataset.id)" data-id="${t.id}">
          <div class="proc-card-icon">${TASK_ICONS[t.name]||'📋'}</div>
          <div class="proc-card-name">${t.name}</div>
          <div class="proc-card-sub">${t.items.length}개 항목</div>
        </div>`).join('')}
    </div>`;
}

function openTask(id){
  const t=DB.tasks.find(x=>x.id===id);
  if(!t) return;
  _panelId=id;
  if(!panelChecks[id]) panelChecks[id]={};
  const html=t.items.map(item=>{
    const key='item_'+item.num;
    const chk=panelChecks[id][key]?'checked':'';
    return `<div class="check-item ${chk}" onclick="toggleCheck(this.dataset.k)" data-k="${key}">
      <div class="check-box"><span class="check-box-inner">✓</span></div>
      <div>
        <div class="check-text"><strong>${item.num}.</strong> ${item.item}</div>
        ${item.desc?`<div class="check-note">${item.desc}</div>`:''}
      </div></div>`;
  }).join('');
  openPage(t.name+' 체크리스트',html,true);
  updateProgress(id);
}

function renderNursing(){
  const c=document.getElementById('mainContent');
  c.innerHTML=DB.nursing.map(n=>`
    <div class="cat-header">${NURSING_ICONS[n.name]||'📝'} ${n.name}</div>
    ${Object.values(n.symptoms).map(s=>`
      <div class="list-item" onclick="openNursing(this.dataset.nid,this.dataset.sname)"
        data-nid="${n.id}" data-sname="${s.name}">
        <div class="list-item-left"><div class="list-item-title">${s.name}</div></div>
        <div class="list-item-arrow">›</div>
      </div>`).join('')}`).join('');
}

function openNursing(nid,sname){
  const n=DB.nursing.find(x=>x.id===nid);
  if(!n) return;
  const s=n.symptoms[sname];
  if(!s) return;
  _panelId=nid+'|||'+sname;
  if(!panelChecks[_panelId]) panelChecks[_panelId]={};
  const sectionConfig={
    '사정 및 평가(A&E)':['📊 사정 및 평가','t-ae'],
    '간호진단(D)':['🏷️ 간호진단','t-diag'],
    '계획 및 중재(P&E)':['📌 계획 및 중재','t-plan'],
  };
  let html='', globalIdx=0;
  Object.entries(s.sections).forEach(([subName,procs])=>{
    html+=`<div style="font-size:12px;font-weight:700;color:var(--text-muted);margin:14px 0 6px;padding-left:4px">${subName}</div>`;
    Object.entries(procs).forEach(([proc,items])=>{
      const [title,cls]=sectionConfig[proc]||[proc,'t-ae'];
      html+=`<div class="checklist-section"><div class="checklist-section-title ${cls}">${title}</div>`;
      items.forEach(item=>{
        const key='n_'+globalIdx++;
        const chk=panelChecks[_panelId][key]?'checked':'';
        html+=`<div class="check-item ${chk}" onclick="toggleCheck(this.dataset.k)" data-k="${key}">
          <div class="check-box"><span class="check-box-inner">✓</span></div>
          <div>
            <div class="check-text">${item.text}</div>
            ${item.note?`<div class="nursing-note">📌 ${item.note}</div>`:''}
          </div></div>`;
      });
      html+='</div>';
    });
  });
  openPage(sname,html,true);
  updateProgress(_panelId);
}

function renderGuide(){
  const c=document.getElementById('mainContent');
  c.innerHTML=DB.guides.map(g=>`
    <div class="list-item" onclick="openGuide(this.dataset.id)" data-id="${g.id}">
      <div class="list-item-left">
        <div class="list-item-title">${g.name_ko} <span style="font-size:11px;color:var(--text-muted)">${g.name_en}</span></div>
        <div class="list-item-sub">${Object.values(g.items).flat().length}개 항목</div>
      </div>
      <div class="list-item-arrow">›</div>
    </div>`).join('');
}

function openGuide(id){
  const g=DB.guides.find(x=>x.id===id);
  if(!g) return;
  _panelId=id;
  const catCls={'준비':'cat-준비','기입':'cat-기입','참고':'cat-참고','주의':'cat-주의',
    '절차':'cat-절차','동의서':'cat-동의서','안내':'cat-안내'};
  const html=Object.entries(g.items).map(([cat,items])=>
    `<div class="checklist-section">
      <div class="checklist-section-title ${catCls[cat]||'t-ae'}">${cat}</div>
      ${items.map(item=>item.includes('⚠️')
        ?`<div class="warn-item">${item}</div>`
        :`<div class="check-item"><div class="check-box"><span class="check-box-inner">✓</span></div><div class="check-text">${item}</div></div>`
      ).join('')}
    </div>`).join('');
  openPage(g.name_ko,html,false);
}

function toggleCheck(key){
  if(!panelChecks[_panelId]) panelChecks[_panelId]={};
  panelChecks[_panelId][key]=!panelChecks[_panelId][key];
  document.querySelectorAll('#detailBody .check-item').forEach(el=>{
    if(el.dataset.k===key) el.classList.toggle('checked',!!panelChecks[_panelId][key]);
  });
  updateProgress(_panelId);
}
function resetChecks(){
  panelChecks[_panelId]={};
  document.querySelectorAll('#detailBody .check-item').forEach(el=>el.classList.remove('checked'));
  updateProgress(_panelId);
}
function updateProgress(id){
  const checks=panelChecks[id]||{};
  const total=document.querySelectorAll('#detailBody .check-item').length;
  const done=Object.values(checks).filter(Boolean).length;
  document.getElementById('progressText').textContent=`${done} / ${total} 완료`;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressFill').style.width=pct+'%';
}

function showAdmin(){
  const pw=prompt('관리자 비밀번호를 입력하세요:');
  if(pw!=='1234'){if(pw!==null) alert('비밀번호가 올바르지 않습니다.');return}
  renderAdminContent();
  document.getElementById('pg-admin').classList.add('active');
}
function closeAdmin(){document.getElementById('pg-admin').classList.remove('active')}
function renderAdminContent(){
  const c=document.getElementById('adminContent');
  const sData={procedure:DB.procedures,drug:DB.drugs,task:DB.tasks,guide:DB.guides};
  const sNames={procedure:'시술/검사',drug:'약물',task:'필수업무',guide:'업무가이드'};
  const items=sData[adminSection]||[];
  c.innerHTML=`<div class="admin-wrap">
    <div class="admin-sidebar">
      ${Object.entries(sNames).map(([k,v])=>`
        <div class="admin-nav-item ${adminSection===k?'active':''}" onclick="adminSection='${k}';renderAdminContent()">${v}</div>`).join('')}
    </div>
    <div class="admin-main">
      <div class="admin-toolbar">
        <strong>${sNames[adminSection]} 관리</strong>
        <button class="btn-export" onclick="exportData()">💾 웹 패키지 내보내기</button>
      </div>
      <table class="admin-table">
        <thead><tr><th>이름(영문)</th><th>이름(한글)</th><th>항목 수</th><th>관리</th></tr></thead>
        <tbody>
          ${items.map((item,i)=>`<tr>
            <td>${item.name_en||item.id||item.name||''}</td>
            <td>${item.name_ko||item.name||''}</td>
            <td>${item.items?.length||'-'}</td>
            <td>
              <button class="btn-edit" onclick="openEdit(${i})">수정</button>
              <button class="btn-del" onclick="openDelete(${i})">삭제</button>
            </td></tr>`).join('')}
        </tbody>
      </table>
    </div></div>`;
}
function openEdit(i){editTarget=i;document.getElementById('editModal').classList.add('show')}
function closeEditModal(){document.getElementById('editModal').classList.remove('show')}
function saveEdit(){closeEditModal();alert('저장되었습니다. (실제 저장은 서버 연동 후 반영)')}
function openDelete(i){
  deleteTarget=i;
  document.getElementById('confirmText').textContent='정말 이 항목을 삭제하시겠습니까?';
  document.getElementById('confirmModal').classList.add('show');
}
function closeConfirm(){document.getElementById('confirmModal').classList.remove('show')}
function confirmDelete(){closeConfirm();alert('삭제되었습니다. (실제 삭제는 서버 연동 후 반영)')}
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='er_mate_data_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  alert('JSON 데이터를 내보냈습니다.');
}
function goHome(){
  closePage();
  closeAdmin();
  showTab('home');
  window.scrollTo({top:0,behavior:'smooth'});
}

renderHome();
</script>
