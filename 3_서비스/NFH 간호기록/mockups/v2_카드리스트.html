<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>V2 · 카드 리스트 (Toss)</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;}
:root{--bg:#f2f4f8;--ink:#191f28;--mut:#8b95a1;--line:#e5e8ee;--ac:#3182f6;--ac2:#1b64da;
 --pos:#fff4f2;--posb:#f0584a;--neg:#eefcf5;--negb:#15c47e;--card:#fff;}
@media(prefers-color-scheme:dark){:root{--bg:#0e1116;--ink:#eaeef5;--mut:#8893a4;--line:#222834;
 --card:#171b22;--pos:#2a1512;--neg:#0f2419;}}
body{background:var(--bg);color:var(--ink);min-height:100vh;
 font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",sans-serif;line-height:1.5;}
.app{max-width:520px;margin:0 auto;padding:0 0 110px;}
header{position:sticky;top:0;z-index:10;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(10px);
 padding:16px 20px 12px;border-bottom:1px solid var(--line);}
.h1{font-size:1.35rem;font-weight:800;letter-spacing:-.02em;}
.prog{display:flex;align-items:center;gap:10px;margin-top:10px;}
.prog .bar{flex:1;height:8px;border-radius:99px;background:var(--line);overflow:hidden;}
.prog .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--ac),#74a9ff);transition:.3s;}
.prog .pct{font-size:.82rem;font-weight:800;color:var(--ac);white-space:nowrap;}
section{padding:16px 20px;}
.search{width:100%;padding:14px 16px;border-radius:14px;border:1px solid var(--line);background:var(--card);color:var(--ink);font:inherit;font-size:1rem;}
.glab{font-size:.78rem;font-weight:800;color:var(--mut);margin:20px 0 9px;}
.chips{display:flex;flex-wrap:wrap;gap:9px;}
.chip{background:var(--card);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:.95rem;font-weight:600;
 padding:13px 17px;border-radius:14px;cursor:pointer;transition:.13s;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.chip:active{transform:scale(.97);} .chip:hover{border-color:var(--ac);}
.cctitle{font-size:1.5rem;font-weight:800;letter-spacing:-.02em;}
.ccsub{color:var(--mut);font-size:.88rem;margin-top:2px;margin-bottom:6px;}
.seclab{font-size:.8rem;font-weight:800;letter-spacing:.02em;margin:22px 4px 10px;display:flex;align-items:center;gap:7px;}
.seclab .dot{width:8px;height:8px;border-radius:99px;}.dot.ae{background:var(--ac);}.dot.d{background:#8b5cf6;}.dot.pe{background:var(--negb);}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 17px;margin-bottom:12px;
 box-shadow:0 1px 3px rgba(20,30,60,.05);transition:.15s;}
.card.has{border-color:var(--ac);}
.card .q{font-size:1.05rem;font-weight:700;letter-spacing:-.01em;}
.card .note{font-size:.82rem;color:var(--mut);margin-top:5px;line-height:1.45;}
.seg{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap;}
.seg button{flex:1;min-width:84px;background:transparent;border:1.5px solid var(--line);color:var(--ink);font:inherit;
 font-size:.95rem;font-weight:700;padding:13px 8px;border-radius:13px;cursor:pointer;transition:.12s;}
.seg button:active{transform:scale(.96);}
.seg button.on.pos{background:var(--pos);border-color:var(--posb);color:var(--posb);}
.seg button.on.neg{background:var(--neg);border-color:var(--negb);color:var(--negb);}
.seg button.on.plain{background:var(--ac);border-color:var(--ac);color:#fff;}
.seg button.skip.on{background:var(--line);border-color:var(--line);color:var(--mut);}
.valin{margin-top:12px;width:100%;padding:13px 14px;border-radius:13px;border:1.5px solid var(--line);background:transparent;color:var(--ink);font:inherit;font-size:1rem;}
.dxcard{background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;border-radius:18px;padding:15px 18px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.dxcard .tag{font-size:.7rem;font-weight:800;background:rgba(0,0,0,.18);padding:3px 9px;border-radius:20px;}
.dxcard .nm{font-size:1.15rem;font-weight:800;}
.peck{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:9px;cursor:pointer;}
.peck input{width:21px;height:21px;accent-color:var(--negb);}
.peck .q{font-weight:600;}
.bottom{position:fixed;left:0;right:0;bottom:0;z-index:20;max-width:520px;margin:0 auto;background:color-mix(in srgb,var(--bg) 92%,transparent);
 backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:13px 20px;display:flex;gap:10px;}
.btn{border:none;border-radius:15px;padding:15px;font:inherit;font-weight:800;font-size:1rem;cursor:pointer;}
.btn.p{background:var(--ac2);color:#fff;flex:1;}.btn.g{background:var(--card);color:var(--ink);border:1px solid var(--line);}
.sheet{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.45);display:none;align-items:flex-end;}
.sheet.show{display:flex;} .sheet .inner{background:var(--bg);width:100%;max-width:520px;margin:0 auto;border-radius:22px 22px 0 0;
 padding:18px 20px 26px;max-height:82vh;overflow:auto;}
.sheet h3{font-size:1.1rem;font-weight:800;margin-bottom:12px;}
table{width:100%;border-collapse:collapse;font-size:.82rem;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
th,td{border-bottom:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top;}
th{background:color-mix(in srgb,var(--card) 60%,var(--line));color:var(--mut);font-size:.74rem;}
td.cat{font-weight:800;}td.pc{font-weight:700;white-space:nowrap;}
td.pc.ae{color:var(--ac);}td.pc.d{color:#8b5cf6;}td.pc.pe{color:var(--negb);}
.empty{color:var(--mut);padding:18px;text-align:center;}
.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);background:var(--negb);color:#fff;font-weight:800;
 padding:11px 20px;border-radius:30px;opacity:0;transition:.25s;pointer-events:none;z-index:60;}
.toast.show{opacity:1;}
</style></head><body>

  <section id="view"></section>

<div class="bottom" id="bottom" style="display:none">

function buildRows(cur,st){
  const rows=[];
  cur.AE.forEach((it,i)=>{ if(st.AE[i].sel) rows.push(["사정 및 평가(A&E)","ae",st.AE[i].sel]); });
  cur.D.forEach((it,i)=>{ if(st.D[i]) rows.push(["간호진단(D)","d",it.s]); });
  cur.PE.forEach((it,i)=>{ if(st.PE[i]) rows.push(["계획 및 중재(P&E)","pe",it.s]); });
  return rows;
}
function freshState(cur){return {AE:cur.AE.map(()=>({sel:null})),D:cur.D.map(()=>true),PE:cur.PE.map(()=>true)};}
function copyTSV(cur,st,toast){
  const rows=buildRows(cur,st); if(!rows.length){toast&&toast("기록이 비어있습니다");return;}
  const lines=rows.map(r=>[cur.소분류,cur.세부분류||"",r[0],r[2]].join("\t"));
  navigator.clipboard.writeText(lines.join("\n")).then(()=>toast&&toast("복사됨 — EMR/엑셀에 붙여넣기")).catch(()=>toast&&toast("복사 실패"));
}
function recordTable(cur,st){
  const rows=buildRows(cur,st);
  if(!rows.length) return '<div class="empty">평가하면 기록이 만들어집니다</div>';
  let h='<table><thead><tr><th>소분류</th><th>세부분류</th><th>과정</th><th>간호 진술문</th></tr></thead><tbody>';
  rows.forEach((r,i)=>{h+='<tr>';
    if(i===0){h+=`<td class="cat" rowspan="${rows.length}">${esc(cur.소분류)}</td><td rowspan="${rows.length}">${esc(cur.세부분류||"")}</td>`;}
    h+=`<td class="pc ${r[1]}">${esc(r[0])}</td><td>${esc(r[2])}</td></tr>`;});
  return h+'</tbody></table>';
}
let _tt; function mkToast(el){return m=>{el.textContent=m;el.classList.add("show");clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove("show"),1700);};}


const toast=mkToast(document.getElementById("toast"));
const view=document.getElementById("view"),prog=document.getElementById("prog"),bottom=document.getElementById("bottom"),sheet=document.getElementById("sheet");
let cur=null,st=null;
function renderPick(f=""){
  cur=null;bottom.style.display="none";prog.innerHTML="";document.getElementById("htitle").textContent="🩺 간호 사정";
  const groups={};BLOCKS.forEach((b,i)=>{const hay=(b.대분류+b.소분류).toLowerCase();if(f&&!hay.includes(f.toLowerCase()))return;(groups[b.대분류]=groups[b.대분류]||[]).push(i);});
  let h=`<input class="search" id="sc" placeholder="주호소 검색 (복부·호흡·출혈·seizure...)" value="${f.replace(/"/g,"")}">`;
  Object.keys(groups).forEach(k=>{h+=`<div class="glab">${esc(k)}</div><div class="chips">`+groups[k].map(i=>`<button class="chip" data-i="${i}">${esc(BLOCKS[i].소분류)}</button>`).join("")+`</div>`;});
  view.innerHTML=h;
  const sc=document.getElementById("sc");sc.oninput=e=>{renderPick(e.target.value);document.getElementById("sc").focus();};
  view.querySelectorAll(".chip").forEach(b=>b.onclick=()=>open(+b.dataset.i));
}
function open(i){cur=BLOCKS[i];st=freshState(cur);render();bottom.style.display="flex";window.scrollTo(0,0);
  document.getElementById("htitle").textContent=cur.대분류;}
function updateProg(){const t=cur.AE.length,d=st.AE.filter(a=>a.answered).length;
  prog.innerHTML=`<div class="prog"><div class="bar"><i style="width:${Math.round(d/t*100)}%"></i></div><div class="pct">${d}/${t} 평가</div></div>`;}
function render(){
  let h=`<div class="cctitle">${esc(cur.소분류)}</div><div class="ccsub">${esc(cur.세부분류||"")} · 항목을 평가하세요</div>`;
  h+=`<div class="seclab"><span class="dot ae"></span>사정 및 평가 (A&E)</div>`;
  cur.AE.forEach((it,idx)=>{
    const tog=parseToggle(it.s),has=st.AE[idx].sel?'has':'';
    let ctrl="";
    if(tog){ctrl='<div class="seg">'+tog.map(o=>{const pos=/있음|강함/.test(o)&&!/없음/.test(o),neg=/없음|약함/.test(o);
        const on=st.AE[idx].sel===o?'on '+(pos?'pos':neg?'neg':'plain'):'';
        return `<button class="${on}" data-i="${idx}" data-sel="${esc(o)}">${esc(o)}</button>`;}).join("")
      +`<button class="skip ${st.AE[idx].answered&&!st.AE[idx].sel?'on':''}" data-i="${idx}" data-skip="1">미평가</button></div>`;}
    else if(isVal(it.s)){ctrl=`<input class="valin" data-i="${idx}" placeholder="값 입력 (선택)" value="${(st.AE[idx].val||'').replace(/"/g,'')}">`;}
    else{const on=st.AE[idx].sel?'on plain':'';ctrl=`<div class="seg"><button class="${on}" data-i="${idx}" data-sel="${esc(it.s)}">기록함</button><button class="skip ${st.AE[idx].answered&&!st.AE[idx].sel?'on':''}" data-i="${idx}" data-skip="1">해당없음</button></div>`;}
    h+=`<div class="card ${has}"><div class="q">${esc(it.s)}</div>`+(it.n?`<div class="note">💡 ${esc(it.n)}</div>`:"")+ctrl+`</div>`;
  });
  h+=`<div class="seclab"><span class="dot d"></span>간호진단 (D)</div>`;
  cur.D.forEach(it=>h+=`<div class="dxcard"><span class="tag">진단</span><span class="nm">${esc(it.s)}</span></div>`);
  h+=`<div class="seclab"><span class="dot pe"></span>계획 및 중재 (P&E)</div>`;
  cur.PE.forEach((it,idx)=>h+=`<label class="peck"><input type="checkbox" data-pe="${idx}" ${st.PE[idx]?'checked':''}><span class="q">${esc(it.s)}</span></label>`);
  view.innerHTML=h;updateProg();
  view.querySelectorAll("[data-sel]").forEach(b=>b.onclick=()=>{const i=+b.dataset.i;st.AE[i]={sel:(st.AE[i].sel===b.dataset.sel?null:b.dataset.sel),answered:true};render();});
  view.querySelectorAll("[data-skip]").forEach(b=>b.onclick=()=>{const i=+b.dataset.i;st.AE[i]={sel:null,answered:true};render();});
  view.querySelectorAll(".valin").forEach(inp=>inp.oninput=()=>{const i=+inp.dataset.i;st.AE[i]={sel:inp.value?cur.AE[i].s:null,val:inp.value,answered:true};updateProg();});
  view.querySelectorAll("[data-pe]").forEach(c=>c.onchange=()=>{st.PE[+c.dataset.pe]=c.checked;});
}
function back(){renderPick();}
function openSheet(){document.getElementById("rec").innerHTML=recordTable(cur,st);sheet.classList.add("show");}
function closeSheet(){sheet.classList.remove("show");}
document.getElementById("done").onclick=openSheet;
document.getElementById("copy2").onclick=()=>copyTSV(cur,st,toast);
sheet.onclick=e=>{if(e.target===sheet)closeSheet();};
renderPick();
</script></body></html>
