<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V1 · 대화형 사정 (Typeform/TurboTax)</title><style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;}
:root{--bg:#0b1020;--ink:#f1f5fb;--mut:#8a98b8;--line:#293252;--ac:#4f8cff;--ac2:#2f6be0;
 --pos:#f97362;--neg:#34d399;--card:#151c34;--card2:#1c264a;}
body{background:radial-gradient(900px 500px at 50% -10%,#16204a,var(--bg));color:var(--ink);min-height:100vh;
 font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",sans-serif;}
.frame{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.top{padding:18px 22px 10px;}
.bar{height:7px;border-radius:99px;background:var(--line);overflow:hidden;}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--ac),#7aa8ff);transition:.35s;}
.barlbl{font-size:.78rem;color:var(--mut);margin-top:8px;display:flex;justify-content:space-between;}
.body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:8px 26px 24px;}
h1.t{font-size:1.05rem;font-weight:700;letter-spacing:-.01em;}
.sub{color:var(--mut);font-size:.85rem;margin-top:3px;}
/* picker */
.pick h2{font-size:.78rem;color:var(--mut);margin:18px 0 8px;font-weight:700;}
.chips{display:flex;flex-wrap:wrap;gap:9px;}
.chip{background:var(--card);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:.92rem;
 padding:12px 16px;border-radius:13px;cursor:pointer;transition:.14s;}
.chip:hover{border-color:var(--ac);transform:translateY(-2px);background:var(--card2);}
.search{width:100%;padding:13px 15px;border-radius:13px;border:1px solid var(--line);background:var(--card);color:var(--ink);font:inherit;}
/* question */
.qtag{font-size:.74rem;font-weight:800;letter-spacing:.08em;color:var(--ac);margin-bottom:14px;}
.q{font-size:1.7rem;font-weight:800;letter-spacing:-.02em;line-height:1.3;}
.note{margin-top:14px;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--ac);
 border-radius:10px;padding:11px 14px;color:#c4d0ee;font-size:.86rem;line-height:1.5;}
.ans{margin-top:26px;display:flex;flex-direction:column;gap:11px;}
.opt{display:flex;align-items:center;gap:13px;background:var(--card);border:2px solid var(--line);color:var(--ink);
 font:inherit;font-size:1.05rem;font-weight:600;padding:17px 18px;border-radius:14px;cursor:pointer;text-align:left;transition:.13s;}
.opt:hover{border-color:var(--ac);}
.opt .k{flex:none;width:26px;height:26px;border-radius:7px;background:var(--card2);display:grid;place-items:center;
 font-size:.78rem;color:var(--mut);font-weight:800;}
.opt.pos{border-color:var(--pos);} .opt.pos .k{background:var(--pos);color:#1a0c0a;}
.opt.neg{border-color:var(--neg);} .opt.neg .k{background:var(--neg);color:#04130d;}
.opt.skip{justify-content:center;color:var(--mut);font-size:.92rem;border-style:dashed;}
.valin{width:100%;padding:16px;border-radius:14px;border:2px solid var(--line);background:var(--card);color:var(--ink);font:inherit;font-size:1.05rem;}
.nav{display:flex;gap:10px;margin-top:22px;}
.btn{border:none;border-radius:13px;padding:14px;font:inherit;font-weight:700;cursor:pointer;font-size:.95rem;}
.btn.p{background:var(--ac2);color:#fff;flex:1;} .btn.g{background:var(--card2);color:var(--ink);border:1px solid var(--line);}
/* review */
.review h1{font-size:1.5rem;font-weight:800;letter-spacing:-.02em;}
.rsec{margin-top:18px;} .rsec .lab{font-size:.76rem;font-weight:800;letter-spacing:.04em;margin-bottom:8px;}
.lab.d{color:#b794f6;} .lab.pe{color:var(--neg);}
.ck{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:8px;cursor:pointer;}
.ck input{width:20px;height:20px;accent-color:var(--ac);}
table{width:100%;border-collapse:collapse;font-size:.82rem;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:8px;}
th,td{border-bottom:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top;}
th{background:var(--card2);color:var(--mut);font-size:.74rem;}
td.cat{font-weight:800;background:#10183a;} td.pc{font-weight:700;white-space:nowrap;}
td.pc.ae{color:#7fb0ff;}td.pc.d{color:#b794f6;}td.pc.pe{color:var(--neg);}
.empty{color:var(--mut);padding:16px;text-align:center;}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--neg);color:#04130d;
 font-weight:800;padding:11px 20px;border-radius:30px;opacity:0;transition:.25s;pointer-events:none;}
.toast.show{opacity:1;}
</style></head><body>
<div class="frame">

  <div class="body" id="view"></div>

function buildRows(cur,st){
  const rows=[];
  cur.AE.forEach((it,i)=>{ if(st.AE[i].sel) rows.push(["사정 및 평가(A&E)","ae",st.AE[i].sel]); });
  cur.D.forEach((it,i)=>{ if(st.D[i]) rows.push(["간호진단(D)","d",it.s]); });
  cur.PE.forEach((it,i)=>{ if(st.PE[i]) rows.push(["계획 및 중재(P&E)","pe",it.s]); });
  return rows;
}
function freshState(cur){return {AE:cur.AE.map(()=>({sel:null})),D:cur.D.map(()=>true),PE:cur.PE.map(()=>true)};}
function copyTSV(cur,st,toast){
  const rows=buildRows(cur,st); if(!rows.length){toast&&toast("기록이 비어있습니다");return;}
  const lines=rows.map(r=>[cur.소분류,cur.세부분류||"",r[0],r[2]].join("\t"));
  navigator.clipboard.writeText(lines.join("\n")).then(()=>toast&&toast("복사됨 — EMR/엑셀에 붙여넣기")).catch(()=>toast&&toast("복사 실패"));
}
function recordTable(cur,st){
  const rows=buildRows(cur,st);
  if(!rows.length) return '<div class="empty">평가하면 기록이 만들어집니다</div>';
  let h='<table><thead><tr><th>소분류</th><th>세부분류</th><th>과정</th><th>간호 진술문</th></tr></thead><tbody>';
  rows.forEach((r,i)=>{h+='<tr>';
    if(i===0){h+=`<td class="cat" rowspan="${rows.length}">${esc(cur.소분류)}</td><td rowspan="${rows.length}">${esc(cur.세부분류||"")}</td>`;}
    h+=`<td class="pc ${r[1]}">${esc(r[0])}</td><td>${esc(r[2])}</td></tr>`;});
  return h+'</tbody></table>';
}
let _tt; function mkToast(el){return m=>{el.textContent=m;el.classList.add("show");clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove("show"),1700);};}


const toast=mkToast(document.getElementById("toast"));
let cur=null,st=null,qi=0,phase="pick";
const view=document.getElementById("view"),topEl=document.getElementById("top");
function renderPick(f=""){
  phase="pick"; topEl.innerHTML="";
  const groups={};
  BLOCKS.forEach((b,i)=>{const hay=(b.대분류+b.소분류).toLowerCase();if(f&&!hay.includes(f.toLowerCase()))return;(groups[b.대분류]=groups[b.대분류]||[]).push(i);});
  let h='<h1 class="t">🩺 무엇 때문에 오셨나요?</h1><div class="sub">주호소를 선택하면 한 문항씩 사정합니다</div>';
  h+='<div class="pick" style="margin-top:18px"><input class="search" id="sc" placeholder="검색 (복부·호흡·출혈·seizure...)" value="'+f.replace(/"/g,"")+'">';
  Object.keys(groups).forEach(k=>{h+=`<h2>${esc(k)}</h2><div class="chips">`+groups[k].map(i=>`<button class="chip" data-i="${i}">${esc(BLOCKS[i].소분류)}</button>`).join("")+`</div>`;});
  h+='</div>';
  view.innerHTML=h;
  const sc=document.getElementById("sc"); sc.oninput=e=>{renderPick(e.target.value);document.getElementById("sc").focus();};
  view.querySelectorAll(".chip").forEach(b=>b.onclick=()=>start(+b.dataset.i));
}
function start(i){cur=BLOCKS[i];st=freshState(cur);qi=0;phase="ae";renderFlow();}
function progress(){const total=cur.AE.length;const done=st.AE.filter(a=>a.answered).length;
  topEl.innerHTML=`<div class="bar"><i style="width:${phase==='review'?100:Math.round(done/total*100)}%"></i></div>
  <div class="barlbl"><span>${esc(cur.소분류)}</span><span>${phase==='review'?'사정 완료':`${qi+1} / ${total}`}</span></div>`;}
function renderFlow(){
  if(qi>=cur.AE.length){return renderReview();}
  progress();
  const it=cur.AE[qi], tog=parseToggle(it.s);
  let ans="";
  if(tog){ans=tog.map((o,j)=>{const pos=/있음|강함/.test(o)&&!/없음/.test(o);const neg=/없음|약함/.test(o);
      return `<button class="opt ${pos?'pos':neg?'neg':''}" data-sel="${esc(o)}"><span class="k">${j+1}</span>${esc(o)}</button>`;}).join("")
    +`<button class="opt skip" data-skip="1">미평가 · 건너뛰기</button>`;}
  else if(isVal(it.s)){ans=`<input class="valin" id="vi" placeholder="값 입력 (선택)"><div class="nav"><button class="btn g" data-skip="1">미평가</button><button class="btn p" id="vnext">다음 →</button></div>`;}
  else{ans=`<button class="opt pos" data-sel="${esc(it.s)}"><span class="k">✓</span>기록함</button><button class="opt skip" data-skip="1">해당 없음</button>`;}
  view.innerHTML=`<div class="qtag">사정 및 평가 (A&E)</div><div class="q">${esc(it.s)}</div>`+
    (it.n?`<div class="note">💡 ${esc(it.n)}</div>`:"")+`<div class="ans">${ans}</div>`+
    `<div class="nav"><button class="btn g" id="back">← 이전</button></div>`;
  view.querySelectorAll("[data-sel]").forEach(b=>b.onclick=()=>{st.AE[qi]={sel:b.dataset.sel,answered:true};next();});
  view.querySelectorAll("[data-skip]").forEach(b=>b.onclick=()=>{st.AE[qi]={sel:null,answered:true};next();});
  const vn=document.getElementById("vnext");if(vn)vn.onclick=()=>{const v=document.getElementById("vi").value;st.AE[qi]={sel:v?it.s:null,answered:true};next();};
  document.getElementById("back").onclick=()=>{if(qi>0){qi--;renderFlow();}else renderPick();};
}
function next(){qi++;renderFlow();}
function renderReview(){
  phase="review";progress();
  let h='<h1 class="t" style="font-size:1.5rem;font-weight:800">기록 확인</h1><div class="sub">진단·중재를 확인하고 복사하세요</div>';
  h+='<div class="rsec"><div class="lab d">간호진단 (D)</div>'+cur.D.map((it,i)=>`<label class="ck"><input type="checkbox" data-t="D" data-i="${i}" ${st.D[i]?'checked':''}><span>${esc(it.s)}</span></label>`).join("")+'</div>';
  h+='<div class="rsec"><div class="lab pe">계획 및 중재 (P&E)</div>'+cur.PE.map((it,i)=>`<label class="ck"><input type="checkbox" data-t="PE" data-i="${i}" ${st.PE[i]?'checked':''}><span>${esc(it.s)}</span></label>`).join("")+'</div>';
  h+='<div class="rsec"><div class="lab">📋 완성된 간호기록</div><div id="rec">'+recordTable(cur,st)+'</div></div>';
  h+='<div class="nav"><button class="btn g" id="back">← 이전</button><button class="btn g" id="restart">처음으로</button><button class="btn p" id="copy">복사하기</button></div>';
  view.innerHTML=h;
  view.querySelectorAll("input[type=checkbox]").forEach(c=>c.onchange=()=>{st[c.dataset.t][+c.dataset.i]=c.checked;document.getElementById("rec").innerHTML=recordTable(cur,st);});
  document.getElementById("back").onclick=()=>{qi=cur.AE.length-1;renderFlow();};
  document.getElementById("restart").onclick=()=>renderPick();
  document.getElementById("copy").onclick=()=>copyTSV(cur,st,toast);
}
renderPick();
</script></body></html>
