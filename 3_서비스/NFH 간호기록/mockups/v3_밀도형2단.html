<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>V3 · 밀도형 2단 (Apple Health/Linear)</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;}
:root{--bg:#0d1017;--panel:#141821;--panel2:#1a1f2b;--ink:#e6eaf2;--mut:#7e8aa0;--line:#232a38;
 --ac:#5b9dff;--ac2:#2f6be0;--pos:#ff7a6b;--neg:#3ddc97;--dx:#b794f6;}
@media(prefers-color-scheme:light){:root{--bg:#f4f6fa;--panel:#fff;--panel2:#f0f3f8;--ink:#1a2230;--mut:#6b7686;--line:#e3e8f0;}}
body{background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;
 font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",sans-serif;font-size:14px;line-height:1.45;}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 18px;border-bottom:1px solid var(--line);background:var(--panel);}
.topbar .logo{font-weight:800;letter-spacing:-.01em;}
.topbar select{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:7px 11px;font:inherit;font-weight:600;max-width:280px;}
.prog{display:flex;align-items:center;gap:9px;margin-left:auto;font-size:.82rem;color:var(--mut);}
.prog .bar{width:120px;height:6px;border-radius:99px;background:var(--line);overflow:hidden;}
.prog .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--ac),#8fbcff);transition:.3s;}
.tbtn{background:var(--ac2);color:#fff;border:none;border-radius:9px;padding:8px 14px;font:inherit;font-weight:700;cursor:pointer;}
.tbtn.g{background:var(--panel2);color:var(--ink);border:1px solid var(--line);}
.split{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 49px);}
@media(max-width:860px){.split{grid-template-columns:1fr;}.right{display:none;}.right.show{display:block;}}
.pane{overflow:auto;padding:16px 18px;}
.left{border-right:1px solid var(--line);}
.right{background:var(--panel);}
/* picker overlay */
.pickwrap{max-width:760px;margin:30px auto;}
.pickwrap h1{font-size:1.4rem;font-weight:800;letter-spacing:-.02em;margin-bottom:4px;}
.pickwrap .s{color:var(--mut);margin-bottom:16px;}
.search{width:100%;padding:12px 14px;border-radius:11px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font:inherit;margin-bottom:8px;}
.glab{font-size:.74rem;font-weight:800;color:var(--mut);margin:16px 0 8px;letter-spacing:.03em;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{background:var(--panel);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:.9rem;padding:9px 13px;border-radius:10px;cursor:pointer;transition:.12s;}
.chip:hover{border-color:var(--ac);background:var(--panel2);}
/* assess rows */
.sec{font-size:.72rem;font-weight:800;letter-spacing:.05em;color:var(--mut);margin:6px 0 10px;text-transform:uppercase;}
.row{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;background:var(--panel);}
.row.has{border-color:var(--ac);background:color-mix(in srgb,var(--ac) 8%,var(--panel));}
.row .info{flex:1;min-width:0;}
.row .q{font-weight:600;font-size:.95rem;}
.row .note{font-size:.76rem;color:var(--mut);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.seg{display:flex;gap:5px;flex:none;}
.seg button{background:transparent;border:1px solid var(--line);color:var(--mut);font:inherit;font-size:.82rem;font-weight:700;padding:7px 11px;border-radius:8px;cursor:pointer;transition:.1s;white-space:nowrap;}
.seg button.on.pos{background:var(--pos);border-color:var(--pos);color:#1a0c0a;}
.seg button.on.neg{background:var(--neg);border-color:var(--neg);color:#04130d;}
.seg button.on.plain{background:var(--ac);border-color:var(--ac);color:#fff;}
.seg button.skip.on{background:var(--line);color:var(--mut);}
.valin{flex:none;width:150px;padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--ink);font:inherit;font-size:.85rem;}
.ck{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:7px;cursor:pointer;background:var(--panel);}
.ck input{width:18px;height:18px;accent-color:var(--neg);}
.dxrow{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:10px;margin-bottom:7px;background:color-mix(in srgb,var(--dx) 14%,var(--panel));border:1px solid color-mix(in srgb,var(--dx) 40%,var(--line));}
.dxrow .b{font-size:.66rem;font-weight:800;background:var(--dx);color:#1a0f2e;padding:2px 7px;border-radius:12px;}
.dxrow .nm{font-weight:700;color:var(--dx);}
/* preview */
.rhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.rhead h2{font-size:.95rem;font-weight:800;}
.rhead .cnt{font-size:.78rem;color:var(--mut);}
table{width:100%;border-collapse:collapse;font-size:.82rem;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
th,td{border-bottom:1px solid var(--line);border-right:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top;}
th:last-child,td:last-child{border-right:none;}
th{background:var(--panel2);color:var(--mut);font-size:.72rem;font-weight:700;}
td.cat{font-weight:800;background:color-mix(in srgb,var(--panel2) 70%,var(--panel));}
td.pc{font-weight:700;white-space:nowrap;}td.pc.ae{color:var(--ac);}td.pc.d{color:var(--dx);}td.pc.pe{color:var(--neg);}
.empty{color:var(--mut);padding:24px;text-align:center;border:1px dashed var(--line);border-radius:10px;}
.tsv{margin-top:14px;}.tsv .lab{font-size:.72rem;color:var(--mut);margin-bottom:5px;}
.tsv textarea{width:100%;height:120px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--ink);font-family:ui-monospace,monospace;font-size:.78rem;padding:10px;resize:vertical;}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--neg);color:#04130d;font-weight:800;padding:10px 18px;border-radius:30px;opacity:0;transition:.25s;pointer-events:none;z-index:60;}
.toast.show{opacity:1;}
.hidden{display:none;}
</style></head><body>

function buildRows(cur,st){
  const rows=[];
  cur.AE.forEach((it,i)=>{ if(st.AE[i].sel) rows.push(["사정 및 평가(A&E)","ae",st.AE[i].sel]); });
  cur.D.forEach((it,i)=>{ if(st.D[i]) rows.push(["간호진단(D)","d",it.s]); });
  cur.PE.forEach((it,i)=>{ if(st.PE[i]) rows.push(["계획 및 중재(P&E)","pe",it.s]); });
  return rows;
}
function freshState(cur){return {AE:cur.AE.map(()=>({sel:null})),D:cur.D.map(()=>true),PE:cur.PE.map(()=>true)};}
function copyTSV(cur,st,toast){
  const rows=buildRows(cur,st); if(!rows.length){toast&&toast("기록이 비어있습니다");return;}
  const lines=rows.map(r=>[cur.소분류,cur.세부분류||"",r[0],r[2]].join("\t"));
  navigator.clipboard.writeText(lines.join("\n")).then(()=>toast&&toast("복사됨 — EMR/엑셀에 붙여넣기")).catch(()=>toast&&toast("복사 실패"));
}
function recordTable(cur,st){
  const rows=buildRows(cur,st);
  if(!rows.length) return '<div class="empty">평가하면 기록이 만들어집니다</div>';
  let h='<table><thead><tr><th>소분류</th><th>세부분류</th><th>과정</th><th>간호 진술문</th></tr></thead><tbody>';
  rows.forEach((r,i)=>{h+='<tr>';
    if(i===0){h+=`<td class="cat" rowspan="${rows.length}">${esc(cur.소분류)}</td><td rowspan="${rows.length}">${esc(cur.세부분류||"")}</td>`;}
    h+=`<td class="pc ${r[1]}">${esc(r[0])}</td><td>${esc(r[2])}</td></tr>`;});
  return h+'</tbody></table>';
}
let _tt; function mkToast(el){return m=>{el.textContent=m;el.classList.add("show");clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove("show"),1700);};}


const toast=mkToast(document.getElementById("toast"));
const picker=document.getElementById("picker"),pw=document.getElementById("pickwrap"),ws=document.getElementById("workspace");
const assess=document.getElementById("assess"),right=document.getElementById("right"),prog=document.getElementById("prog"),ccsel=document.getElementById("ccsel");
let cur=null,st=null;
function renderPick(f=""){
  const groups={};BLOCKS.forEach((b,i)=>{const hay=(b.대분류+b.소분류).toLowerCase();if(f&&!hay.includes(f.toLowerCase()))return;(groups[b.대분류]=groups[b.대분류]||[]).push(i);});
  let h=`<h1>🩺 간호 사정</h1><div class="s">주호소를 선택하면 좌측에서 사정하고, 우측에 간호기록이 실시간으로 만들어집니다.</div>
    <input class="search" id="sc" placeholder="검색 (복부·호흡·출혈·seizure...)" value="${f.replace(/"/g,"")}">`;
  Object.keys(groups).forEach(k=>{h+=`<div class="glab">${esc(k)}</div><div class="chips">`+groups[k].map(i=>`<button class="chip" data-i="${i}">${esc(BLOCKS[i].소분류)}</button>`).join("")+`</div>`;});
  pw.innerHTML=h;
  const sc=document.getElementById("sc");sc.oninput=e=>{renderPick(e.target.value);document.getElementById("sc").focus();};
  pw.querySelectorAll(".chip").forEach(b=>b.onclick=()=>open(+b.dataset.i));
}
function fillSel(){ccsel.innerHTML=BLOCKS.map((b,i)=>`<option value="${i}">${esc(b.대분류)} › ${esc(b.소분류)}</option>`).join("");}
function open(i){cur=BLOCKS[i];st=freshState(cur);picker.classList.add("hidden");ws.classList.remove("hidden");fillSel();ccsel.value=i;renderAssess();renderRight();}
ccsel.onchange=()=>open(+ccsel.value);
function updateProg(){const t=cur.AE.length,d=st.AE.filter(a=>a.answered).length;
  prog.innerHTML=`<span>A&E ${d}/${t}</span><div class="bar"><i style="width:${Math.round(d/t*100)}%"></i></div>`;}
function renderAssess(){
  let h=`<div class="sec">사정 및 평가 (A&E) · 환자 확인</div>`;
  cur.AE.forEach((it,idx)=>{
    const tog=parseToggle(it.s),has=st.AE[idx].sel?'has':'';let ctrl="";
    if(tog){ctrl='<div class="seg">'+tog.map(o=>{const pos=/있음|강함/.test(o)&&!/없음/.test(o),neg=/없음|약함/.test(o);
        const on=st.AE[idx].sel===o?'on '+(pos?'pos':neg?'neg':'plain'):'';
        return `<button class="${on}" data-i="${idx}" data-sel="${esc(o)}">${esc(o)}</button>`;}).join("")
      +`<button class="skip ${st.AE[idx].answered&&!st.AE[idx].sel?'on':''}" data-i="${idx}" data-skip="1">–</button></div>`;}
    else if(isVal(it.s)){ctrl=`<input class="valin" data-i="${idx}" placeholder="값" value="${(st.AE[idx].val||'').replace(/"/g,'')}">`;}
    else{const on=st.AE[idx].sel?'on plain':'';ctrl=`<div class="seg"><button class="${on}" data-i="${idx}" data-sel="${esc(it.s)}">기록</button><button class="skip ${st.AE[idx].answered&&!st.AE[idx].sel?'on':''}" data-i="${idx}" data-skip="1">×</button></div>`;}
    h+=`<div class="row ${has}"><div class="info"><div class="q">${esc(it.s)}</div>`+(it.n?`<div class="note" title="${esc(it.n)}">💡 ${esc(it.n)}</div>`:"")+`</div>${ctrl}</div>`;
  });
  h+=`<div class="sec" style="margin-top:18px">간호진단 (D)</div>`;
  cur.D.forEach(it=>h+=`<div class="dxrow"><span class="b">D</span><span class="nm">${esc(it.s)}</span></div>`);
  h+=`<div class="sec" style="margin-top:18px">계획 및 중재 (P&E)</div>`;
  cur.PE.forEach((it,idx)=>h+=`<label class="ck"><input type="checkbox" data-pe="${idx}" ${st.PE[idx]?'checked':''}><span class="info"><span class="q">${esc(it.s)}</span></span></label>`);
  assess.innerHTML=h;updateProg();
  assess.querySelectorAll("[data-sel]").forEach(b=>b.onclick=()=>{const i=+b.dataset.i;st.AE[i]={sel:(st.AE[i].sel===b.dataset.sel?null:b.dataset.sel),answered:true};renderAssess();renderRight();});
  assess.querySelectorAll("[data-skip]").forEach(b=>b.onclick=()=>{const i=+b.dataset.i;st.AE[i]={sel:null,answered:true};renderAssess();renderRight();});
  assess.querySelectorAll(".valin").forEach(inp=>inp.oninput=()=>{const i=+inp.dataset.i;st.AE[i]={sel:inp.value?cur.AE[i].s:null,val:inp.value,answered:true};updateProg();renderRight();});
  assess.querySelectorAll("[data-pe]").forEach(c=>c.onchange=()=>{st.PE[+c.dataset.pe]=c.checked;renderRight();});
}
function renderRight(){
  const rows=buildRows(cur,st);
  right.innerHTML=`<div class="rhead"><h2>📋 간호기록 미리보기</h2><span class="cnt">${rows.length}행 · 진술문 원문</span></div>`+recordTable(cur,st)
    +`<div class="tsv"><div class="lab">복사용 (EMR 붙여넣기 · TSV)</div><textarea readonly>${rows.map(r=>[cur.소분류,cur.세부분류||"",r[0],r[2]].join("\t")).join("\n")}</textarea></div>`;
}
function copyNow(){copyTSV(cur,st,toast);}
function csvNow(){const rows=buildRows(cur,st);if(!rows.length)return toast("기록이 비어있습니다");
  const e=v=>'"'+String(v).replace(/"/g,'""')+'"';const head=["소분류","세부분류","간호일지 과정","간호 진술문"];
  const csv="﻿"+[head.map(e).join(","),...rows.map(r=>[cur.소분류,cur.세부분류||"",r[0],r[2]].map(e).join(","))].join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download=`간호기록_${cur.소분류}.csv`;a.click();toast("CSV 저장됨");}
document.getElementById("toRec").onclick=()=>{right.classList.toggle("show");};
fillSel();renderPick();
</script></body></html>
